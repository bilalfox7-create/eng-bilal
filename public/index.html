<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>إدارة مشروعات ليبيا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#07090F;--navy2:#0A0D18;
  --blue:#60A5FA;--blue2:#0A1A30;--blue3:#163660;
  --green:#34D399;--green2:#031208;--green3:#06281A;
  --red:#F87171;--red2:#1A0505;
  --gold:#FCD34D;--gold2:#150E00;
  --purple:#A78BFA;--purple2:#0D0818;
  --cyan:#22D3EE;--cyan2:#041820;
  --gray:#3D4A62;--gray2:#0D1017;--gray3:#090C12;
  --bdr:#151B2E;--bdr2:#1E2640;
  --text:#E8ECF5;--sub:#566078;
  --bg:#060810;--bg2:#0C0F1C;--bg3:#090B16;
  --r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 8px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.4);
  --shadow2:0 8px 24px rgba(0,0,0,.7);
  --shadow3:0 20px 60px rgba(0,0,0,.8);
  --glow-blue:0 0 20px rgba(96,165,250,.2);
  --glow-green:0 0 20px rgba(52,211,153,.2);
  --glow-gold:0 0 20px rgba(252,211,77,.2);
  --glow-purple:0 0 20px rgba(167,139,250,.2);
}

/* ── Base & background ── */
body{
  font-family:'Cairo','Segoe UI',sans-serif;
  direction:rtl;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,rgba(96,165,250,.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(167,139,250,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%,rgba(34,211,238,.03) 0%,transparent 60%);
  pointer-events:none;
  z-index:0;
}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* ── Sidebar ── */
.sidebar{
  width:240px;
  background:linear-gradient(180deg,rgba(10,13,24,.98) 0%,rgba(7,9,15,.99) 100%);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  position:relative;
}
.sidebar::before{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,rgba(96,165,250,.3),rgba(167,139,250,.2),transparent);
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;order:3}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── Sidebar header ── */
.sb-header{
  padding:18px 16px 14px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(96,165,250,.07) 0%,rgba(167,139,250,.04) 100%);
  position:relative;
}
.sb-logo{
  width:64px;height:64px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.5),0 0 0 1px rgba(96,165,250,.1);
}
.sb-logo img{width:60px;height:60px;object-fit:contain;display:block}
.sb-title{color:#fff;font-size:12px;font-weight:900;text-align:center;line-height:1.4;letter-spacing:.3px;padding:0 4px}
.sb-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.25),rgba(167,139,250,.15),transparent);margin:2px 0}

/* nav */
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{
  padding:14px 18px 5px;
  font-size:8.5px;font-weight:800;
  color:rgba(255,255,255,.2);
  letter-spacing:1.8px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.sb-section::before{content:'';display:inline-block;width:14px;height:1px;background:rgba(255,255,255,.15);flex-shrink:0}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  border-radius:10px;margin:1px 8px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  color:rgba(255,255,255,.35);
  font-size:12px;font-weight:600;
  position:relative;overflow:hidden;
}
.nav-item::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(90deg,rgba(96,165,250,.08),transparent);
  transition:opacity .2s;border-radius:10px;
}
.nav-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.04)}
.nav-item:hover::before{opacity:1}
.nav-item.on{
  background:linear-gradient(90deg,rgba(96,165,250,.18),rgba(99,102,241,.07));
  color:var(--blue);
  box-shadow:0 2px 14px rgba(96,165,250,.1);
}
.nav-item.on::after{
  content:'';position:absolute;right:0;top:18%;bottom:18%;width:3px;
  background:linear-gradient(180deg,#60A5FA,#818CF8);
  border-radius:2px 0 0 2px;
  box-shadow:0 0 10px rgba(96,165,250,.7);
}
.nav-item-icon{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
  background:rgba(255,255,255,.04);
}
.nav-item.on .nav-item-icon{background:rgba(96,165,250,.15)}
.nav-item svg{width:15px;height:15px;fill:currentColor}
.nav-badge{margin-right:auto;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;box-shadow:0 2px 6px rgba(239,68,68,.4)}

/* Province sub-items in sidebar */
.nav-sub-item{
  display:flex;align-items:center;gap:9px;
  padding:6px 14px 6px 22px;cursor:pointer;
  border-radius:8px;margin:1px 8px 1px 18px;
  transition:all .18s;color:rgba(255,255,255,.28);
  font-size:11px;font-weight:600;
}
.nav-sub-item:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.nav-sub-item.on{color:#93C5FD;background:rgba(96,165,250,.12)}
.nav-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .18s}
.nav-sub-item.on .nav-sub-dot{transform:scale(1.4);box-shadow:0 0 6px currentColor}

/* footer */
.sb-footer{
  padding:12px 12px;
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:4px;
}
.sb-month-info{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  margin-bottom:2px;
}
.sb-month-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.sb-month-text{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;flex:1;line-height:1.3}
.sb-month-count{font-size:11px;font-weight:800;color:var(--green)}
.sb-ver{font-size:9px;color:rgba(255,255,255,.12);margin-bottom:0;text-align:center}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;
  background:rgba(12,15,28,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
  gap:10px;flex-wrap:wrap;flex-shrink:0;
  backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(255,255,255,.03),var(--shadow);
  order:1;
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.menu-btn{
  width:38px;height:38px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.menu-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.menu-btn svg{width:16px;height:16px;fill:var(--sub)}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.page-title{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:.2px}
.page-sub{font-size:11px;color:var(--sub);white-space:nowrap;font-weight:500}
.sep{width:1px;height:20px;background:rgba(255,255,255,.07)}

/* ── Month strip ── */
.mstrip{
  display:flex;gap:6px;overflow-x:auto;
  padding:8px 20px;
  background:rgba(9,11,22,.9);
  border-bottom:1px solid rgba(255,255,255,.04);
  scrollbar-width:none;align-items:center;flex-shrink:0;order:2;
  backdrop-filter:blur(10px);
}
.mstrip::-webkit-scrollbar{display:none}
.mchip{
  padding:5px 14px;border-radius:100px;
  font-size:11px;font-weight:600;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  cursor:pointer;white-space:nowrap;
  color:var(--sub);
  display:inline-flex;align-items:center;gap:5px;
  transition:all .18s;flex-shrink:0;
}
.mchip:hover{border-color:rgba(96,165,250,.4);color:var(--blue);background:rgba(96,165,250,.08)}
.mchip.cur{
  background:linear-gradient(135deg,rgba(96,165,250,.25),rgba(99,102,241,.15));
  color:#93C5FD;border-color:rgba(96,165,250,.5);
  font-weight:700;
  box-shadow:0 0 16px rgba(96,165,250,.2),inset 0 0 12px rgba(96,165,250,.05);
}
.mchip.saved{border-color:rgba(52,211,153,.4);color:var(--green);background:rgba(52,211,153,.06)}
.mchip.cur.saved{
  background:linear-gradient(135deg,rgba(52,211,153,.2),rgba(16,185,129,.1));
  color:#6EE7B7;border-color:rgba(52,211,153,.5);
  box-shadow:0 0 16px rgba(52,211,153,.2);
}
.mchip.add{border-style:dashed;border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.25)}
.mchip.add:hover{border-color:rgba(96,165,250,.3);color:var(--blue);border-style:dashed}
.mchip-x{display:none;align-items:center;justify-content:center;margin-right:-4px;margin-left:2px;opacity:.35;cursor:pointer;transition:opacity .15s}
.mchip-del:hover .mchip-x{display:inline-flex}
.mchip-x:hover{opacity:1!important;color:#f87171}
.mdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Buttons ── */
.btn{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  border-radius:10px;padding:7px 14px;cursor:pointer;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  white-space:nowrap;font-family:'Cairo',sans-serif;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  transition:opacity .18s;
}
.btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97) translateY(0)}
.btn:disabled{opacity:.35;cursor:default;transform:none}
.btn.blue{
  background:linear-gradient(135deg,#3B82F6,#6366F1);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(99,102,241,.4),0 1px 0 rgba(255,255,255,.2) inset;
}
.btn.blue:hover{background:linear-gradient(135deg,#60A5FA,#818CF8);box-shadow:0 6px 20px rgba(99,102,241,.5)}
.btn.green{
  background:linear-gradient(135deg,#059669,#34D399);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(52,211,153,.3);
}
.btn.green:hover{background:linear-gradient(135deg,#10B981,#6EE7B7);box-shadow:0 6px 20px rgba(52,211,153,.4)}
.btn.gold{
  background:linear-gradient(135deg,#D97706,#FCD34D);
  color:#0C0800;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(252,211,77,.3);
}
.btn.red-outline{border-color:rgba(248,113,113,.4);color:var(--red);background:rgba(248,113,113,.05)}
.btn.red-outline:hover{background:rgba(248,113,113,.12);border-color:var(--red);box-shadow:0 4px 12px rgba(248,113,113,.2)}
.btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.btn-icon{
  width:34px;height:34px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.btn-icon:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.btn-icon svg{width:13px;height:13px;fill:var(--sub)}
.btn-icon.del:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4)}
.btn-icon.del:hover svg{fill:var(--red)}
.btn-icon.edit:hover{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.4)}
.btn-icon.edit:hover svg{fill:var(--blue)}

/* ── Status badges ── */
.paid-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:100px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid transparent;
  transition:all .2s;user-select:none;white-space:nowrap;
}
.paid-badge.yes{
  background:rgba(52,211,153,.1);color:var(--green);
  border-color:rgba(52,211,153,.25);
  box-shadow:0 0 10px rgba(52,211,153,.1);
}
.paid-badge.yes:hover{background:rgba(52,211,153,.18);border-color:rgba(52,211,153,.5);box-shadow:0 0 16px rgba(52,211,153,.2)}
.paid-badge.no{
  background:rgba(252,211,77,.08);color:var(--gold);
  border-color:rgba(252,211,77,.2);
}
.paid-badge.no:hover{background:rgba(252,211,77,.15);border-color:rgba(252,211,77,.4);box-shadow:0 0 16px rgba(252,211,77,.15)}

/* ── Pay strip ── */
.pay-strip{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(52,211,153,.05),rgba(16,185,129,.03));
  border-radius:12px;
  border:1px solid rgba(52,211,153,.12);
  flex-wrap:wrap;
  box-shadow:0 0 20px rgba(52,211,153,.05);
}
.pay-strip-bar{flex:1;min-width:120px;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.pay-strip-fill{
  height:100%;
  background:linear-gradient(90deg,#059669,#34D399);
  border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(52,211,153,.4);
}

/* ── Inline input ── */
.inline-inp{
  width:100%;background:transparent;border:none;
  border-bottom:1px dashed rgba(255,255,255,.15);
  color:inherit;font-size:inherit;font-weight:inherit;
  font-family:'Cairo',sans-serif;
  text-align:center;padding:2px 4px;outline:none;min-width:0;
  transition:all .15s;
}
.inline-inp:focus{
  border-bottom-color:var(--blue);
  background:rgba(96,165,250,.06);
  border-radius:4px 4px 0 0;
}

/* ── Cards ── */
.card{
  background:rgba(12,15,28,.8);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;overflow:hidden;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);
  pointer-events:none;border-radius:16px;
}
.card:hover{
  border-color:rgba(96,165,250,.15);
  box-shadow:var(--shadow2),0 0 0 1px rgba(96,165,250,.08),inset 0 1px 0 rgba(255,255,255,.06);
  transform:translateY(-1px);
}
.card-hdr{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
}
.card-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px}
.card-title-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.card-title-icon svg{width:14px;height:14px}
.card-badge{
  font-size:10px;color:var(--sub);
  background:rgba(255,255,255,.04);
  padding:3px 10px;border-radius:100px;
  border:1px solid rgba(255,255,255,.07);
  font-weight:600;
}

/* ── Stat cards ── */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.sc{
  background:rgba(12,15,28,.85);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);
}
.sc::before{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(circle,var(--sc-glow,rgba(96,165,250,.12)) 0%,transparent 70%);
  pointer-events:none;
}
.sc:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow2),0 0 30px var(--sc-glow,rgba(96,165,250,.1));
  border-color:rgba(255,255,255,.1);
}
.sc-stripe{
  position:absolute;top:0;right:0;width:3px;height:100%;
  background:var(--sc-color,var(--blue));
  box-shadow:0 0 12px var(--sc-color,var(--blue));
}
.sc-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.sc-icon svg{width:20px;height:20px}
.sc-lbl{font-size:11px;color:var(--sub);margin-bottom:6px;font-weight:600;letter-spacing:.2px}
.sc-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc-sub{font-size:10px;color:var(--sub);margin-top:7px;font-weight:500}
.sc-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{
  padding:10px 12px;
  background:rgba(7,9,15,.9);
  font-size:10px;font-weight:800;color:rgba(255,255,255,.3);
  border-bottom:1px solid rgba(255,255,255,.05);
  white-space:nowrap;text-align:center;
  letter-spacing:.8px;text-transform:uppercase;
}
.tbl th.l{text-align:right}
.tbl td{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.04);
  text-align:center;color:var(--text);
  vertical-align:middle;transition:background .15s;
}
.tbl td.l{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(96,165,250,.04)}
.tbl .sub-row td{
  background:linear-gradient(90deg,rgba(96,165,250,.07),rgba(99,102,241,.04));
  font-weight:700;font-size:12px;color:var(--text);
}
.tbl .sub-row:hover td{background:linear-gradient(90deg,rgba(96,165,250,.1),rgba(99,102,241,.06))}
.day-inp{
  width:46px;padding:5px;text-align:center;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:12px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;font-weight:700;
}
.day-inp:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(96,165,250,.15);
  background:rgba(96,165,250,.06);
}

/* ── Province header ── */
.prov-hdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.prov-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.prov-name{font-size:14px;font-weight:800;color:var(--text)}
.prov-count{font-size:11px;color:var(--sub);font-weight:500}
.prov-bar-bg{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin:0 18px 14px}
.prov-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.8);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:16px;
  backdrop-filter:blur(8px);
}
.modal{
  background:rgba(12,15,28,.97);
  border-radius:20px;width:440px;max-width:100%;
  border:1px solid rgba(255,255,255,.08);
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow3),0 0 0 1px rgba(96,165,250,.06);
  animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);
}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-hdr{
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(96,165,250,.04),transparent);
}
.modal-hdr h3{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.2px}
.modal-body{padding:18px 20px}
.modal-ftr{
  padding:14px 20px;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:flex-end;gap:10px;
  background:rgba(0,0,0,.2);
}
.fld{margin-bottom:16px}
.fld label{
  font-size:10px;font-weight:800;color:rgba(255,255,255,.4);
  display:block;margin-bottom:6px;
  letter-spacing:.8px;text-transform:uppercase;
}
.fld input,.fld select,.fld textarea{
  width:100%;padding:9px 13px;
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:13px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;
}
.fld input:focus,.fld select:focus{
  outline:none;border-color:rgba(96,165,250,.5);
  box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.fld select option{background:#0C0F1C;color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.prev-box{
  background:rgba(255,255,255,.03);
  border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  padding:14px;margin-top:14px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.prev-lbl{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:3px}
.prev-val{font-size:14px;font-weight:800}

/* ── Info boxes ── */
.info{
  border-radius:12px;padding:12px 16px;
  font-size:12px;line-height:1.8;border:1px solid;
  display:flex;gap:12px;align-items:flex-start;
  font-weight:500;
}
.info svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
.info.blue{background:rgba(96,165,250,.06);color:#93C5FD;border-color:rgba(96,165,250,.15)}
.info.blue svg{fill:#93C5FD}
.info.green{background:rgba(52,211,153,.06);color:#6EE7B7;border-color:rgba(52,211,153,.15)}
.info.green svg{fill:#6EE7B7}
.info.amber{background:rgba(252,211,77,.06);color:#FDE68A;border-color:rgba(252,211,77,.15)}
.info.amber svg{fill:#FDE68A}

/* ── Toast ── */
.toast-wrap{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;
  gap:8px;align-items:center;pointer-events:none;
}
.toast{
  padding:10px 22px;border-radius:100px;
  font-size:12px;font-weight:700;white-space:nowrap;
  box-shadow:var(--shadow3);
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:all;letter-spacing:.2px;
  backdrop-filter:blur(20px);
}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.t-ok{background:rgba(6,24,16,.95);color:var(--green);border:1px solid rgba(52,211,153,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(52,211,153,.15)}
.t-err{background:rgba(26,5,5,.95);color:var(--red);border:1px solid rgba(248,113,113,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(248,113,113,.15)}
.t-info{background:rgba(10,26,48,.95);color:var(--blue);border:1px solid rgba(96,165,250,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(96,165,250,.15)}
.chart-wrap{position:relative;width:100%}

/* ── Rank rows ── */
.rank-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.rank-bar-bg{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Drop zone ── */
.dz{
  border:2px dashed rgba(255,255,255,.1);
  border-radius:16px;padding:28px;
  text-align:center;cursor:pointer;
  transition:all .2s;
}
.dz:hover,.dz.over{
  border-color:rgba(96,165,250,.4);
  background:rgba(96,165,250,.05);
  box-shadow:0 0 20px rgba(96,165,250,.1);
}
.dz-icon{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.dz-icon svg{width:22px;height:22px;fill:var(--sub)}
.dz strong{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.dz p{font-size:11px;color:var(--sub)}

/* ── Steps ── */
.step-row{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-row:last-child{border-bottom:none}
.step-num{
  width:26px;height:26px;border-radius:50%;
  background:rgba(96,165,250,.1);color:var(--blue);
  border:1px solid rgba(96,165,250,.2);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
  box-shadow:0 0 12px rgba(96,165,250,.1);
}
.step-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.step-sub{font-size:11px;color:var(--sub);font-weight:500}

/* ── Logo preview ── */
.logo-preview{
  width:84px;height:84px;
  border:2px dashed rgba(255,255,255,.1);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:all .2s;
  background:rgba(255,255,255,.03);
}
.logo-preview:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.05);box-shadow:0 0 20px rgba(96,165,250,.1)}
.logo-preview img{width:100%;height:100%;object-fit:contain}

/* ── Search ── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap input{
  height:36px;font-size:12px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-family:'Cairo',sans-serif;
  padding:0 10px 0 34px;width:170px;
  transition:all .2s;font-weight:500;
}
.search-wrap input:focus{
  outline:none;border-color:rgba(96,165,250,.4);
  width:210px;box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.search-wrap .search-icon{position:absolute;left:10px;width:14px;height:14px;fill:var(--sub);pointer-events:none}

/* ── Mobile ── */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;backdrop-filter:blur(6px)}
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,13,22,.95);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:40;
  box-shadow:0 -8px 30px rgba(0,0,0,.5);
  backdrop-filter:blur(20px);
}
.bottom-nav-inner{display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 12px;cursor:pointer;color:var(--sub);
  flex:1;transition:all .15s;border-radius:10px;margin:2px;
  font-size:10px;font-weight:700;
}
.bn-item:hover{color:var(--blue)}
.bn-item.on{color:var(--blue)}
.bn-item svg{width:22px;height:22px;fill:currentColor}

/* ── Login ── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(99,102,241,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 70%,rgba(96,165,250,.08) 0%,transparent 55%),
    #060810;
  padding:16px;
}
.login-box{
  background:rgba(12,15,28,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:42px 36px;
  width:380px;max-width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(96,165,250,.06),0 0 60px rgba(99,102,241,.08);
  backdrop-filter:blur(30px);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#6366F1,#60A5FA,#34D399,transparent);
}
.login-logo{
  width:140px;height:auto;
  display:block;
  margin:0 auto 20px;
  object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.login-title{font-size:24px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:.3px}
.login-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:28px;font-weight:500}

/* ── Loading ── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.06);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 14px;
  box-shadow:0 0 20px rgba(96,165,250,.2);
}

/* ── Logout ── */
.logout-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.28);font-size:11px;font-weight:700;
  transition:all .18s;width:100%;background:none;border:none;
  font-family:'Cairo',sans-serif;
  border:1px solid rgba(255,255,255,.05);
}
.logout-btn:hover{background:rgba(248,113,113,.07);color:var(--red);border-color:rgba(248,113,113,.15)}
.logout-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.logout-user{font-size:10px;opacity:.55;margin-right:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px}

/* ── Paid row highlight ── */
.paid-row td{background:rgba(52,211,153,.03) !important}

/* ── Light mode ── */
html.light{
  --blue:#2563EB;--blue2:#EFF6FF;--blue3:#BFDBFE;
  --green:#059669;--green2:#ECFDF5;--green3:#A7F3D0;
  --red:#DC2626;--red2:#FEF2F2;
  --gold:#B45309;--gold2:#FFFBEB;
  --purple:#7C3AED;--purple2:#F5F3FF;
  --bdr:#E2E8F0;--bdr2:#CBD5E1;
  --text:#0F172A;--sub:#64748B;
  --bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#F8FAFC;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 20px rgba(0,0,0,.08);
  --shadow3:0 20px 60px rgba(0,0,0,.12);
}
html.light body{background:var(--bg)}
html.light body::before{
  background:
    radial-gradient(ellipse 80% 60% at 15% 0%,rgba(37,99,235,.07) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 90%,rgba(124,58,237,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(5,150,105,.03) 0%,transparent 60%);
}
/* sidebar stays dark in light mode — elegant contrast */
html.light .sidebar{background:linear-gradient(160deg,#1a2540 0%,#0f1729 100%)}
html.light .sidebar::before{background:linear-gradient(180deg,transparent,rgba(59,130,246,.35),rgba(139,92,246,.2),transparent)}
html.light .nav-item{color:rgba(255,255,255,.4)}
html.light .nav-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.06)}
html.light .nav-item.on{color:#93C5FD;background:rgba(96,165,250,.15)}
html.light .sb-ver{color:rgba(255,255,255,.2)}
html.light .logout-btn{color:rgba(255,255,255,.35)}
html.light .logout-btn:hover{background:rgba(248,113,113,.1);color:#F87171}

/* topbar */
html.light .topbar{
  background:rgba(255,255,255,.92);
  border-bottom:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 0 rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.04);
  backdrop-filter:blur(16px);
}
html.light .menu-btn{background:#fff;border-color:var(--bdr2)}
html.light .sep{background:var(--bdr)}

/* month strip */
html.light .mstrip{background:rgba(248,250,252,.9);border-bottom:1px solid rgba(0,0,0,.06)}
html.light .mchip{background:#fff;border-color:var(--bdr2);color:var(--sub);box-shadow:0 1px 3px rgba(0,0,0,.05)}
html.light .mchip:hover{background:var(--blue2);border-color:rgba(37,99,235,.3);color:var(--blue)}
html.light .mchip.cur{
  background:linear-gradient(135deg,#2563EB,#4F46E5);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
html.light .mchip.saved{background:var(--green2);border-color:rgba(5,150,105,.3);color:var(--green)}
html.light .mchip.cur.saved{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(5,150,105,.3)}
html.light .mchip.add{border-style:dashed;background:transparent;color:var(--sub)}

/* cards */
html.light .card{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
html.light .card::before{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent)}
html.light .card:hover{
  border-color:rgba(37,99,235,.15);
  box-shadow:0 4px 20px rgba(37,99,235,.1),0 1px 3px rgba(0,0,0,.06);
  transform:translateY(-2px);
}
html.light .card-hdr{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent);border-bottom-color:rgba(0,0,0,.06)}
html.light .card-badge{background:var(--bg3);border-color:var(--bdr);color:var(--sub)}
html.light .card-title{color:var(--text)}

/* stat cards */
html.light .sc{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
html.light .sc:hover{
  box-shadow:0 8px 24px rgba(0,0,0,.1);
  border-color:rgba(0,0,0,.1);
}
html.light .sc::before{background:radial-gradient(circle,var(--sc-glow,rgba(37,99,235,.06)) 0%,transparent 70%)}
html.light .sc-lbl{color:var(--sub)}
html.light .sc-sub{color:var(--sub)}
html.light .sc-bar{background:rgba(0,0,0,.06)}

/* tables */
html.light .tbl th{
  background:linear-gradient(135deg,#F8FAFC,#F1F5F9);
  border-bottom:2px solid rgba(0,0,0,.07);
  color:#64748B;font-size:10.5px;
}
html.light .tbl td{border-bottom:1px solid rgba(0,0,0,.05);color:var(--text)}
html.light .tbl tr:hover td{background:rgba(37,99,235,.03)}
html.light .tbl .sub-row td{background:linear-gradient(90deg,rgba(37,99,235,.05),rgba(79,70,229,.03))}
html.light .day-inp{background:#fff;border-color:var(--bdr2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
html.light .day-inp:focus{background:var(--blue2);border-color:var(--blue)}

/* buttons */
html.light .btn{
  background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
html.light .btn:hover{background:var(--bg3);border-color:rgba(0,0,0,.14);box-shadow:0 2px 6px rgba(0,0,0,.1)}
html.light .btn-icon{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .btn-icon svg{fill:var(--sub)}

/* modal */
html.light .modal{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 25px 60px rgba(0,0,0,.15)}
html.light .modal-hdr{background:linear-gradient(135deg,rgba(37,99,235,.03),transparent);border-bottom-color:rgba(0,0,0,.07)}
html.light .modal-ftr{background:#F8FAFC;border-top-color:rgba(0,0,0,.07)}
html.light .overlay{background:rgba(15,23,42,.55);backdrop-filter:blur(6px)}

/* form fields */
html.light .fld label{color:#64748B}
html.light .fld input,html.light .fld select,html.light .fld textarea{
  background:#fff;border-color:rgba(0,0,0,.12);color:var(--text);
  box-shadow:0 1px 2px rgba(0,0,0,.04) inset;
}
html.light .fld input:focus,html.light .fld select:focus{
  background:var(--blue2);border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
html.light .fld select option{background:#fff;color:var(--text)}
html.light .prev-box{background:#F8FAFC;border-color:rgba(0,0,0,.08)}

/* misc */
html.light .pay-strip{background:linear-gradient(135deg,rgba(5,150,105,.05),rgba(16,185,129,.03));border-color:rgba(5,150,105,.15)}
html.light .pay-strip-fill{box-shadow:0 0 8px rgba(5,150,105,.25)}
html.light .inline-inp{border-bottom-color:rgba(0,0,0,.15)}
html.light .inline-inp:focus{background:var(--blue2)}
html.light .dz{border-color:rgba(0,0,0,.12)}
html.light .dz:hover{background:var(--blue2);border-color:var(--blue)}
html.light .search-wrap input{background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .search-wrap input:focus{background:var(--blue2);border-color:var(--blue)}
html.light .bottom-nav{background:rgba(255,255,255,.95);border-top-color:rgba(0,0,0,.08)}
html.light .prov-bar-bg{background:rgba(0,0,0,.07)}
html.light .rank-bar-bg{background:rgba(0,0,0,.07)}
html.light .info.blue{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
html.light .info.blue svg{fill:#1D4ED8}
html.light .info.green{background:#ECFDF5;border-color:#A7F3D0;color:#065F46}
html.light .info.green svg{fill:#065F46}
html.light .info.amber{background:#FFFBEB;border-color:#FDE68A;color:#92400E}
html.light .info.amber svg{fill:#92400E}
html.light .t-ok{background:#ECFDF5;color:#059669;border-color:#A7F3D0;box-shadow:0 4px 12px rgba(5,150,105,.12)}
html.light .t-err{background:#FEF2F2;color:#DC2626;border-color:#FECACA;box-shadow:0 4px 12px rgba(220,38,38,.1)}
html.light .t-info{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;box-shadow:0 4px 12px rgba(37,99,235,.1)}
html.light .paid-badge.yes{background:#ECFDF5;border-color:#A7F3D0;color:#059669}
html.light .paid-badge.yes:hover{background:#D1FAE5;border-color:var(--green)}
html.light .paid-badge.no{background:#FFFBEB;border-color:#FDE68A;color:#B45309}
html.light .paid-badge.no:hover{background:#FEF3C7;border-color:#D97706}

/* login light mode */
html.light .login-screen{
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(37,99,235,.1) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 70%,rgba(124,58,237,.06) 0%,transparent 55%),
    #F0F4F8;
}
html.light .login-box{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.09);
  box-shadow:0 30px 80px rgba(0,0,0,.12),0 0 0 1px rgba(37,99,235,.06);
}
html.light .login-box::before{background:linear-gradient(90deg,transparent,#2563EB,#7C3AED,#059669,transparent)}
html.light .login-title{color:var(--text)}
html.light .login-sub{color:var(--sub)}

/* ══ Org Chart — Professional v3 ════════════════════════ */
.org-page{display:flex;flex-direction:column;gap:0;padding:0;flex:1;overflow-y:auto;order:3;min-height:0}
.org-full{position:fixed;inset:0;z-index:9999;overflow-y:auto;background:var(--bg1);}
/* ── OrgTree ── */
.ot-wrap{padding:0 0 32px;overflow-x:auto;direction:ltr;flex-shrink:0}
.ot-inner{display:flex;flex-direction:column;align-items:center;min-width:max-content;padding:32px 48px}
.ot-legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding:12px 24px 24px;border-top:1px solid var(--border);margin-top:4px}
.ot-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}

/* ── Company Banner ────────────────────────────────────── */
.org-banner{
  background:linear-gradient(135deg,#0c1a35 0%,#0f2460 45%,#1a3a8f 100%);
  padding:22px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  position:relative;overflow:clip;
}
.org-banner::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 70% 50%,rgba(96,165,250,.12) 0%,transparent 65%);
  pointer-events:none;
}
.org-banner-logo{
  width:62px;height:62px;border-radius:14px;overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;position:relative;z-index:1;
}
.org-banner-logo img{width:56px;height:56px;object-fit:contain}
.org-banner-info{flex:1;min-width:0;position:relative;z-index:1}
.org-banner-company{font-size:20px;font-weight:900;color:#fff;letter-spacing:.3px;line-height:1.2}
.org-banner-sub{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-top:4px;letter-spacing:.5px}
.org-banner-stats{display:flex;gap:6px;align-items:center;position:relative;z-index:1}
.org-bs{
  text-align:center;padding:9px 16px;min-width:68px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  border-radius:10px;backdrop-filter:blur(4px);
}
.org-bs-v{font-size:22px;font-weight:900;color:#93C5FD;line-height:1}
.org-bs-l{font-size:8px;font-weight:700;color:rgba(255,255,255,.5);margin-top:3px;letter-spacing:.6px}
.org-banner-actions{display:flex;gap:7px;align-items:center;flex-shrink:0;flex-wrap:wrap;position:relative;z-index:1}
html.light .org-banner{background:linear-gradient(135deg,#0f2460 0%,#1d4ed8 60%,#2563eb 100%)}

/* ── Edit bar ─────────────────────────────────────────── */
.org-edit-bar{
  display:flex;align-items:center;gap:8px;padding:9px 20px;
  background:rgba(252,211,77,.06);border-bottom:1px solid rgba(252,211,77,.15);
}
html.light .org-edit-bar{background:#FFFBEB;border-color:rgba(217,119,6,.2)}

/* ── Director ─────────────────────────────────────────── */
.org-ceo-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 24px 0;background:var(--bg)}
html.light .org-ceo-wrap{background:#f8faff}
.org-ceo-card{
  background:linear-gradient(135deg,#1e3a8a,#1d4ed8 55%,#2563eb);
  border:1px solid rgba(96,165,250,.35);border-radius:16px;
  padding:18px 30px;display:flex;align-items:center;gap:18px;
  box-shadow:0 8px 40px rgba(37,99,235,.3),0 0 0 1px rgba(96,165,250,.12);
  max-width:500px;width:100%;
}
.org-ceo-av{
  width:58px;height:58px;border-radius:15px;flex-shrink:0;
  background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.32);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:900;color:#fff;
}
.org-ceo-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:5px;line-height:1.2}
.org-ceo-ttl{font-size:11px;color:rgba(255,255,255,.72);font-weight:600}
.org-ceo-badge{
  margin-right:auto;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.88);font-size:9.5px;font-weight:800;
  padding:5px 14px;border-radius:20px;white-space:nowrap;line-height:1.4;
}
.org-ceo-line{width:2px;height:26px;background:linear-gradient(180deg,rgba(96,165,250,.5),rgba(96,165,250,.08));margin:0 auto}

/* ── Province Grid ─────────────────────────────────────── */
.org-provinces{
  display:grid;grid-template-columns:repeat(2,1fr);gap:0;
  background:var(--bg);padding:0 24px 24px;
  gap:16px;
}
html.light .org-provinces{background:#f8faff}

/* ── Province Card ─────────────────────────────────────── */
.org-prov{
  border-radius:14px;overflow:clip;
  background:var(--bg2);
  border:1px solid rgba(255,255,255,.07);
  border-top:4px solid var(--pc,#60A5FA);
  box-shadow:0 2px 20px rgba(0,0,0,.22);
  transition:box-shadow .25s,transform .25s;
}
.org-prov:hover{transform:translateY(-2px);box-shadow:0 10px 40px rgba(0,0,0,.32)}
.org-prov.focused{box-shadow:0 0 0 2px var(--pc,#60A5FA),0 10px 40px rgba(0,0,0,.35)!important;transform:none!important}
html.light .org-prov{background:#fff;border-color:#e2e8f0;box-shadow:0 2px 12px rgba(0,0,0,.07)}

/* Province header */
.org-ph{
  display:flex;align-items:center;gap:12px;padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.06);
  background:linear-gradient(120deg,rgba(255,255,255,.04) 0%,transparent 100%);
}
html.light .org-ph{background:linear-gradient(120deg,color-mix(in srgb,var(--pc,#2563eb) 4%,white) 0%,white 100%);border-bottom-color:#f0f4fb}
.org-ph-letter{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;
  background:color-mix(in srgb,var(--pc,#60A5FA) 15%,transparent);
  color:var(--pc,#60A5FA);border:1.5px solid color-mix(in srgb,var(--pc,#60A5FA) 30%,transparent);
}
.org-ph-info{flex:1;min-width:0}
.org-ph-name{font-size:20px;font-weight:900;color:var(--pc,#60A5FA);letter-spacing:.2px;line-height:1.1}
.org-ph-sub{font-size:9px;color:var(--sub);font-weight:600;margin-top:3px;letter-spacing:.4px}
.org-ph-chips{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.org-ph-chip{
  display:flex;flex-direction:column;align-items:center;padding:5px 10px;border-radius:9px;
  background:color-mix(in srgb,var(--pc,#60A5FA) 10%,transparent);
  border:1px solid color-mix(in srgb,var(--pc,#60A5FA) 20%,transparent);
}
.org-ph-cv{font-size:15px;font-weight:900;color:var(--pc,#60A5FA);line-height:1}
.org-ph-cl{font-size:7.5px;font-weight:700;color:var(--sub);margin-top:2px}

/* Province body */
.org-pb{display:grid;grid-template-columns:minmax(0,1.15fr) minmax(0,.85fr)}

/* Projects column (right in RTL = border on left side visually) */
.org-pv-proj{border-right:1px solid rgba(255,255,255,.06)}
html.light .org-pv-proj{border-right-color:#f0f4fb}

/* Section label */
.org-slbl{
  padding:7px 14px 5px;font-size:7.5px;font-weight:800;letter-spacing:1.1px;
  text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.015);
}
html.light .org-slbl{border-bottom-color:#f1f5f9;background:#f8fafc;color:#6b7280}

/* Manager row */
.org-mgr-row{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-bottom:1px solid rgba(255,255,255,.04);
  background:rgba(255,255,255,.025);transition:background .14s;
}
html.light .org-mgr-row{background:#fafbff;border-bottom-color:#f5f7fb}
.org-mgr-row:hover{background:rgba(255,255,255,.045)}
.org-mgr-row:hover .org-xbtn{opacity:.65}
.org-mgr-av{
  width:36px;height:36px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  background:color-mix(in srgb,var(--pc,#60A5FA) 18%,transparent);
  color:var(--pc,#60A5FA);border:1.5px solid color-mix(in srgb,var(--pc,#60A5FA) 28%,transparent);
}
.org-mgr-nm{font-size:12.5px;font-weight:800;color:var(--text);line-height:1.3}
.org-mgr-rl{font-size:9.5px;color:var(--sub);margin-top:2px}

/* Engineer row */
.org-eng-row{
  display:flex;align-items:center;gap:8px;padding:7px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s;
}
.org-eng-row:last-child{border-bottom:none}
.org-eng-row:hover{background:rgba(255,255,255,.025)}
html.light .org-eng-row{border-bottom-color:#f8fafc}
html.light .org-eng-row:hover{background:#f8fafc}
.org-eng-row:hover .org-xbtn{opacity:.65}
.org-eng-num{
  width:21px;height:21px;border-radius:50%;flex-shrink:0;font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb,var(--pc,#60A5FA) 14%,transparent);
  color:var(--pc,#60A5FA);
}
.org-eng-nm{font-size:11.5px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.org-eng-rl{font-size:9px;color:var(--sub);flex-shrink:0;white-space:nowrap}

/* Project row */
.org-prj-row{
  display:flex;align-items:flex-start;gap:8px;padding:7px 14px;
  border-bottom:1px solid rgba(255,255,255,.03);transition:background .12s;
}
.org-prj-row:last-child{border-bottom:none}
.org-prj-row:hover{background:rgba(52,211,153,.04)}
html.light .org-prj-row{border-bottom-color:#f8fafc}
.org-prj-row:hover .org-xbtn{opacity:.65}
.org-prj-num{
  width:18px;height:18px;border-radius:50%;flex-shrink:0;font-size:8.5px;font-weight:900;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
  background:rgba(52,211,153,.14);color:#34D399;
}
.org-prj-nm{font-size:11px;font-weight:600;color:var(--text);flex:1;line-height:1.4}

/* Edit controls */
.org-xbtn{opacity:0;transition:opacity .14s;background:none;border:none;cursor:pointer;color:var(--red);font-size:12px;padding:0 2px;flex-shrink:0}
.org-xbtn:hover{opacity:1!important}
.org-addbtn{
  width:100%;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:6px;background:none;border:none;cursor:pointer;
  font-family:inherit;font-size:10px;font-weight:700;color:var(--sub);
  border-top:1px dashed rgba(255,255,255,.09);transition:all .14s;
}
.org-addbtn:hover{color:var(--green);background:rgba(52,211,153,.05)}
html.light .org-addbtn{border-top-color:rgba(0,0,0,.08)}
.org-inp{
  width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);
  color:var(--text);border-radius:5px;padding:3px 6px;margin-bottom:2px;
  font-family:inherit;font-size:11px;font-weight:700;box-sizing:border-box;display:block;
}
html.light .org-inp{background:#f8fafc;border-color:#cbd5e1;color:#1e293b}
.org-inp:focus{outline:none;border-color:rgba(96,165,250,.5)}

@media(max-width:1000px){.org-provinces{grid-template-columns:1fr}}
@media(max-width:700px){.org-pb{grid-template-columns:1fr}}

/* ── Print / PDF ── */
@page{size:A4 landscape;margin:7mm}
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box!important}
  body{background:#fff!important;color:#111!important;font-family:"Segoe UI",Tahoma,Arial,sans-serif!important}
  body::before{display:none!important}
  .sidebar,.topbar,.mstrip,.bottom-nav,.org-edit-bar,.org-xbtn,.org-addbtn,.org-inp,.org-banner-actions{display:none!important}
  .shell{display:block!important;height:auto!important;overflow:visible!important;width:100%!important}
  .main{overflow:visible!important;display:block!important;width:100%!important}
  .content{overflow:visible!important;padding:0!important;display:block!important;width:100%!important}
  .org-page{display:flex!important;flex-direction:column!important;gap:5px!important;width:100%!important}

  /* Banner */
  .org-banner{
    background:linear-gradient(135deg,#0f2460,#1d4ed8)!important;
    padding:10px 18px!important;break-inside:avoid;border-radius:0!important;
    flex-wrap:nowrap!important;gap:14px!important;
  }
  .org-banner::after{display:none!important}
  .org-banner-logo{width:48px!important;height:48px!important;border-radius:10px!important}
  .org-banner-logo img{width:42px!important;height:42px!important}
  .org-banner-company{font-size:16px!important;color:#fff!important}
  .org-banner-sub{font-size:9px!important}
  .org-bs{padding:6px 10px!important;min-width:52px!important;border-radius:7px!important}
  .org-bs-v{font-size:17px!important}
  .org-bs-l{font-size:7px!important}

  /* Director */
  .org-ceo-wrap{padding:10px 0 5px!important;background:#fff!important}
  .org-ceo-card{
    background:linear-gradient(135deg,#1e3a8a,#1d4ed8)!important;
    box-shadow:none!important;padding:10px 20px!important;border-radius:10px!important;
    max-width:380px!important;gap:12px!important;
  }
  .org-ceo-av{width:42px!important;height:42px!important;font-size:18px!important;border-radius:10px!important}
  .org-ceo-name{font-size:14px!important}
  .org-ceo-ttl{font-size:9.5px!important}
  .org-ceo-badge{font-size:8.5px!important;padding:3px 10px!important}
  .org-ceo-line{height:16px!important}

  /* Provinces — 2×2 grid */
  .org-provinces{
    display:grid!important;grid-template-columns:1fr 1fr!important;
    gap:6px!important;padding:0!important;background:#fff!important;
  }
  .org-prov{
    background:#fff!important;border:1px solid #cbd5e1!important;
    box-shadow:none!important;border-radius:8px!important;
    border-top-width:3px!important;
    break-inside:avoid;page-break-inside:avoid;
    transform:none!important;
  }
  .org-ph{padding:8px 12px!important;border-bottom-color:#e8edf5!important;background:none!important}
  .org-ph-letter{width:36px!important;height:36px!important;font-size:17px!important;border-radius:8px!important}
  .org-ph-name{font-size:15px!important;color:#1e3a8a!important;font-weight:900!important}
  .org-ph-sub{font-size:7.5px!important}
  .org-ph-chip{padding:3px 7px!important;border-radius:6px!important}
  .org-ph-cv{font-size:12px!important;color:#1d4ed8!important}
  .org-ph-cl{font-size:7px!important}
  .org-pb{display:grid!important;grid-template-columns:1fr 1fr!important}
  .org-pv-proj{border-right-color:#e8edf5!important}
  .org-slbl{
    padding:4px 10px 3px!important;font-size:7px!important;
    background:#f8fafc!important;color:#475569!important;border-bottom-color:#e8edf5!important;
  }
  .org-mgr-row{padding:5px 10px!important;background:#f8fbff!important;border-bottom-color:#e8edf5!important;gap:7px!important}
  .org-mgr-av{width:26px!important;height:26px!important;border-radius:6px!important;font-size:12px!important}
  .org-mgr-nm{font-size:9.5px!important;color:#1e293b!important}
  .org-mgr-rl{font-size:7.5px!important;color:#64748b!important}
  .org-eng-row{padding:4px 10px!important;border-bottom-color:#f1f5f9!important;gap:6px!important}
  .org-eng-num{width:16px!important;height:16px!important;font-size:7.5px!important}
  .org-eng-nm{font-size:9px!important;color:#1e293b!important}
  .org-eng-rl{font-size:7.5px!important;color:#64748b!important}
  .org-prj-row{padding:4px 10px!important;border-bottom-color:#f1f5f9!important;gap:6px!important}
  .org-prj-num{width:15px!important;height:15px!important;font-size:7.5px!important}
  .org-prj-nm{font-size:9px!important;color:#1e293b!important}
}

/* ══════════════════════════════════════════════
   ATTENDANCE PAGE
══════════════════════════════════════════════ */
.att-page{display:flex;flex-direction:column;gap:14px}

/* Province tabs */
.att-tab{padding:7px 16px;border-radius:10px;cursor:pointer;font-size:11.5px;font-weight:700;border:1.5px solid var(--bdr2);transition:all .18s;color:var(--sub);background:var(--bg2);white-space:nowrap}
.att-tab:hover{border-color:var(--bdr3);color:var(--text)}
.att-tab.on{color:#fff!important;border-color:transparent!important}

/* Summary stat cards */
.att-sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.att-sum-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px;text-align:center}
.att-sum-val{font-size:26px;font-weight:900;line-height:1}
.att-sum-lbl{font-size:9.5px;color:var(--sub);font-weight:700;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
html.light .att-sum-card{background:#fff;border-color:#e2e8f0}

/* Table wrapper */
.att-table-wrap{overflow-x:auto}
.att-table-wrap::-webkit-scrollbar{height:5px}
.att-table-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.att-table{border-collapse:separate;border-spacing:0;min-width:700px;width:100%;font-size:11px}

/* Header row */
.att-th{
  background:var(--bg2);padding:7px 3px;text-align:center;font-weight:800;
  color:var(--sub);font-size:9px;white-space:nowrap;border-bottom:2px solid var(--bdr2);
  position:sticky;top:0;z-index:2;
}
.att-th-name{
  text-align:right;padding:7px 14px;min-width:145px;
  position:sticky;right:0;z-index:3;background:var(--bg2);
  border-left:2px solid var(--bdr2);
}
html.light .att-th,.att-th-name{background:#f8fafc}

/* Body cells */
.att-td{padding:2px 2px;text-align:center;border-bottom:1px solid var(--bdr);vertical-align:middle}
.att-td-name{
  text-align:right;padding:8px 14px;font-size:12px;
  position:sticky;right:0;background:var(--bg);z-index:1;
  border-left:2px solid var(--bdr2);min-width:145px;
  border-bottom:1px solid var(--bdr);
}
html.light .att-td-name{background:#fff}
.att-td-eng{font-weight:700;color:var(--text);line-height:1.3}
.att-td-spec{font-size:9.5px;color:var(--sub);margin-top:2px}
.att-table tr:last-child .att-td,.att-table tr:last-child .att-td-name{border-bottom:none}
.att-table tr:hover .att-td{background:rgba(255,255,255,.015)}
html.light .att-table tr:hover .att-td{background:#fafbfc}

/* Status cells */
.att-cell{
  width:26px;height:26px;border-radius:5px;margin:1px auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:8.5px;font-weight:900;letter-spacing:.2px;
  transition:transform .12s;user-select:none;border:1.5px solid transparent;
}
.att-cell:hover{transform:scale(1.18);z-index:2;position:relative}

function LineChart({labels,datasets,height=160}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(ch.current)ch.current.destroy();
    ch.current=new window.Chart(ref.current,{
      type:"line",data:{labels,datasets:datasets.map(d=>({...d,tension:.4,pointRadius:4,pointHoverRadius:6,fill:false}))},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:datasets.length>1,position:"bottom",rtl:true,labels:{color:"#64708E",font:{size:11,family:"Segoe UI,Tahoma"},boxWidth:12,padding:12}},tooltip:{rtl:true,backgroundColor:"#111520",titleColor:"#E2E6F0",bodyColor:"#64708E",borderColor:"#1C2130",borderWidth:1,callbacks:{label:c=>`${c.dataset.label||""}: ${Number(c.raw).toFixed(1)} $`}}},scales:{x:{ticks:{color:"#64708E",font:{size:10}},grid:{display:false},border:{color:"#1C2130"}},y:{ticks:{color:"#64708E",font:{size:10},callback:v=>v.toFixed(0)+"$"},grid:{color:"rgba(255,255,255,0.04)"},border:{color:"#1C2130"}}}}

/* ── Build org tree from live attendance data ── */
function buildOrgTreeFromData(data,att,months,orgData){
  const director=orgData?.director||DEFAULT_ORG.director;
  const company=orgData?.company||DEFAULT_ORG.company;

  /* أيام الحضور الفعلية + عدد الأشهر في ليبيا لكل مهندس */
  function engStats(engId){
    let totalPresent=0,monthsActive=0;
    Object.values(months).forEach(m=>{
      const engAtt=(m.attendance||{})[engId]||{};
      const pDays=Object.values(engAtt).filter(d=>d.s==='P').length;
      if(pDays>0){totalPresent+=pDays;monthsActive++;}
      else{
        const eng=Object.values(m.data||{}).flat().find(e=>e.id===engId);
        if(eng&&(eng.d1>0||eng.d2>0))monthsActive++;
      }
    });
    const out=[];
    if(totalPresent>0)out.push(`${totalPresent} يوم حضور`);
    if(monthsActive>0)out.push(`${monthsActive} شهر في ليبيا`);
    return out;
  }

  /* الحالة الحالية بناءً على سجلات الحضور لهذا الشهر */
  function engStatus(engId){
    const vals=Object.values(att[engId]||{});
    const present=vals.filter(d=>d.s==='P').length;
    const onLeave=vals.filter(d=>d.s==='AL'||d.s==='SL'||d.s==='EL').length;
    if(present>15)return'نشط';
    if(present>0)return'جزئي';
    if(onLeave>0)return'إجازة';
    return'غائب';
  }

  const cityChildren=CITY_CFG.map(({id,name,prov})=>{
    const allEngs=(data[prov]||[]).filter(e=>e.name!==director.name);
    const mgrs=allEngs.filter(e=>e.spec&&e.spec.includes('مدير'));
    const team=allEngs.filter(e=>!e.spec||!e.spec.includes('مدير'));
    const cityRep=mgrs[0];
    const projects=(orgData?.cities||DEFAULT_ORG.cities||[]).find(c=>c.id===id)?.projects||[];
    const groups=[];
    if(mgrs.length)groups.push({
      id:`g-mgr-${id}`,name:'القيادة',role:`${mgrs.length} مدير`,level:2,stats:[],
      children:mgrs.map((m,i)=>({
        id:`mgr-${id}-${i}`,name:m.name,role:m.spec||'مدير',level:3,
        stats:[...engStats(m.id),engStatus(m.id)],children:[]
      }))
    });
    if(team.length)groups.push({
      id:`g-eng-${id}`,name:'الفريق الهندسي',role:`${team.length} مهندس`,level:2,stats:[],
      children:team.map((e,i)=>({
        id:`eng-${id}-${i}`,name:e.name,role:e.spec||'مهندس',level:3,
        stats:[...engStats(e.id),engStatus(e.id)],children:[]
      }))
    });
    if(projects.length)groups.push({
      id:`g-prj-${id}`,name:'المشاريع',role:`${projects.length} مشروع`,level:2,stats:[],
      children:projects.map((p,i)=>({
        id:`prj-${id}-${i}`,name:typeof p==='string'?p:p.name,role:'مشروع',level:3,stats:[],children:[]
      }))
    });
    return{
      id,name:cityRep?.name||name,
      role:cityRep?(cityRep.spec||'مدير المشروع'):'الفريق الهندسي',
      level:1,
      stats:[allEngs.length?`${allEngs.length} مهندس`:null,projects.length?`${projects.length} مشروع`:null].filter(Boolean),
      children:groups
    };
  }).filter(c=>(data[CITY_CFG.find(cc=>cc.id===c.id)?.prov]||[]).filter(e=>e.name!==director.name).length>0);

  const totalEng=Object.values(data).flat().filter(e=>e.name!==director.name).length;
  return{
    id:'root',name:director.name||'المدير',
    role:director.title||'مدير مشروعات ليبيا',
    level:0,
    stats:[company,`${totalEng} مهندس`].filter(Boolean),
    children:cityChildren
  };
}

                "مستخدمو المحافظات"
              ),
              h("span",{className:"card-badge"},provUsers.length+" مستخدم")
            ),
            provUsers.length===0
              ?h("div",{style:{padding:"20px 16px",textAlign:"center",color:"var(--sub)",fontSize:12}},"يتطلب إعادة تشغيل الخادم لتفعيل المستخدمين — راجع لوحة التحكم")
              :h("div",{style:{padding:"8px 16px 14px"}},
                provUsers.map(u=>{
                  const isOnline=activeUsers.some(a=>a.username===u.username);
                  return h("div",{key:u.id,style:{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--bdr)"}},
                    h("div",{style:{position:"relative",flexShrink:0}},
                      h("div",{style:{width:36,height:36,borderRadius:"50%",background:"rgba(96,165,250,.12)",border:"1px solid rgba(96,165,250,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}},"👤"),
                      isOnline&&h("div",{style:{position:"absolute",bottom:1,left:1,width:10,height:10,borderRadius:"50%",background:"#34D399",border:"2px solid var(--bg2)",boxShadow:"0 0 6px #34D399"}})
                    ),
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:2}},
                        h("span",{style:{fontWeight:700,fontSize:13}},u.username),
                        isOnline&&h("span",{style:{fontSize:9,padding:"1px 6px",borderRadius:100,background:"rgba(52,211,153,.15)",color:"#34D399",border:"1px solid rgba(52,211,153,.3)",fontWeight:700}},"نشط")
                      ),
                      h("div",{style:{fontSize:11,color:"var(--sub)"}},u.province)
                    ),
                    h("button",{className:"btn",style:{fontSize:11,padding:"5px 12px"},
                      onClick:()=>setPwdModal({id:u.id,username:u.username,val:""})},
                      h("svg",{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:"1.8",strokeLinecap:"round",width:12,height:12},
                        h("rect",{x:3,y:9,width:14,height:9,rx:1.5}),h("path",{d:"M7 9V6a3 3 0 016 0v3"})
                      ),
                      " كلمة المرور"
                    )
                  );
                })
              )
          )
        )
      ),

      /* ══ ORGANIZATIONAL CHART ══ */
      page==="org"&&(()=>{
        const od=orgEdit?orgDraft:(orgData||DEFAULT_ORG);
        if(!od)return h("div",{style:{padding:40,textAlign:"center",color:"var(--sub)"}},"جاري التحميل...");
        const upd=fn=>setOrgDraft(d=>{const nd=JSON.parse(JSON.stringify(d));fn(nd);return nd;});

        const doSync=async()=>{
          if(!confirm("سيتم مزامنة الهيكل مع المهندسين الموجودين في الشهر الحالي. هل تريد المتابعة؟"))return;
          const base=buildOrgFromBase();
          const synced=dc(base);
          // Add engineers from current month data that are not already in the base
          for(const city of synced.cities){
            const prov=CITY_CFG.find(c=>c.id===city.id)?.prov;
            if(!prov)continue;
            const engs=data[prov]||[];
            const existing=new Set([...city.managers.map(m=>m.name),...city.team.map(t=>t.name)]);
            for(const e of engs){
              if(existing.has(e.name)||e.name===synced.director?.name)continue;
              const entry={name:e.name,role:e.spec||"مهندس"};
              if((e.spec||"").includes("مدير"))city.managers.push(entry);
              else city.team.push(entry);
            }
          }
          await fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:synced})}).catch(()=>{});
          setOrgData(synced);
          msg("تمت المزامنة مع الشهر الحالي");
        };

        const totalEng=od.cities.reduce((a,c)=>a+c.team.length,0);
        const totalMgr=od.cities.reduce((a,c)=>a+c.managers.length,0);
        const totalProj=od.cities.reduce((a,c)=>a+(c.projects||[]).length,0);

        const Ei=(val,onChange,st={})=>h("input",{className:"org-inp",style:st,value:val||"",onChange:e=>onChange(e.target.value)});

        return h("div",{className:"org-page"+(orgFull?" org-full":"")},

          /* ── Banner ── */
          h("div",{className:"org-banner"},
            h("div",{className:"org-banner-logo"},logo?h("img",{src:logo,alt:"logo"}):h("span",{style:{fontSize:28,color:"rgba(255,255,255,.5)"}},"🏗")),
            h("div",{className:"org-banner-info"},
              orgEdit
                ?Ei(od.company,v=>upd(d=>{d.company=v;}),{fontSize:18,fontWeight:900,background:"rgba(255,255,255,.1)",color:"#fff",borderColor:"rgba(255,255,255,.25)",width:"100%"})
                :h("div",{className:"org-banner-company"},od.company),
              h("div",{className:"org-banner-sub"},"الهيكل التنظيمي — مشاريع ليبيا")
            ),
            h("div",{className:"org-banner-stats"},
              [{v:totalMgr+totalEng+1,l:"إجمالي الطاقم",hi:true},{v:od.cities.length,l:"محافظة"},{v:totalMgr,l:"مدير"},{v:totalEng,l:"مهندس"},{v:totalProj,l:"مشروع"}]
              .map(({v,l,hi})=>h("div",{key:l,className:"org-bs",style:hi?{background:"rgba(99,102,241,.25)",border:"1px solid rgba(99,102,241,.45)"}:undefined},h("div",{className:"org-bs-v",style:hi?{color:"#A5B4FC",fontSize:26}:undefined},v),h("div",{className:"org-bs-l"},l)))
            ),
            h("div",{className:"org-banner-actions"},
              h("button",{className:"btn",style:{padding:"7px 14px",fontSize:12,background:orgFull?"rgba(239,68,68,.13)":"rgba(99,102,241,.13)",border:orgFull?"1px solid rgba(239,68,68,.35)":"1px solid rgba(99,102,241,.35)",color:orgFull?"#f87171":"#A5B4FC"},onClick:()=>setOrgFull(f=>!f)},
                orgFull
                  ?h("svg",{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:"1.8",strokeLinecap:"round",width:14,height:14},h("path",{d:"M8 3H5a2 2 0 00-2 2v3m14 0V5a2 2 0 00-2-2h-3m0 14h3a2 2 0 002-2v-3M3 12v3a2 2 0 002 2h3"}))
                  :h("svg",{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:"1.8",strokeLinecap:"round",width:14,height:14},h("path",{d:"M3 8V5a2 2 0 012-2h3M12 3h3a2 2 0 012 2v3m0 6v3a2 2 0 01-2 2h-3M8 17H5a2 2 0 01-2-2v-3"})),
                " ",orgFull?"خروج":"شاشة كاملة"
              ),
              !orgEdit&&h("button",{className:"btn",style:{padding:"7px 14px",fontSize:12,background:"rgba(52,211,153,.12)",border:"1px solid rgba(52,211,153,.3)",color:"#34D399"},onClick:()=>window.print()},
                h("svg",{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:"1.8",strokeLinecap:"round",width:14,height:14},h("path",{d:"M5 7V3h10v4"}),h("rect",{x:"2",y:"7",width:"16",height:"8",rx:"1.5"}),h("path",{d:"M5 11h10M7 15h6"}))," طباعة"
              ),
              !orgEdit&&h("button",{className:"btn",style:{padding:"7px 14px",fontSize:12,background:"rgba(252,211,77,.08)",border:"1px solid rgba(252,211,77,.25)",color:"#FCD34D"},onClick:doSync},"↺ مزامنة"),
              orgEdit
                ?[h("button",{key:"sv",className:"btn green",style:{padding:"7px 18px",fontSize:12},disabled:orgSaving,
                    onClick:async()=>{setOrgSaving(true);await fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:orgDraft})}).catch(()=>{});setOrgData(orgDraft);setOrgEdit(false);setOrgSaving(false);}
                  },orgSaving?"جاري الحفظ...":"💾 حفظ"),
                  h("button",{key:"cn",className:"btn",style:{padding:"7px 14px",fontSize:12},onClick:()=>{setOrgEdit(false);setOrgDraft(null);}},"إلغاء")]
                :h("button",{className:"btn",style:{padding:"7px 14px",fontSize:12},onClick:()=>{setOrgDraft(dc(orgData||DEFAULT_ORG));setOrgEdit(true);}},h(Ic,{n:"edit",sz:13,c:"currentColor"})," تعديل")
            )
          ),

          orgEdit&&h("div",{className:"org-edit-bar"},
            h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#FCD34D",flexShrink:0}}),
            h("span",{style:{fontSize:12,fontWeight:700,color:"#FCD34D"}},"وضع التعديل"),
            h("span",{style:{fontSize:11,color:"var(--sub)",marginRight:8}},"— اضغط على أي نص لتعديله، أو أضف / احذف أعضاء ومشاريع")
          ),

          /* ── Tree view (non-edit) ── */
          !orgEdit&&(()=>{
            const treeData=buildOrgTreeFromData(data,att,months,orgData);
            if(!treeData)return null;
            const displayTree=orgFocus
              ?{...treeData,children:treeData.children.filter(c=>c.id===orgFocus)}
              :treeData;
            const focusedCity=orgFocus?CITY_CFG.find(c=>c.id===orgFocus):null;
            return h("div",{style:{display:"flex",flexDirection:"column",minHeight:0}},
              orgFocus&&h("div",{style:{
                padding:"8px 20px",display:"flex",alignItems:"center",gap:10,
                borderBottom:"1px solid var(--border)",background:"var(--bg2)",flexShrink:0
              }},
                h("span",{style:{fontSize:12,color:"var(--sub)"}},
                  "عرض: ",h("strong",{style:{color:"var(--text)"}},focusedCity?.name||orgFocus)
                ),
                h("button",{
                  className:"btn",
                  style:{padding:"4px 12px",fontSize:11,marginRight:"auto"},
                  onClick:()=>setOrgFocus(null)
                },"← عرض الكل")
              ),
              h("div",{className:"ot-wrap"},
                h("div",{className:"ot-inner"},
                  h(OrgNode,{node:displayTree})
                ),
                h(OrgLegend)
              )
            );
          })(),

          /* ── Edit mode: classic director card ── */
          orgEdit&&h("div",{className:"org-ceo-wrap"},
            h("div",{className:"org-ceo-card"},
              h("div",{className:"org-ceo-av"},od.director.name.charAt(0)||"م"),
              h("div",{style:{flex:1,minWidth:0}},
                orgEdit
                  ?Ei(od.director.name,v=>upd(d=>{d.director.name=v;}),{fontSize:15,fontWeight:900,background:"rgba(255,255,255,.12)",color:"#fff",borderColor:"rgba(255,255,255,.25)",marginBottom:4})
                  :h("div",{className:"org-ceo-name"},od.director.name),
                orgEdit
                  ?Ei(od.director.title,v=>upd(d=>{d.director.title=v;}),{fontSize:10,background:"rgba(255,255,255,.08)",color:"rgba(255,255,255,.8)",borderColor:"rgba(255,255,255,.18)"})
                  :h("div",{className:"org-ceo-ttl"},od.director.title)
              ),
              h("div",{className:"org-ceo-badge"},od.company)
            ),
            h("div",{className:"org-ceo-line"})
          ),

          /* ── Edit mode: provinces grid ── */
          orgEdit&&h("div",{className:"org-provinces"},
            od.cities.map((city,ci)=>{
              const col=city.color;
              const projects=city.projects||[];
              return h("div",{
                key:city.id,
                className:"org-prov"+(orgFocus===city.id?" focused":""),
                style:{["--pc"]:col},
                ref:el=>{orgSecRefs.current[city.id]=el;}
              },

                /* Province header */
                h("div",{className:"org-ph"},
                  h("div",{className:"org-ph-letter"},city.name.charAt(0)),
                  h("div",{className:"org-ph-info"},
                    orgEdit
                      ?Ei(city.name,v=>upd(d=>{d.cities[ci].name=v;}),{fontSize:18,fontWeight:900,color:col})
                      :h("div",{className:"org-ph-name"},city.name),
                    h("div",{className:"org-ph-sub"},"الفريق الهندسي • شركة الرائد")
                  ),
                  h("div",{className:"org-ph-chips"},
                    [{v:city.managers.length,l:"مدير"},{v:city.team.length,l:"مهندس"},{v:projects.length,l:"مشروع"}]
                    .map(({v,l})=>h("div",{key:l,className:"org-ph-chip"},h("div",{className:"org-ph-cv"},v),h("div",{className:"org-ph-cl"},l)))
                  )
                ),

                /* Province body: people | projects */
                h("div",{className:"org-pb"},

                  /* People column */
                  h("div",null,
                    /* Managers */
                    h("div",{className:"org-slbl",style:{color:col}},"★  القيادة"),
                    city.managers.map((mgr,mi)=>
                      h("div",{key:mi,className:"org-mgr-row"},
                        h("div",{className:"org-mgr-av"},"★"),
                        h("div",{style:{flex:1,minWidth:0}},
                          orgEdit?Ei(mgr.name,v=>upd(d=>{d.cities[ci].managers[mi].name=v;})):h("div",{className:"org-mgr-nm"},mgr.name),
                          orgEdit?Ei(mgr.role,v=>upd(d=>{d.cities[ci].managers[mi].role=v;})):h("div",{className:"org-mgr-rl"},mgr.role)
                        ),
                        orgEdit&&h("button",{className:"org-xbtn",style:{opacity:1},onClick:()=>upd(d=>{d.cities[ci].managers.splice(mi,1);})},"✕")
                      )
                    ),
                    orgEdit&&h("button",{className:"org-addbtn",onClick:()=>upd(d=>{d.cities[ci].managers.push({name:"اسم المدير",role:"مدير المشروع"});})},"+ مدير"),

                    /* Engineers */
                    h("div",{className:"org-slbl",style:{color:"var(--sub)"}},"الفريق الهندسي"),
                    city.team.map((eng,ei)=>
                      h("div",{key:ei,className:"org-eng-row"},
                        h("div",{className:"org-eng-num"},ei+1),
                        h("div",{style:{flex:1,minWidth:0}},
                          orgEdit?Ei(eng.name,v=>upd(d=>{d.cities[ci].team[ei].name=v;})):h("div",{className:"org-eng-nm"},eng.name),
                          orgEdit?Ei(eng.role,v=>upd(d=>{d.cities[ci].team[ei].role=v;})):h("div",{className:"org-eng-rl"},eng.role)
                        ),
                        orgEdit&&h("button",{className:"org-xbtn",style:{opacity:1},onClick:()=>upd(d=>{d.cities[ci].team.splice(ei,1);})},"✕")
                      )
                    ),
                    orgEdit&&h("button",{className:"org-addbtn",onClick:()=>upd(d=>{d.cities[ci].team.push({name:"اسم المهندس",role:"مهندس"});})},"+ مهندس")
                  ),

                  /* Projects column */
                  h("div",{className:"org-pv-proj"},
                    h("div",{className:"org-slbl",style:{color:"#34D399"}},"📁  المشروعات"),
                    projects.map((p,pi)=>
                      h("div",{key:pi,className:"org-prj-row"},
                        h("div",{className:"org-prj-num"},pi+1),
                        orgEdit?Ei(p,v=>upd(d=>{d.cities[ci].projects[pi]=v;})):h("div",{className:"org-prj-nm"},p),
                        orgEdit&&h("button",{className:"org-xbtn",style:{opacity:1},onClick:()=>upd(d=>{d.cities[ci].projects.splice(pi,1);})},"✕")
                      )
                    ),
                    orgEdit&&h("button",{className:"org-addbtn",style:{color:"#34D399"},onClick:()=>upd(d=>{(d.cities[ci].projects=d.cities[ci].projects||[]).push("اسم المشروع");})},"+ مشروع")
                  )
                )
              );
            })
          )
        );
      })(),

      /* ── BOTTOM NAV (mobile) ──────────────────────────── */
      h("div",{className:"bottom-nav"},
        h("div",{className:"bottom-nav-inner"},
          (isAdmin?mobileNavs:[{id:"eng",n:"eng",lbl:"المهندسون"},{id:"att",n:"att",lbl:"الحضور"}])
            .map(({id,n,lbl})=>h("div",{key:id,className:`bn-item ${page===id?"on":""}`,onClick:()=>setPage(id)},h(Ic,{n,sz:20}),h("span",null,lbl.split(" ")[0]))),
          isAdmin&&h("div",{className:`bn-item ${["backup","report"].includes(page)?"on":""}`,onClick:()=>setPage("backup")},
            h(Ic,{n:"backup",sz:20}),h("span",null,"أدوات"),
            unsaved>0&&h("div",{className:"nav-badge",style:{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",margin:0}},unsaved)
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
