     Each builds a complete white-template PDF without
     navigating away. mode='print' auto-opens print dialog,
     mode='preview' just opens window for viewing.
  ────────────────────────────────────────────────────── */
  const _openPdfWin=(html,mode,skipSig)=>{
    const w=window.open('','_blank','width=1100,height=820');
    if(!w){msg('السماح بفتح النوافذ المنبثقة','err');return null;}
    /* Inject developer signature before closing body so every helper-built PDF gets it.
       skipSig=true: caller embeds its own themed credit inside the last page (avoids a blank orphan page). */
    const sig=skipSig?'':_devSigPdf();
    const finalHtml=html.includes('</body>')?html.replace('</body>',sig+'</body>'):html+sig;
    w.document.write(finalHtml);
    w.document.close();
    setTimeout(()=>{try{w.focus();if(mode==='print')w.print();}catch(e){}},mode==='print'?700:200);
    return w;
  };

  const _pdfHeaderHtml=(title,subtitle)=>{
    const today=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
    const logoHtml=`<img src="${logo||location.origin+'/logo.jpg'}" style="width:60px;height:60px;object-fit:contain;border-radius:10px;padding:4px;border:2px solid rgba(212,165,56,.5);background:#fff"/>`;
    return `<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 22px;background:linear-gradient(135deg,#0A0E1A 0%,#0F2659 55%,#1A2238 100%);border-radius:14px;margin-bottom:18px;position:relative;overflow:hidden">
      <div style="display:flex;align-items:center;gap:14px">
        ${logoHtml}
        <div>
          <div style="font-size:22px;font-weight:900;color:#fff;line-height:1.25">${title}</div>
          <div style="font-size:12px;color:#D4A538;font-weight:700;margin-top:4px">${subtitle}</div>
        </div>
      </div>
      <div style="text-align:left;font-size:10.5px;color:#C9D4E8;line-height:1.7">${cfg.company||'شركة الرائد للاستشارات الهندسية'}<br>صدر: ${today}</div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#D4A538,#0F2659)"></div>
    </div>`;
  };

  const _pdfShellCss=()=>`@page{size:A4;margin:12mm 10mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;color:#1A2238;font-size:11px;background:#fff;padding:14px;line-height:1.55;-webkit-print-color-adjust:exact;print-color-adjust:exact}@media print{body{padding:0}.no-print{display:none!important}}.print-bar{position:fixed;top:8px;left:8px;z-index:99}.print-btn{background:#0F2659;color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;box-shadow:0 4px 12px rgba(15,38,89,.3)}table{width:100%;border-collapse:collapse;font-size:10.5px}thead{display:table-header-group}tr{page-break-inside:avoid}th,td{border:1px solid #E2E8F0;padding:6px 9px;text-align:right}th{background:#0F2659;font-weight:700;color:#F5E6C5}tfoot td{font-weight:800;background:#F4F1E8;color:#0F2659}.empty{padding:8px 12px;text-align:right;color:#94A3B8;font-style:italic;font-size:10.5px;background:#F8FAFC;border-radius:6px;margin:4px 0}.section{margin:0 0 14px}.section-title{font-size:14px;font-weight:800;color:#0F2659;padding:7px 13px;background:linear-gradient(90deg,#F4F1E8,#F7FAFF);border-right:5px solid #D4A538;border-radius:6px;margin-bottom:9px;page-break-after:avoid}`;

  /* ── Developer signature for PDFs (inline-styled for portability across all PDF templates) ── */
  const _devSigPdf=()=>`<div style="margin:22px 4mm 0;padding:11px 16px;border-radius:10px 10px 0 0;border-top:3px solid #D4A538;font-size:10px;background:#0A0E1A;color:#C9D4E8;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px"><span>${cfg.company||'شركة الرائد للاستشارات الهندسية'}</span><span style="font-weight:800;color:#D4A538">© Bilal A.Ali ${new Date().getFullYear()}</span></div>`;

  /* ── Attendance PDF (defaults to PREVIOUS month — attendance is recorded for prev month at start of current month) ── */
  const printAttendancePDF=(mode='print',monthKey=null)=>{
    /* Default: use attKey (previous month). Fall back to current ak if no override and attKey missing data */
    const useKey=monthKey||attKey;
    const useM=months[useKey];
    const _data=useM?.data||data;
    const _att=useM?.attendance||{};
    const _cfg=useM?.cfg||cfg;
    const M=_cfg.month||(now.getMonth()+1),Y=_cfg.year||now.getFullYear();
    const monthLabel=MONTHS[M-1]+' '+Y;
    const daysInMonth=new Date(Y,M,0).getDate();
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);
    const DAY_AR=["أح","إث","ث","أر","خ","ج","س"];
    const isFri=d=>new Date(Y,M-1,d).getDay()===5;
    const S_BG={P:'#D1FAE5',EG:'#DBEAFE',A:'#FEE2E2',AL:'#EFF6FF',SL:'#FEF3C7',EL:'#FFEDD5',H:'#F1F5F9'};
    const S_COL={P:'#059669',EG:'#2563EB',A:'#DC2626',AL:'#1D4ED8',SL:'#D97706',EL:'#EA580C',H:'#64748B'};
    const visibleProvs=isProvince?[userProv]:PROVS;
    let totalP=0,totalA=0,totalLv=0,totalEgL=0,totalLateMins=0,totalLateDays=0;
    /* PDF colors for egypt leave (orange) and late (amber) */
    const PDF_EGL_BG='#FFEDD5',PDF_EGL_COL='#C2410C';
    const PDF_TXR_BG='#FEF3C7',PDF_TXR_COL='#B45309';
    /* Cross-month egypt-leave check — defensive against legacy data where egyptLeaves
       might exist only on the month it was created on, not propagated to others */
    const isLeaveDayPDF=(engId,dateStr)=>{
      for(const k of Object.keys(months)){
        if(k==='leaves')continue;
        const md=months[k];
        if(!md?.data)continue;
        for(const p of Object.keys(md.data)){
          const e=(md.data[p]||[]).find(x=>x?.id===engId);
          if(e&&isOnEgyptLeaveDate(e,dateStr))return true;
        }
      }
      return false;
    };
    const provBlocks=visibleProvs.map(prov=>{
      /* Use transfer-aware list: shows both currently-here engs AND those who passed through this prov this month */
      const provEngs=engsInProvDuringMonth(prov,Y,M,_data);
      if(!provEngs.length)return '';
      const rows=provEngs.map(eng=>{
        const eAtt=_att[eng.id]||{};
        /* isSplit indicates the engineer didn't span the full prov×month — used to render the tenure badge */
        const isSplit=eng.hasTransfer&&(eng.firstDay>1||eng.lastDay<daysInMonth);
        const showDepartureBadge=!!eng.hasDeparture;
        let p=0,a=0,lv=0,egL=0,lateDays=0,lateMins=0;
        const cells=days.map(d=>{
          const fri=isFri(d);
          const inTenure=eng.daysInProvSet.has(d);
          /* Outside tenure → grey "—" cell */
          if(!inTenure){
            return '<td style="background:#FAFAFA;color:#CBD5E1;text-align:center;font-size:11px;font-weight:600;border:1px dashed #E2E8F0">—</td>';
          }
          /* Egypt-leave override (highest priority) — cross-month aware */
          const ds=`${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const onLeave=isLeaveDayPDF(eng.id,ds);
          if(onLeave){egL++;return `<td style="background:${PDF_EGL_BG};color:${PDF_EGL_COL};text-align:center;font-size:9px;font-weight:800">م</td>`;}
          const dd=eAtt[d];const st=dd?.s;
          /* Late state — show ⚠ + HH:MM in 2 lines */
          if(st==='TXR'){
            const lh=+dd.lateH||0,lm=+dd.lateM||0;
            lateDays++;
            lateMins+=lh*60+lm;
            const lateLabel=String(lh).padStart(2,'0')+':'+String(lm).padStart(2,'0');
            return `<td style="background:${PDF_TXR_BG};color:${PDF_TXR_COL};text-align:center;font-size:8px;font-weight:800;line-height:1.1"><div>⚠</div><div style="font-size:7px;font-weight:700">${lateLabel}</div></td>`;
          }
          if(st==='P')p++;else if(st==='A')a++;else if(['AL','SL','EL'].includes(st))lv++;
          if(fri)return '<td style="background:#F1F5F9;color:#94A3B8;text-align:center;font-size:9px;font-weight:700">ع</td>';
          if(!st)return '<td></td>';
          return `<td style="background:${S_BG[st]};color:${S_COL[st]};text-align:center;font-size:9px;font-weight:800">${ATT_SHORT[st]||st}</td>`;
        }).join('');
        /* Multi-month full-duration aggregates for summary header */
        const _lvFull=getDisplayLeaveDays(eng.id,Y,M,lv);
        const _egLFull=getDisplayEgyptLeaveDays(eng.id,Y,M,egL);
        totalEgL+=_egLFull;
        totalP+=p;totalA+=a;totalLv+=_lvFull;
        totalLateDays+=lateDays;
        totalLateMins+=lateMins;
        /* Tenure / transfer badges */
        let badges='';
        if(isSplit){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE;font-weight:700;margin-right:4px">📅 يوم ${eng.firstDay}-${eng.lastDay}</span>`;
        }
        if(eng.isReadOnlyHere){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F1F5F9;color:#475569;border:1px solid #CBD5E1;font-weight:700;margin-right:4px">🔒 منقول</span>`;
        }else if(eng.hasTransfer){
          /* Show "منقول من X" only in destination prov */
          const ts=getTransfers(eng);
          const last=ts[ts.length-1];
          if(last&&last.to===prov){
            badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE;font-weight:700;margin-right:4px">🔄 منقول من ${last.from.replace('محافظة ','')} · ${last.date}</span>`;
          }
        }
        /* Egypt-leave badge if engineer is currently on leave */
        const activeLeave=getActiveEgyptLeave(eng);
        if(activeLeave){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#FFEDD5;color:#C2410C;border:1px solid #FED7AA;font-weight:700;margin-right:4px">🇪🇬 إجازة منذ ${activeLeave.departureDate}</span>`;
        }
        /* Permanent-departure badge if engineer left to Egypt in this month */
        if(showDepartureBadge){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;font-weight:800;margin-right:4px">📤 غادر نهائياً يوم ${eng.departureDay}</span>`;
        }
        /* Late summary cell (per-engineer): days count + total HH:MM */
        const lateCell=lateDays>0
          ?`<td style="text-align:center;background:#FFFBEB;border-left:1px solid #FDE68A;min-width:80px"><div style="font-size:10px;font-weight:800;color:#B45309">${lateDays} يوم</div><div style="font-size:13px;font-weight:900;font-family:monospace;color:#B45309;letter-spacing:1px">${formatTotalLate(lateMins)}</div></td>`
          :`<td style="text-align:center;color:#CBD5E1;font-size:11px;border-left:1px solid #FDE68A;min-width:80px">—</td>`;
        /* Multi-month full-duration display values for the summary cell */
        const lvFull=getDisplayLeaveDays(eng.id,Y,M,lv);
        const egLFull=getDisplayEgyptLeaveDays(eng.id,Y,M,egL);
        return `<tr><td style="font-weight:700">${eng.name}${badges?'<br>'+badges:''}<br><span style="font-size:9px;color:#64748B">${eng.spec||''}</span></td>${cells}${lateCell}<td style="text-align:center;background:#FAFAFA"><span style="color:#059669;font-weight:800">${p}</span> · <span style="color:#DC2626;font-weight:800">${a}</span>${lvFull>0?' · <span style="color:#2563EB;font-weight:800">'+lvFull+'</span>':''}${egLFull>0?' · <span style="color:#C2410C;font-weight:800">'+egLFull+' م</span>':''}</td></tr>`;
      }).join('');
      const header=`<tr><th style="min-width:130px">المهندس</th>${days.map(d=>`<th style="min-width:24px;font-size:9px${isFri(d)?';background:#F1F5F9;color:#94A3B8':''}">${d}<br>${DAY_AR[new Date(Y,M-1,d).getDay()]}</th>`).join('')}<th style="min-width:80px;background:#FFFBEB;color:#B45309">⏰ التأخير</th><th style="min-width:90px">الملخص</th></tr>`;
      /* Transferred-OUT section (engineers who left this prov during this month) */
      const transferredOutNames=[];
      Object.values(_data).forEach(provEngsList=>(provEngsList||[]).forEach(e=>{
        const ts=getTransfers(e);
        if(!ts.length)return;
        const last=ts[ts.length-1];
        const lastDate=new Date(last.date+'T12:00');
        if(last.from===prov && e.prov!==prov && lastDate.getFullYear()===Y && lastDate.getMonth()+1===M){
          transferredOutNames.push({name:e.name,spec:e.spec,date:last.date,to:last.to});
        }
      }));
      const transferOutBlock=transferredOutNames.length>0
        ?`<div style="margin-top:8px;padding:10px 14px;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:8px"><div style="font-size:11px;font-weight:800;color:#6D28D9;margin-bottom:6px">📤 منقولون من هذه المحافظة (${transferredOutNames.length})</div>${transferredOutNames.map(t=>`<div style="font-size:10px;color:#475569;padding:3px 0"><strong style="color:#1F2937">${t.name}</strong> · ${t.spec||'مهندس'} · <span style="color:#6D28D9">${t.date}</span> → <strong style="color:#059669">${t.to.replace('محافظة ','')}</strong></div>`).join('')}</div>`
        :'';
      return `<div class="section"><div class="section-title">📍 ${prov} (${provEngs.length} مهندس)</div><table>${header}${rows}</table>${transferOutBlock}</div>`;
    }).join('');
    const summary=`<div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:1;padding:10px;border:2px solid #34D399;background:#ECFDF5;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#059669">${totalP}</div><div style="font-size:10px;color:#065F46;font-weight:700">إجمالى الحضور</div></div><div style="flex:1;padding:10px;border:2px solid #F87171;background:#FEF2F2;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#DC2626">${totalA}</div><div style="font-size:10px;color:#991B1B;font-weight:700">إجمالى الغياب</div></div><div style="flex:1;padding:10px;border:2px solid #60A5FA;background:#EFF6FF;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2563EB">${totalLv}</div><div style="font-size:10px;color:#1E40AF;font-weight:700">إجمالى الإجازة المرضية</div></div><div style="flex:1;padding:10px;border:2px solid #F59E0B;background:#FFFBEB;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#B45309">${totalLateDays}</div><div style="font-size:10px;color:#78350F;font-weight:700">عدد أيام التأخير</div></div><div style="flex:1;padding:10px;border:2px solid #F59E0B;background:#FFFBEB;border-radius:8px;text-align:center"><div style="font-size:18px;font-weight:900;font-family:monospace;color:#B45309;letter-spacing:1px">${formatTotalLate(totalLateMins)}</div><div style="font-size:10px;color:#78350F;font-weight:700">إجمالى ساعات التأخير</div></div></div>`;
    const hrNote=`<div style="margin-top:14px;padding:12px 16px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;font-size:10px;color:#78350F"><strong style="color:#B45309">⚠️ ملاحظة:</strong> يخضع للخصم بناءً على ساعات التأخير (يحدد بواسطة HR فى مصر).</div>`;
    const legend=`<div style="margin-top:10px;padding:8px 12px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
  <span style="font-size:10px;font-weight:800;color:#475569;margin-left:6px">📖 دليل الرموز:</span>
  ${[['P','حضور','#D1FAE5','#059669'],['EG','فى مصر','#DBEAFE','#2563EB'],['م','إجازة (مصر)','#FFEDD5','#C2410C'],['A','غياب','#FEE2E2','#DC2626'],['SL','إجازة مرضية','#FEF3C7','#D97706'],['H','عطلة رسمية','#F1F5F9','#64748B'],['⚠','متأخر','#FEF3C7','#B45309']].map(([s,l,bg,col])=>`<span style="display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700"><span style="display:inline-block;width:18px;height:18px;border-radius:3px;background:${bg};color:${col};border:1px solid ${col};text-align:center;line-height:16px;font-size:9px;font-weight:900">${s}</span>${l}</span>`).join('')}
  <span style="font-size:9.5px;color:#94A3B8;margin-right:auto">🔴 الجمعة عطلة أسبوعية</span>
</div>`;
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>تقرير الحضور — ${monthLabel}</title><style>${_pdfShellCss()}@page{size:A4 landscape;margin:8mm}body{padding:14px;font-size:10px}table{font-size:10px}th,td{padding:4px 6px}</style></head><body><div class="print-bar no-print"><button class="print-btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div>${_pdfHeaderHtml('تقرير الحضور والانصراف','تفصيل أيام الحضور والغياب لكل مهندس · '+monthLabel)}${summary}${provBlocks||'<div class="empty">لا توجد بيانات حضور</div>'}${legend}${totalLateDays>0?hrNote:''}</body></html>`;
    _openPdfWin(html,mode);
  };

  /* ── Expenses PDF (defaults to current month ak; pass monthKey to override or pass 'all' for aggregated) ── */
  const printExpensesPDF=(mode='print',monthKey=null)=>{
    const fmt=n=>(+n||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtN=n=>(+n||0).toLocaleString('ar-EG',{minimumFractionDigits:0,maximumFractionDigits:0});
    const useKey=monthKey||ak;
    const isAll=useKey==='all';
    const useM=months[useKey];
    /* Source arrays: 'all' uses aggregated; specific month uses that month's expenses block */
    const baseCust=isAll?aggCustody:(useM?.expenses?.custody||[]).map(c=>({...c,monthKey:useKey}));
    const baseItems=isAll?aggExpItems:(useM?.expenses?.items||[]).map(e=>({...e,monthKey:useKey}));
    const baseTrfs=isAll?aggTransfers:(useM?.expenses?.transfers||[]).map(t=>({...t,monthKey:useKey}));
    const cust=isProvince?baseCust.filter(c=>c.prov===userProv):baseCust;
    const items=isProvince?baseItems.filter(e=>e.prov===userProv):baseItems;
    const trfs=isProvince?baseTrfs.filter(t=>t.prov===userProv):baseTrfs;
    const monthLabel=isAll?'كل الشهور':(useM?.cfg?MONTHS[(useM.cfg.month||1)-1]+' '+useM.cfg.year:useKey);
    const totC_USD=cust.reduce((a,c)=>a+(+c.usd||0),0);
    const totC_LYD=cust.reduce((a,c)=>a+(+c.lyd||0),0);
    const totC_EGP=cust.reduce((a,c)=>a+(+c.egp||0),0);
    const totI_USD=items.reduce((a,e)=>a+(+e.usd||0),0);
    const totI_LYD=items.reduce((a,e)=>a+(+e.lyd||0),0);
    const totI_EGP=items.reduce((a,e)=>a+(+e.egp||0),0);
    let totTFromUSD=0,totTFromLYD=0,totTFromEGP=0,totTToUSD=0,totTToLYD=0,totTToEGP=0;
    trfs.forEach(t=>{
      const fc=(t.fromCurrency||'usd').toLowerCase();
      const tc=(t.toCurrency||'lyd').toLowerCase();
      const fa=+t[fc]||+t.usd||0;
      const ta=+t[tc]||+t.lyd||0;
      if(fc==='usd')totTFromUSD+=fa;else if(fc==='lyd')totTFromLYD+=fa;else if(fc==='egp')totTFromEGP+=fa;
      if(tc==='usd')totTToUSD+=ta;else if(tc==='lyd')totTToLYD+=ta;else if(tc==='egp')totTToEGP+=ta;
    });
    const balUSD=totC_USD+totTToUSD-totI_USD-totTFromUSD;
    const balLYD=totC_LYD+totTToLYD-totI_LYD-totTFromLYD;
    const balEGP=totC_EGP+totTToEGP-totI_EGP-totTFromEGP;
    const fmtCurrencies=(usd,lyd,egp,smallSize)=>{
      const parts=[];
      if(usd>0)parts.push(`<div style="font-size:14px;font-weight:900;color:#059669">${fmt(usd)} $</div>`);
      if(lyd>0)parts.push(`<div style="font-size:${smallSize||14}px;font-weight:${smallSize?800:900};color:#15803D">${fmtN(lyd)} د.ل</div>`);
      if(egp>0)parts.push(`<div style="font-size:${smallSize||14}px;font-weight:${smallSize?800:900};color:#6D28D9">${fmtN(egp)} ج.م</div>`);
      return parts.join('')||'<div style="font-size:11px;color:#9CA3AF">—</div>';
    };
    const summary=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      <div style="padding:10px;border:2px solid #34D399;background:#ECFDF5;border-radius:8px;text-align:center"><div style="font-size:9px;color:#065F46;font-weight:800;margin-bottom:4px">العهد المستلمة</div>${fmtCurrencies(totC_USD,totC_LYD,totC_EGP,11)}</div>
      <div style="padding:10px;border:2px solid #F87171;background:#FEF2F2;border-radius:8px;text-align:center"><div style="font-size:9px;color:#991B1B;font-weight:800;margin-bottom:4px">المصروفات</div>${fmtCurrencies(totI_USD,totI_LYD,totI_EGP,11)}</div>
      <div style="padding:10px;border:2px solid #FCD34D;background:#FFFBEB;border-radius:8px;text-align:center"><div style="font-size:9px;color:#78350F;font-weight:800;margin-bottom:4px">التحويلات</div><div style="font-size:10px;color:#92400E">من: ${[totTFromUSD>0?fmt(totTFromUSD)+'$':null,totTFromLYD>0?fmtN(totTFromLYD)+'د.ل':null,totTFromEGP>0?fmtN(totTFromEGP)+'ج.م':null].filter(Boolean).join(' · ')||'—'}</div><div style="font-size:10px;color:#92400E;margin-top:2px">إلى: ${[totTToUSD>0?fmt(totTToUSD)+'$':null,totTToLYD>0?fmtN(totTToLYD)+'د.ل':null,totTToEGP>0?fmtN(totTToEGP)+'ج.م':null].filter(Boolean).join(' · ')||'—'}</div></div>
      <div style="padding:10px;border:2px solid #60A5FA;background:#EFF6FF;border-radius:8px;text-align:center"><div style="font-size:9px;color:#1E40AF;font-weight:800;margin-bottom:4px">الرصيد المتبقى</div><div style="font-size:14px;font-weight:900;color:${balUSD<0?'#DC2626':'#2563EB'}">${fmt(balUSD)} $</div><div style="font-size:11px;font-weight:800;color:${balLYD<0?'#DC2626':'#1E40AF'}">${fmtN(balLYD)} د.ل</div>${(balEGP!==0)?`<div style="font-size:11px;font-weight:800;color:${balEGP<0?'#DC2626':'#6D28D9'}">${fmtN(balEGP)} ج.م</div>`:''}</div>
    </div>`;
    const sCust=cust.length?`<div class="section"><div class="section-title">💰 العهد المستلمة (${cust.length})</div><table><thead><tr><th>التاريخ</th><th>المحافظة</th><th>المسؤول</th><th>المصدر</th><th style="text-align:center">$</th><th style="text-align:center">د.ل</th><th style="text-align:center">ج.م</th><th>ملاحظات</th></tr></thead><tbody>${cust.map(c=>`<tr><td>${c.date||'—'}</td><td>${(c.prov||'').replace('محافظة ','')}</td><td>${engById(c.responsibleId)?.name||'—'}</td><td>${c.source||'—'}</td><td style="text-align:center;font-weight:700;color:#059669">${fmt(c.usd||0)}</td><td style="text-align:center;font-weight:700;color:#15803D">${fmtN(c.lyd||0)}</td><td style="text-align:center;font-weight:700;color:#6D28D9">${fmtN(c.egp||0)}</td><td style="font-size:10px;color:#64748B">${c.note||''}</td></tr>`).join('')}<tr style="background:#F8FAFC;font-weight:900"><td colspan="4">الإجمالى</td><td style="text-align:center;color:#059669">${fmt(totC_USD)} $</td><td style="text-align:center;color:#15803D">${fmtN(totC_LYD)} د.ل</td><td style="text-align:center;color:#6D28D9">${fmtN(totC_EGP)} ج.م</td><td></td></tr></tbody></table></div>`:'';
    const sItems=items.length?`<div class="section"><div class="section-title">💸 المصروفات والإيجارات (${items.length})</div><table><thead><tr><th>التاريخ</th><th>النوع</th><th>التصنيف</th><th>الوصف</th><th>المحافظة</th><th style="text-align:center">$</th><th style="text-align:center">د.ل</th><th style="text-align:center">ج.م</th></tr></thead><tbody>${items.map(e=>`<tr><td>${e.date||'—'}</td><td><span style="background:${e.type==='إيجار'?'#FEF3C7':'#FEE2E2'};color:${e.type==='إيجار'?'#92400E':'#991B1B'};padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800">${e.type||'—'}</span></td><td>${e.category||'—'}</td><td>${e.desc||'—'}</td><td>${(e.prov||'').replace('محافظة ','')}</td><td style="text-align:center;font-weight:700;color:#DC2626">${fmt(e.usd||0)}</td><td style="text-align:center;font-weight:700;color:#B91C1C">${fmtN(e.lyd||0)}</td><td style="text-align:center;font-weight:700;color:#6D28D9">${fmtN(e.egp||0)}</td></tr>`).join('')}<tr style="background:#F8FAFC;font-weight:900"><td colspan="5">الإجمالى</td><td style="text-align:center;color:#DC2626">${fmt(totI_USD)} $</td><td style="text-align:center;color:#B91C1C">${fmtN(totI_LYD)} د.ل</td><td style="text-align:center;color:#6D28D9">${fmtN(totI_EGP)} ج.م</td></tr></tbody></table></div>`:'';
    const SYM2={usd:'$',lyd:'د.ل',egp:'ج.م'};
    const sTrfs=trfs.length?`<div class="section"><div class="section-title">🔄 التحويلات (${trfs.length})</div><table><thead><tr><th>التاريخ</th><th>المحافظة</th><th>المسؤول</th><th style="text-align:center">من</th><th style="text-align:center">إلى</th><th style="text-align:center">السعر</th></tr></thead><tbody>${trfs.map(t=>{const fc=(t.fromCurrency||'usd').toLowerCase();const tc=(t.toCurrency||'lyd').toLowerCase();const fa=+t[fc]||+t.usd||0;const ta=+t[tc]||+t.lyd||0;return `<tr><td>${t.date||'—'}</td><td>${(t.prov||'').replace('محافظة ','')}</td><td>${t.responsible||'—'}</td><td style="text-align:center;font-weight:700;color:#D97706">${fmt(fa)} ${SYM2[fc]}</td><td style="text-align:center;font-weight:700;color:#92400E">${fmtN(ta)} ${SYM2[tc]}</td><td style="text-align:center;font-size:10px;color:#64748B">${t.rate||(fa>0?(ta/fa).toFixed(4):'—')} ${SYM2[tc]}/${SYM2[fc]}</td></tr>`}).join('')}</tbody></table></div>`:'';
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>تقرير المصروفات — ${monthLabel}</title><style>${_pdfShellCss()}</style></head><body><div class="print-bar no-print"><button class="print-btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div>${_pdfHeaderHtml('تقرير العهدة والمصروفات','العهد + الإيجارات + التحويلات + الرصيد المتبقى · '+monthLabel)}${summary}${sCust||'<div class="empty">لا توجد عهد مسجلة</div>'}${sItems}${sTrfs}</body></html>`;
    _openPdfWin(html,mode);
  };

  /* ── Leaves PDF (all leaves with status) ── */
  /* printLeavesPDF — يطبع تقرير الإجازات.
     filter يقبل:
       null/'all'  → كل الطلبات (سلوك افتراضى)
       'pending'   → فقط قيد الانتظار
       'approved'  → فقط معتمدة (يفصل بين المسافرين الآن، المعتمدين قبل السفر،
                     والذين أنهوا الإجازة)
       'rejected'  → فقط مرفوضة/ملغية */
  const printLeavesPDF=(mode='print',filter=null)=>{
    const list=isProvince?leaves.filter(l=>l.prov===userProv):leaves;
    const approved=list.filter(l=>l.status==='approved');
    const pending=list.filter(l=>l.status==='pending');
    const cancelled=list.filter(l=>l.status==='cancelled'||l.status==='rejected');
    const today=new Date();today.setHours(12,0,0,0);
    const onLeaveNow=approved.filter(l=>{
      if(!l.travelDate)return false;
      const t=new Date(l.travelDate+'T12:00'),r=l.returnDate?new Date(l.returnDate+'T12:00'):null;
      return t<=today&&(!r||today<=r);
    });
    /* النص المعروض فى الهيدر + الـ summary حسب الفلتر */
    const f=filter==='all'?null:filter;
    const titleMap={pending:'تقرير الإجازات — قيد الانتظار',approved:'تقرير الإجازات — معتمدة',rejected:'تقرير الإجازات — مرفوضة/ملغية'};
    const subMap={pending:`الإجازات اللى لسه فى انتظار الموافقة (${pending.length} طلب)`,approved:`الإجازات المعتمدة (${approved.length} طلب)`,rejected:`الإجازات المرفوضة أو الملغية (${cancelled.length} طلب)`};
    const title=titleMap[f]||'تقرير الإجازات الشامل';
    const subtitle=subMap[f]||'كل الإجازات (معتمدة، معلقة، ملغية) مع التواريخ والمدة';
    /* الـ summary cards: يعرض الـ4 لو الكل، أو واحدة بس لو فلتر معين */
    let summary='';
    if(!f){
      summary=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
        <div style="padding:10px;border:2px solid #34D399;background:#ECFDF5;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#059669">${approved.length}</div><div style="font-size:10px;color:#065F46;font-weight:700">معتمدة</div></div>
        <div style="padding:10px;border:2px solid #FCD34D;background:#FFFBEB;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#D97706">${pending.length}</div><div style="font-size:10px;color:#78350F;font-weight:700">معلقة</div></div>
        <div style="padding:10px;border:2px solid #60A5FA;background:#EFF6FF;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2563EB">${onLeaveNow.length}</div><div style="font-size:10px;color:#1E40AF;font-weight:700">في إجازة الآن</div></div>
        <div style="padding:10px;border:2px solid #F87171;background:#FEF2F2;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#DC2626">${cancelled.length}</div><div style="font-size:10px;color:#991B1B;font-weight:700">ملغية / مرفوضة</div></div>
      </div>`;
    }
    const stBadge=st=>{const m={'approved':['#ECFDF5','#059669','معتمدة'],'pending':['#FFFBEB','#D97706','معلقة'],'cancelled':['#FEF2F2','#DC2626','ملغية'],'rejected':['#FEF2F2','#DC2626','مرفوضة']};const x=m[st]||['#F1F5F9','#64748B',st||'—'];return `<span style="background:${x[0]};color:${x[1]};padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800">${x[2]}</span>`;};
    const renderTable=(arr,title)=>arr.length?`<div class="section"><div class="section-title">${title} (${arr.length})</div><table><thead><tr><th>المهندس</th><th>المحافظة</th><th>طلبها</th><th>السفر</th><th>العودة</th><th style="text-align:center">المدة</th><th>التذكرة</th><th>ملاحظات</th><th>الحالة</th><th>القرار</th></tr></thead><tbody>${arr.map(l=>{const ts=l.ticketStatus||(l.ticketBooked?'booked':'notBooked');const tkt={booked:'محجوزة',notBooked:'غير محجوزة',postponed:'مؤجلة',cancelled:'ملغاة'}[ts]||'—';return `<tr><td style="font-weight:700">${l.engineerName||'—'}</td><td>${(l.prov||'').replace('محافظة ','')}</td><td style="font-size:10px">${l.requestedBy||'—'}</td><td>${l.travelDate||l.leaveStartDate||'—'}</td><td>${l.returnDate||l.leaveEndDate||'—'}</td><td style="text-align:center;font-weight:700">${l.durationDays||'—'} ${l.durationDays?'يوم':''}</td><td style="font-size:10px">${tkt}${l.ticketDetails?` · ${l.ticketDetails}`:''}</td><td style="font-size:10px;color:#64748B">${l.notes||l.cancelReason||'—'}</td><td>${stBadge(l.status)}</td><td style="font-size:9px;color:#64748B">${l.decidedBy?(l.decidedBy+(l.decidedAt?' · '+new Date(l.decidedAt).toLocaleDateString('ar-EG'):'')):'—'}</td></tr>`}).join('')}</tbody></table></div>`:'';
    /* محتوى الـ tables — محسوب حسب الفلتر */
    let content='';
    if(!f){
      content=renderTable(onLeaveNow,'✈️ في إجازة الآن')
        +renderTable(approved.filter(l=>!onLeaveNow.includes(l)),'✅ إجازات معتمدة')
        +renderTable(pending,'⏳ إجازات معلقة')
        +renderTable(cancelled,'❌ إجازات ملغية / مرفوضة');
      if(list.length===0)content='<div class="empty">لا توجد إجازات</div>';
    }else if(f==='pending'){
      content=renderTable(pending,'⏳ إجازات قيد الانتظار');
      if(pending.length===0)content='<div class="empty">لا توجد طلبات قيد الانتظار</div>';
    }else if(f==='approved'){
      content=renderTable(onLeaveNow,'✈️ في إجازة الآن')+renderTable(approved.filter(l=>!onLeaveNow.includes(l)),'✅ إجازات معتمدة');
      if(approved.length===0)content='<div class="empty">لا توجد إجازات معتمدة</div>';
    }else if(f==='rejected'){
      content=renderTable(cancelled,'❌ إجازات مرفوضة / ملغية');
      if(cancelled.length===0)content='<div class="empty">لا توجد إجازات مرفوضة</div>';
    }
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>${title}</title><style>${_pdfShellCss()}@page{size:A4 landscape;margin:10mm}</style></head><body><div class="print-bar no-print"><button class="print-btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div>${_pdfHeaderHtml(title,subtitle)}${summary}${content}</body></html>`;
    _openPdfWin(html,mode);
  };

  /* ── Org/Provinces PDF (org structure + per-province stats) ── */
  /* ══════════════════════════════════════════════════════════════
     Annual-Report style Org Chart PDF (cover + hierarchy SVG + donuts + city pages)
     ════════════════════════════════════════════════════════════════ */
  const printOrgPDF=(mode='print')=>{
    const od=orgData||{director:{name:'—',title:'مدير المشروعات'},cities:[]};
    const dirName=od.director?.name||'ضياء الدين محمود';
    const dirTitle=od.director?.title||'مدير مشروعات ليبيا';
    const company=cfg.company||od.company||'شركة الرائد للاستشارات الهندسية';
    const _M=cfg.month||(now.getMonth()+1),_Y=cfg.year||now.getFullYear();
    const monthLabel=MONTHS[_M-1]+' '+_Y;
    /* Logo handling: use uploaded logo data-URL if set, else fall back to 'R' monogram */
    /* Logo: uploaded data-URL if set, else the bundled Raed logo asset (absolute URL so it loads inside the about:blank print window) */
    const logoSrc=logo||(location.origin+'/logo.jpg');
    const logoCoverHtml=`<div style="background:#fff;border:3px solid #D4A538;border-radius:16px;padding:16px 28px;margin-bottom:26px;box-shadow:0 0 0 6px rgba(212,165,56,.10),0 20px 60px rgba(0,0,0,.5);display:inline-flex;align-items:center;justify-content:center"><img src="${logoSrc}" style="height:82px;max-width:320px;object-fit:contain;display:block"/></div>`;
    const logoHdrHtml=`<div style="background:#fff;border:1.5px solid #E8E0CC;border-radius:8px;padding:5px 9px;display:inline-flex;align-items:center"><img src="${logoSrc}" style="height:34px;max-width:115px;object-fit:contain;display:block"/></div>`;
    /* Map CITY_CFG to live data so report uses real numbers */
    const CITY_META={
      derna:   {accent:'#3B82F6',soft:'#DBEAFE',deep:'#1E40AF',gradFrom:'#1E40AF',gradTo:'#3B82F6',officeLabel:'OFFICE I'},
      bayda:   {accent:'#8B5CF6',soft:'#EDE9FE',deep:'#5B21B6',gradFrom:'#5B21B6',gradTo:'#8B5CF6',officeLabel:'OFFICE II'},
      benghazi:{accent:'#F59E0B',soft:'#FEF3C7',deep:'#92400E',gradFrom:'#92400E',gradTo:'#F59E0B',officeLabel:'OFFICE III'},
      tabrouk: {accent:'#10B981',soft:'#DCFCE7',deep:'#166534',gradFrom:'#166534',gradTo:'#10B981',officeLabel:'OFFICE IV'},
    };
    const initial=(name)=>(name||'?').trim().split(' ').filter(Boolean).slice(0,1).map(w=>w[0]).join('');
    /* Build the cities data we'll use for everything */
    const cities=(CITY_CFG||[]).map(cfgC=>{
      const meta=CITY_META[cfgC.id]||CITY_META.derna;
      const provName=cfgC.prov;
      const cityOrg=(od.cities||[]).find(c=>c.id===cfgC.id)||{managers:[],team:[],projects:[]};
      /* Live engineers list (only the ones still in this prov, not departed) */
      const engs=(data[provName]||[]).filter(e=>!isDepartedBeforeMonth(e,_Y,_M)&&e.name!==dirName);
      const mgrEng=engs.find(e=>e.spec&&e.spec.includes('مدير'));
      const mgrOrg=cityOrg.managers&&cityOrg.managers[0];
      const mgrName=(mgrEng&&mgrEng.name)||(mgrOrg&&mgrOrg.name)||cfgC.name;
      const mgrRole=(mgrEng&&mgrEng.spec)||(mgrOrg&&mgrOrg.role)||'مدير المشروع';
      const projects=(PROJ_DATA[cfgC.id]||cityOrg.projects||[]).map(p=>typeof p==='string'?p:(p?.name||''));
      const team=engs.filter(e=>e.id!==mgrEng?.id||!mgrEng);
      return {id:cfgC.id,name:cfgC.name,prov:provName,meta,engs,mgrName,mgrRole,projects,team};
    });
    const totalEngs=cities.reduce((a,c)=>a+c.engs.length,0);
    const totalProjs=cities.reduce((a,c)=>a+c.projects.length,0);
    const activeProvs=cities.filter(c=>c.engs.length>0).length;
    /* Donut helper — share = part/total. ringPath length = 2π × 32 ≈ 201 */
    const donutSvg=(count,total,color,softColor,labelArabic)=>{
      const pct=total>0?Math.round(count/total*100):0;
      const dashOffset=Math.max(0,Math.round(201-(pct/100)*201));
      return `<div class="donut-card" style="padding:10px 10px">
        <div class="donut-card-name" style="margin-bottom:6px;font-size:12px"><span class="donut-card-dot" style="background:${color}"></span> ${labelArabic}</div>
        <svg width="76" height="76" viewBox="0 0 80 80">
          <circle cx="40" cy="40" r="32" fill="none" stroke="${softColor}" stroke-width="10"/>
          <circle cx="40" cy="40" r="32" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="201" stroke-dashoffset="${dashOffset}" stroke-linecap="round" transform="rotate(-90 40 40)"/>
          <text x="40" y="38" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="18" fill="${color}">${String(count).padStart(2,'0')}</text>
          <text x="40" y="54" text-anchor="middle" font-family="'Bebas Neue',sans-serif" font-size="11" fill="#475569" letter-spacing="1">${pct}%</text>
        </svg>
        <div class="donut-card-sub">${count} · ${pct}٪</div>
      </div>`;
    };
    /* Hierarchy SVG — director + 4 city boxes */
    const treeSvgHtml=()=>{
      const cityBoxes=cities.slice(0,4).map((c,i)=>{
        const x=[60,310,570,820][i];
        const cx=x+110;
        return `<g>
          <rect x="${x}" y="200" width="220" height="100" fill="#FFFFFF" stroke="${c.meta.accent}" stroke-width="2"/>
          <rect x="${x}" y="200" width="220" height="22" fill="${c.meta.accent}"/>
          <text x="${cx}" y="215" text-anchor="middle" fill="#FFFFFF" font-family="'Bebas Neue',sans-serif" font-size="11" letter-spacing="3">${c.id.toUpperCase()} · ${c.name}</text>
          <text x="${cx}" y="245" text-anchor="middle" fill="${c.meta.deep}" font-family="Cairo,sans-serif" font-size="14" font-weight="800">${c.mgrName}</text>
          <text x="${cx}" y="262" text-anchor="middle" fill="#475569" font-family="Cairo,sans-serif" font-size="10" font-weight="600">${c.mgrRole}</text>
          <text x="${cx}" y="285" text-anchor="middle" fill="${c.meta.accent}" font-family="'Bebas Neue',sans-serif" font-size="22" letter-spacing="1">${c.engs.length} ENG · ${c.projects.length} PROJ</text>
        </g>
        <line x1="${cx}" y1="160" x2="${cx}" y2="200" stroke="#B8860B" stroke-width="2"/>
        <line x1="${cx}" y1="300" x2="${cx}" y2="330" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="3,3"/>
        <g>
          <rect x="${x}" y="330" width="220" height="56" fill="#F5F1E8" stroke="${c.meta.accent}" stroke-width="1.5" stroke-dasharray="4,3"/>
          <text x="${cx}" y="354" text-anchor="middle" fill="${c.meta.deep}" font-family="Cairo,sans-serif" font-size="12" font-weight="700">الفريق الهندسى</text>
          <text x="${cx}" y="372" text-anchor="middle" fill="#475569" font-family="Cairo,sans-serif" font-size="10" font-weight="600">${c.team.length} مهندس</text>
        </g>`;
      }).join('');
      return `<svg viewBox="0 0 1100 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dirGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0F2659"/><stop offset="1" stop-color="#1E40AF"/></linearGradient>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity=".15"/></filter>
        </defs>
        <g filter="url(#softShadow)">
          <rect x="430" y="20" width="240" height="86" fill="url(#dirGrad)" stroke="#D4A538" stroke-width="2"/>
          <text x="550" y="44" text-anchor="middle" fill="#D4A538" font-family="'Bebas Neue',sans-serif" font-size="11" letter-spacing="4">DIRECTOR · المدير العام</text>
          <text x="550" y="72" text-anchor="middle" fill="#F5E6C5" font-family="Cairo,sans-serif" font-size="18" font-weight="800">${dirName}</text>

        page==="att"&&(()=>{

          const days=Array.from({length:daysInMonth},(_,i)=>i+1);

          const provEngs=engsInProvDuringMonth(attProv,cfg.year,cfg.month,data);
          /* Cross-month active egypt-leave lookup — egyptLeaves should be the same on all
             months for a given engineer, but legacy data may have it only on the month it
             was created. Search every month's record for an open leave. */
          const findActiveLeave=engId=>{
            for(const k of Object.keys(months)){
              if(k==='leaves')continue;
              const md=months[k];
              if(!md?.data)continue;
              for(const p of Object.keys(md.data)){
                const e=(md.data[p]||[]).find(x=>x?.id===engId);
                if(e){

                  if(a)return a;
                }
              }
            }
            return null;
          };
          /* Returns ALL egypt-leaves (open + closed) for an engineer, dedup by id, across all months.
             Used by the edit/cancel button which should appear whenever any leave exists, not only
             when an open leave is active. */
          const findAllLeaves=engId=>{
            const seen=new Map();
            for(const k of Object.keys(months)){
              if(k==='leaves')continue;
              const md=months[k];
              if(!md?.data)continue;
              for(const p of Object.keys(md.data)){
                const e=(md.data[p]||[]).find(x=>x?.id===engId);
                if(e?.egyptLeaves)e.egyptLeaves.forEach(l=>{if(l.id)seen.set(l.id,l);});
              }
            }
            return Array.from(seen.values());
          };
          /* Returns the leave that overlaps the currently-viewed month (cfg.year/month).

          const findRelevantLeave=engId=>{
            const all=findAllLeaves(engId);
            if(!all.length)return null;
            const ms=`${cfg.year}-${String(cfg.month).padStart(2,'0')}-01`;
            const dim=new Date(cfg.year,cfg.month,0).getDate();
            const me=`${cfg.year}-${String(cfg.month).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
            const overlap=all.filter(l=>{
              if(!l.departureDate)return false;
              const lastDay=l.returnDate?subOneDayYmd(l.returnDate):'9999-12-31';
              return !(l.departureDate>me||lastDay<ms);
            });
            if(!overlap.length)return null;
            /* Prefer open over closed, then latest by departureDate */
            overlap.sort((a,b)=>{
              if(!a.returnDate&&b.returnDate)return -1;
              if(a.returnDate&&!b.returnDate)return 1;
              return (b.departureDate||'').localeCompare(a.departureDate||'');
            });
            return overlap[0];
          };
          const isWknd=d=>new Date(cfg.year,cfg.month-1,d).getDay()===5; /* الجمعة فقط */
          const isToday=d=>d===now.getDate()&&cfg.month===now.getMonth()+1&&cfg.year===now.getFullYear();
          const todayD=cfg.month===now.getMonth()+1&&cfg.year===now.getFullYear()?now.getDate():null;
          const toggleSel=id=>setAttSelected(prev=>{const s=new Set(prev);s.has(id)?s.delete(id):s.add(id);return s;});

          /* keyboard shortcuts: P=حاضر، A=غائب، L/م=مرضى (SL، الإجازة العادية اتشالت) */
          const handleRowKey=(e,engId)=>{if(!todayD)return;const k=e.key;if(k==="ح"||k==="p"||k==="P"){e.preventDefault();attSetStatus(engId,todayD,"P");}else if(k==="غ"||k==="a"||k==="A"){e.preventDefault();attSetStatus(engId,todayD,"A");}else if(k==="م"||k==="s"||k==="S"||k==="l"||k==="L"){e.preventDefault();attSetStatus(engId,todayD,"SL");}};

            const v=getDisplayLeaveDays(e.id,cfg.year,cfg.month,s.vac);
            const eg=getDisplayEgyptLeaveDays(e.id,cfg.year,cfg.month,s.egyptDays||0);

          },{P:0,A:0,H:0,vac:0,egyptDays:0,hrs:0});

          /* ── Vacation balance display REMOVED — engineers may take more than 15 days ── */

            const arr=new Date(eng.arrivalDate);arr.setHours(0,0,0,0);
            const cell=new Date(cfg.year,cfg.month-1,d);
            return cell<arr?'EG':null;
          };

          const printAtt=()=>{

            const S_FULL={P:'حاضر',EG:'مصر',A:'غائب',AL:'إجازة سنوية',SL:'إجازة مرضية',EL:'إجازة طارئة',H:'عطلة',TXR:'متأخر',EGL:'إجازة (مصر)'};
            const S_COL={P:'#059669',EG:'#2563EB',A:'#DC2626',AL:'#1D4ED8',SL:'#D97706',EL:'#EA580C',H:'#64748B',TXR:'#B45309',EGL:'#C2410C'};
            const S_BG={P:'#D1FAE5',EG:'#DBEAFE',A:'#FEE2E2',AL:'#EFF6FF',SL:'#FEF3C7',EL:'#FFEDD5',H:'#F1F5F9',TXR:'#FEF3C7',EGL:'#FFEDD5'};
            /* Cross-month leave-day check — covers legacy data where egyptLeaves
               might not have propagated to this view's month yet */
            const isLeaveDay=(engId,dateStr)=>{
              for(const k of Object.keys(months)){
                if(k==='leaves')continue;
                const md=months[k];
                if(!md?.data)continue;
                for(const p of Object.keys(md.data)){
                  const e=(md.data[p]||[]).find(x=>x?.id===engId);
                  if(e&&isOnEgyptLeaveDate(e,dateStr))return true;
                }
              }
              return false;
            };
            const thStyle='padding:5px 3px;text-align:center;font-size:10px;font-weight:800;color:#F5E6C5;border-bottom:2px solid #0F2659;background:#0F2659;white-space:nowrap;border:1px solid #1E3A5F';
            const tdStyle='padding:3px 2px;text-align:center;border:1px solid #F1F5F9';
            const nameThStyle='padding:6px 10px;text-align:right;font-size:10px;font-weight:800;color:#F5E6C5;background:#0F2659;border:1px solid #1E3A5F;min-width:130px';

            };

                  <span style="color:#92400E;font-weight:800">${s.hrs}h عمل</span>

          };

          return h("div",{className:"att-page"},

            /* ── Province tasks banner ── */
            isProvince&&(()=>{

                  ),
                  h("span",{className:"card-badge"},now.toLocaleDateString("ar-EG",{day:"numeric",month:"long",year:"numeric"}))
                ),

            })(),

            /* ── Header + tabs ── */
            h("div",{className:"card"},

                    sortedKeys.map(k=>{const[y,m]=k.split('-');return h("option",{key:k,value:k},MONTHS[+m-1]+" "+y);}))

                h("div",{className:"att-view-toggle"},
                  h("div",{className:"att-view-btn"+(attView==="table"?" on":""),onClick:()=>{setAttView("table");setAttLogMonth(null);}},h(Ic,{n:"att",sz:12})," الجدول"),
                  h("div",{className:"att-view-btn"+(attView==="log"?" on":""),onClick:()=>setAttView("log")},h(Ic,{n:"hist",sz:12})," السجل")

                      onClick:()=>setAttProv(p)},p.replace("محافظة ",""));
                  }),
                  isProvince&&h("div",{className:"att-tab on",style:{background:CITY_CFG.find(c=>c.prov===userProv)?.color||"#60A5FA",cursor:"default"}},
                    (userProv||"").replace("محافظة ","")
                  ),
                  h("button",{className:"btn",
                    style:{padding:"7px 14px",fontSize:11,gap:5,background:"rgba(220,38,38,.08)",border:"1px solid rgba(220,38,38,.25)",color:"#F87171"},

                )

            ),

            /* ══ LOG VIEW ══ */
            attView==="log"&&(()=>{
              const logEntries=sortedKeys.map(k=>{
                const mAtt=months[k]?.attendance||{};
                const mData=months[k]?.data||{};
                const mCfg=months[k]?.cfg||{};
                const [y,m]=k.split('-');

                  let P=0,A=0,vac=0,hrs=0;
                  engs.forEach(e=>{const s=attGetStats(e.id,mAtt,+y,+m);const v=getDisplayLeaveDays(e.id,+y,+m,s.vac);P+=s.P;A+=s.A;vac+=v;hrs+=s.hrs;});
                  return{prov:p,n:engs.length,P,A,vac,hrs};
                }).filter(r=>r.P>0||r.A>0||r.vac>0);
                const totP=provRows.reduce((a,r)=>a+r.P,0);
                const totA=provRows.reduce((a,r)=>a+r.A,0);
                const totVac=provRows.reduce((a,r)=>a+r.vac,0);
                const totHrs=provRows.reduce((a,r)=>a+r.hrs,0);
                return{key:k,y:+y,m:+m,label:MONTHS[+m-1]+" "+y,mCfg,mAtt,mData,provRows,totP,totA,totVac,totHrs};
              }).filter(e=>e.provRows.length>0).reverse();

              if(logEntries.length===0)return h("div",{className:"info",style:{marginTop:0}},
                h(Ic,{n:"info",sz:16}),"لا توجد سجلات حضور محفوظة بعد — سجّل الحضور في الجدول الشهري وسيظهر هنا تلقائياً"
              );

              /* print a specific month from the log */
              const printMonth=(entry)=>{

                const DAY_AR=["أح","إث","ث","أر","خ","ج","س"];
                const S_COL={P:'#059669',EG:'#2563EB',A:'#DC2626',AL:'#2563EB',SL:'#D97706',EL:'#EA580C',H:'#64748B',TXR:'#B45309',EGL:'#C2410C'};
                const S_BG={P:'#D1FAE5',EG:'#DBEAFE',A:'#FEE2E2',AL:'#DBEAFE',SL:'#FEF3C7',EL:'#FFEDD5',H:'#F1F5F9',TXR:'#FEF3C7',EGL:'#FFEDD5'};
                /* Cross-month egypt-leave check (covers legacy data without propagation) */
                const isLeaveDayPM=(engId,dateStr)=>{
                  for(const k of Object.keys(months)){
                    if(k==='leaves')continue;
                    const md=months[k];
                    if(!md?.data)continue;
                    for(const p of Object.keys(md.data)){
                      const e=(md.data[p]||[]).find(x=>x?.id===engId);
                      if(e&&isOnEgyptLeaveDate(e,dateStr))return true;
                    }
                  }
                  return false;
                };
                const isFri=d=>new Date(y,m-1,d).getDay()===5;
                const thS='padding:5px 2px;font-size:9px;font-weight:800;color:#475569;background:#F8FAFC;border:1px solid #E2E8F0;text-align:center';

<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;color:#1e293b;font-size:11px}

</style></head><body>

<div><div class="hdr-t">${mCfg.company||cfg.company} — سجل الحضور والانصراف</div>

${(isProvince?[userProv]:PROVS).map(prov=>{
  /* Province user sees ONLY their own province in this السجل print (no cross-province leak) */
  const engs=(mData[prov]||[]).filter(e=>!isDepartedBeforeMonth(e,y,m));
  if(engs.length===0)return'';
  /* aggregations per province للـ header chip */
  let provP=0,provA=0,provVac=0,provEg=0,provLateDays=0,provLateMins=0,provHrs=0;
  const rows=engs.map(eng=>{
    const eAtt=mAtt[eng.id]||{};
    const s=attGetStats(eng.id,mAtt,y,m);
    /* compute late + egypt-leave per engineer (يحتاجها summary لكل مهندس + provincial aggregations) */

        egyptDays++;

      }

    }).join('');

    const adjP=s.P,adjA=s.A;
    const vacCount=s.vac; /* cell-based SL count (لا يلتفت للطلبات) */

    const egyptFull=getDisplayEgyptLeaveDays(eng.id,y,m,egyptDays);

                                h("span",{style:{margin:"0 8px",color:"#a78bfa",fontWeight:900}},"→"),
                                h("span",{style:{color:"#34d399"}},t.to.replace('محافظة ',''))
                              )
                            ),
                            /* Undo button — only on the LATEST transfer, admin or province (with own+24h) */
                            isLatest&&(isAdmin||(isProvince&&t.by===user?.username&&(Date.now()-new Date(t.at).getTime())<24*60*60*1000))&&
                            h("button",{
                              title:"تراجع عن هذا النقل",
                              style:{padding:"6px 12px",border:"1px solid rgba(245,158,11,.4)",borderRadius:8,background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.06))",color:"#fbbf24",fontFamily:"inherit",fontSize:11,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0},
                              onClick:()=>setUndoConfirm({eng:engProfile.eng,transfer:t})
                            },"↩️ تراجع")
                          )
                        );
                      })
                    )
              );
            })()
          )
        )
      ),

      /* ── ATT CELL POPUP ─────────────────────────────────── */
      attPopup&&(()=>{const PH=320,PW=145;const showAbove=attPopup.y+4+PH>window.innerHeight;const top=showAbove?Math.max(4,attPopup.cellTop-4-PH):attPopup.y+4;const left=Math.max(4,Math.min(attPopup.x,window.innerWidth-PW-4));return h("div",{className:"att-popup",style:{top,left},onClick:e=>e.stopPropagation()},
        h("div",{className:"att-popup-hdr"},"تسجيل الحالة"),
        ATT_CYCLE.filter(s=>s!==null).map(s=>
          h("button",{key:s,className:"att-popup-btn",style:{background:ATT_BG[s],color:ATT_COL[s]},
            onClick:()=>{
              if(s==='TXR'){
                /* Open late-input modal instead of setting status directly */
                const eng=PROVS.flatMap(p=>(attData[p]||[])).find(e=>e.id===attPopup.engId);
                const cur=(attAtt[attPopup.engId]||{})[attPopup.day]||{};
                setLateInputModal({engId:attPopup.engId,day:attPopup.day,engName:eng?.name||'مهندس',lateH:+cur.lateH||0,lateM:+cur.lateM||0});
                setAttPopup(null);
                return;
              }
              attSetStatus(attPopup.engId,attPopup.day,s);
              setAttPopup(null);
            }
          },
            h("span",{style:{fontWeight:900,minWidth:16}},ATT_SHORT[s]),
            h("span",null,ATT_LABEL[s])
          )
        ),
        h("button",{className:"att-popup-btn att-popup-clr",
          onClick:()=>{
            const cur=(attAtt[attPopup.engId]||{})[attPopup.day]?.s;
            if(cur&&!confirm('مسح حالة يوم '+attPopup.day+'؟ ستعود الخلية فارغة.'))return;
            attClearCell(attPopup.engId,attPopup.day);setAttPopup(null);
          }
        },"🗑️ مسح الحالة")
      );})(),

      /* ── LATE TIME INPUT MODAL ───────────────────────────── */
      lateInputModal&&h("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)setLateInputModal(null);}},
        h("div",{className:"modal",style:{width:380}},
          h("div",{className:"modal-hdr"},
            h("h3",null,"⚠️ تسجيل تأخير"),
            h("button",{className:"btn",style:{padding:"5px 10px"},onClick:()=>setLateInputModal(null)},h(Ic,{n:"del",sz:12}))
          ),
          h("div",{className:"modal-body",style:{display:"flex",flexDirection:"column",gap:14}},
            h("div",{style:{padding:"10px 14px",borderRadius:10,background:"rgba(245,158,11,.10)",border:"1px solid rgba(245,158,11,.25)",fontSize:13,fontWeight:700,color:"#fbbf24"}},
              "📅 يوم "+lateInputModal.day+" · "+lateInputModal.engName
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
              h("div",{className:"fld"},
                h("label",null,"الساعات (0-12)"),
                h("input",{
                  type:"number",min:0,max:12,
                  style:{textAlign:"center",fontSize:18,fontWeight:800,fontFamily:"monospace"},
                  value:lateInputModal.lateH,
                  onChange:ev=>setLateInputModal(m=>({...m,lateH:Math.max(0,Math.min(12,+ev.target.value||0))}))
                })
              ),
              h("div",{className:"fld"},
                h("label",null,"الدقائق (0-59)"),
                h("input",{
                  type:"number",min:0,max:59,
                  style:{textAlign:"center",fontSize:18,fontWeight:800,fontFamily:"monospace"},
                  value:lateInputModal.lateM,
                  onChange:ev=>setLateInputModal(m=>({...m,lateM:Math.max(0,Math.min(59,+ev.target.value||0))}))
                })
              )
            ),
            h("div",{style:{padding:"12px 16px",borderRadius:10,background:"linear-gradient(135deg,rgba(245,158,11,.18),rgba(245,158,11,.05))",border:"1px solid rgba(245,158,11,.35)",textAlign:"center"}},
              h("div",{style:{fontSize:10,color:"#fbbf24",fontWeight:800,marginBottom:4,letterSpacing:".5px"}},"⏰ إجمالى التأخير"),
              h("div",{style:{fontSize:32,fontWeight:900,fontFamily:"monospace",color:"#F59E0B",letterSpacing:2}},
                String(lateInputModal.lateH).padStart(2,'0')+":"+String(lateInputModal.lateM).padStart(2,'0')
              )
            ),
            h("div",{className:"info amber",style:{fontSize:11}},
              h(Ic,{n:"info",sz:14}),
              "ℹ️ يخضع للخصم بناءً على ساعات التأخير (يحدد بواسطة HR فى مصر)"
            )
          ),
          h("div",{className:"modal-ftr",style:{display:"flex",gap:6,flexWrap:"wrap"}},
            /* Delete button — only when this cell already has a TXR set (editing existing) */
            (()=>{
              const cell=(attAtt[lateInputModal.engId]||{})[lateInputModal.day]||{};
              if(cell.s!=='TXR')return null;
              return h("button",{
                className:"btn",
                style:{background:"linear-gradient(135deg,#dc2626,#991b1b)",color:"#fff",border:"none",fontWeight:800,padding:"8px 14px",borderRadius:10,boxShadow:"0 6px 18px rgba(220,38,38,.4)",marginLeft:"auto"},
                onClick:()=>{
                  if(!confirm('حذف تسجيل التأخير ليوم '+lateInputModal.day+'؟ ستعود الخلية إلى حالة فارغة.'))return;
                  undoLateEntry(lateInputModal.engId,attKey,lateInputModal.day);
                  setLateInputModal(null);
                }
              },"🗑️ حذف التأخير");
            })(),
            h("button",{className:"btn",onClick:()=>setLateInputModal(null)},"إلغاء"),
            h("button",{
              className:"btn",
              style:{background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#fff",border:"none",fontWeight:800,padding:"8px 18px",borderRadius:10,boxShadow:"0 6px 18px rgba(245,158,11,.4)"},
              onClick:()=>{
                attSetLate(lateInputModal.engId,lateInputModal.day,lateInputModal.lateH,lateInputModal.lateM);
                setLateInputModal(null);
              }
            },"⚠️ تسجيل التأخير")
          )
        )
      ),

      /* ── EGYPT-LEAVE EDIT MODAL ──────────────────────────── */
      egyptLeaveEditModal&&h("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)setEgyptLeaveEditModal(null);}},
        h("div",{className:"modal",style:{width:440}},
          h("div",{className:"modal-hdr"},
            h("h3",null,"✏️ تعديل إجازة مصر"),
            h("button",{className:"btn",style:{padding:"5px 10px"},onClick:()=>setEgyptLeaveEditModal(null)},h(Ic,{n:"del",sz:12}))
          ),
          h("div",{className:"modal-body",style:{display:"flex",flexDirection:"column",gap:14}},
            h("div",{style:{padding:"10px 14px",borderRadius:10,background:"rgba(99,102,241,.10)",border:"1px solid rgba(99,102,241,.25)",fontSize:13,fontWeight:700,color:"#a5b4fc"}},
              "👤 ",egyptLeaveEditModal.engName
            ),
            h("div",{className:"fld"},
              h("label",null,"تاريخ النزول *"),
              h("input",{type:"date",value:egyptLeaveEditModal.departureDate,onChange:ev=>setEgyptLeaveEditModal(m=>({...m,departureDate:ev.target.value}))})
            ),
            h("div",{className:"fld"},
              h("label",null,"تاريخ العودة (اتركه فارغاً لو لم يعد بعد)"),
              h("input",{type:"date",value:egyptLeaveEditModal.returnDate,onChange:ev=>setEgyptLeaveEditModal(m=>({...m,returnDate:ev.target.value}))})
            ),
            h("div",{className:"info blue",style:{fontSize:11}},
              h(Ic,{n:"info",sz:14}),
              "ℹ️ تعديل التواريخ بيحدّث سجل الإجازة في كل الشهور. لو محتاج تعدل أيام الحضور (P/A) في الشيت، اعملها يدوياً."
            )
          ),
          h("div",{className:"modal-ftr",style:{display:"flex",gap:6,flexWrap:"wrap"}},
            h("button",{
              className:"btn",
              style:{background:"linear-gradient(135deg,#dc2626,#991b1b)",color:"#fff",border:"none",fontWeight:800,padding:"8px 14px",borderRadius:10,boxShadow:"0 6px 18px rgba(220,38,38,.4)",marginLeft:"auto"},
              onClick:()=>{
                setEgyptLeaveCancelModal({...egyptLeaveEditModal,daysAction:'empty'});
                setEgyptLeaveEditModal(null);
              }
            },"🗑️ إلغاء الإجازة كاملاً"),
            h("button",{className:"btn",onClick:()=>setEgyptLeaveEditModal(null)},"تراجع"),
            h("button",{
              className:"btn blue",
              style:{fontWeight:800,padding:"8px 18px"},
              onClick:()=>{
                editEgyptLeaveDates(egyptLeaveEditModal.engId,egyptLeaveEditModal.leaveId,egyptLeaveEditModal.departureDate,egyptLeaveEditModal.returnDate||null);
                setEgyptLeaveEditModal(null);
              }
            },"💾 حفظ التعديلات")
          )
        )
      ),

      /* ── EGYPT-LEAVE CANCEL CONFIRMATION MODAL ──────────── */
      egyptLeaveCancelModal&&h("div",{className:"overlay",onClick:ev=>{if(ev.target===ev.currentTarget)setEgyptLeaveCancelModal(null);}},
        h("div",{className:"modal",style:{width:440}},
          h("div",{className:"modal-hdr"},
            h("h3",null,"🗑️ إلغاء إجازة مصر"),
            h("button",{className:"btn",style:{padding:"5px 10px"},onClick:()=>setEgyptLeaveCancelModal(null)},h(Ic,{n:"del",sz:12}))
          ),
          h("div",{className:"modal-body",style:{display:"flex",flexDirection:"column",gap:14}},
            h("div",{style:{padding:"10px 14px",borderRadius:10,background:"rgba(220,38,38,.08)",border:"1px solid rgba(220,38,38,.30)",fontSize:13,fontWeight:700,color:"#fca5a5"}},
              "⚠️ بتلغي إجازة ",egyptLeaveCancelModal.engName,
              h("div",{style:{fontSize:11,marginTop:4,color:"#fecaca"}},
                "من ",egyptLeaveCancelModal.departureDate,
                egyptLeaveCancelModal.returnDate?" إلى "+egyptLeaveCancelModal.returnDate:" (مفتوحة)"
              )
            ),
            h("div",{className:"fld"},
              h("label",null,"الأيام في شيت الحضور تتحول إلى:"),
              h("div",{style:{display:"flex",flexDirection:"column",gap:6,marginTop:6}},
                [
                  {v:'empty',l:'⚪ خلية فارغة (تحديد يدوي لاحقاً)',c:'#94A3B8'},
                  {v:'present',l:'✓ حاضر',c:'#10B981'},
                  {v:'absent',l:'✗ غائب',c:'#EF4444'}
                ].map(o=>h("label",{key:o.v,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",border:"1px solid var(--bdr)",borderRadius:8,cursor:"pointer",background:egyptLeaveCancelModal.daysAction===o.v?`${o.c}22`:"transparent"}},
                  h("input",{type:"radio",name:"daysAction",value:o.v,checked:egyptLeaveCancelModal.daysAction===o.v,onChange:()=>setEgyptLeaveCancelModal(m=>({...m,daysAction:o.v}))}),
                  h("span",{style:{fontWeight:700,color:o.c}},o.l)
                ))
              )
            )
          ),
          h("div",{className:"modal-ftr",style:{display:"flex",gap:6}},
            h("button",{className:"btn",onClick:()=>setEgyptLeaveCancelModal(null),style:{marginLeft:"auto"}},"تراجع"),
            h("button",{
              className:"btn",
              style:{background:"linear-gradient(135deg,#dc2626,#991b1b)",color:"#fff",border:"none",fontWeight:800,padding:"8px 18px",borderRadius:10,boxShadow:"0 6px 18px rgba(220,38,38,.4)"},
              onClick:()=>{
                cancelEgyptLeave(egyptLeaveCancelModal.engId,egyptLeaveCancelModal.leaveId,egyptLeaveCancelModal.daysAction);
                setEgyptLeaveCancelModal(null);
              }
            },"🗑️ تأكيد الإلغاء")
          )
        )
      ),

      /* ── DAY POPUP ───────────────────────────────────────── */
      /* Bulk-day-set: TXR is excluded — late time must be set per-engineer
         via the late-input modal, not silently 0:00 for everyone. */
      dayPopup&&(()=>{const PH=320,PW=145;const showAbove=dayPopup.y+4+PH>window.innerHeight;const top=showAbove?Math.max(4,dayPopup.cellTop-4-PH):dayPopup.y+4;const left=Math.max(4,Math.min(dayPopup.x,window.innerWidth-PW-4));return h("div",{className:"att-popup",style:{top,left},onClick:e=>e.stopPropagation()},
        h("div",{className:"att-popup-hdr"},"اليوم "+dayPopup.day+" — تسجيل الكل"),
        ATT_CYCLE.filter(s=>s!==null&&s!=='TXR').map(s=>
          h("button",{key:s,className:"att-popup-btn",style:{background:ATT_BG[s],color:ATT_COL[s]},
            onClick:()=>{
              (data[attProv]||[]).forEach(eng=>{attSetStatus(eng.id,dayPopup.day,s);});
              setDayPopup(null);
            }
          },
            h("span",{style:{fontWeight:900,minWidth:16}},ATT_SHORT[s]),
            h("span",null,ATT_LABEL[s])
          )
        ),
        h("button",{className:"att-popup-btn",style:{background:"var(--bg)",color:"var(--sub)",marginTop:2},
          onClick:()=>setDayPopup(null)
        },"إلغاء")
      );})(),

      /* ── BOTTOM NAV (mobile) ──────────────────────────── */
      h("div",{className:"bottom-nav"},
        h("div",{className:"bottom-nav-inner"},
          (isAdmin?mobileNavs:[{id:"eng",n:"eng",lbl:"كشف الإعاشة"},{id:"att",n:"att",lbl:"الحضور"}])
            .map(({id,n,lbl})=>h("div",{key:id,className:`bn-item ${page===id?"on":""}`,onClick:()=>setPage(id)},h(Ic,{n,sz:20}),h("span",null,lbl.split(" ")[0]))),
          isAdmin&&h("div",{className:`bn-item ${["backup","report"].includes(page)?"on":""}`,onClick:()=>setPage("backup")},
            h(Ic,{n:"backup",sz:20}),h("span",null,"أدوات"),
            unsaved>0&&h("div",{className:"nav-badge",style:{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",margin:0}},unsaved)
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
