<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>إدارة مشروعات ليبيا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#07090F;--navy2:#0A0D18;
  --blue:#60A5FA;--blue2:#0A1A30;--blue3:#163660;
  --green:#34D399;--green2:#031208;--green3:#06281A;
  --red:#F87171;--red2:#1A0505;
  --gold:#FCD34D;--gold2:#150E00;
  --purple:#A78BFA;--purple2:#0D0818;
  --cyan:#22D3EE;--cyan2:#041820;
  --gray:#3D4A62;--gray2:#0D1017;--gray3:#090C12;
  --bdr:#151B2E;--bdr2:#1E2640;
  --text:#E8ECF5;--sub:#566078;
  --bg:#060810;--bg2:#0C0F1C;--bg3:#090B16;
  --r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 8px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.4);
  --shadow2:0 8px 24px rgba(0,0,0,.7);
  --shadow3:0 20px 60px rgba(0,0,0,.8);
  --glow-blue:0 0 20px rgba(96,165,250,.2);
  --glow-green:0 0 20px rgba(52,211,153,.2);
  --glow-gold:0 0 20px rgba(252,211,77,.2);
  --glow-purple:0 0 20px rgba(167,139,250,.2);
}

/* ── Base & background ── */
*,*::before,*::after{font-family:'Cairo',system-ui,'Segoe UI',sans-serif}
body{
  font-family:'Cairo','Segoe UI',sans-serif;
  direction:rtl;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
}
body{background:#0a0e1a}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%,rgba(99,102,241,.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 88%,rgba(139,92,246,.14) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(34,211,238,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 15%,rgba(96,165,250,.10) 0%,transparent 50%);
  pointer-events:none;
  z-index:0;
}
html.light body{background:#F0F4F8}
html.light body::before{
  background:
    radial-gradient(ellipse 60% 50% at 15% 12%,rgba(99,102,241,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 88%,rgba(139,92,246,.05) 0%,transparent 55%);
}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* ── Sidebar ── */
.sidebar{
  width:240px;
  background:linear-gradient(180deg,rgba(10,13,24,.98) 0%,rgba(7,9,15,.99) 100%);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  position:relative;
}
.sidebar::before{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,rgba(96,165,250,.3),rgba(167,139,250,.2),transparent);
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;order:3}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── Sidebar header ── */
.sb-header{
  padding:18px 16px 14px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  background:linear-gradient(180deg,rgba(96,165,250,.07) 0%,rgba(167,139,250,.04) 100%);
  position:relative;
}
.sb-logo{
  width:64px;height:64px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
  box-shadow:0 6px 20px rgba(0,0,0,.5),0 0 0 1px rgba(96,165,250,.1);
}
.sb-logo img{width:60px;height:60px;object-fit:contain;display:block}
.sb-title{color:#fff;font-size:12px;font-weight:900;text-align:center;line-height:1.4;letter-spacing:.3px;padding:0 4px}
.sb-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.25),rgba(167,139,250,.15),transparent);margin:2px 0}

/* nav */
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{
  padding:16px 18px 8px;
  font-size:9px;font-weight:900;
  color:rgba(167,139,250,.5);
  letter-spacing:2.2px;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.sb-section::before{content:'';display:inline-block;width:6px;height:6px;border-radius:2px;background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 0 8px rgba(139,92,246,.5);flex-shrink:0}
.sb-section::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(139,92,246,.18),transparent)}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:8px 12px;cursor:pointer;
  border-radius:11px;margin:2px 8px;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  color:rgba(255,255,255,.55);
  font-size:12px;font-weight:600;
  position:relative;overflow:hidden;
  border:1px solid transparent;
  --c1:#6366f1; --c2:#8b5cf6;
}
.nav-item:hover{
  color:#fff;
  background:rgba(255,255,255,.04);
  border-color:rgba(255,255,255,.07);
  transform:translateX(-2px);
}
.nav-item:hover .nav-item-icon{transform:scale(1.08);box-shadow:0 6px 18px var(--c1)55}
.nav-item.on{
  background:linear-gradient(135deg,var(--c1),var(--c2));
  color:#fff;font-weight:700;
  box-shadow:0 8px 24px var(--c1)55,0 0 0 1px rgba(255,255,255,.06),inset 0 1px 0 rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.12);
}
.nav-item.on::after{
  content:'';position:absolute;right:-1px;top:18%;bottom:18%;width:3px;
  background:#fff;border-radius:3px 0 0 3px;
  box-shadow:0 0 12px rgba(255,255,255,.7);
}
.nav-item-icon{
  width:30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .22s;
  background:var(--icon-bg, linear-gradient(135deg,rgba(99,102,241,.20),rgba(139,92,246,.10)));
  border:1px solid var(--icon-bdr, rgba(99,102,241,.30));
  color:#fff;
  box-shadow:0 4px 12px var(--icon-glow, rgba(99,102,241,.22));
}
.nav-item.on .nav-item-icon{
  background:rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.32);
  color:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.25);
}
.nav-item svg{width:15px;height:15px;fill:currentColor}
.nav-badge{margin-right:auto;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;box-shadow:0 2px 6px rgba(239,68,68,.4)}

/* Province sub-items in sidebar */
.nav-sub-item{
  display:flex;align-items:center;gap:9px;
  padding:6px 14px 6px 22px;cursor:pointer;
  border-radius:8px;margin:1px 8px 1px 18px;
  transition:all .18s;color:rgba(255,255,255,.28);
  font-size:11px;font-weight:600;
}
.nav-sub-item:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.nav-sub-item.on{color:#93C5FD;background:rgba(96,165,250,.12)}
.nav-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .18s}
.nav-sub-item.on .nav-sub-dot{transform:scale(1.4);box-shadow:0 0 6px currentColor}

/* footer */
.sb-footer{
  padding:12px 12px;
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:4px;
}
.sb-month-info{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  margin-bottom:2px;
}
.sb-month-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.sb-month-text{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;flex:1;line-height:1.3}
.sb-month-count{font-size:11px;font-weight:800;color:var(--green)}
.sb-ver{font-size:9px;color:rgba(255,255,255,.12);margin-bottom:0;text-align:center}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;
  background:rgba(12,15,28,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
  gap:10px;flex-wrap:wrap;flex-shrink:0;
  backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(255,255,255,.03),var(--shadow);
  order:1;
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.menu-btn{
  width:38px;height:38px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.menu-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.menu-btn svg{width:16px;height:16px;fill:var(--sub)}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.page-title{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:.2px}
.page-sub{font-size:11px;color:var(--sub);white-space:nowrap;font-weight:500}
.sep{width:1px;height:20px;background:rgba(255,255,255,.07)}

/* ── Month strip ── */
.mstrip{
  display:flex;gap:6px;overflow-x:auto;
  padding:8px 20px;
  background:rgba(9,11,22,.9);
  border-bottom:1px solid rgba(255,255,255,.04);
  scrollbar-width:none;align-items:center;flex-shrink:0;order:2;
  backdrop-filter:blur(10px);
}
.mstrip::-webkit-scrollbar{display:none}
.mchip{
  padding:5px 14px;border-radius:100px;
  font-size:11px;font-weight:600;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  cursor:pointer;white-space:nowrap;
  color:var(--sub);
  display:inline-flex;align-items:center;gap:5px;
  transition:all .18s;flex-shrink:0;
}
.mchip:hover{border-color:rgba(96,165,250,.4);color:var(--blue);background:rgba(96,165,250,.08)}
.mchip.cur{
  background:linear-gradient(135deg,rgba(96,165,250,.25),rgba(99,102,241,.15));
  color:#93C5FD;border-color:rgba(96,165,250,.5);
  font-weight:700;
  box-shadow:0 0 16px rgba(96,165,250,.2),inset 0 0 12px rgba(96,165,250,.05);
}
.mchip.saved{border-color:rgba(52,211,153,.4);color:var(--green);background:rgba(52,211,153,.06)}
.mchip.cur.saved{
  background:linear-gradient(135deg,rgba(52,211,153,.2),rgba(16,185,129,.1));
  color:#6EE7B7;border-color:rgba(52,211,153,.5);
  box-shadow:0 0 16px rgba(52,211,153,.2);
}
.mchip.add{border-style:dashed;border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.25)}
.mchip.add:hover{border-color:rgba(96,165,250,.3);color:var(--blue);border-style:dashed}
.mchip-x{display:none;align-items:center;justify-content:center;margin-right:-4px;margin-left:2px;opacity:.35;cursor:pointer;transition:opacity .15s}
.mchip-del:hover .mchip-x{display:inline-flex}
.mchip-x:hover{opacity:1!important;color:#f87171}
.mdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Buttons ── */
.btn{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  border-radius:10px;padding:7px 14px;cursor:pointer;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  white-space:nowrap;font-family:'Cairo',sans-serif;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  transition:opacity .18s;
}
.btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97) translateY(0)}
.btn:disabled{opacity:.35;cursor:default;transform:none}
.btn.blue{
  background:linear-gradient(135deg,#3B82F6,#6366F1);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(99,102,241,.4),0 1px 0 rgba(255,255,255,.2) inset;
}
.btn.blue:hover{background:linear-gradient(135deg,#60A5FA,#818CF8);box-shadow:0 6px 20px rgba(99,102,241,.5)}
.btn.green{
  background:linear-gradient(135deg,#059669,#34D399);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(52,211,153,.3);
}
.btn.green:hover{background:linear-gradient(135deg,#10B981,#6EE7B7);box-shadow:0 6px 20px rgba(52,211,153,.4)}
.btn.gold{
  background:linear-gradient(135deg,#D97706,#FCD34D);
  color:#0C0800;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(252,211,77,.3);
}
.btn.red-outline{border-color:rgba(248,113,113,.4);color:var(--red);background:rgba(248,113,113,.05)}
.btn.red-outline:hover{background:rgba(248,113,113,.12);border-color:var(--red);box-shadow:0 4px 12px rgba(248,113,113,.2)}
.btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.btn-icon{
  width:34px;height:34px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.btn-icon:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.btn-icon svg{width:13px;height:13px;fill:var(--sub)}
.btn-icon.del:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4)}
.btn-icon.del:hover svg{fill:var(--red)}
.btn-icon.edit:hover{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.4)}
.btn-icon.edit:hover svg{fill:var(--blue)}

/* ── Status badges ── */
.paid-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:100px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid transparent;
  transition:all .2s;user-select:none;white-space:nowrap;
}
.paid-badge.yes{
  background:rgba(52,211,153,.1);color:var(--green);
  border-color:rgba(52,211,153,.25);
  box-shadow:0 0 10px rgba(52,211,153,.1);
}
.paid-badge.yes:hover{background:rgba(52,211,153,.18);border-color:rgba(52,211,153,.5);box-shadow:0 0 16px rgba(52,211,153,.2)}
.paid-badge.no{
  background:rgba(252,211,77,.08);color:var(--gold);
  border-color:rgba(252,211,77,.2);
}
.paid-badge.no:hover{background:rgba(252,211,77,.15);border-color:rgba(252,211,77,.4);box-shadow:0 0 16px rgba(252,211,77,.15)}

/* ── Pay strip ── */
.pay-strip{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(52,211,153,.05),rgba(16,185,129,.03));
  border-radius:12px;
  border:1px solid rgba(52,211,153,.12);
  flex-wrap:wrap;
  box-shadow:0 0 20px rgba(52,211,153,.05);
}
.pay-strip-bar{flex:1;min-width:120px;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.pay-strip-fill{
  height:100%;
  background:linear-gradient(90deg,#059669,#34D399);
  border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(52,211,153,.4);
}

/* ── Live rate banner ── */
.rate-banner{display:flex;align-items:center;gap:10px;padding:9px 16px;background:linear-gradient(135deg,rgba(217,119,6,.07),rgba(245,158,11,.03));border:1px solid rgba(217,119,6,.22);border-radius:12px;font-size:12px;}

/* ── Inline input ── */
.inline-inp{
  width:100%;background:transparent;border:none;
  border-bottom:1px dashed rgba(255,255,255,.15);
  color:inherit;font-size:inherit;font-weight:inherit;
  font-family:'Cairo',sans-serif;
  text-align:center;padding:2px 4px;outline:none;min-width:0;
  transition:all .15s;
}
.inline-inp:focus{
  border-bottom-color:var(--blue);
  background:rgba(96,165,250,.06);
  border-radius:4px 4px 0 0;
}

/* ── Cards ── */
.card{
  background:rgba(15,23,42,.6);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);
  pointer-events:none;border-radius:16px;
}
.card:hover{
  border-color:rgba(96,165,250,.15);
  box-shadow:var(--shadow2),0 0 0 1px rgba(96,165,250,.08),inset 0 1px 0 rgba(255,255,255,.06);
  transform:translateY(-1px);
}
.card-hdr{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
}
.card-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px}
.card-title-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 14px rgba(99,102,241,.25),inset 0 1px 0 rgba(255,255,255,.12);
  background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.10))!important;
  border:1px solid rgba(139,92,246,.25);
}
.card-title-icon svg{width:14px;height:14px}
.card-badge{
  font-size:10px;color:var(--sub);
  background:rgba(255,255,255,.04);
  padding:3px 10px;border-radius:100px;
  border:1px solid rgba(255,255,255,.07);
  font-weight:600;
}

/* ── Stat cards ── */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.sc{
  background:rgba(12,15,28,.85);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);
}
.sc::before{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(circle,var(--sc-glow,rgba(96,165,250,.12)) 0%,transparent 70%);
  pointer-events:none;
}
.sc:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow2),0 0 30px var(--sc-glow,rgba(96,165,250,.1));
  border-color:rgba(255,255,255,.1);
}
.sc-stripe{
  position:absolute;top:0;right:0;width:3px;height:100%;
  background:var(--sc-color,var(--blue));
  box-shadow:0 0 12px var(--sc-color,var(--blue));
}
.sc-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.sc-icon svg{width:20px;height:20px}
.sc-lbl{font-size:11px;color:var(--sub);margin-bottom:6px;font-weight:600;letter-spacing:.2px}
.sc-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc-sub{font-size:10px;color:var(--sub);margin-top:7px;font-weight:500}
.sc-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{
  padding:10px 12px;
  background:rgba(7,9,15,.9);
  font-size:10px;font-weight:800;color:rgba(255,255,255,.3);
  border-bottom:1px solid rgba(255,255,255,.05);
  white-space:nowrap;text-align:center;
  letter-spacing:.8px;text-transform:uppercase;
}
.tbl th.l{text-align:right}
.tbl td{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.04);
  text-align:center;color:var(--text);
  vertical-align:middle;transition:background .15s;
}
.tbl td.l{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(96,165,250,.04)}
.tbl .sub-row td{
  background:linear-gradient(90deg,rgba(96,165,250,.07),rgba(99,102,241,.04));
  font-weight:700;font-size:12px;color:var(--text);
}
.tbl .sub-row:hover td{background:linear-gradient(90deg,rgba(96,165,250,.1),rgba(99,102,241,.06))}
.day-inp{
  width:46px;padding:5px;text-align:center;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:12px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;font-weight:700;
}
.day-inp:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(96,165,250,.15);
  background:rgba(96,165,250,.06);
}

/* ── Province header ── */
.prov-hdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.prov-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.prov-name{font-size:14px;font-weight:800;color:var(--text)}
.prov-count{font-size:11px;color:var(--sub);font-weight:500}
.prov-bar-bg{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin:0 18px 14px}
.prov-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);
  display:flex;align-items:center;justify-content:center;
  z-index:99999;padding:16px;
}
.modal{
  background:rgba(12,15,28,.97);
  border-radius:20px;width:440px;max-width:100%;
  border:1px solid rgba(255,255,255,.08);
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow3),0 0 0 1px rgba(96,165,250,.06);
  animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);
}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-hdr{
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(96,165,250,.04),transparent);
}
.modal-hdr h3{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.2px}
.modal-body{padding:18px 20px}
.modal-ftr{
  padding:14px 20px;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:flex-end;gap:10px;
  background:rgba(0,0,0,.2);
}
.fld{margin-bottom:16px}

/* ── Engineer Profile Modal ── */
.ep-modal{width:720px}
.ep-tab-bar{display:flex;gap:2px;padding:10px 16px 0;border-bottom:1px solid var(--bdr)}
.ep-tab{padding:7px 16px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--sub);border-bottom:2px solid transparent;transition:.15s}
.ep-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.ep-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 18px}
.ep-field{background:var(--bg2);border-radius:8px;padding:10px 14px;border:1px solid var(--bdr)}
.ep-lbl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ep-val{font-size:13px;font-weight:700}
.ep-body{padding:16px 18px;overflow-y:auto;max-height:calc(88vh - 160px)}
/* Eng name link style */
.eng-link{cursor:pointer;border-bottom:1px dashed rgba(96,165,250,.4);transition:color .15s}
.eng-link:hover{color:var(--blue)}
.fld label{
  font-size:10px;font-weight:800;color:rgba(255,255,255,.4);
  display:block;margin-bottom:6px;
  letter-spacing:.8px;text-transform:uppercase;
}
.fld input,.fld select,.fld textarea{
  width:100%;padding:9px 13px;
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:13px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;
}
.fld input:focus,.fld select:focus{
  outline:none;border-color:rgba(96,165,250,.5);
  box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.fld select option{background:#0C0F1C;color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.prev-box{
  background:rgba(255,255,255,.03);
  border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  padding:14px;margin-top:14px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.prev-lbl{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:3px}
.prev-val{font-size:14px;font-weight:800}

/* ── Info boxes ── */
.info{
  border-radius:12px;padding:12px 16px;
  font-size:12px;line-height:1.8;border:1px solid;
  display:flex;gap:12px;align-items:flex-start;
  font-weight:500;
}
.info svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
.info.blue{background:rgba(96,165,250,.06);color:#93C5FD;border-color:rgba(96,165,250,.15)}
.info.blue svg{fill:#93C5FD}
.info.green{background:rgba(52,211,153,.06);color:#6EE7B7;border-color:rgba(52,211,153,.15)}
.info.green svg{fill:#6EE7B7}
.info.amber{background:rgba(252,211,77,.06);color:#FDE68A;border-color:rgba(252,211,77,.15)}
.info.amber svg{fill:#FDE68A}

/* ── Toast ── */
.toast-wrap{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;
  gap:8px;align-items:center;pointer-events:none;
}
.toast{
  padding:10px 22px;border-radius:100px;
  font-size:12px;font-weight:700;white-space:nowrap;
  box-shadow:var(--shadow3);
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:all;letter-spacing:.2px;
  backdrop-filter:blur(20px);
}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.t-ok{background:rgba(6,24,16,.95);color:var(--green);border:1px solid rgba(52,211,153,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(52,211,153,.15)}
.t-err{background:rgba(26,5,5,.95);color:var(--red);border:1px solid rgba(248,113,113,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(248,113,113,.15)}
.t-info{background:rgba(10,26,48,.95);color:var(--blue);border:1px solid rgba(96,165,250,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(96,165,250,.15)}
.chart-wrap{position:relative;width:100%}

/* ── Rank rows ── */
.rank-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.rank-bar-bg{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Drop zone ── */
.dz{
  border:2px dashed rgba(255,255,255,.1);
  border-radius:16px;padding:28px;
  text-align:center;cursor:pointer;
  transition:all .2s;
}
.dz:hover,.dz.over{
  border-color:rgba(96,165,250,.4);
  background:rgba(96,165,250,.05);
  box-shadow:0 0 20px rgba(96,165,250,.1);
}
.dz-icon{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.dz-icon svg{width:22px;height:22px;fill:var(--sub)}
.dz strong{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.dz p{font-size:11px;color:var(--sub)}

/* ── Steps ── */
.step-row{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-row:last-child{border-bottom:none}
.step-num{
  width:26px;height:26px;border-radius:50%;
  background:rgba(96,165,250,.1);color:var(--blue);
  border:1px solid rgba(96,165,250,.2);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
  box-shadow:0 0 12px rgba(96,165,250,.1);
}
.step-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.step-sub{font-size:11px;color:var(--sub);font-weight:500}

/* ── Logo preview ── */
.logo-preview{
  width:84px;height:84px;
  border:2px dashed rgba(255,255,255,.1);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:all .2s;
  background:rgba(255,255,255,.03);
}
.logo-preview:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.05);box-shadow:0 0 20px rgba(96,165,250,.1)}
.logo-preview img{width:100%;height:100%;object-fit:contain}

/* ── Notifications bell ── */
.notif-wrap{position:relative;display:inline-flex;align-items:center}
.notif-btn{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:8px;
  background:var(--bg2);border:1.5px solid var(--bdr2);
  cursor:pointer;transition:all .2s;font-size:16px;
}
.notif-btn:hover{background:var(--bg3);border-color:var(--blue)}
.notif-btn.has-alerts{animation:notif-pulse 2s infinite}
@keyframes notif-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(252,211,77,.4)}
  50%{box-shadow:0 0 0 6px rgba(252,211,77,0)}
}
.notif-badge{
  position:absolute;top:-4px;left:-4px;
  min-width:16px;height:16px;border-radius:100px;padding:0 4px;
  background:#EF4444;color:#fff;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);box-shadow:0 0 6px rgba(239,68,68,.5);
}
.notif-badge.red{background:#DC2626}
.notif-dropdown{
  position:fixed;
  width:340px;max-height:480px;overflow-y:auto;
  background:var(--bg2);border:1px solid var(--bdr2);
  border-radius:12px;box-shadow:var(--shadow3);
  z-index:999999;padding:6px;
}
.notif-dropdown::-webkit-scrollbar{width:4px}
.notif-dropdown::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.notif-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.notif-hdr-title{font-size:12px;font-weight:800;color:var(--text)}
.notif-hdr-count{font-size:10px;color:var(--sub);font-weight:700}
.notif-empty{padding:28px 14px;text-align:center;color:var(--sub);font-size:11px}
.notif-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  transition:background .15s;margin-top:4px;
  border-right:3px solid transparent;
}
.notif-item:hover{background:var(--bg3)}
.notif-item.lvl-red{border-right-color:#EF4444;background:rgba(248,113,113,.04)}
.notif-item.lvl-yellow{border-right-color:#FCD34D;background:rgba(252,211,77,.04)}
.notif-item-icon{font-size:18px;line-height:1;flex-shrink:0}
.notif-item-body{flex:1;min-width:0}
.notif-item-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}
.notif-item-sub{font-size:10px;color:var(--sub);margin-top:3px}

/* ── Quick Actions dropdown (➕ in topbar) ── */
.qa-wrap{position:relative;display:inline-flex;align-items:center}
.qa-btn{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;cursor:pointer;
  font-size:18px;font-weight:900;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(99,102,241,.45);
  transition:all .2s;
}
.qa-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(99,102,241,.55)}
.qa-btn.on{background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.qa-dropdown{
  position:fixed;
  width:240px;
  background:rgba(15,23,42,.92);
  border:1px solid rgba(139,92,246,.3);
  border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(139,92,246,.18);
  z-index:999999;padding:8px;
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
}
.qa-hdr{
  padding:8px 12px 10px;
  font-size:10px;font-weight:800;color:rgba(167,139,250,.95);
  letter-spacing:1px;
  border-bottom:1px solid rgba(139,92,246,.18);
  margin-bottom:4px;
}
.qa-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .18s;
  border:1px solid transparent;margin-top:2px;
  user-select:none;
}
.qa-item:hover{
  background:rgba(99,102,241,.10);
  border-color:rgba(139,92,246,.28);
  transform:translateX(-2px);
}
.qa-item-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--qa-c1,#6366f1),var(--qa-c2,#8b5cf6));
  box-shadow:0 4px 14px rgba(99,102,241,.3);
}
.qa-item-label{font-size:12.5px;font-weight:700;color:var(--text);flex:1}
.qa-item-arrow{font-size:14px;color:rgba(167,139,250,.6);font-weight:900}

html.light .qa-dropdown{background:rgba(255,255,255,.95);border-color:#C7D2FE;box-shadow:0 20px 60px rgba(99,102,241,.25)}
html.light .qa-hdr{color:#6366f1;border-bottom-color:#E0E7FF}
html.light .qa-item:hover{background:#EEF2FF;border-color:#C7D2FE}

/* ── Page actions toolbar (per-page buttons row) ── */
.page-actions{
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  padding:10px 14px;margin-bottom:14px;
  background:rgba(15,23,42,.45);
  border:1px solid rgba(139,92,246,.16);
  border-radius:14px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
html.light .page-actions{background:rgba(248,250,252,.65);border-color:#E0E7FF}

/* ── Search ── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap input{
  height:36px;font-size:12px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-family:'Cairo',sans-serif;
  padding:0 10px 0 34px;width:170px;
  transition:all .2s;font-weight:500;
}
.search-wrap input:focus{
  outline:none;border-color:rgba(96,165,250,.4);
  width:210px;box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.search-wrap .search-icon{position:absolute;left:10px;width:14px;height:14px;fill:var(--sub);pointer-events:none}

/* ── Mobile ── */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;backdrop-filter:blur(6px)}
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,13,22,.95);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:40;
  box-shadow:0 -8px 30px rgba(0,0,0,.5);
  backdrop-filter:blur(20px);
}
.bottom-nav-inner{display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 12px;cursor:pointer;color:var(--sub);
  flex:1;transition:all .15s;border-radius:10px;margin:2px;
  font-size:10px;font-weight:700;
}
.bn-item:hover{color:var(--blue)}
.bn-item.on{color:var(--blue)}
.bn-item svg{width:22px;height:22px;fill:currentColor}

/* ── Login ── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(99,102,241,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 70%,rgba(96,165,250,.08) 0%,transparent 55%),
    #060810;
  padding:16px;
}
.login-box{
  background:rgba(12,15,28,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:42px 36px;
  width:380px;max-width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(96,165,250,.06),0 0 60px rgba(99,102,241,.08);
  backdrop-filter:blur(30px);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#6366F1,#60A5FA,#34D399,transparent);
}
.login-logo{
  width:140px;height:auto;
  display:block;
  margin:0 auto 20px;
  object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.login-title{font-size:24px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:.3px}
.login-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:28px;font-weight:500}

/* ── Loading ── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.06);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 14px;
  box-shadow:0 0 20px rgba(96,165,250,.2);
}

/* ── Logout ── */
.logout-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.28);font-size:11px;font-weight:700;
  transition:all .18s;width:100%;background:none;border:none;
  font-family:'Cairo',sans-serif;
  border:1px solid rgba(255,255,255,.05);
}

/* ── Light mode ── */
html.light{
  --blue:#2563EB;--blue2:#EFF6FF;--blue3:#BFDBFE;
  --green:#059669;--green2:#ECFDF5;--green3:#A7F3D0;
  --red:#DC2626;--red2:#FEF2F2;
  --gold:#B45309;--gold2:#FFFBEB;
  --purple:#7C3AED;--purple2:#F5F3FF;
  --bdr:#E2E8F0;--bdr2:#CBD5E1;
  --text:#0F172A;--sub:#64748B;
  --bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#F8FAFC;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 20px rgba(0,0,0,.08);
  --shadow3:0 20px 60px rgba(0,0,0,.12);
}
html.light body{background:var(--bg)}
html.light body::before{
  background:
    radial-gradient(ellipse 80% 60% at 15% 0%,rgba(37,99,235,.07) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 90%,rgba(124,58,237,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(5,150,105,.03) 0%,transparent 60%);
}
/* sidebar stays dark in light mode — elegant contrast */
html.light .sidebar{background:linear-gradient(160deg,#1a2540 0%,#0f1729 100%)}
html.light .sidebar::before{background:linear-gradient(180deg,transparent,rgba(59,130,246,.35),rgba(139,92,246,.2),transparent)}
html.light .nav-item{color:rgba(255,255,255,.55)}
html.light .nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
html.light .nav-item.on{color:#fff}
html.light .sb-ver{color:rgba(255,255,255,.2)}
html.light .logout-btn{color:rgba(255,255,255,.35)}
html.light .logout-btn:hover{background:rgba(248,113,113,.1);color:#F87171}

/* topbar */
html.light .topbar{
  background:rgba(255,255,255,.92);
  border-bottom:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 0 rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.04);
  backdrop-filter:blur(16px);
}
html.light .menu-btn{background:#fff;border-color:var(--bdr2)}
html.light .sep{background:var(--bdr)}

/* month strip */
html.light .mstrip{background:rgba(248,250,252,.9);border-bottom:1px solid rgba(0,0,0,.06)}
html.light .mchip{background:#fff;border-color:var(--bdr2);color:var(--sub);box-shadow:0 1px 3px rgba(0,0,0,.05)}
html.light .mchip:hover{background:var(--blue2);border-color:rgba(37,99,235,.3);color:var(--blue)}
html.light .mchip.cur{
  background:linear-gradient(135deg,#2563EB,#4F46E5);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
html.light .mchip.saved{background:var(--green2);border-color:rgba(5,150,105,.3);color:var(--green)}
html.light .mchip.cur.saved{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(5,150,105,.3)}
html.light .mchip.add{border-style:dashed;background:transparent;color:var(--sub)}

/* cards */
html.light .card{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
html.light .card::before{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent)}
html.light .card:hover{
  border-color:rgba(37,99,235,.15);
  box-shadow:0 4px 20px rgba(37,99,235,.1),0 1px 3px rgba(0,0,0,.06);
  transform:translateY(-2px);
}
html.light .card-hdr{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent);border-bottom-color:rgba(0,0,0,.06)}
html.light .card-badge{background:var(--bg3);border-color:var(--bdr);color:var(--sub)}
html.light .card-title{color:var(--text)}

/* stat cards */
html.light .sc{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
html.light .sc:hover{
  box-shadow:0 8px 24px rgba(0,0,0,.1);
  border-color:rgba(0,0,0,.1);
}
html.light .sc::before{background:radial-gradient(circle,var(--sc-glow,rgba(37,99,235,.06)) 0%,transparent 70%)}
html.light .sc-lbl{color:var(--sub)}
html.light .sc-sub{color:var(--sub)}
html.light .sc-bar{background:rgba(0,0,0,.06)}

/* tables */
html.light .tbl th{
  background:linear-gradient(135deg,#F8FAFC,#F1F5F9);
  border-bottom:2px solid rgba(0,0,0,.07);
  color:#64748B;font-size:10.5px;
}
html.light .tbl td{border-bottom:1px solid rgba(0,0,0,.05);color:var(--text)}
html.light .tbl tr:hover td{background:rgba(37,99,235,.03)}
html.light .tbl .sub-row td{background:linear-gradient(90deg,rgba(37,99,235,.05),rgba(79,70,229,.03))}
html.light .day-inp{background:#fff;border-color:var(--bdr2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
html.light .day-inp:focus{background:var(--blue2);border-color:var(--blue)}

/* buttons */
html.light .btn{
  background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
html.light .btn:hover{background:var(--bg3);border-color:rgba(0,0,0,.14);box-shadow:0 2px 6px rgba(0,0,0,.1)}
html.light .btn-icon{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .btn-icon svg{fill:var(--sub)}

/* modal */
html.light .modal{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 25px 60px rgba(0,0,0,.15)}
html.light .modal-hdr{background:linear-gradient(135deg,rgba(37,99,235,.03),transparent);border-bottom-color:rgba(0,0,0,.07)}
html.light .modal-ftr{background:#F8FAFC;border-top-color:rgba(0,0,0,.07)}
html.light .overlay{background:rgba(15,23,42,.55);backdrop-filter:blur(6px)}

/* form fields */
html.light .fld label{color:#64748B}
html.light .fld input,html.light .fld select,html.light .fld textarea{
  background:#fff;border-color:rgba(0,0,0,.12);color:var(--text);
  box-shadow:0 1px 2px rgba(0,0,0,.04) inset;
}
html.light .fld input:focus,html.light .fld select:focus{
  background:var(--blue2);border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
html.light .fld select option{background:#fff;color:var(--text)}
html.light .prev-box{background:#F8FAFC;border-color:rgba(0,0,0,.08)}

/* misc */
html.light .pay-strip{background:linear-gradient(135deg,rgba(5,150,105,.05),rgba(16,185,129,.03));border-color:rgba(5,150,105,.15)}
html.light .pay-strip-fill{box-shadow:0 0 8px rgba(5,150,105,.25)}
html.light .inline-inp{border-bottom-color:rgba(0,0,0,.15)}
html.light .inline-inp:focus{background:var(--blue2)}
html.light .dz{border-color:rgba(0,0,0,.12)}
html.light .dz:hover{background:var(--blue2);border-color:var(--blue)}
html.light .search-wrap input{background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .search-wrap input:focus{background:var(--blue2);border-color:var(--blue)}
html.light .bottom-nav{background:rgba(255,255,255,.95);border-top-color:rgba(0,0,0,.08)}
html.light .prov-bar-bg{background:rgba(0,0,0,.07)}
html.light .rank-bar-bg{background:rgba(0,0,0,.07)}
html.light .info.blue{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
html.light .info.blue svg{fill:#1D4ED8}
html.light .info.green{background:#ECFDF5;border-color:#A7F3D0;color:#065F46}
html.light .info.green svg{fill:#065F46}
html.light .info.amber{background:#FFFBEB;border-color:#FDE68A;color:#92400E}
html.light .info.amber svg{fill:#92400E}
html.light .t-ok{background:#ECFDF5;color:#059669;border-color:#A7F3D0;box-shadow:0 4px 12px rgba(5,150,105,.12)}
html.light .t-err{background:#FEF2F2;color:#DC2626;border-color:#FECACA;box-shadow:0 4px 12px rgba(220,38,38,.1)}
html.light .t-info{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;box-shadow:0 4px 12px rgba(37,99,235,.1)}
html.light .paid-badge.yes{background:#ECFDF5;border-color:#A7F3D0;color:#059669}

html.light .paid-badge.no{background:#FFFBEB;border-color:#FDE68A;color:#B45309}
html.light .paid-badge.no:hover{background:#FEF3C7;border-color:#D97706}

/* login light mode */
html.light .login-screen{
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(37,99,235,.1) 0%,transparent 60%),

.oc-team-stat-val{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.oc-team-stat-lbl{font-size:10px;color:var(--sub);margin-top:3px;font-weight:700;letter-spacing:.5px}
.oc-spec-tabs{display:flex;gap:6px;flex-wrap:wrap}
.oc-spec-tab{padding:8px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg2);color:var(--text);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.oc-spec-tab:hover{border-color:var(--blue)}
.oc-spec-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.08);min-width:20px;height:18px;border-radius:9px;font-size:10px;padding:0 5px}
html.dark .oc-spec-count{background:rgba(255,255,255,.1)}
.oc-spec-tab.on .oc-spec-count{background:rgba(255,255,255,.25)}
.oc-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.oc-team-card{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;transition:transform .2s,box-shadow .2s}
.oc-team-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.oc-team-av-wrap{position:relative}
.oc-team-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.oc-team-status-dot{position:absolute;bottom:0;right:-2px;width:18px;height:18px;border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 0 1px rgba(0,0,0,.05)}
.oc-team-card-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.3}
.oc-team-card-spec{font-size:11px;color:var(--sub);font-weight:600}
@media(max-width:600px){
  .oc-canvas{padding:12px}
  .oc-branch{gap:10px}
  .oc-city{width:calc(50% - 5px);min-width:140px}
  .oc-city-v2{width:calc(50% - 6px);min-width:160px}
  .oc-eng-grid{grid-template-columns:1fr}
  .oc-team-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){.dash-2col{grid-template-columns:1fr}.att-cell{width:22px;height:22px;font-size:7.5px}.att-th-name,.att-td-name{min-width:96px}.att-td-sum,.att-th-sum{min-width:116px}.att-vac-period{flex-wrap:wrap}.att-vac-grid{grid-template-columns:1fr}}
/* ══════════════════════════════════════════════
   ATTENDANCE PAGE
══════════════════════════════════════════════ */
.att-page{display:flex;flex-direction:column;gap:14px}

/* Province tabs */
.att-tab{padding:7px 16px;border-radius:10px;cursor:pointer;font-size:11.5px;font-weight:700;border:1.5px solid var(--bdr2);transition:all .18s;color:var(--sub);background:var(--bg2);white-space:nowrap}
.att-tab:hover{border-color:var(--bdr3);color:var(--text)}
.att-tab.on{color:#fff!important;border-color:transparent!important}

/* Summary stat cards */
.att-sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.att-sum-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px;text-align:center}
.att-sum-val{font-size:26px;font-weight:900;line-height:1}
.att-sum-lbl{font-size:9.5px;color:var(--sub);font-weight:700;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
html.light .att-sum-card{background:#fff;border-color:#e2e8f0}

/* Table wrapper */
.att-table-wrap{overflow-x:auto}
.att-table-wrap::-webkit-scrollbar{height:5px}
.att-table-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.att-table{border-collapse:separate;border-spacing:0;min-width:700px;width:100%;font-size:11px}

/* Header row */
.att-th{
  background:var(--bg2);padding:7px 3px;text-align:center;font-weight:800;
  color:var(--sub);font-size:9px;white-space:nowrap;border-bottom:2px solid var(--bdr2);
  position:sticky;top:0;z-index:2;
}
.att-th-name{
  text-align:right;padding:7px 14px;min-width:145px;
  position:sticky;right:0;z-index:3;background:var(--bg2);
  border-left:2px solid var(--bdr2);
}
html.light .att-th,.att-th-name{background:#f8fafc}

/* Body cells */
.att-td{padding:2px 2px;text-align:center;border-bottom:1px solid var(--bdr);vertical-align:middle}
.att-td-name{
  text-align:right;padding:8px 14px;font-size:12px;
  position:sticky;right:0;background:var(--bg);z-index:1;
  border-left:2px solid var(--bdr2);min-width:145px;
  border-bottom:1px solid var(--bdr);
}
html.light .att-td-name{background:#fff}
.att-td-eng{font-weight:700;color:var(--text);line-height:1.3}
.att-td-spec{font-size:9.5px;color:var(--sub);margin-top:2px}
.att-table tr:last-child .att-td,.att-table tr:last-child .att-td-name{border-bottom:none}
.att-table tr:hover .att-td{background:rgba(255,255,255,.015)}
html.light .att-table tr:hover .att-td{background:#fafbfc}

/* Status cells */
.att-cell{
  width:26px;height:26px;border-radius:5px;margin:1px auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:8.5px;font-weight:900;letter-spacing:.2px;
  transition:transform .12s;user-select:none;border:1.5px solid transparent;
}
.att-cell:hover{transform:scale(1.18);z-index:2;position:relative}
.att-cell-e{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.12)}
html.light .att-cell-e{background:#f1f5f9;border-color:#e2e8f0;color:#cbd5e1}
.att-cell-P{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.45);color:#10B981}
.att-cell-A{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.4);color:#F87171}
.att-cell-AL{background:rgba(59,130,246,.16);border-color:rgba(59,130,246,.4);color:#60A5FA}
.att-cell-SL{background:rgba(245,158,11,.16);border-color:rgba(245,158,11,.4);color:#FCD34D}
.att-cell-EL{background:rgba(249,115,22,.16);border-color:rgba(249,115,22,.4);color:#FB923C}
.att-cell-EGL{background:rgba(234,88,12,.22);border-color:rgba(234,88,12,.5);color:#EA580C;font-weight:900}
.att-cell-TXR{background:rgba(245,158,11,.20);border-color:rgba(245,158,11,.5);color:#F59E0B;font-weight:900}
.att-cell-H{background:rgba(148,163,184,.1);border-color:rgba(148,163,184,.28);color:#94A3B8}
.att-cell-wknd{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.1);color:rgba(239,68,68,.3);cursor:default}

/* Summary column */
.att-td-sum{
  padding:6px 12px;border-bottom:1px solid var(--bdr);
  border-right:2px solid var(--bdr2);min-width:165px;vertical-align:middle;
  position:sticky;left:0;background:var(--bg);z-index:1;
}
html.light .att-td-sum{background:#fff;border-right-color:#e2e8f0}
.att-th-sum{
  text-align:right;padding:7px 12px;min-width:165px;font-size:9px;
  font-weight:800;color:var(--sub);border-bottom:2px solid var(--bdr2);
  border-right:2px solid var(--bdr2);
  position:sticky;left:0;top:0;z-index:4;background:var(--bg2);
}
html.light .att-th-sum{background:#f8fafc}
.att-stat-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10.5px}
.att-stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.att-stat-val{font-weight:900;color:var(--text);min-width:16px;text-align:left}
.att-stat-lbl{color:var(--sub);font-size:9.5px}
.att-stat-div{border-top:1px solid var(--bdr);margin:4px 0;padding-top:4px}

/* Time display under present cell */
.att-time{font-size:7px;color:var(--sub);line-height:1;margin-top:1px;text-align:center;white-space:nowrap}

/* Legend */
.att-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.att-leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px}
.att-leg-box{width:18px;height:18px;border-radius:4px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0}

/* Time modal */
.att-time-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.att-time-row:last-child{border-bottom:none}
.att-time-day{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.att-time-inp{padding:5px 8px;border:1.5px solid var(--bdr2);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:12.5px;width:96px}
.att-time-inp:focus{outline:none;border-color:rgba(96,165,250,.5)}
/* -- Quick Status Buttons -- */
.att-qbtns{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.att-qbtn{padding:2px 8px;border-radius:5px;border:1.5px solid;font-size:9px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;background:transparent;white-space:nowrap;line-height:1.5}
.att-qbtn-P{border-color:rgba(16,185,129,.35);color:#10B981}
.att-qbtn-P:hover,.att-qbtn-P.on{background:#10B981;color:#fff;border-color:#10B981}
.att-qbtn-A{border-color:rgba(239,68,68,.35);color:#EF4444}
.att-qbtn-A:hover,.att-qbtn-A.on{background:#EF4444;color:#fff;border-color:#EF4444}
.att-qbtn-AL{border-color:rgba(59,130,246,.35);color:#60A5FA}
.att-qbtn-AL:hover,.att-qbtn-AL.on{background:#3B82F6;color:#fff;border-color:#3B82F6}
/* -- Bulk Actions Bar -- */
.att-bulk-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;flex-wrap:wrap;margin-bottom:8px}
.att-bulk-count{font-size:11px;color:var(--sub);font-weight:700;flex-shrink:0}
.att-bulk-count em{font-style:normal;color:var(--blue);font-size:13px;font-weight:900}
.att-bulk-sep{width:1px;height:16px;background:var(--bdr2);flex-shrink:0}
/* -- Keyboard tooltip -- */
.att-kb-tip{font-size:8px;color:var(--sub);margin-top:0;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.att-table tr:hover .att-kb-tip{opacity:.8}
/* -- Row checkbox -- */
.att-chk{width:14px;height:14px;cursor:pointer;accent-color:var(--blue);flex-shrink:0;margin-top:2px}
.att-td-name-inner{display:flex;align-items:flex-start;gap:6px;width:100%}
.att-td-name-body{flex:1;min-width:0}
/* -- Leave Request System -- */
.leave-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:all .2s}
.leave-card:hover{border-color:var(--bdr3)}
.leave-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:800;border:1px solid}
.leave-status-pending{background:rgba(239,159,39,.12);color:#EF9F27;border-color:rgba(239,159,39,.3)}
.leave-status-approved{background:rgba(29,158,117,.12);color:#1D9E75;border-color:rgba(29,158,117,.3)}
.leave-status-rejected{background:rgba(226,75,74,.1);color:#E24B4A;border-color:rgba(226,75,74,.3)}
.leave-elig-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:6px 0}
.leave-elig-fill{height:100%;border-radius:3px;transition:width .4s ease}
.leave-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:14px}
.leave-tab{flex:1;padding:7px 4px;text-align:center;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.leave-tab.on{background:var(--bg3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.leave-info-box{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;margin:8px 0}
.att-hours{font-size:11px;font-weight:800;color:#FCD34D;margin-right:auto;white-space:nowrap}

/* Weekly/monthly day header colors */
.att-th-wknd{color:#94A3B8!important}
.att-th-today{color:#60A5FA!important;background:rgba(96,165,250,.06)!important}

/* Attendance log view */
.att-log-list{display:flex;flex-direction:column;gap:12px}
.att-log-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden;transition:border-color .2s}
html.light .att-log-card{background:#fff;border-color:#e2e8f0}
.att-log-card:hover{border-color:rgba(96,165,250,.35)}
.att-log-hdr{display:flex;align-items:center;gap:14px;padding:14px 18px 12px;border-bottom:1px solid var(--bdr2)}
.att-log-month{font-size:18px;font-weight:900;color:var(--text);min-width:110px}
.att-log-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.att-log-chip{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:800;border:1.5px solid;white-space:nowrap}
.att-log-actions{display:flex;gap:6px;flex-shrink:0}
.att-log-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0}
.att-log-prov{padding:12px 16px;border-left:1px solid var(--bdr)}
.att-log-prov:last-child{border-left:none}
html.light .att-log-prov{border-left-color:#f1f5f9}
.att-log-prov-name{font-size:10px;font-weight:800;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.att-log-stat{display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:4px}
.att-log-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.att-log-stat-val{font-weight:900;color:var(--text);min-width:22px}
.att-log-stat-lbl{color:var(--sub);font-size:10px}
.att-log-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden}
html.light .att-log-bar{background:#f1f5f9}
.att-log-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#10B981,#059669)}
/* View toggle */
.att-view-toggle{display:flex;gap:0;border:1px solid var(--bdr2);border-radius:10px;overflow:hidden;flex-shrink:0}
.att-view-btn{padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--sub);background:transparent;border:none;font-family:inherit}
.att-view-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.att-view-btn.on{background:rgba(96,165,250,.15);color:#60A5FA}

/* Vacation balance card */
.att-vac-card{padding:16px 18px}
.att-vac-period{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr2)}
.att-vac-period-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.25)}
.att-vac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.att-vac-row{background:var(--bg);border:1px solid var(--bdr2);border-radius:10px;padding:10px 12px}
html.light .att-vac-row{background:#f8fafc}
.att-vac-name{font-size:11.5px;font-weight:800;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-vac-spec{font-size:9.5px;color:var(--sub);margin-bottom:8px}
.att-vac-bar-wrap{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:6px}
html.light .att-vac-bar-wrap{background:#e2e8f0}
.att-vac-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.att-vac-nums{display:flex;justify-content:space-between;font-size:9.5px;font-weight:700}
.att-vac-exceeded{font-size:9px;font-weight:800;color:#EF4444;margin-top:3px}

/* ── Scrollbar global ── */
*{scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

@media(max-width:768px){.mstrip{-webkit-overflow-scrolling:touch}.att-table-wrap{-webkit-overflow-scrolling:touch}
  .sidebar{position:fixed;top:0;right:0;bottom:0;z-index:60;transform:translateX(100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow3)}
  .mob-overlay.show{display:block}
  .menu-btn{display:inline-flex}
  .main{padding-bottom:68px}
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-right .btn span{display:none}
  .topbar-right .btn{padding:7px 9px}
  .search-wrap input{width:130px}
  .search-wrap input:focus{width:160px}
  .bottom-nav{display:block}
  .content{padding:12px}
  .g2{grid-template-columns:1fr}
  /* ── Card / table tweaks ── */
  .card{border-radius:12px}
  .card-hdr{padding:10px 14px}
  .topbar{padding:8px 14px;gap:8px}
  .mstrip{padding:6px 14px}
}
@media(max-width:480px){
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sc-val{font-size:20px}
  .page-sub{display:none}
  .sep{display:none}
}
@media(max-width:860px) and (min-width:769px){.sg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:769px){.sc-val{font-size:26px}}

.eng-status{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:800;margin-right:6px;vertical-align:middle}
.eng-status-active{background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.3)}
.eng-status-on_leave{background:rgba(96,165,250,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.3)}
.eng-status-ended{background:rgba(156,163,175,.12);color:#9CA3AF;border:1px solid rgba(156,163,175,.3)}
.leave-action-box{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.leave-history-item{padding:8px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--bdr2);font-size:11px}
.leave-report-table{width:100%;border-collapse:collapse;font-size:12px}
.leave-report-table th{background:var(--bg3);padding:8px 10px;text-align:right;font-weight:700;font-size:11px;color:var(--sub);border-bottom:1px solid var(--bdr2)}
.leave-report-table td{padding:7px 10px;border-bottom:1px solid var(--bdr2)}
.leave-report-table tr:last-child td{border-bottom:none}
.ticket-booked{color:#1D9E75;font-weight:700}

.bn-item.on::before{content:'';display:block;width:20px;height:3px;border-radius:2px;background:var(--blue);margin:-4px auto 3px;box-shadow:0 0 8px var(--blue)}

/* calc: e.extra carries to NEXT month (NOT in this month's tot).
   incomingExtra is days carried IN from previous month — folded into a1 (d1 portion). */
const calc=(e,r,eg,incomingExtra=0)=>{
  const dr=r/30;
  const a1Reg=e.d1*dr;
  const a2=e.d2*dr;
  const inc=(+incomingExtra||0)*dr;
  // a1 includes the incoming carryover so إعاشة 1 column shows combined amount
  return{a1:a1Reg+inc,a1Reg,a1Inc:inc,a2,incoming:inc,incomingDays:+incomingExtra||0,tot:a1Reg+a2+inc,egp:(a1Reg+a2+inc)*eg};
};
/* Auto-calc d1/d2/extra based on arrivalDate. Returns null if arrival not in target month.
   Disbursement model:
   - d1 صرف happens on day 1 (must be present that day to receive d1)
   - d2 صرف happens on day 14 (must be present that day to receive d2)
   Logic:
   - Arrival on day 1: d1=15, d2=15 (full month)
   - Arrival day 2-14: d1=0 (missed صرف), d2=15 (present at day 14), extra = days from arrival to day 15
   - Arrival day 15-30: d1=0, d2=0 (missed both), extra = days from arrival to end of month */
const calcArrivalDays=(arrivalDateStr,year,month)=>{
  if(!arrivalDateStr)return null;
  const arr=new Date(arrivalDateStr+'T12:00');
  if(isNaN(arr))return null;
  const aY=arr.getFullYear(),aM=arr.getMonth()+1,aD=arr.getDate();
  if(aY!==year||aM!==month)return null;
  const FIXED=30;// billing always treats month as 30 days
  if(aD===1){
    return{d1:15,d2:15,extra:0,arrivalDay:aD};
  }else if(aD<=14){
    // Present on day 14 → gets d2. Days from arrival to 15 carry as extra.
    return{d1:0,d2:15,extra:15-aD+1,arrivalDay:aD};
  }else{
    // Missed day 14 صرف → no d2. All days from arrival carry as extra.
    return{d1:0,d2:0,extra:Math.max(0,FIXED-aD+1),arrivalDay:aD};
  }
};

function ocAttPct(engId,att,month,year){
  if(!att||!month||!year)return 0;
  const ea=att[engId]||{};
  const dim=new Date(year,month,0).getDate();
  let work=0,present=0;
  for(let d=1;d<=dim;d++){
    if(new Date(year,month-1,d).getDay()===5)continue;
    work++;
    if(ea[d]?.s==='P')present++;
  }
  return work>0?Math.round(present/work*100):0;
}

/* ══════════════════════════════════════════════════════

function App(){

  const [nmForm,setNmForm]=useState({month:now.getMonth()+1,year:now.getFullYear()});

  const [drag,setDrag]=useState(false);
  const [logo,setLogo]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [user,setUser]=useState(null);
  const [loginForm,setLoginForm]=useState({username:"",password:""});
  const [loginError,setLoginError]=useState("");
  const [provUsers,setProvUsers]=useState([]);
  const [pwdModal,setPwdModal]=useState(null);
  const [activeUsers,setActiveUsers]=useState([]);
  const [mustChangePwd,setMustChangePwd]=useState(false);

  const [forcePwdErr,setForcePwdErr]=useState("");

  const [newUserForm,setNewUserForm]=useState({username:"",password:"",province:PROVS[0]});
  const [autoSaving,setAutoSaving]=useState(false);
  const isAdmin=useMemo(()=>user?.role==='admin',[user]);
  const isProvince=useMemo(()=>user?.role==='province',[user]);
  const userProv=useMemo(()=>user?.province||null,[user]);
  const [expForm,setExpForm]=useState({id:null,desc:"",type:"مصروف",category:"",prov:"",usd:"",lyd:"",date:"",note:"",custodyId:""});
  const [custForm,setCustForm]=useState({id:null,desc:"",source:"",sourceOther:"",responsibleId:"",prov:"",usd:"",lyd:"",date:"",note:""});
  const [trfForm,setTrfForm]=useState({id:null,fromCustodyId:"",toCustodyId:"",usd:"",rate:"",lyd:"",date:"",note:""});
  /* Engineer transfer modal: select engineer + target province + date */
  const [engTransferForm,setEngTransferForm]=useState({engId:'',toProv:'',date:''});
  /* Egypt transfer modal: select engineer + date + notes */
  const [egyptTransferForm,setEgyptTransferForm]=useState({engId:'',date:'',notes:''});
  /* Egypt leave/return modal — type='depart' for departure, type='return' for return */
  const [egyptLeaveForm,setEgyptLeaveForm]=useState({engId:'',type:'depart',date:'',notes:''});
  /* Debounce flag for transfer button (2s lock after each submit) */
  const [transferring,setTransferring]=useState(false);
  const transferringRef=useRef(false);
  /* Undo confirmation modal: holds {eng:{id,name}, transfer:{id,from,to,date,by,at}} */
  const [undoConfirm,setUndoConfirm]=useState(null);
  /* Live clock — ticks every second for the unified header */
  const [clockNow,setClockNow]=useState(()=>new Date());
  const [expFilters,setExpFilters]=useState({dateFrom:'',dateTo:'',prov:'',type:'',category:''});
  const [fixedRents,setFixedRents]=useState([
    {id:'r1',desc:'سكن رقم 1',day:1,lyd:5000,usd:0,prov:''},
    {id:'r2',desc:'سكن رقم 2',day:7,lyd:3500,usd:0,prov:''},
    {id:'r3',desc:'سكن رقم 3',day:22,lyd:5000,usd:0,prov:''}
  ]);
  const [editingRent,setEditingRent]=useState(null);
  const [orgData,setOrgData]=useState(null);
  const [attProv,setAttProv]=useState(PROVS[0]);
  const [saveLogs,setSaveLogs]=useState([]);
  const lastLogIdRef=useRef(0);
  const [serverBackups,setServerBackups]=useState([]);
  const [gOpen,setGOpen]=useState(false);
  const [gQ,setGQ]=useState("");
  const [notifsOpen,setNotifsOpen]=useState(false);
  const [notifPos,setNotifPos]=useState({top:60,left:16});
  const notifBtnRef=useRef(null);
  /* Quick Actions dropdown (➕ in topbar) */
  const [qaOpen,setQaOpen]=useState(false);
  const [qaPos,setQaPos]=useState({top:60,left:16});
  const qaBtnRef=useRef(null);
  const [attTimeModal,setAttTimeModal]=useState(null);
  const [attView,setAttView]=useState('table'); // 'table' | 'log'
  const [attSelected,setAttSelected]=useState(()=>new Set());
  const [attHovEng,setAttHovEng]=useState(null);
  const [attPopup,setAttPopup]=useState(null);   // {engId,day,x,y}
  const [dayPopup,setDayPopup]=useState(null);   // {day,x,y}
  const [activityLogs,setActivityLogs]=useState([]);
  const [leaveTab,setLeaveTab]=useState('pending');
  const [leaveView,setLeaveView]=useState('list');
  const [leaveForm,setLeaveForm]=useState({engId:'',startDate:'',endDate:'',ticketBooked:false,ticketDetails:'',notes:''});
  const [leaveElig,setLeaveElig]=useState(null);
  const [leaveActionForm,setLeaveActionForm]=useState(null); // {type:'postpone'|'cancel',reqId,newDate:'',reason:''}
  const [engHistoryId,setEngHistoryId]=useState(null);
  const [leaveReportMonth,setLeaveReportMonth]=useState(()=>mkKey(now.getMonth()+1,now.getFullYear())); // key when viewing a past month from log
  const [liveRate,setLiveRate]=useState(null);
  const [rateAt,setRateAt]=useState(null);
  const [rateFetching,setRateFetching]=useState(false);
  const fileRef=useRef(null);
  const logoRef=useRef(null);
  const pendingRef=useRef({});
  const timerRef=useRef(null);
  const printAttRef=useRef(null);
  const orgPrintRef=useRef(null);
  const [pendingPrint,setPendingPrint]=useState(null);

  /* ── Load data on mount ───────────────────────────── */
  useEffect(()=>{
    fetch("/auth/me").then(r=>r.json()).then(u=>{
      if(!u.username){setLoaded(true);return;}
      setUser(u);
      if(u.province)setAttProv(u.province);
      if(u.role==='province')setPage("att");
      const fetches=[
        fetch("/api/months").then(r=>r.json()),
        fetch("/api/logo").then(r=>r.json()).catch(()=>({logo:null})),
      ];
      fetch("/api/fixed-rents").then(r=>r.json()).then(d=>{if(d.rents)setFixedRents(d.rents);}).catch(()=>{});
      if(u.role==='admin'){
        fetches.push(fetch("/api/org-chart").then(r=>r.json()).catch(()=>({data:null})));
        fetches.push(fetch("/api/users").then(r=>r.json()).catch(()=>({users:[]})));
      }
      return Promise.all(fetches).then(([md,ld,od,ud])=>{
        const m=md.months||{};
        /* Auto-create current month if missing — site auto-manages months by date */
        const expectedKey=mkKey(now.getMonth()+1,now.getFullYear());
        if(!m[expectedKey]){
          const sortedKeys=Object.keys(m).filter(k=>k!=='leaves').sort();
          const prevKey=sortedKeys[sortedKeys.length-1];
          const prev=prevKey?m[prevKey]:null;
          const nd=prev?.data?JSON.parse(JSON.stringify(prev.data)):JSON.parse(JSON.stringify(BASE));
          PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;if(e.paid1!==undefined)e.paid1=false;if(e.paid2!==undefined)e.paid2=false;});});
          const[y2,m2]=expectedKey.split('-');
          m[expectedKey]={data:nd,cfg:{...(prev?.cfg||{rate:300,egp:52.5,company:''}),month:+m2,year:+y2},savedAt:null,attendance:null,expenses:null};
          /* Save to DB */
          fetch(`/api/months/${expectedKey}`,{method:'PUT',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(m[expectedKey])}).catch(()=>{});
        }
        setMonths(m);
        setAk(expectedKey);
        setLogo(ld.logo||null);
        if(u.role==='admin'){setOrgData(od?.data||DEFAULT_ORG);setProvUsers(ud?.users||[]);}
        setLoaded(true);
      });
    }).catch(()=>setLoaded(true));
  },[]);

  /* ── Load activity log when admin opens activity page ── */
  useEffect(()=>{
    if(page==='activity'&&isAdmin){
      fetch('/api/activity').then(r=>r.json()).then(d=>{if(d.logs)setActivityLogs(d.logs);}).catch(()=>{});
    }
  },[page,isAdmin]);

  /* ── Load province users when admin opens report page ── */
  useEffect(()=>{
    if(page==='report'&&isAdmin){
      fetch('/api/users').then(r=>r.json()).then(d=>{if(d.users)setProvUsers(d.users);}).catch(()=>{});
    }
  },[page,isAdmin]);

  /* ── Poll active users every 30s (admin only) ────────── */
  useEffect(()=>{
    if(!isAdmin||!user)return;
    const fetchActive=()=>fetch('/api/active-users').then(r=>r.json()).then(d=>{if(d.users)setActiveUsers(d.users);}).catch(()=>{});
    fetchActive();
    const t=setInterval(fetchActive,120000);
    return()=>clearInterval(t);
  },[isAdmin,user]);

  /* ── Poll province save logs every 30s (admin only) ── */
  useEffect(()=>{
    if(!isAdmin||!user)return;
    const poll=()=>fetch(`/api/save-logs?since=${lastLogIdRef.current}`)
      .then(r=>r.json()).then(d=>{
        if(!d.logs||d.logs.length===0)return;
        d.logs.forEach(l=>{
          if(l.id>lastLogIdRef.current){
            const[y,mo]=l.key.split("-");
            const mn2=MONTHS[+mo-1]+" "+y;
            msg(`📍 ${l.province.replace("محافظة ","")} — حفظ البيانات (${mn2})`,"ok");
          }
        });
        lastLogIdRef.current=d.lastId;
        setSaveLogs(prev=>[...prev,...d.logs].slice(-50));
      }).catch(()=>{});
    // Start polling after 2s to let initial load settle
    const t=setTimeout(()=>{poll();const iv=setInterval(poll,120000);return()=>clearInterval(iv);},2000);
    return()=>clearTimeout(t);
  },[isAdmin,user]);

  /* ── Load server backups when on backup page ─────────── */
  useEffect(()=>{
    if(page==='backup'&&isAdmin){
      fetch('/api/backups').then(r=>r.json()).then(d=>{if(d.backups)setServerBackups(d.backups);}).catch(()=>{});
    }
  },[page,isAdmin]);

  /* ── Ctrl+K global search ────────────────────────────── */
  useEffect(()=>{
    const h=ev=>{if((ev.ctrlKey||ev.metaKey)&&ev.key==='k'){ev.preventDefault();setGOpen(o=>!o);}
      if(ev.key==='Escape'){setGOpen(false);}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);

  /* ── Fetch live USD/EGP exchange rate ─────────────── */
  const fetchLiveRate=useCallback(()=>{
    setRateFetching(true);
    fetch('https://open.er-api.com/v6/latest/USD')
      .then(r=>r.json())
      .then(d=>{if(d.rates?.EGP){setLiveRate(d.rates.EGP);setRateAt(new Date().toISOString());}else throw new Error();})
      .catch(()=>fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(d=>{if(d.rates?.EGP){setLiveRate(d.rates.EGP);setRateAt(new Date().toISOString());}}).catch(()=>{}))
      .finally(()=>setRateFetching(false));
  },[]);

  useEffect(()=>{
    if(!user)return;
    fetchLiveRate();
    const t=setInterval(fetchLiveRate,300000);
    return()=>clearInterval(t);
  },[user,fetchLiveRate]);

  useEffect(()=>{
    if(!attPopup&&!dayPopup)return;
    const close=()=>{setAttPopup(null);setDayPopup(null);};
    document.addEventListener('click',close);
    return()=>document.removeEventListener('click',close);
  },[attPopup,dayPopup]);

  const logActivity=useCallback((action,detail='')=>{
    fetch('/api/activity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,detail})}).catch(()=>{});
  },[]);

  /* ── Save queue (debounced) ───────────────────────── */
  const queueSave=useCallback((key,val)=>{
    pendingRef.current[key]=val;
    setAutoSaving(true);
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      const q={...pendingRef.current};pendingRef.current={};
      for(const[k,v]of Object.entries(q)){
        if(v===null){
          await fetch(`/api/months/${k}`,{method:"DELETE"}).catch(()=>{});
        }else{
          try{
            const r=await fetch(`/api/months/${k}`,{
              method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)
            });
            if(r.status===409){
              const err=await r.json().catch(()=>({}));
              const list=(err.conflicts||[]).join(' • ');
              alert(`⚠️ تم رفض الحفظ لمنع فقدان بيانات:\n\n${list}\n\nسيتم إعادة تحميل البيانات من الخادم.`);
              // Reload fresh state from server
              try{
                const fresh=await fetch('/api/months',{credentials:'include'});
                if(fresh.ok){const fd=await fresh.json();if(fd.months)setMonths(fd.months);}
              }catch(e){}
            }
          }catch(e){}
        }
      }
      setAutoSaving(false);
    },800);
  },[]);

  const msg=(m,t="ok")=>{setToast({m,t});setTimeout(()=>setToast(null),3500);};

  /* ── Auth ─────────────────────────────────────────── */
  const doLogin=async()=>{
    setLoginError("");
    try{
      const r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(loginForm)});
      const d=await r.json();
      if(!r.ok){setLoginError(d.error||"خطأ في تسجيل الدخول");return;}
      setUser(d);
      if(d.mustChangePwd)setMustChangePwd(true);
      if(d.province)setAttProv(d.province);
      if(d.role==='province')setPage("att");
      const fetches=[
        fetch("/api/months").then(r=>r.json()),
        fetch("/api/logo").then(r=>r.json()).catch(()=>({logo:null})),
      ];
      fetch("/api/fixed-rents").then(r=>r.json()).then(d=>{if(d.rents)setFixedRents(d.rents);}).catch(()=>{});

        fetches.push(fetch("/api/users").then(r=>r.json()).catch(()=>({users:[]})));

  const getTransfers=e=>(Array.isArray(e?.transfers)?e.transfers:[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  /* ── Month status, notifications, task tracking ─────── */
  const monthStatus=useMemo(()=>{
    const pm=now.getMonth()===0?12:now.getMonth(),py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const prevKey=mkKey(pm,py);
    const prevAtt=months[prevKey]?.attendance||{};
    const attCount=Object.values(prevAtt).reduce((a,d)=>a+Object.values(d).filter(v=>v?.s==='P').length,0);
    const attSt=attCount>5?'done':attCount>0?'progress':'none';
    const curData=months[expectedAk]?.data||{};
    const d1Sum=PROVS.reduce((a,p)=>a+(curData[p]||[]).reduce((b,e)=>b+(+e.d1||0),0),0);
    const d2Sum=PROVS.reduce((a,p)=>a+(curData[p]||[]).reduce((b,e)=>b+(+e.d2||0),0),0);
    const engs=PROVS.reduce((a,p)=>a+(curData[p]||[]).length,0);
    const threshold=engs*7;
    const d1St=engs>0?(d1Sum>=threshold?'done':d1Sum>0?'progress':'none'):'none';
    const d2St=engs>0?(d2Sum>=threshold?'done':d2Sum>0?'progress':'none'):'none';
    return{
      att:{st:attSt,label:'حضور '+MONTHS[pm-1]+' '+py},
      d1:{st:d1St,label:'إعاشة النصف الأول'},
      d2:{st:d2St,label:'إعاشة النصف الثاني'},
    };
  },[months,expectedAk,prevMonthKey]);

  const provTaskStatus=useMemo(()=>{
    const pm=now.getMonth()===0?12:now.getMonth(),py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const prevKey=mkKey(pm,py);
    return PROVS.map((prov,pi)=>{

      const attDone=prevData.some(e=>Object.values(prevAtt[e.id]||{}).some(d=>d?.s==='P'));

      return{prov,color:PCOLS[pi],lastLog,attDone,d1Done:curData.some(e=>+e.d1>0),d2Done:curData.some(e=>+e.d2>0)};
    });

  const dashNotifs=useMemo(()=>{
    const d=now.getDate(),m=now.getMonth()+1,y=now.getFullYear();

        if(!ps.d1Done)notes.push({id:'d1',lvl:'yellow',msg:`📋 أدخل إعاشة النصف الأول لـ${mn} ${cfg.year}`});
        if(d>=14&&!ps.d2Done)notes.push({id:'d2',lvl:'yellow',msg:`📋 أدخل إعاشة النصف الثاني لـ${mn} ${cfg.year}`});
      }
      return notes;
    }
    if(monthStatus.att.st==='none')notes.push({id:'att',lvl:'yellow',msg:`لم يتم تسجيل حضور ${MONTHS[pm-1]} ${py} حتى الآن`});
    if(d>=14&&monthStatus.d2.st==='none')notes.push({id:'d2',lvl:'yellow',msg:`لم يتم إعاشة النصف الثاني لـ${mn} ${cfg.year} بعد`});
    if(d>=29){const nm=m===12?1:m+1,ny=m===12?y+1:y;if(monthStatus.d1.st==='none')notes.push({id:'d1',lvl:'yellow',msg:`لم يتم إعاشة النصف الأول لـ${MONTHS[nm-1]} ${ny} بعد`});}
    if(dueRentsToday.length>0)dueRentsToday.forEach(r=>notes.push({id:'rent-'+r.id,lvl:'yellow',msg:`⚠️ إيجار مستحق اليوم: ${r.desc} (${(+r.lyd).toLocaleString('ar-EG')} د.ل)`}));

    return notes;
  },[isAdmin,isProvince,userProv,monthStatus,provTaskStatus,mn,cfg.year,dueRentsToday,aggBalance]);

  /* ── Unified notifications (bell dropdown) ───────────── */
  const allNotifications=useMemo(()=>{
