.oc-branch{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding:0 8px}
.dash-2col{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:12px}
      .oc-city{border-radius:14px;background:#fff;border:1px solid #e2e8f0;border-top:4px solid var(--cc,#3b82f6);padding:0;overflow:hidden;width:210px;flex-shrink:0;cursor:pointer;transition:box-shadow .2s,transform .2s;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.oc-city:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.14)}
html.dark .oc-city{background:#1e293b;border-color:#334155}
.oc-city-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f1f5f9}
html.dark .oc-city-head{border-bottom-color:#334155}
.oc-city-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;background:var(--avBg,#dbeafe);color:var(--avColor,#1e40af)}
.oc-city-info{flex:1;min-width:0}
.oc-city-name{font-size:13px;font-weight:900;color:#1e293b}
html.dark .oc-city-name{color:#f1f5f9}
.oc-city-role{font-size:9.5px;color:#64748b;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.oc-city-stats{display:flex;gap:5px;padding:8px 14px;flex-wrap:wrap}
.oc-city-stat{font-size:9.5px;font-weight:700;color:#475569;background:#f8fafc;border-radius:8px;padding:3px 8px}
html.dark .oc-city-stat{background:#0f172a;color:#94a3b8}
.oc-city-foot{padding:7px 14px;font-size:9px;font-weight:700;color:var(--avColor,#1e40af);display:flex;align-items:center;gap:4px;border-top:1px solid #f1f5f9}
html.dark .oc-city-foot{border-top-color:#334155}
.oc-detail-head{background:#fff;border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:14px;border:1px solid #e2e8f0}
html.dark .oc-detail-head{background:#1e293b;border-color:#334155}
.oc-detail-av{width:52px;height:52px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0;background:var(--avBg,#dbeafe);color:var(--avColor,#1e40af)}
.oc-detail-info{flex:1}
.oc-detail-name{font-size:17px;font-weight:900;color:#1e293b}
html.dark .oc-detail-name{color:#f1f5f9}
.oc-detail-sub{font-size:10px;color:#64748b;margin-top:3px}
.oc-eng-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.oc-eng-card{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;border:1px solid #e2e8f0;transition:box-shadow .15s}
.oc-eng-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
html.dark .oc-eng-card{background:#1e293b;border-color:#334155}
.oc-eng-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;background:var(--avBg,#dbeafe);color:var(--avColor,#1e40af)}
.oc-eng-name{font-size:12px;font-weight:800;color:#1e293b}
html.dark .oc-eng-name{color:#f1f5f9}
.oc-eng-role{font-size:9.5px;color:#64748b;margin-top:2px}
.oc-eng-s{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.oc-sa{background:#dcfce7;color:#166534}
.oc-sl{background:#fef3c7;color:#92400e}
.oc-sab{background:#fee2e2;color:#991b1b}
.oc-proj-list{margin-top:14px}
.oc-proj-head{font-size:11px;font-weight:800;color:#475569;margin-bottom:8px}
html.dark .oc-proj-head{color:#94a3b8}
.oc-proj-item{background:#fff;border-radius:10px;padding:10px 14px;font-size:12px;font-weight:700;color:#1e293b;border:1px solid #e2e8f0;display:flex;align-items:center;gap:8px;margin-bottom:6px}
html.dark .oc-proj-item{background:#1e293b;border-color:#334155;color:#f1f5f9}
.oc-proj-dot{width:8px;height:8px;border-radius:50%;background:var(--cc,#3b82f6);flex-shrink:0}
/* ── Org Chart V2 ── */
.oc-page-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:18px;padding:20px 24px;background:linear-gradient(135deg,#0A0E1A 0%,#0F2659 50%,#1A2238 100%);border-radius:16px;color:#F5E6C5;box-shadow:0 8px 30px rgba(10,14,26,.4),inset 0 0 0 1px rgba(212,165,56,.20);position:relative;overflow:hidden}
.oc-page-hdr::before{content:'';position:absolute;top:0;right:0;width:120px;height:4px;background:linear-gradient(90deg,transparent,#D4A538);border-radius:0 16px 0 0}
.oc-page-hdr::after{content:'';position:absolute;bottom:0;left:0;width:120px;height:4px;background:linear-gradient(90deg,#D4A538,transparent);border-radius:0 0 0 16px}
.oc-page-title{font-size:24px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px;color:#F5E6C5}
.oc-page-sub{font-family:'Cormorant Garamond',serif;font-size:14px;color:#D4A538;font-style:italic;font-weight:500;letter-spacing:.5px}
.oc-stats-pill{display:inline-flex;align-items:center;gap:10px;background:rgba(212,165,56,.10);padding:10px 16px;border-radius:100px;border:1px solid rgba(212,165,56,.30);font-size:12px;font-weight:700;backdrop-filter:blur(6px);color:#F5E6C5}
.oc-stats-pill strong{font-size:15px;font-weight:900;margin-left:3px;color:#D4A538;font-family:'Bebas Neue',sans-serif;letter-spacing:.5px}
.oc-stats-sep{opacity:.5;color:#D4A538}
.oc-root-dark{background:linear-gradient(135deg,#0A0E1A,#0F2659);color:#F5E6C5;border:2px solid #D4A538;border-radius:18px;padding:22px 30px;text-align:center;min-width:260px;box-shadow:0 10px 36px rgba(10,14,26,.50),0 0 0 6px rgba(212,165,56,.08);position:relative}
.oc-root-dark::before{content:'DIRECTOR';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:#D4A538;color:#0A0E1A;font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;padding:3px 14px;border-radius:100px;font-weight:700}
.oc-root-dark-av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#D4A538,#F5E6C5);color:#0A0E1A;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;margin:6px auto 12px;border:2px solid rgba(245,230,197,.30);box-shadow:0 4px 12px rgba(212,165,56,.30)}
.oc-root-dark-name{font-size:19px;font-weight:900;color:#F5E6C5;letter-spacing:-.2px}
.oc-root-dark-role{font-family:'Cormorant Garamond',serif;font-size:13px;color:#D4A538;margin-top:6px;font-style:italic;letter-spacing:.4px}
.oc-root-dark-badge{display:inline-block;margin-top:12px;background:rgba(212,165,56,.10);color:#D4A538;font-family:'Bebas Neue',sans-serif;font-size:11px;font-weight:400;padding:5px 14px;border-radius:100px;border:1px solid rgba(212,165,56,.30);letter-spacing:1.5px}
.oc-city-v2{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;width:240px;flex-shrink:0;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;display:flex;flex-direction:column}
.oc-city-v2:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.14)}
.oc-city-v2-head{padding:14px 16px 12px;background:linear-gradient(180deg,rgba(0,0,0,.02),transparent)}
html.dark .oc-city-v2-head{background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}
.oc-city-v2-label{font-size:9px;color:var(--sub);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.oc-city-v2-name{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.4px;margin-bottom:8px}
.oc-city-v2-att{display:inline-flex;font-size:11px;font-weight:800;padding:3px 10px;border-radius:100px}
.oc-city-v2-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px}
.oc-city-v2-stat{padding:10px 12px;background:var(--bg2);border-radius:10px;text-align:center;border:1px solid var(--bdr)}
.oc-city-v2-stat-val{font-size:20px;font-weight:900;color:var(--text);line-height:1}
.oc-city-v2-stat-lbl{font-size:10px;color:var(--sub);margin-top:3px;font-weight:600}
.oc-city-v2-avs{display:flex;align-items:center;padding:14px 16px 10px;direction:ltr;justify-content:flex-start}
.oc-city-v2-btn{margin:4px 16px 16px;padding:9px 12px;border-radius:10px;border:0;font-size:12px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s}
.oc-city-v2-btn:hover{opacity:.88}
/* Team page (selected city) */
.oc-team-page{display:flex;flex-direction:column;gap:14px;padding:6px 0}
.oc-breadcrumb{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:var(--sub);padding:4px 4px}
.oc-breadcrumb-link{cursor:pointer;color:var(--blue);text-decoration:none}
.oc-breadcrumb-link:hover{text-decoration:underline}
.oc-breadcrumb-sep{opacity:.5}
.oc-breadcrumb-cur{color:var(--text)}
.oc-team-hdr{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.oc-team-hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.oc-team-hdr-icon{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.oc-team-hdr-label{font-size:9px;color:var(--sub);letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.oc-team-hdr-name{font-size:22px;font-weight:900;color:var(--text);letter-spacing:-.3px}
.oc-team-hdr-mgr{font-size:12px;color:var(--sub);margin-top:4px;font-weight:600}
.oc-team-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;border-top:1px solid var(--bdr);padding-top:14px}
.oc-team-stat{padding:8px;text-align:center}
.oc-team-stat-val{font-size:22px;font-weight:900;color:var(--text);line-height:1}
.oc-team-stat-lbl{font-size:10px;color:var(--sub);margin-top:3px;font-weight:700;letter-spacing:.5px}
.oc-spec-tabs{display:flex;gap:6px;flex-wrap:wrap}
.oc-spec-tab{padding:8px 14px;border-radius:10px;border:1px solid var(--bdr);background:var(--bg2);color:var(--text);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.oc-spec-tab:hover{border-color:var(--blue)}
.oc-spec-count{display:inline-flex;align-items:center;justify-content:center;background:rgba(0,0,0,.08);min-width:20px;height:18px;border-radius:9px;font-size:10px;padding:0 5px}
html.dark .oc-spec-count{background:rgba(255,255,255,.1)}
.oc-spec-tab.on .oc-spec-count{background:rgba(255,255,255,.25)}
.oc-team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.oc-team-card{background:var(--bg);border:1px solid var(--bdr);border-radius:14px;padding:18px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;transition:transform .2s,box-shadow .2s}
.oc-team-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.oc-team-av-wrap{position:relative}
.oc-team-av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900}
.oc-team-status-dot{position:absolute;bottom:0;right:-2px;width:18px;height:18px;border-radius:50%;border:3px solid var(--bg);box-shadow:0 0 0 1px rgba(0,0,0,.05)}
.oc-team-card-name{font-size:13px;font-weight:800;color:var(--text);line-height:1.3}
.oc-team-card-spec{font-size:11px;color:var(--sub);font-weight:600}
@media(max-width:600px){
  .oc-canvas{padding:12px}
  .oc-branch{gap:10px}
  .oc-city{width:calc(50% - 5px);min-width:140px}
  .oc-city-v2{width:calc(50% - 6px);min-width:160px}
  .oc-eng-grid{grid-template-columns:1fr}
  .oc-team-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:480px){.dash-2col{grid-template-columns:1fr}.att-cell{width:22px;height:22px;font-size:7.5px}.att-th-name,.att-td-name{min-width:96px}.att-td-sum,.att-th-sum{min-width:116px}.att-vac-period{flex-wrap:wrap}.att-vac-grid{grid-template-columns:1fr}}
/* ══════════════════════════════════════════════
   ATTENDANCE PAGE
══════════════════════════════════════════════ */
.att-page{display:flex;flex-direction:column;gap:14px}

/* Province tabs */
.att-tab{padding:7px 16px;border-radius:10px;cursor:pointer;font-size:11.5px;font-weight:700;border:1.5px solid var(--bdr2);transition:all .18s;color:var(--sub);background:var(--bg2);white-space:nowrap}
.att-tab:hover{border-color:var(--bdr3);color:var(--text)}
.att-tab.on{color:#fff!important;border-color:transparent!important}

/* Summary stat cards */
.att-sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.att-sum-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;padding:14px 16px;text-align:center}
.att-sum-val{font-size:26px;font-weight:900;line-height:1}
.att-sum-lbl{font-size:9.5px;color:var(--sub);font-weight:700;margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
html.light .att-sum-card{background:#fff;border-color:#e2e8f0}

/* Table wrapper */
.att-table-wrap{overflow-x:auto}
.att-table-wrap::-webkit-scrollbar{height:5px}
.att-table-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}
.att-table{border-collapse:separate;border-spacing:0;min-width:700px;width:100%;font-size:11px}

/* Header row */
.att-th{
  background:var(--bg2);padding:7px 3px;text-align:center;font-weight:800;
  color:var(--sub);font-size:9px;white-space:nowrap;border-bottom:2px solid var(--bdr2);
  position:sticky;top:0;z-index:2;
}
.att-th-name{
  text-align:right;padding:7px 14px;min-width:145px;
  position:sticky;right:0;z-index:3;background:var(--bg2);
  border-left:2px solid var(--bdr2);
}
html.light .att-th,.att-th-name{background:#f8fafc}

/* Body cells */
.att-td{padding:2px 2px;text-align:center;border-bottom:1px solid var(--bdr);vertical-align:middle}
.att-td-name{
  text-align:right;padding:8px 14px;font-size:12px;
  position:sticky;right:0;background:var(--bg);z-index:1;
  border-left:2px solid var(--bdr2);min-width:145px;
  border-bottom:1px solid var(--bdr);
}
html.light .att-td-name{background:#fff}
.att-td-eng{font-weight:700;color:var(--text);line-height:1.3}
.att-td-spec{font-size:9.5px;color:var(--sub);margin-top:2px}
.att-table tr:last-child .att-td,.att-table tr:last-child .att-td-name{border-bottom:none}
.att-table tr:hover .att-td{background:rgba(255,255,255,.015)}
html.light .att-table tr:hover .att-td{background:#fafbfc}

/* Status cells */
.att-cell{
  width:26px;height:26px;border-radius:5px;margin:1px auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;font-size:8.5px;font-weight:900;letter-spacing:.2px;
  transition:transform .12s;user-select:none;border:1.5px solid transparent;
}
.att-cell:hover{transform:scale(1.18);z-index:2;position:relative}
.att-cell-e{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:rgba(255,255,255,.12)}
html.light .att-cell-e{background:#f1f5f9;border-color:#e2e8f0;color:#cbd5e1}
.att-cell-P{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.45);color:#10B981}
.att-cell-A{background:rgba(239,68,68,.16);border-color:rgba(239,68,68,.4);color:#F87171}
.att-cell-AL{background:rgba(59,130,246,.16);border-color:rgba(59,130,246,.4);color:#60A5FA}
.att-cell-SL{background:rgba(245,158,11,.16);border-color:rgba(245,158,11,.4);color:#FCD34D}
.att-cell-EL{background:rgba(249,115,22,.16);border-color:rgba(249,115,22,.4);color:#FB923C}
.att-cell-EGL{background:rgba(234,88,12,.22);border-color:rgba(234,88,12,.5);color:#EA580C;font-weight:900}
.att-cell-TXR{background:rgba(245,158,11,.20);border-color:rgba(245,158,11,.5);color:#F59E0B;font-weight:900}
.att-cell-H{background:rgba(148,163,184,.1);border-color:rgba(148,163,184,.28);color:#94A3B8}
.att-cell-wknd{background:rgba(239,68,68,.05);border-color:rgba(239,68,68,.1);color:rgba(239,68,68,.3);cursor:default}

/* Summary column */
.att-td-sum{
  padding:6px 12px;border-bottom:1px solid var(--bdr);
  border-right:2px solid var(--bdr2);min-width:165px;vertical-align:middle;
  position:sticky;left:0;background:var(--bg);z-index:1;
}
html.light .att-td-sum{background:#fff;border-right-color:#e2e8f0}
.att-th-sum{
  text-align:right;padding:7px 12px;min-width:165px;font-size:9px;
  font-weight:800;color:var(--sub);border-bottom:2px solid var(--bdr2);
  border-right:2px solid var(--bdr2);
  position:sticky;left:0;top:0;z-index:4;background:var(--bg2);
}
html.light .att-th-sum{background:#f8fafc}
.att-stat-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;font-size:10.5px}
.att-stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.att-stat-val{font-weight:900;color:var(--text);min-width:16px;text-align:left}
.att-stat-lbl{color:var(--sub);font-size:9.5px}
.att-stat-div{border-top:1px solid var(--bdr);margin:4px 0;padding-top:4px}

/* Time display under present cell */
.att-time{font-size:7px;color:var(--sub);line-height:1;margin-top:1px;text-align:center;white-space:nowrap}

/* Legend */
.att-legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.att-leg-item{display:flex;align-items:center;gap:5px;font-size:10.5px}
.att-leg-box{width:18px;height:18px;border-radius:4px;border:1.5px solid;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;flex-shrink:0}

/* Time modal */
.att-time-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bdr)}
.att-time-row:last-child{border-bottom:none}
.att-time-day{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.att-time-inp{padding:5px 8px;border:1.5px solid var(--bdr2);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:12.5px;width:96px}
.att-time-inp:focus{outline:none;border-color:rgba(96,165,250,.5)}
/* -- Quick Status Buttons -- */
.att-qbtns{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.att-qbtn{padding:2px 8px;border-radius:5px;border:1.5px solid;font-size:9px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .15s;background:transparent;white-space:nowrap;line-height:1.5}
.att-qbtn-P{border-color:rgba(16,185,129,.35);color:#10B981}
.att-qbtn-P:hover,.att-qbtn-P.on{background:#10B981;color:#fff;border-color:#10B981}
.att-qbtn-A{border-color:rgba(239,68,68,.35);color:#EF4444}
.att-qbtn-A:hover,.att-qbtn-A.on{background:#EF4444;color:#fff;border-color:#EF4444}
.att-qbtn-AL{border-color:rgba(59,130,246,.35);color:#60A5FA}
.att-qbtn-AL:hover,.att-qbtn-AL.on{background:#3B82F6;color:#fff;border-color:#3B82F6}
/* SL (sick leave) — orange/yellow tone matching ATT_BG.SL */
.att-qbtn-SL{border-color:rgba(249,115,22,.35);color:#FB923C}
.att-qbtn-SL:hover,.att-qbtn-SL.on{background:#F97316;color:#fff;border-color:#F97316}
/* -- Bulk Actions Bar -- */
.att-bulk-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;flex-wrap:wrap;margin-bottom:8px}
.att-bulk-count{font-size:11px;color:var(--sub);font-weight:700;flex-shrink:0}
.att-bulk-count em{font-style:normal;color:var(--blue);font-size:13px;font-weight:900}
.att-bulk-sep{width:1px;height:16px;background:var(--bdr2);flex-shrink:0}
/* -- Keyboard tooltip -- */
.att-kb-tip{font-size:8px;color:var(--sub);margin-top:0;opacity:0;transition:opacity .2s;white-space:nowrap;pointer-events:none}
.att-table tr:hover .att-kb-tip{opacity:.8}
/* -- Row checkbox -- */
.att-chk{width:14px;height:14px;cursor:pointer;accent-color:var(--blue);flex-shrink:0;margin-top:2px}
.att-td-name-inner{display:flex;align-items:flex-start;gap:6px;width:100%}
.att-td-name-body{flex:1;min-width:0}
/* -- Leave Request System -- */
.leave-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:all .2s}
.leave-card:hover{border-color:var(--bdr3)}
.leave-status{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:800;border:1px solid}
.leave-status-pending{background:rgba(239,159,39,.12);color:#EF9F27;border-color:rgba(239,159,39,.3)}
.leave-status-approved{background:rgba(29,158,117,.12);color:#1D9E75;border-color:rgba(29,158,117,.3)}
.leave-status-traveling{background:rgba(59,130,246,.14);color:#60A5FA;border-color:rgba(59,130,246,.35)}
.leave-status-ended{background:rgba(148,163,184,.12);color:#94A3B8;border-color:rgba(148,163,184,.3)}
.leave-status-rejected{background:rgba(226,75,74,.1);color:#E24B4A;border-color:rgba(226,75,74,.3)}
.leave-elig-bar{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin:6px 0}
.leave-elig-fill{height:100%;border-radius:3px;transition:width .4s ease}
.leave-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:14px}
.leave-tab{flex:1;padding:7px 4px;text-align:center;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;color:var(--sub);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:4px}
.leave-tab.on{background:var(--bg3);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.leave-info-box{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;margin:8px 0}
.att-hours{font-size:11px;font-weight:800;color:#FCD34D;margin-right:auto;white-space:nowrap}

/* Weekly/monthly day header colors */
.att-th-wknd{color:#94A3B8!important}
.att-th-today{color:#60A5FA!important;background:rgba(96,165,250,.06)!important}

/* Attendance log view */
.att-log-list{display:flex;flex-direction:column;gap:12px}
.att-log-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:14px;overflow:hidden;transition:border-color .2s}
html.light .att-log-card{background:#fff;border-color:#e2e8f0}
.att-log-card:hover{border-color:rgba(96,165,250,.35)}
.att-log-hdr{display:flex;align-items:center;gap:14px;padding:14px 18px 12px;border-bottom:1px solid var(--bdr2)}
.att-log-month{font-size:18px;font-weight:900;color:var(--text);min-width:110px}
.att-log-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.att-log-chip{padding:4px 11px;border-radius:20px;font-size:10px;font-weight:800;border:1.5px solid;white-space:nowrap}
.att-log-actions{display:flex;gap:6px;flex-shrink:0}
.att-log-body{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:0}
.att-log-prov{padding:12px 16px;border-left:1px solid var(--bdr)}
.att-log-prov:last-child{border-left:none}
html.light .att-log-prov{border-left-color:#f1f5f9}
.att-log-prov-name{font-size:10px;font-weight:800;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.att-log-stat{display:flex;align-items:center;gap:5px;font-size:11px;margin-bottom:4px}
.att-log-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.att-log-stat-val{font-weight:900;color:var(--text);min-width:22px}
.att-log-stat-lbl{color:var(--sub);font-size:10px}
.att-log-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:6px;overflow:hidden}
html.light .att-log-bar{background:#f1f5f9}
.att-log-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#10B981,#059669)}
/* View toggle */
.att-view-toggle{display:flex;gap:0;border:1px solid var(--bdr2);border-radius:10px;overflow:hidden;flex-shrink:0}
.att-view-btn{padding:7px 14px;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;color:var(--sub);background:transparent;border:none;font-family:inherit}
.att-view-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.att-view-btn.on{background:rgba(96,165,250,.15);color:#60A5FA}

/* Vacation balance card */
.att-vac-card{padding:16px 18px}
.att-vac-period{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--bdr2)}
.att-vac-period-badge{padding:4px 12px;border-radius:20px;font-size:10px;font-weight:800;background:rgba(96,165,250,.12);color:#60A5FA;border:1px solid rgba(96,165,250,.25)}
.att-vac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.att-vac-row{background:var(--bg);border:1px solid var(--bdr2);border-radius:10px;padding:10px 12px}
html.light .att-vac-row{background:#f8fafc}
.att-vac-name{font-size:11.5px;font-weight:800;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-vac-spec{font-size:9.5px;color:var(--sub);margin-bottom:8px}
.att-vac-bar-wrap{height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:6px}
html.light .att-vac-bar-wrap{background:#e2e8f0}
.att-vac-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.att-vac-nums{display:flex;justify-content:space-between;font-size:9.5px;font-weight:700}
.att-vac-exceeded{font-size:9px;font-weight:800;color:#EF4444;margin-top:3px}

/* ── Scrollbar global ── */
*{scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

@media(max-width:768px){.mstrip{-webkit-overflow-scrolling:touch}.att-table-wrap{-webkit-overflow-scrolling:touch}
  .sidebar{position:fixed;top:0;right:0;bottom:0;z-index:60;transform:translateX(100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow3)}
  .mob-overlay.show{display:block}
  .menu-btn{display:inline-flex}
  .main{padding-bottom:68px}
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-right .btn span{display:none}
  .topbar-right .btn{padding:7px 9px}
  .search-wrap input{width:130px}
  .search-wrap input:focus{width:160px}
  .bottom-nav{display:block}
  .content{padding:12px}
  .g2{grid-template-columns:1fr}
  /* ── Card / table tweaks ── */
  .card{border-radius:12px}
  .card-hdr{padding:10px 14px}
  .topbar{padding:8px 14px;gap:8px}
  .mstrip{padding:6px 14px}
}
@media(max-width:480px){
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sc-val{font-size:20px}
  .page-sub{display:none}
  .sep{display:none}
}
@media(max-width:860px) and (min-width:769px){.sg{grid-template-columns:repeat(2,1fr)}}
@media(min-width:769px){.sc-val{font-size:26px}}
@keyframes loginIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.login-box{animation:loginIn .45s cubic-bezier(.34,1.4,.64,1)}
@keyframes badgePulse{0%,100%{box-shadow:0 2px 6px rgba(239,68,68,.4)}50%{box-shadow:0 2px 12px rgba(239,68,68,.7),0 0 0 3px rgba(239,68,68,.15)}}
.nav-badge{animation:badgePulse 2.5s ease-in-out infinite}
.leave-card-pending{border-right:3px solid #FCD34D!important;background:linear-gradient(90deg,rgba(252,211,77,.04),transparent 60%)!important}
.leave-card-approved{border-right:3px solid #34D399!important;background:linear-gradient(90deg,rgba(52,211,153,.04),transparent 60%)!important}
.leave-card-rejected{border-right:3px solid #F87171!important;background:linear-gradient(90deg,rgba(248,113,113,.04),transparent 60%)!important}
.eng-status{display:inline-flex;align-items:center;padding:2px 7px;border-radius:100px;font-size:9px;font-weight:800;margin-right:6px;vertical-align:middle}
.eng-status-active{background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.3)}
.eng-status-on_leave{background:rgba(96,165,250,.15);color:#60A5FA;border:1px solid rgba(96,165,250,.3)}
.eng-status-ended{background:rgba(156,163,175,.12);color:#9CA3AF;border:1px solid rgba(156,163,175,.3)}
.leave-action-box{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px;padding:10px 12px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.leave-history-item{padding:8px 10px;border-radius:8px;background:var(--bg3);border:1px solid var(--bdr2);font-size:11px}
.leave-report-table{width:100%;border-collapse:collapse;font-size:12px}
.leave-report-table th{background:var(--bg3);padding:8px 10px;text-align:right;font-weight:700;font-size:11px;color:var(--sub);border-bottom:1px solid var(--bdr2)}
.leave-report-table td{padding:7px 10px;border-bottom:1px solid var(--bdr2)}
.leave-report-table tr:last-child td{border-bottom:none}
.ticket-booked{color:#1D9E75;font-weight:700}
.ticket-postponed{color:#EF9F27;font-weight:700}
.ticket-cancelled{color:#E24B4A;font-weight:700}
.ticket-notBooked{color:#9CA3AF;font-weight:600}
.att-cell{border-radius:6px!important;font-weight:800}
.bn-item.on::before{content:'';display:block;width:20px;height:3px;border-radius:2px;background:var(--blue);margin:-4px auto 3px;box-shadow:0 0 8px var(--blue)}
/* (override removed — colors now driven by per-item --c1/--c2 in main .nav-item rules) */
@keyframes pageIn{from{opacity:.7}to{opacity:1}}
.content>*{animation:pageIn .2s ease}
.month-cur-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:100px;font-size:12px;font-weight:700;cursor:default;border:1px solid rgba(96,165,250,.35);background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(99,102,241,.12));color:var(--fg);white-space:nowrap;flex-shrink:0}
.warn-banner{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#D97706;font-size:12px;font-weight:600;margin-bottom:8px}
/* ── Unified header (logo + name + clock + 4 badges) ── */
.unified-header{position:relative;overflow:hidden;background:#0a0e1a;border:1px solid #1e293b;border-radius:16px;padding:24px 28px;margin-bottom:14px;display:flex;flex-direction:column;flex-shrink:0}
.unified-header-glow{position:absolute;top:-80px;left:-80px;width:250px;height:250px;background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);pointer-events:none}
.uh-row{position:relative;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.uh-row-top{padding-bottom:14px}
.uh-row-badges{padding-top:14px;border-top:1px solid #1e293b;gap:10px}
.uh-brand{display:flex;align-items:center;gap:16px;min-width:0;flex:1}
.uh-logo-box{flex-shrink:0;width:78px;height:78px;border-radius:16px;background:#fff;padding:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.uh-logo-img{width:100%;height:100%;object-fit:contain;display:block}
.uh-logo-fallback{font-size:36px}
.uh-brand-text{min-width:0}
.uh-brand-title{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.5px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
.uh-brand-sub{font-size:13px;color:#94a3b8;font-weight:600;margin-top:6px}
.uh-clock{flex-shrink:0;min-width:120px;padding:10px 18px;background:linear-gradient(135deg,rgba(6,182,212,.15) 0%,rgba(6,182,212,.05) 100%);border:1px solid rgba(6,182,212,.3);border-radius:12px;text-align:center}
.uh-clock-time{font-size:26px;font-weight:800;font-family:'Cairo',monospace,'Segoe UI Mono',monospace;color:#fff;line-height:1;letter-spacing:1.5px}
.uh-clock-date{font-size:11px;color:#67e8f9;margin-top:4px;font-weight:700}
.uh-badge{flex:1;min-width:0;padding:12px 16px;border-radius:12px;display:flex;align-items:center;gap:10px}
.uh-badge-icon{font-size:20px;flex-shrink:0;line-height:1}
.uh-badge-text{font-size:14px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.uh-badge-indigo{background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(99,102,241,.05));border:1px solid rgba(99,102,241,.3)}
.uh-badge-emerald{background:linear-gradient(135deg,rgba(16,185,129,.15),rgba(16,185,129,.05));border:1px solid rgba(16,185,129,.3)}
.uh-badge-amber{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.05));border:1px solid rgba(245,158,11,.3)}
.uh-badge-pink{background:linear-gradient(135deg,rgba(236,72,153,.15),rgba(236,72,153,.05));border:1px solid rgba(236,72,153,.3)}

/* ── Single page title row (replaces topbar duplicate) ── */
.page-title-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 4px 14px;flex-wrap:wrap}
.page-title-main{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.page-title-icon{font-size:22px;line-height:1;filter:drop-shadow(0 2px 6px rgba(99,102,241,.4))}
.page-title-text{font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.page-title-month-select{padding:7px 14px;background:rgba(255,255,255,.05);color:var(--text);border:1px solid rgba(139,92,246,.3);border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;outline:none;font-family:inherit;backdrop-filter:blur(10px)}
.page-title-month-select:hover{border-color:rgba(139,92,246,.6);background:rgba(139,92,246,.10)}
html.light .page-title-month-select{background:#fff;border-color:#C7D2FE;color:#1e293b}

@media(max-width:768px){
  .unified-header{padding:18px 18px}
  .uh-logo-box{width:60px;height:60px;padding:6px}
  .uh-brand-title{font-size:18px;white-space:normal}

.page-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;margin-bottom:14px;background:linear-gradient(135deg,rgba(99,102,241,.16) 0%,rgba(139,92,246,.10) 50%,rgba(34,211,238,.06) 100%);border:1px solid rgba(139,92,246,.25);border-radius:18px;backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);box-shadow:0 8px 28px rgba(99,102,241,.16),inset 0 1px 0 rgba(255,255,255,.05);position:relative;overflow:hidden}

.page-header>*{position:relative}
.page-header-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.page-header-icon{font-size:26px;line-height:1;filter:drop-shadow(0 4px 8px rgba(139,92,246,.4))}
.page-header-title{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.4px}
.page-header-month{font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:5px 14px;border-radius:100px;border:1px solid rgba(255,255,255,.15);box-shadow:0 4px 14px rgba(99,102,241,.4)}

.page-header-select:hover{border-color:rgba(139,92,246,.6);background:rgba(139,92,246,.10)}
.page-header-select:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.2)}
html.light .page-header{background:linear-gradient(135deg,#EEF2FF,#F5F3FF,#ECFEFF);border-color:#C7D2FE}
html.light .page-header-month{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
html.light .page-header-select{background:#fff;border-color:#C7D2FE;color:#1e293b}
.att-popup{position:fixed;background:var(--bg2);border:1px solid var(--bdr2);border-radius:10px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.45);z-index:9999;display:flex;flex-direction:column;gap:3px;min-width:130px}
.att-popup-hdr{padding:3px 8px 5px;font-size:10px;color:var(--sub);font-weight:700;border-bottom:1px solid var(--bdr);margin-bottom:2px}
.att-popup-btn{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:inherit;text-align:right;transition:opacity .15s;width:100%}
.att-popup-btn:hover{filter:brightness(1.15)}
.att-popup-clr{margin-top:2px;background:rgba(239,68,68,.1)!important;color:#F87171!important;border:1px solid rgba(239,68,68,.25)!important}
.att-cell-EG{background:rgba(59,130,246,.18)!important;color:#60A5FA!important;opacity:.7}
.extra-badge{
  display:inline-flex;align-items:center;gap:4px;
  margin-right:6px;padding:2px 8px;border-radius:100px;
  background:linear-gradient(135deg,rgba(252,211,77,.15),rgba(251,146,60,.12));
  border:1px solid rgba(252,211,77,.4);

}
.incoming-badge{
  display:inline-flex;align-items:center;gap:4px;
  margin-right:6px;padding:2px 8px;border-radius:100px;
  background:linear-gradient(135deg,rgba(52,211,153,.15),rgba(34,197,94,.12));
  border:1px solid rgba(52,211,153,.4);
  color:#34D399;font-size:9.5px;font-weight:800;

  vertical-align:middle;

}
.d1-bonus{

/* ─────────────────────────────────────────
   PRINT STYLES (Light/Professional)
   When user prints the main app pages directly (Ctrl+P),
   force a clean light theme: hide chrome, white background,
   navy headers, professional table styling.
   ───────────────────────────────────────── */
@media print{
  @page{size:A4;margin:14mm 10mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  html,body{background:#fff!important;color:#0f172a!important}
  /* Hide app chrome */
  .sidebar,.shell-sidebar,.mstrip,.topbar,.mobile-nav,.notif-wrap,.notif-dropdown,
  .menu-btn,.btn,.btn-icon,.day-inp[disabled],.search-wrap,.warn-banner,
  .pay-strip,.rate-banner,.toast,.modal-overlay,.overlay,
  .print-hide,.no-print{display:none!important}
  /* Page layout for print */
  .shell{display:block!important;background:#fff!important}
  .main{margin:0!important;padding:0!important;background:#fff!important;display:block!important}
  .content{padding:0!important;background:#fff!important;max-width:none!important}
  /* Light backgrounds for everything */
  .card,.kpi,.prov-hdr,.tbl-wrap,.page-header,
  .oc-canvas,.oc-page-hdr,.oc-root-dark,.oc-city,.oc-city-v2,
  .oc-team-hdr,.oc-team-card,.oc-eng-card,
  .att-sum-card,.att-cell{
    background:#fff!important;color:#0f172a!important;
    border-color:#cbd5e1!important;box-shadow:none!important
  }
  /* Force readable tables */
  table.tbl,.tbl,table{background:#fff!important;color:#0f172a!important}
  .tbl th,th{background:#1A365D!important;color:#fff!important;
    border-bottom:2px solid #1A365D!important;font-weight:800!important}
  .tbl td,td{background:transparent!important;color:#0f172a!important;
    border-bottom:1px solid #e2e8f0!important}
  .tbl tr:nth-child(even) td{background:#f8fafc!important}
  /* Headings: navy color */
  h1,h2,h3,h4,h5,.page-title,.page-name,.page-header-title,
  .oc-page-title,.oc-team-hdr-name,.oc-city-v2-name,
  .card-title,.kpi-val,.prov-name{color:#1A365D!important}
  /* Subtle text */
  .page-sub,.kpi-sub,.kpi-lbl,.card-sub,.oc-page-sub,
  .oc-team-hdr-mgr,.oc-team-stat-lbl,.oc-team-card-spec,
  .oc-city-v2-stat-lbl,.oc-breadcrumb-cur,.oc-breadcrumb-link{color:#64748b!important}
  /* Org chart polish for print */
  .oc-page-hdr{border:2px solid #1A365D!important;color:#1A365D!important;
    background:#fff!important;page-break-inside:avoid}

   - d2 صرف happens on day 14 (must be present that day to receive d2)
   Logic:
   - Arrival on day 1: d1=15, d2=15 (full month)
   - Arrival day 2-14: d1=0 (missed صرف), d2=15 (present at day 14), extra = days from arrival to day 15

      options:{animation:false,responsive:true,maintainAspectRatio:false,cutout:"70%",plugins:{legend:{display:true,position:"bottom",rtl:true,labels:{color:"#64708E",font:{size:11},boxWidth:12,padding:10}},tooltip:{rtl:true,backgroundColor:"#111520",titleColor:"#E2E6F0",bodyColor:"#64708E",borderColor:"#1C2130",borderWidth:1,callbacks:{label:c=>`${c.label}: ${Number(c.raw).toFixed(1)} $`}}}}
    });
    return()=>{if(ch.current){ch.current.destroy();ch.current=null;}};
  },[sig]);
  return h("div",{className:"chart-wrap",style:{height}},h("canvas",{ref}));
}

const OC_PALETTE={
  derna:   {cc:'#3b82f6',avBg:'#dbeafe',avColor:'#1e40af'},
  bayda:   {cc:'#8b5cf6',avBg:'#ede9fe',avColor:'#5b21b6'},

};
function ocInitials(name){
  return (name||'?').trim().split(' ').filter(Boolean).slice(0,2).map(function(w){return w[0];}).join('');
}
function ocEngStatus(engId,att){
  const days=Object.values((att||{})[engId]||{});
  const present=days.filter(function(d){return d.s==='P';}).length;
  const onLeave=days.filter(function(d){return d.s==='AL'||d.s==='SL'||d.s==='EL';}).length;
  if(present>=15)return{l:'نشط',cls:'oc-sa'};
  if(present>0)return{l:'جزئي',cls:'oc-sl'};
  if(onLeave>0)return{l:'إجازة',cls:'oc-sl'};
  return{l:'غائب',cls:'oc-sab'};
}
/* Hash-based avatar color picker for variety */
const OC_AV_PALETTE=[
  {bg:'#DBEAFE',color:'#1E40AF'},
  {bg:'#FCE7F3',color:'#9D174D'},
  {bg:'#DCFCE7',color:'#166534'},
  {bg:'#FEF3C7',color:'#92400E'},
  {bg:'#EDE9FE',color:'#5B21B6'},
  {bg:'#FEE2E2',color:'#991B1B'},
  {bg:'#CFFAFE',color:'#155E75'},
  {bg:'#FFE4E6',color:'#9F1239'},
  {bg:'#E0E7FF',color:'#3730A3'},
];
function ocAvColor(name){
  let hash=0;for(const c of(name||''))hash=((hash<<5)-hash+c.charCodeAt(0))|0;
  return OC_AV_PALETTE[Math.abs(hash)%OC_AV_PALETTE.length];
}
function ocAttPct(engId,att,month,year){
  if(!att||!month||!year)return 0;
  const ea=att[engId]||{};
  const dim=new Date(year,month,0).getDate();
  let work=0,present=0;
  for(let d=1;d<=dim;d++){
    if(new Date(year,month-1,d).getDay()===5)continue;
    work++;
    if(ea[d]?.s==='P')present++;
  }
  return work>0?Math.round(present/work*100):0;
}

  /* ── Save queue (debounced) ─────────────────────────
     queueSave: مع debounce 250ms (للحضور والكتابة السريعة).
     flushSaves: تنفّذ كل المعلّق فورًا (للأكشنز المنفصلة كإضافة/حذف عهدة).
     beforeunload: تحذّر المستخدم لو فيه بيانات لم تُحفظ بعد + تحاول حفظ
                   سريع عبر fetch keepalive (يصمد أثناء غلق الصفحة).
     ── force flag ──
     لما المستخدم يضغط "حذف"/"حفظ" بشكل مقصود (flushSaves) — السيرفر
     يسمح بمسح بيانات (force:true). الكتابة الـ debounced (queueSave)
     لا تستخدم force عشان الـ destructive write guard يحمى من stale tabs. */
  const _runSaves=useCallback(async(q,forceFlag=false)=>{
    for(const[k,v]of Object.entries(q)){
      if(v===null){
        await fetch(`/api/months/${k}`,{method:"DELETE"}).catch(()=>{});
      }else{
        try{
          const body=forceFlag?{...v,force:true}:v;
          const r=await fetch(`/api/months/${k}`,{
            method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
          });
          if(r.status===409){
            const err=await r.json().catch(()=>({}));
            const list=(err.conflicts||[]).join(' • ');
            alert(`⚠️ تم رفض الحفظ لمنع فقدان بيانات:\n\n${list}\n\nسيتم إعادة تحميل البيانات من الخادم.`);
            try{
              const fresh=await fetch('/api/months',{credentials:'include'});
              if(fresh.ok){const fd=await fresh.json();if(fd.months)setMonths(fd.months);}
            }catch(e){}
          }
        }catch(e){}
      }
    }
  },[]);

  const flushSaves=useCallback(async()=>{
    if(timerRef.current){clearTimeout(timerRef.current);timerRef.current=null;}
    const q={...pendingRef.current};pendingRef.current={};
    if(!Object.keys(q).length){setAutoSaving(false);return;}
    setAutoSaving(true);
    // الأكشنز المنفصلة (إضافة/حذف/تعديل/نقل) — bypass للـ guard لأنها
    // نية واضحة من المستخدم، مش stale-state من تاب قديم.
    await _runSaves(q,true);
    setAutoSaving(false);
  },[_runSaves]);

  const queueSave=useCallback((key,val)=>{

    setAutoSaving(true);
    clearTimeout(timerRef.current);
    /* 250ms (down from 800ms) — أسرع التزام للسيرفر يقلّل نافذة الفقد
       لو المستخدم عمل refresh بعد كتابة سريعة. لا force — guard فعّال. */
    timerRef.current=setTimeout(async()=>{
      const q={...pendingRef.current};pendingRef.current={};
      await _runSaves(q,false);
      setAutoSaving(false);
    },250);
  },[_runSaves]);

  /* ── Pending-save guard: warn on refresh/close + try keepalive flush ── */
  useEffect(()=>{
    const onUnload=(e)=>{
      const q=pendingRef.current;
      const keys=Object.keys(q);
      if(!keys.length)return;
      // Best-effort persist via keepalive (works even after page is unloading)
      keys.forEach(k=>{
        const v=q[k];
        try{
          if(v===null){
            fetch(`/api/months/${k}`,{method:'DELETE',keepalive:true,credentials:'include'});
          }else{
            const body=JSON.stringify(v);
            // keepalive has 64KB body limit; skip if too big (user already warned via dialog)
            if(body.length<60000){
              fetch(`/api/months/${k}`,{
                method:'PUT',headers:{'Content-Type':'application/json'},
                body,keepalive:true,credentials:'include'
              });
            }
          }
        }catch(_){}
      });
      // Browser-native warning dialog
      e.preventDefault();
      e.returnValue='هناك بيانات لم تُحفظ بعد. هل تريد فعلاً المغادرة؟';
      return e.returnValue;
    };
    window.addEventListener('beforeunload',onUnload);
    return()=>window.removeEventListener('beforeunload',onUnload);
  },[]);

  /* ── Computed ─────────────────────────────────────── */
  const am=useMemo(()=>months[ak]||null,[months,ak]);
  /* dataRaw: full month data including egypt-transferred engineers (used by PDFs / undo / activity log) */
  const dataRaw=useMemo(()=>am?.data||dc(BASE),[am]);
  /* data: filtered view — engineers transferred to Egypt are HIDDEN from active UI everywhere */
  const data=useMemo(()=>{

  /* Previous month key — used to look up "incoming" extra days (carried over from late arrivals) */
  const prevAk=useMemo(()=>{
    const[yStr,mStr]=ak.split('-');
    const y=+yStr,m=+mStr;

     This stub is kept so legacy callers don't throw — they all get 0. */
  const getIncomingExtra=useCallback(()=>0,[]);
  /* Paid-status helpers: backwards compat with old `paid` field */
  const isP1=e=>e?.paid1!==undefined?!!e.paid1:!!e?.paid;

  /* ── Engineer transfer helpers ────────────────────────
     Each engineer has optional `transfers: [{from,to,date,by,at}]`.
     Engineer's CURRENT prov is `eng.prov` (or where they sit in data[]).
     The transfers array is the immutable history of moves.
  ─────────────────────────────────────────────────────── */
  const getTransfers=e=>(Array.isArray(e?.transfers)?e.transfers:[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  /* Returns the prov the engineer was in on a specific date (YYYY-MM-DD) */
  const engProvAtDate=(eng,dateStr,currentProv)=>{
    const ts=getTransfers(eng);

  /* ── Month status, notifications, task tracking ─────── */
  const monthStatus=useMemo(()=>{
    const pm=now.getMonth()===0?12:now.getMonth(),py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const prevKey=mkKey(pm,py);
    const prevAtt=months[prevKey]?.attendance||{};
    const attCount=Object.values(prevAtt).reduce((a,d)=>a+Object.values(d).filter(v=>v?.s==='P').length,0);
    const attSt=attCount>5?'done':attCount>0?'progress':'none';
    const curData=months[expectedAk]?.data||{};
    const d1Sum=PROVS.reduce((a,p)=>a+(curData[p]||[]).reduce((b,e)=>b+(+e.d1||0),0),0);
    const d2Sum=PROVS.reduce((a,p)=>a+(curData[p]||[]).reduce((b,e)=>b+(+e.d2||0),0),0);
    const engs=PROVS.reduce((a,p)=>a+(curData[p]||[]).length,0);
    const threshold=engs*7;
    const d1St=engs>0?(d1Sum>=threshold?'done':d1Sum>0?'progress':'none'):'none';
    const d2St=engs>0?(d2Sum>=threshold?'done':d2Sum>0?'progress':'none'):'none';
    return{
      att:{st:attSt,label:'حضور '+MONTHS[pm-1]+' '+py},
      d1:{st:d1St,label:'إعاشة النصف الأول'},
      d2:{st:d2St,label:'إعاشة النصف الثاني'},
    };
  },[months,expectedAk,prevMonthKey]);

  const provTaskStatus=useMemo(()=>{
    const pm=now.getMonth()===0?12:now.getMonth(),py=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();
    const prevKey=mkKey(pm,py);
    return PROVS.map((prov,pi)=>{
      const lastLog=[...saveLogs].reverse().find(l=>l.province===prov&&l.key===prevKey);

      const prevAtt=months[prevKey]?.attendance||{};
      const attDone=prevData.some(e=>Object.values(prevAtt[e.id]||{}).some(d=>d?.s==='P'));
      const curData=months[expectedAk]?.data?.[prov]||[];
      return{prov,color:PCOLS[pi],lastLog,attDone,d1Done:curData.some(e=>+e.d1>0),d2Done:curData.some(e=>+e.d2>0)};

  const dashNotifs=useMemo(()=>{
    const d=now.getDate(),m=now.getMonth()+1,y=now.getFullYear();
    const pm=m===1?12:m-1,py=m===1?y-1:y;

    if(isProvince){
      const ps=provTaskStatus.find(s=>s.prov===userProv);
      if(ps){
        if(!ps.attDone)notes.push({id:'att',lvl:'red',msg:`⚠️ لم يتم تسجيل حضور ${MONTHS[pm-1]} ${py} لمحافظتك`});
        if(!ps.d1Done)notes.push({id:'d1',lvl:'yellow',msg:`📋 أدخل إعاشة النصف الأول لـ${mn} ${cfg.year}`});
        if(d>=14&&!ps.d2Done)notes.push({id:'d2',lvl:'yellow',msg:`📋 أدخل إعاشة النصف الثاني لـ${mn} ${cfg.year}`});
      }
      return notes;
    }
    if(monthStatus.att.st==='none')notes.push({id:'att',lvl:'yellow',msg:`لم يتم تسجيل حضور ${MONTHS[pm-1]} ${py} حتى الآن`});
    if(d>=14&&monthStatus.d2.st==='none')notes.push({id:'d2',lvl:'yellow',msg:`لم يتم إعاشة النصف الثاني لـ${mn} ${cfg.year} بعد`});
    if(d>=29){const nm=m===12?1:m+1,ny=m===12?y+1:y;if(monthStatus.d1.st==='none')notes.push({id:'d1',lvl:'yellow',msg:`لم يتم إعاشة النصف الأول لـ${MONTHS[nm-1]} ${ny} بعد`});}
    if(dueRentsToday.length>0)dueRentsToday.forEach(r=>notes.push({id:'rent-'+r.id,lvl:'yellow',msg:`⚠️ إيجار مستحق اليوم: ${r.desc} (${(+r.lyd).toLocaleString('ar-EG')} د.ل)`}));
    if(aggBalance.critical)notes.push({id:'bal-crit',lvl:'red',msg:`⚠️ الاستهلاك تجاوز 80% (${aggBalance.pct}% مستخدم)`});
    else if(aggBalance.low)notes.push({id:'bal-low',lvl:'yellow',msg:`⚠️ الاستهلاك ${aggBalance.pct}% — راقب المصروفات`});
    return notes;
  },[isAdmin,isProvince,userProv,monthStatus,provTaskStatus,mn,cfg.year,dueRentsToday,aggBalance]);

  /* ── Unified notifications (bell dropdown) ───────────── */
  const allNotifications=useMemo(()=>{
    const items=[];
    const today=new Date();today.setHours(0,0,0,0);
    // Leaves & returns — visible to all roles (already filtered by province in pendingLeaves/returnAlerts)
    if(pendingLeaves>0){
      items.push({id:'lv-pending',icon:'✈️',lvl:'yellow',title:`${pendingLeaves} طلب إجازة بانتظار الموافقة`,subtitle:'صفحة طلبات إجازة مصر',action:()=>setPage('leaves')});
    }
    returnAlerts.forEach(l=>{
      const days=Math.ceil((new Date(l.returnDate+'T12:00')-today)/86400000);
      items.push({id:'ret-'+l.id,icon:'🏠',lvl:days<=1?'red':'yellow',title:`عودة ${l.engineerName} ${days<=0?'اليوم':'خلال '+days+' يوم'}`,subtitle:l.prov,action:()=>setPage('leaves')});
    });
    // Rents & balance — admin-level concerns only
    if(!isProvince){
      monthRents.forEach(r=>{
        if(r.paid)return;
        const due=new Date(r.dueDate+'T12:00');due.setHours(0,0,0,0);
        const dd=Math.ceil((due-today)/86400000);
        if(dd===0)items.push({id:'rent-due-'+r.id,icon:'📅',lvl:'yellow',title:`إيجار مستحق اليوم: ${r.desc}`,subtitle:(+r.lyd).toLocaleString('ar-EG')+' د.ل',action:()=>setPage('expenses')});
        else if(dd<0)items.push({id:'rent-overdue-'+r.id,icon:'⚠️',lvl:'red',title:`إيجار متأخر: ${r.desc}`,subtitle:r.dueDate+' · '+(+r.lyd).toLocaleString('ar-EG')+' د.ل',action:()=>setPage('expenses')});
        else if(dd<=3)items.push({id:'rent-soon-'+r.id,icon:'📅',lvl:'yellow',title:`إيجار قريب: ${r.desc} (خلال ${dd} يوم)`,subtitle:(+r.lyd).toLocaleString('ar-EG')+' د.ل',action:()=>setPage('expenses')});
      });
      if(aggBalance.critical)items.push({id:'bal-c',icon:'⚠️',lvl:'red',title:'استهلاك مرتفع جداً',subtitle:`${aggBalance.pct}% مستخدم`,action:()=>setPage('expenses')});
      else if(aggBalance.low)items.push({id:'bal-l',icon:'⚠️',lvl:'yellow',title:'الاستهلاك مرتفع',subtitle:`${aggBalance.pct}% مستخدم`,action:()=>setPage('expenses')});
    }
    // Sort: red first, then yellow
    return items.sort((a,b)=>(a.lvl==='red'?-1:1)-(b.lvl==='red'?-1:1));
  },[pendingLeaves,returnAlerts,monthRents,aggBalance,isProvince]);

  /* ── Close notifications dropdown on outside click ── */
  useEffect(()=>{
    if(!notifsOpen)return;
    const close=(ev)=>{if(!ev.target.closest('.notif-wrap'))setNotifsOpen(false);};
    document.addEventListener('click',close);
    return()=>document.removeEventListener('click',close);
  },[notifsOpen]);

  useEffect(()=>{

    const close=(ev)=>{if(!ev.target.closest('.qa-wrap')&&!ev.target.closest('.qa-dropdown'))setQaOpen(false);};
    document.addEventListener('click',close);
