<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>إدارة مشروعات ليبيا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#07090F;--navy2:#0A0D18;
  --blue:#60A5FA;--blue2:#0A1A30;--blue3:#163660;
  --green:#34D399;--green2:#031208;--green3:#06281A;
  --red:#F87171;--red2:#1A0505;
  --gold:#FCD34D;--gold2:#150E00;
  --purple:#A78BFA;--purple2:#0D0818;
  --cyan:#22D3EE;--cyan2:#041820;
  --gray:#3D4A62;--gray2:#0D1017;--gray3:#090C12;
  --bdr:#151B2E;--bdr2:#1E2640;
  --text:#E8ECF5;--sub:#566078;
  --bg:#060810;--bg2:#0C0F1C;--bg3:#090B16;
  --r:10px;--rl:14px;--rxl:18px;
  --shadow:0 2px 8px rgba(0,0,0,.6),0 1px 3px rgba(0,0,0,.4);
  --shadow2:0 8px 24px rgba(0,0,0,.7);
  --shadow3:0 20px 60px rgba(0,0,0,.8);
  --glow-blue:0 0 20px rgba(96,165,250,.2);
  --glow-green:0 0 20px rgba(52,211,153,.2);
  --glow-gold:0 0 20px rgba(252,211,77,.2);
  --glow-purple:0 0 20px rgba(167,139,250,.2);
}

/* ── Base & background ── */
*,*::before,*::after{font-family:'Cairo',system-ui,'Segoe UI',sans-serif}
body{
  font-family:'Cairo','Segoe UI',sans-serif;
  direction:rtl;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  overflow-x:hidden;
}
body{background:#0a0e1a}
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%,rgba(99,102,241,.18) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 85% 88%,rgba(139,92,246,.14) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(34,211,238,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 90% 15%,rgba(96,165,250,.10) 0%,transparent 50%);
  pointer-events:none;
  z-index:0;
}
html.light body{background:#F0F4F8}
html.light body::before{
  background:
    radial-gradient(ellipse 60% 50% at 15% 12%,rgba(99,102,241,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 88%,rgba(139,92,246,.05) 0%,transparent 55%);
}
.shell{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}

/* ── Sidebar ── */
.sidebar{
  width:240px;
  background:linear-gradient(180deg,rgba(10,13,24,.98) 0%,rgba(7,9,15,.99) 100%);
  display:flex;flex-direction:column;flex-shrink:0;
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  border-left:1px solid rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  position:relative;
}
.sidebar::before{
  content:'';position:absolute;top:0;right:0;width:1px;height:100%;
  background:linear-gradient(180deg,transparent,rgba(96,165,250,.3),rgba(167,139,250,.2),transparent);
}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;order:3}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-track{background:transparent}
.content::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

/* ── Sidebar header ── */
.sb-header{
  padding:14px 14px 12px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:10px;
  background:linear-gradient(180deg,rgba(96,165,250,.07) 0%,rgba(167,139,250,.04) 100%);
  position:relative;
}
.sb-header-row{display:flex;flex-direction:row;align-items:center;gap:10px;width:100%}
.sb-logo{
  width:44px;height:44px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.12);
  overflow:hidden;
  box-shadow:0 4px 12px rgba(0,0,0,.4),0 0 0 1px rgba(96,165,250,.1);
  flex-shrink:0;
}
.sb-logo img{width:40px;height:40px;object-fit:contain;display:block}
.sb-brand{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.sb-brand-ar{font-family:'Cairo',sans-serif;font-size:14px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:.2px}
.sb-brand-en{font-family:'Poppins','Cairo',sans-serif;font-size:11px;font-weight:600;line-height:1.2;letter-spacing:.4px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.25),rgba(167,139,250,.15),transparent);margin:0}
/* ── Developer signature ── */
.dev-sig{font-family:'Poppins','Cairo',sans-serif;font-size:10px;font-weight:600;letter-spacing:.4px;text-align:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#6366f1;user-select:none;padding:6px 8px}
.dev-sig-login{font-family:'Poppins','Cairo',sans-serif;font-size:11px;font-weight:600;letter-spacing:.4px;text-align:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#6366f1;margin-top:18px;user-select:none}

/* nav */
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-section{
  padding:16px 18px 8px;
  font-size:9px;font-weight:900;
  color:rgba(167,139,250,.5);
  letter-spacing:2.2px;text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.sb-section::before{content:'';display:inline-block;width:6px;height:6px;border-radius:2px;background:linear-gradient(135deg,#6366f1,#8b5cf6);box-shadow:0 0 8px rgba(139,92,246,.5);flex-shrink:0}
.sb-section::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(139,92,246,.18),transparent)}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:8px 12px;cursor:pointer;
  border-radius:11px;margin:2px 8px;
  transition:all .22s cubic-bezier(.4,0,.2,1);
  color:rgba(255,255,255,.55);
  font-size:12px;font-weight:600;
  position:relative;overflow:hidden;
  border:1px solid transparent;
  --c1:#6366f1; --c2:#8b5cf6;
}
.nav-item:hover{
  color:#fff;
  background:rgba(255,255,255,.04);
  border-color:rgba(255,255,255,.07);
  transform:translateX(-2px);
}
.nav-item:hover .nav-item-icon{transform:scale(1.08);box-shadow:0 6px 18px var(--c1)55}
.nav-item.on{
  background:linear-gradient(135deg,var(--c1),var(--c2));
  color:#fff;font-weight:700;
  box-shadow:0 8px 24px var(--c1)55,0 0 0 1px rgba(255,255,255,.06),inset 0 1px 0 rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.12);
}
.nav-item.on::after{
  content:'';position:absolute;right:-1px;top:18%;bottom:18%;width:3px;
  background:#fff;border-radius:3px 0 0 3px;
  box-shadow:0 0 12px rgba(255,255,255,.7);
}
.nav-item-icon{
  width:30px;height:30px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .22s;
  background:var(--icon-bg, linear-gradient(135deg,rgba(99,102,241,.20),rgba(139,92,246,.10)));
  border:1px solid var(--icon-bdr, rgba(99,102,241,.30));
  color:#fff;
  box-shadow:0 4px 12px var(--icon-glow, rgba(99,102,241,.22));
}
.nav-item.on .nav-item-icon{
  background:rgba(255,255,255,.18);
  border-color:rgba(255,255,255,.32);
  color:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.25);
}
.nav-item svg{width:15px;height:15px;fill:currentColor}
.nav-badge{margin-right:auto;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:100px;box-shadow:0 2px 6px rgba(239,68,68,.4)}

/* Province sub-items in sidebar */
.nav-sub-item{
  display:flex;align-items:center;gap:9px;
  padding:6px 14px 6px 22px;cursor:pointer;
  border-radius:8px;margin:1px 8px 1px 18px;
  transition:all .18s;color:rgba(255,255,255,.28);
  font-size:11px;font-weight:600;
}
.nav-sub-item:hover{color:rgba(255,255,255,.75);background:rgba(255,255,255,.05)}
.nav-sub-item.on{color:#93C5FD;background:rgba(96,165,250,.12)}
.nav-sub-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:transform .18s}
.nav-sub-item.on .nav-sub-dot{transform:scale(1.4);box-shadow:0 0 6px currentColor}

/* footer */
.sb-footer{
  padding:12px 12px;
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:4px;
}
.sb-month-info{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.05);
  margin-bottom:2px;
}
.sb-month-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0}
.sb-month-text{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;flex:1;line-height:1.3}
.sb-month-count{font-size:11px;font-weight:800;color:var(--green)}
.sb-ver{font-size:9px;color:rgba(255,255,255,.12);margin-bottom:0;text-align:center}

/* ── Topbar ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 20px;
  background:rgba(12,15,28,.85);
  border-bottom:1px solid rgba(255,255,255,.05);
  gap:10px;flex-wrap:wrap;flex-shrink:0;
  backdrop-filter:blur(20px);
  box-shadow:0 1px 0 rgba(255,255,255,.03),var(--shadow);
  order:1;
}
.topbar-left{display:flex;align-items:center;gap:14px;min-width:0}
.menu-btn{
  width:38px;height:38px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;
}
.menu-btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.menu-btn svg{width:16px;height:16px;fill:var(--sub)}
.topbar-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.page-title{font-size:16px;font-weight:800;color:var(--text);white-space:nowrap;letter-spacing:.2px}
.page-sub{font-size:11px;color:var(--sub);white-space:nowrap;font-weight:500}
.sep{width:1px;height:20px;background:rgba(255,255,255,.07)}

/* ── Month strip ── */
.mstrip{
  display:flex;gap:6px;overflow-x:auto;
  padding:8px 20px;
  background:rgba(9,11,22,.9);
  border-bottom:1px solid rgba(255,255,255,.04);
  scrollbar-width:none;align-items:center;flex-shrink:0;order:2;
  backdrop-filter:blur(10px);
}
.mstrip::-webkit-scrollbar{display:none}
.mchip{
  padding:5px 14px;border-radius:100px;
  font-size:11px;font-weight:600;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03);
  cursor:pointer;white-space:nowrap;
  color:var(--sub);
  display:inline-flex;align-items:center;gap:5px;
  transition:all .18s;flex-shrink:0;
}
.mchip:hover{border-color:rgba(96,165,250,.4);color:var(--blue);background:rgba(96,165,250,.08)}
.mchip.cur{
  background:linear-gradient(135deg,rgba(96,165,250,.25),rgba(99,102,241,.15));
  color:#93C5FD;border-color:rgba(96,165,250,.5);
  font-weight:700;
  box-shadow:0 0 16px rgba(96,165,250,.2),inset 0 0 12px rgba(96,165,250,.05);
}
.mchip.saved{border-color:rgba(52,211,153,.4);color:var(--green);background:rgba(52,211,153,.06)}
.mchip.cur.saved{
  background:linear-gradient(135deg,rgba(52,211,153,.2),rgba(16,185,129,.1));
  color:#6EE7B7;border-color:rgba(52,211,153,.5);
  box-shadow:0 0 16px rgba(52,211,153,.2);
}
.mchip.add{border-style:dashed;border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.25)}
.mchip.add:hover{border-color:rgba(96,165,250,.3);color:var(--blue);border-style:dashed}
.mchip-x{display:none;align-items:center;justify-content:center;margin-right:-4px;margin-left:2px;opacity:.35;cursor:pointer;transition:opacity .15s}
.mchip-del:hover .mchip-x{display:inline-flex}
.mchip-x:hover{opacity:1!important;color:#f87171}
.mdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Buttons ── */
.btn{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:var(--text);
  border-radius:10px;padding:7px 14px;cursor:pointer;
  font-size:12px;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  white-space:nowrap;font-family:'Cairo',sans-serif;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);
  transition:opacity .18s;
}
.btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.4)}
.btn:hover::before{opacity:1}
.btn:active{transform:scale(.97) translateY(0)}
.btn:disabled{opacity:.35;cursor:default;transform:none}
.btn.blue{
  background:linear-gradient(135deg,#3B82F6,#6366F1);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(99,102,241,.4),0 1px 0 rgba(255,255,255,.2) inset;
}
.btn.blue:hover{background:linear-gradient(135deg,#60A5FA,#818CF8);box-shadow:0 6px 20px rgba(99,102,241,.5)}
.btn.green{
  background:linear-gradient(135deg,#059669,#34D399);
  color:#fff;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(52,211,153,.3);
}
.btn.green:hover{background:linear-gradient(135deg,#10B981,#6EE7B7);box-shadow:0 6px 20px rgba(52,211,153,.4)}
.btn.gold{
  background:linear-gradient(135deg,#D97706,#FCD34D);
  color:#0C0800;border-color:transparent;font-weight:700;
  box-shadow:0 4px 16px rgba(252,211,77,.3);
}
.btn.red-outline{border-color:rgba(248,113,113,.4);color:var(--red);background:rgba(248,113,113,.05)}
.btn.red-outline:hover{background:rgba(248,113,113,.12);border-color:var(--red);box-shadow:0 4px 12px rgba(248,113,113,.2)}
.btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.btn-icon{
  width:34px;height:34px;border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
  cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.btn-icon:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.12)}
.btn-icon svg{width:13px;height:13px;fill:var(--sub)}
.btn-icon.del:hover{background:rgba(248,113,113,.12);border-color:rgba(248,113,113,.4)}
.btn-icon.del:hover svg{fill:var(--red)}
.btn-icon.edit:hover{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.4)}
.btn-icon.edit:hover svg{fill:var(--blue)}

/* ── Status badges ── */
.paid-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:100px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid transparent;
  transition:all .2s;user-select:none;white-space:nowrap;
}
.paid-badge.yes{
  background:rgba(52,211,153,.1);color:var(--green);
  border-color:rgba(52,211,153,.25);
  box-shadow:0 0 10px rgba(52,211,153,.1);
}
.paid-badge.yes:hover{background:rgba(52,211,153,.18);border-color:rgba(52,211,153,.5);box-shadow:0 0 16px rgba(52,211,153,.2)}
.paid-badge.no{
  background:rgba(252,211,77,.08);color:var(--gold);
  border-color:rgba(252,211,77,.2);
}
.paid-badge.no:hover{background:rgba(252,211,77,.15);border-color:rgba(252,211,77,.4);box-shadow:0 0 16px rgba(252,211,77,.15)}

/* ── Pay strip ── */
.pay-strip{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;
  background:linear-gradient(135deg,rgba(52,211,153,.05),rgba(16,185,129,.03));
  border-radius:12px;
  border:1px solid rgba(52,211,153,.12);
  flex-wrap:wrap;
  box-shadow:0 0 20px rgba(52,211,153,.05);
}
.pay-strip-bar{flex:1;min-width:120px;height:7px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.pay-strip-fill{
  height:100%;
  background:linear-gradient(90deg,#059669,#34D399);
  border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 10px rgba(52,211,153,.4);
}

/* ── Live rate banner ── */
.rate-banner{display:flex;align-items:center;gap:10px;padding:9px 16px;background:linear-gradient(135deg,rgba(217,119,6,.07),rgba(245,158,11,.03));border:1px solid rgba(217,119,6,.22);border-radius:12px;font-size:12px;}

/* ── Inline input ── */
.inline-inp{
  width:100%;background:transparent;border:none;
  border-bottom:1px dashed rgba(255,255,255,.15);
  color:inherit;font-size:inherit;font-weight:inherit;
  font-family:'Cairo',sans-serif;
  text-align:center;padding:2px 4px;outline:none;min-width:0;
  transition:all .15s;
}
.inline-inp:focus{
  border-bottom-color:var(--blue);
  background:rgba(96,165,250,.06);
  border-radius:4px 4px 0 0;
}

/* ── Cards ── */
.card{
  background:rgba(15,23,42,.6);
  border:1px solid rgba(255,255,255,.08);
  border-radius:20px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.05);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);
  pointer-events:none;border-radius:16px;
}
.card:hover{
  border-color:rgba(96,165,250,.15);
  box-shadow:var(--shadow2),0 0 0 1px rgba(96,165,250,.08),inset 0 1px 0 rgba(255,255,255,.06);
  transform:translateY(-1px);
}
.card-hdr{
  padding:14px 18px;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
  background:linear-gradient(135deg,rgba(255,255,255,.02),transparent);
}
.card-title{font-size:13px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:9px}
.card-title-icon{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 14px rgba(99,102,241,.25),inset 0 1px 0 rgba(255,255,255,.12);
  background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.10))!important;
  border:1px solid rgba(139,92,246,.25);
}
.card-title-icon svg{width:14px;height:14px}
.card-badge{
  font-size:10px;color:var(--sub);
  background:rgba(255,255,255,.04);
  padding:3px 10px;border-radius:100px;
  border:1px solid rgba(255,255,255,.07);
  font-weight:600;
}

/* ── Stat cards ── */
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.sc{
  background:rgba(12,15,28,.85);
  border:1px solid rgba(255,255,255,.06);
  border-radius:16px;padding:18px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.04);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  backdrop-filter:blur(10px);
}
.sc::before{
  content:'';position:absolute;
  top:-40px;right:-40px;
  width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(circle,var(--sc-glow,rgba(96,165,250,.12)) 0%,transparent 70%);
  pointer-events:none;
}
.sc:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow2),0 0 30px var(--sc-glow,rgba(96,165,250,.1));
  border-color:rgba(255,255,255,.1);
}
.sc-stripe{
  position:absolute;top:0;right:0;width:3px;height:100%;
  background:var(--sc-color,var(--blue));
  box-shadow:0 0 12px var(--sc-color,var(--blue));
}
.sc-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
  box-shadow:0 4px 12px rgba(0,0,0,.3);
}
.sc-icon svg{width:20px;height:20px}
.sc-lbl{font-size:11px;color:var(--sub);margin-bottom:6px;font-weight:600;letter-spacing:.2px}
.sc-val{font-size:24px;font-weight:800;line-height:1;letter-spacing:-.5px}
.sc-sub{font-size:10px;color:var(--sub);margin-top:7px;font-weight:500}
.sc-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Table ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl-wrap::-webkit-scrollbar{height:4px}
.tbl-wrap::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{
  padding:10px 12px;
  background:rgba(7,9,15,.9);
  font-size:10px;font-weight:800;color:rgba(255,255,255,.3);
  border-bottom:1px solid rgba(255,255,255,.05);
  white-space:nowrap;text-align:center;
  letter-spacing:.8px;text-transform:uppercase;
}
.tbl th.l{text-align:right}
.tbl td{
  padding:10px 12px;
  border-bottom:1px solid rgba(255,255,255,.04);
  text-align:center;color:var(--text);
  vertical-align:middle;transition:background .15s;
}
.tbl td.l{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(96,165,250,.04)}
.tbl .sub-row td{
  background:linear-gradient(90deg,rgba(96,165,250,.07),rgba(99,102,241,.04));
  font-weight:700;font-size:12px;color:var(--text);
}
.tbl .sub-row:hover td{background:linear-gradient(90deg,rgba(96,165,250,.1),rgba(99,102,241,.06))}
.day-inp{
  width:46px;padding:5px;text-align:center;
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:8px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:12px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;font-weight:700;
}
.day-inp:focus{
  outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(96,165,250,.15);
  background:rgba(96,165,250,.06);
}

/* ── Eng page redesign components ── */
.smart-banner{background:linear-gradient(135deg,rgba(124,58,237,.18),rgba(168,85,247,.08));border:1px solid rgba(124,58,237,.4);border-radius:16px;padding:20px 22px;margin-bottom:14px;position:relative;overflow:hidden}
.smart-banner::before{content:"";position:absolute;top:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(168,85,247,.25),transparent 70%);pointer-events:none}
.sb-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:relative}
.sb-icon{font-size:38px;line-height:1;flex-shrink:0;filter:drop-shadow(0 4px 12px rgba(168,85,247,.5))}
.sb-text{flex:1;min-width:200px}
.sb-title{font-size:10px;color:#C4B5FD;font-weight:800;letter-spacing:1px;margin-bottom:3px;text-transform:uppercase}
.sb-msg{font-size:15px;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:3px}
.sb-msg strong{color:#A78BFA}
.sb-sub{font-size:11px;color:var(--sub)}
.sb-btn{padding:11px 22px;border-radius:11px;font-size:13px;font-weight:800;cursor:pointer;border:none;background:linear-gradient(135deg,#A855F7,#7C3AED);color:#fff;font-family:inherit;box-shadow:0 8px 24px rgba(168,85,247,.35);transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.sb-btn:hover{transform:translateY(-1px);box-shadow:0 10px 28px rgba(168,85,247,.45)}
html.light .smart-banner{background:linear-gradient(135deg,rgba(124,58,237,.08),rgba(168,85,247,.04));border-color:rgba(124,58,237,.3)}
html.light .sb-msg{color:#1E1B4B}
html.light .sb-msg strong{color:#7C3AED}

.summary-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:var(--card);border:1px solid var(--bd);border-radius:13px;overflow:hidden;margin-bottom:12px}
@media(max-width:700px){.summary-bar{grid-template-columns:repeat(2,1fr)}}
.sum-cell{padding:13px 14px;border-left:1px solid var(--bd);display:flex;flex-direction:column;gap:2px;transition:background .15s}
.sum-cell:last-child{border-left:none}
.sum-cell:hover{background:rgba(99,102,241,.04)}
.sum-lbl{font-size:9px;color:var(--sub);font-weight:800;letter-spacing:.7px;text-transform:uppercase}
.sum-val{font-size:18px;font-weight:900;line-height:1.2}
.sum-sub{font-size:10px;color:var(--sub);font-weight:700}
.sum-cell.blue .sum-val{color:#93C5FD}
.sum-cell.purple .sum-val{color:#C4B5FD}
.sum-cell.green .sum-val{color:#6EE7B7}
.sum-cell.amber .sum-val{color:#FCD34D}
.sum-cell.red .sum-val{color:#FCA5A5}
html.light .sum-cell.blue .sum-val{color:#2563EB}
html.light .sum-cell.purple .sum-val{color:#7C3AED}
html.light .sum-cell.green .sum-val{color:#059669}
html.light .sum-cell.amber .sum-val{color:#D97706}
html.light .sum-cell.red .sum-val{color:#DC2626}

.prov-tab-bar{display:flex;gap:5px;background:var(--card);border:1px solid var(--bd);border-radius:13px;padding:7px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.prov-tab{padding:8px 14px;border-radius:9px;font-size:11px;font-weight:800;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--sub);font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.prov-tab:hover{background:rgba(99,102,241,.08);color:#A5B4FC}
.prov-tab.active{background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;border-color:#3B82F6;box-shadow:0 3px 12px rgba(59,130,246,.3)}
.prov-tab .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.prov-tab .count{font-size:9px;padding:1px 7px;border-radius:100px;background:rgba(255,255,255,.15);font-weight:800}
.prov-tab.active .count{background:rgba(255,255,255,.25)}
.prov-actions{margin-right:auto;display:flex;gap:5px;align-items:center;flex-wrap:wrap}

.pdf-dropdown{position:relative;display:inline-block}
.pdf-dropdown-menu{position:absolute;top:calc(100% + 6px);left:0;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:5px;min-width:180px;box-shadow:0 12px 32px rgba(0,0,0,.4);z-index:50}
.pdf-dropdown-menu .item{padding:8px 11px;border-radius:7px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:700;transition:background .15s;font-family:inherit;border:none;background:transparent;width:100%;text-align:right}
.pdf-dropdown-menu .item:hover{background:var(--bd)}

.half-combo{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:9px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.22);transition:all .2s;cursor:default}
.half-combo:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.2)}
.half-combo.h2{background:rgba(16,185,129,.06);border-color:rgba(16,185,129,.22)}
.half-combo.old{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.22)}
.half-combo .day-mini{width:34px;background:transparent;border:none;color:var(--text);font-weight:900;text-align:center;font-size:12px;outline:none;font-family:inherit;padding:0}
.half-combo .day-mini:focus{background:rgba(255,255,255,.05);border-radius:4px}
.half-combo .day-mini:disabled,.half-combo .day-mini[readonly]{cursor:not-allowed;opacity:.7}
.half-combo .money-mini{font-size:10px;color:var(--sub);font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(255,255,255,.04);white-space:nowrap}
.half-combo .status-mini{font-size:13px;cursor:pointer;line-height:1;padding:2px 4px;border-radius:4px;transition:background .15s}
.half-combo .status-mini.yes{color:#34D399}
.half-combo .status-mini.no{color:#FCD34D}
.half-combo .status-mini:hover{background:rgba(255,255,255,.08)}
.half-combo.disabled{opacity:.5}
.half-combo.disabled .status-mini{cursor:default}

.dot-status{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-status.active{background:#10B981;box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.dot-status.ended{background:#6B7280}
.dot-status.on_leave{background:#F59E0B;box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.mini-icon{width:18px;height:18px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;cursor:help;border:1px solid transparent;flex-shrink:0}
.mini-icon.transfer{background:rgba(168,85,247,.15);color:#A78BFA;border-color:rgba(168,85,247,.4)}
.mini-icon.tenure{background:rgba(59,130,246,.15);color:#93C5FD;border-color:rgba(59,130,246,.4)}
.mini-icon.readonly{background:rgba(148,163,184,.15);color:#94A3B8;border-color:rgba(148,163,184,.4)}

.total-cell-c{display:flex;flex-direction:column;align-items:center;gap:1px}
.total-cell-c .usd{font-weight:900;color:var(--text);font-size:13px}
.total-cell-c .egp{font-size:10px;color:#D97706;font-weight:800}

/* ── Province header ── */
.prov-hdr{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.prov-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
.prov-name{font-size:14px;font-weight:800;color:var(--text)}
.prov-count{font-size:11px;color:var(--sub);font-weight:500}
.prov-bar-bg{height:3px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin:0 18px 14px}
.prov-bar-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Modal ── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.82);
  display:flex;align-items:center;justify-content:center;
  z-index:99999;padding:16px;
}
.modal{
  background:rgba(12,15,28,.97);
  border-radius:20px;width:440px;max-width:100%;
  border:1px solid rgba(255,255,255,.08);
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow3),0 0 0 1px rgba(96,165,250,.06);
  animation:slideUp .22s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);
}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
@keyframes slideUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-hdr{
  padding:18px 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,rgba(96,165,250,.04),transparent);
}
.modal-hdr h3{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.2px}
.modal-body{padding:18px 20px}
.modal-ftr{
  padding:14px 20px;
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:flex-end;gap:10px;
  background:rgba(0,0,0,.2);
}
.fld{margin-bottom:16px}

/* ── Engineer Profile Modal ── */
.ep-modal{width:720px}
.ep-tab-bar{display:flex;gap:2px;padding:10px 16px 0;border-bottom:1px solid var(--bdr)}
.ep-tab{padding:7px 16px;border-radius:6px 6px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--sub);border-bottom:2px solid transparent;transition:.15s}
.ep-tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.ep-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:16px 18px}
.ep-field{background:var(--bg2);border-radius:8px;padding:10px 14px;border:1px solid var(--bdr)}
.ep-lbl{font-size:10px;color:var(--sub);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.ep-val{font-size:13px;font-weight:700}
.ep-body{padding:16px 18px;overflow-y:auto;max-height:calc(88vh - 160px)}
/* Eng name link style */
.eng-link{cursor:pointer;border-bottom:1px dashed rgba(96,165,250,.4);transition:color .15s}
.eng-link:hover{color:var(--blue)}
.fld label{
  font-size:10px;font-weight:800;color:rgba(255,255,255,.4);
  display:block;margin-bottom:6px;
  letter-spacing:.8px;text-transform:uppercase;
}
.fld input,.fld select,.fld textarea{
  width:100%;padding:9px 13px;
  border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-size:13px;
  font-family:'Cairo',sans-serif;
  transition:all .15s;
}
.fld input:focus,.fld select:focus{
  outline:none;border-color:rgba(96,165,250,.5);
  box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.fld select option{background:#0C0F1C;color:var(--text)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.prev-box{
  background:rgba(255,255,255,.03);
  border-radius:10px;
  border:1px solid rgba(255,255,255,.07);
  padding:14px;margin-top:14px;
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
}
.prev-lbl{font-size:10px;color:var(--sub);font-weight:600;margin-bottom:3px}
.prev-val{font-size:14px;font-weight:800}

/* ── Info boxes ── */
.info{
  border-radius:12px;padding:12px 16px;
  font-size:12px;line-height:1.8;border:1px solid;
  display:flex;gap:12px;align-items:flex-start;
  font-weight:500;
}
.info svg{width:16px;height:16px;flex-shrink:0;margin-top:2px}
.info.blue{background:rgba(96,165,250,.06);color:#93C5FD;border-color:rgba(96,165,250,.15)}
.info.blue svg{fill:#93C5FD}
.info.green{background:rgba(52,211,153,.06);color:#6EE7B7;border-color:rgba(52,211,153,.15)}
.info.green svg{fill:#6EE7B7}
.info.amber{background:rgba(252,211,77,.06);color:#FDE68A;border-color:rgba(252,211,77,.15)}
.info.amber svg{fill:#FDE68A}

/* ── Toast ── */
.toast-wrap{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;
  gap:8px;align-items:center;pointer-events:none;
}
.toast{
  padding:10px 22px;border-radius:100px;
  font-size:12px;font-weight:700;white-space:nowrap;
  box-shadow:var(--shadow3);
  animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:all;letter-spacing:.2px;
  backdrop-filter:blur(20px);
}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.t-ok{background:rgba(6,24,16,.95);color:var(--green);border:1px solid rgba(52,211,153,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(52,211,153,.15)}
.t-err{background:rgba(26,5,5,.95);color:var(--red);border:1px solid rgba(248,113,113,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(248,113,113,.15)}
.t-info{background:rgba(10,26,48,.95);color:var(--blue);border:1px solid rgba(96,165,250,.3);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 20px rgba(96,165,250,.15)}
.chart-wrap{position:relative;width:100%}

/* ── Rank rows ── */
.rank-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.rank-bar-bg{flex:1;height:7px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── Drop zone ── */
.dz{
  border:2px dashed rgba(255,255,255,.1);
  border-radius:16px;padding:28px;
  text-align:center;cursor:pointer;
  transition:all .2s;
}
.dz:hover,.dz.over{
  border-color:rgba(96,165,250,.4);
  background:rgba(96,165,250,.05);
  box-shadow:0 0 20px rgba(96,165,250,.1);
}
.dz-icon{width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.dz-icon svg{width:22px;height:22px;fill:var(--sub)}
.dz strong{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.dz p{font-size:11px;color:var(--sub)}

/* ── Steps ── */
.step-row{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.step-row:last-child{border-bottom:none}
.step-num{
  width:26px;height:26px;border-radius:50%;
  background:rgba(96,165,250,.1);color:var(--blue);
  border:1px solid rgba(96,165,250,.2);
  font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
  box-shadow:0 0 12px rgba(96,165,250,.1);
}
.step-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.step-sub{font-size:11px;color:var(--sub);font-weight:500}

/* ── Logo preview ── */
.logo-preview{
  width:84px;height:84px;
  border:2px dashed rgba(255,255,255,.1);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;overflow:hidden;
  transition:all .2s;
  background:rgba(255,255,255,.03);
}
.logo-preview:hover{border-color:rgba(96,165,250,.4);background:rgba(96,165,250,.05);box-shadow:0 0 20px rgba(96,165,250,.1)}
.logo-preview img{width:100%;height:100%;object-fit:contain}

/* ── Notifications bell ── */
.notif-wrap{position:relative;display:inline-flex;align-items:center}
.notif-btn{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:36px;height:36px;border-radius:8px;
  background:var(--bg2);border:1.5px solid var(--bdr2);
  cursor:pointer;transition:all .2s;font-size:16px;
}
.notif-btn:hover{background:var(--bg3);border-color:var(--blue)}
.notif-btn.has-alerts{animation:notif-pulse 2s infinite}
@keyframes notif-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(252,211,77,.4)}
  50%{box-shadow:0 0 0 6px rgba(252,211,77,0)}
}
.notif-badge{
  position:absolute;top:-4px;left:-4px;
  min-width:16px;height:16px;border-radius:100px;padding:0 4px;
  background:#EF4444;color:#fff;font-size:9px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid var(--bg);box-shadow:0 0 6px rgba(239,68,68,.5);
}
.notif-badge.red{background:#DC2626}
.notif-dropdown{
  position:fixed;
  width:340px;max-height:480px;overflow-y:auto;
  background:var(--bg2);border:1px solid var(--bdr2);
  border-radius:12px;box-shadow:var(--shadow3);
  z-index:999999;padding:6px;
}
.notif-dropdown::-webkit-scrollbar{width:4px}
.notif-dropdown::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
.notif-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.notif-hdr-title{font-size:12px;font-weight:800;color:var(--text)}
.notif-hdr-count{font-size:10px;color:var(--sub);font-weight:700}
.notif-empty{padding:28px 14px;text-align:center;color:var(--sub);font-size:11px}
.notif-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  transition:background .15s;margin-top:4px;
  border-right:3px solid transparent;
}
.notif-item:hover{background:var(--bg3)}
.notif-item.lvl-red{border-right-color:#EF4444;background:rgba(248,113,113,.04)}
.notif-item.lvl-yellow{border-right-color:#FCD34D;background:rgba(252,211,77,.04)}
.notif-item-icon{font-size:18px;line-height:1;flex-shrink:0}
.notif-item-body{flex:1;min-width:0}
.notif-item-title{font-size:12px;font-weight:700;color:var(--text);line-height:1.4}
.notif-item-sub{font-size:10px;color:var(--sub);margin-top:3px}

/* ── Quick Actions dropdown (➕ in topbar) ── */
.qa-wrap{position:relative;display:inline-flex;align-items:center}
.qa-btn{
  width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;cursor:pointer;
  font-size:18px;font-weight:900;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(99,102,241,.45);
  transition:all .2s;
}
.qa-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(99,102,241,.55)}
.qa-btn.on{background:linear-gradient(135deg,#4f46e5,#7c3aed)}
.qa-dropdown{
  position:fixed;
  width:240px;
  background:rgba(15,23,42,.92);
  border:1px solid rgba(139,92,246,.3);
  border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(139,92,246,.18);
  z-index:999999;padding:8px;
  backdrop-filter:blur(20px) saturate(140%);
  -webkit-backdrop-filter:blur(20px) saturate(140%);
}
.qa-hdr{
  padding:8px 12px 10px;
  font-size:10px;font-weight:800;color:rgba(167,139,250,.95);
  letter-spacing:1px;
  border-bottom:1px solid rgba(139,92,246,.18);
  margin-bottom:4px;
}
.qa-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:all .18s;
  border:1px solid transparent;margin-top:2px;
  user-select:none;
}
.qa-item:hover{
  background:rgba(99,102,241,.10);
  border-color:rgba(139,92,246,.28);
  transform:translateX(-2px);
}
.qa-item-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
  background:linear-gradient(135deg,var(--qa-c1,#6366f1),var(--qa-c2,#8b5cf6));
  box-shadow:0 4px 14px rgba(99,102,241,.3);
}
.qa-item-label{font-size:12.5px;font-weight:700;color:var(--text);flex:1}
.qa-item-arrow{font-size:14px;color:rgba(167,139,250,.6);font-weight:900}

html.light .qa-dropdown{background:rgba(255,255,255,.95);border-color:#C7D2FE;box-shadow:0 20px 60px rgba(99,102,241,.25)}
html.light .qa-hdr{color:#6366f1;border-bottom-color:#E0E7FF}
html.light .qa-item:hover{background:#EEF2FF;border-color:#C7D2FE}

/* ── Page actions toolbar (per-page buttons row) ── */
.page-actions{
  display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  padding:10px 14px;margin-bottom:14px;
  background:rgba(15,23,42,.45);
  border:1px solid rgba(139,92,246,.16);
  border-radius:14px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
}
html.light .page-actions{background:rgba(248,250,252,.65);border-color:#E0E7FF}

/* ── Search ── */
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap input{
  height:36px;font-size:12px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;
  background:rgba(255,255,255,.04);
  color:var(--text);font-family:'Cairo',sans-serif;
  padding:0 10px 0 34px;width:170px;
  transition:all .2s;font-weight:500;
}
.search-wrap input:focus{
  outline:none;border-color:rgba(96,165,250,.4);
  width:210px;box-shadow:0 0 0 3px rgba(96,165,250,.1);
  background:rgba(96,165,250,.05);
}
.search-wrap .search-icon{position:absolute;left:10px;width:14px;height:14px;fill:var(--sub);pointer-events:none}

/* ── Mobile ── */
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;backdrop-filter:blur(6px)}
.bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:rgba(10,13,22,.95);
  border-top:1px solid rgba(255,255,255,.06);
  z-index:40;
  box-shadow:0 -8px 30px rgba(0,0,0,.5);
  backdrop-filter:blur(20px);
}
.bottom-nav-inner{display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 12px;cursor:pointer;color:var(--sub);
  flex:1;transition:all .15s;border-radius:10px;margin:2px;
  font-size:10px;font-weight:700;
}
.bn-item:hover{color:var(--blue)}
.bn-item.on{color:var(--blue)}
.bn-item svg{width:22px;height:22px;fill:currentColor}

/* ── Login ── */
.login-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(99,102,241,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 70%,rgba(96,165,250,.08) 0%,transparent 55%),
    #060810;
  padding:16px;
}
.login-box{
  background:rgba(12,15,28,.96);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;padding:42px 36px;
  width:380px;max-width:100%;
  box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 1px rgba(96,165,250,.06),0 0 60px rgba(99,102,241,.08);
  backdrop-filter:blur(30px);
  position:relative;overflow:hidden;
}
.login-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#6366F1,#60A5FA,#34D399,transparent);
}
.login-logo{
  width:140px;height:auto;
  display:block;
  margin:0 auto 20px;
  object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.5));
}
.login-title{font-size:24px;font-weight:900;color:var(--text);text-align:center;margin-bottom:6px;letter-spacing:.3px}
.login-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:28px;font-weight:500}

/* ── Loading ── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.spinner{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.06);
  border-top-color:var(--blue);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto 14px;
  box-shadow:0 0 20px rgba(96,165,250,.2);
}

/* ── Logout ── */
.logout-btn{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-radius:10px;cursor:pointer;
  color:rgba(255,255,255,.28);font-size:11px;font-weight:700;
  transition:all .18s;width:100%;background:none;border:none;
  font-family:'Cairo',sans-serif;
  border:1px solid rgba(255,255,255,.05);
}
.logout-btn:hover{background:rgba(248,113,113,.07);color:var(--red);border-color:rgba(248,113,113,.15)}
.logout-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.logout-user{font-size:10px;opacity:.55;margin-right:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80px}

/* ── Paid row highlight ── */
.paid-row td{background:rgba(52,211,153,.03) !important}

/* ── Light mode ── */
html.light{
  --blue:#2563EB;--blue2:#EFF6FF;--blue3:#BFDBFE;
  --green:#059669;--green2:#ECFDF5;--green3:#A7F3D0;
  --red:#DC2626;--red2:#FEF2F2;
  --gold:#B45309;--gold2:#FFFBEB;
  --purple:#7C3AED;--purple2:#F5F3FF;
  --bdr:#E2E8F0;--bdr2:#CBD5E1;
  --text:#0F172A;--sub:#64748B;
  --bg:#F0F4F8;--bg2:#FFFFFF;--bg3:#F8FAFC;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 20px rgba(0,0,0,.08);
  --shadow3:0 20px 60px rgba(0,0,0,.12);
}
html.light body{background:var(--bg)}
html.light body::before{
  background:
    radial-gradient(ellipse 80% 60% at 15% 0%,rgba(37,99,235,.07) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 90%,rgba(124,58,237,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,rgba(5,150,105,.03) 0%,transparent 60%);
}
/* sidebar stays dark in light mode — elegant contrast */
html.light .sidebar{background:linear-gradient(160deg,#1a2540 0%,#0f1729 100%)}
html.light .sidebar::before{background:linear-gradient(180deg,transparent,rgba(59,130,246,.35),rgba(139,92,246,.2),transparent)}
html.light .nav-item{color:rgba(255,255,255,.55)}
html.light .nav-item:hover{color:#fff;background:rgba(255,255,255,.06)}
html.light .nav-item.on{color:#fff}
html.light .sb-ver{color:rgba(255,255,255,.2)}
html.light .logout-btn{color:rgba(255,255,255,.35)}
html.light .logout-btn:hover{background:rgba(248,113,113,.1);color:#F87171}

/* topbar */
html.light .topbar{
  background:rgba(255,255,255,.92);
  border-bottom:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 0 rgba(0,0,0,.05),0 2px 12px rgba(0,0,0,.04);
  backdrop-filter:blur(16px);
}
html.light .menu-btn{background:#fff;border-color:var(--bdr2)}
html.light .sep{background:var(--bdr)}

/* month strip */
html.light .mstrip{background:rgba(248,250,252,.9);border-bottom:1px solid rgba(0,0,0,.06)}
html.light .mchip{background:#fff;border-color:var(--bdr2);color:var(--sub);box-shadow:0 1px 3px rgba(0,0,0,.05)}
html.light .mchip:hover{background:var(--blue2);border-color:rgba(37,99,235,.3);color:var(--blue)}
html.light .mchip.cur{
  background:linear-gradient(135deg,#2563EB,#4F46E5);
  color:#fff;border-color:transparent;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
html.light .mchip.saved{background:var(--green2);border-color:rgba(5,150,105,.3);color:var(--green)}
html.light .mchip.cur.saved{background:linear-gradient(135deg,#059669,#10B981);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(5,150,105,.3)}
html.light .mchip.add{border-style:dashed;background:transparent;color:var(--sub)}

/* cards */
html.light .card{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04);
}
html.light .card::before{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent)}
html.light .card:hover{
  border-color:rgba(37,99,235,.15);
  box-shadow:0 4px 20px rgba(37,99,235,.1),0 1px 3px rgba(0,0,0,.06);
  transform:translateY(-2px);
}
html.light .card-hdr{background:linear-gradient(135deg,rgba(37,99,235,.02),transparent);border-bottom-color:rgba(0,0,0,.06)}
html.light .card-badge{background:var(--bg3);border-color:var(--bdr);color:var(--sub)}
html.light .card-title{color:var(--text)}

/* stat cards */
html.light .sc{
  background:#fff;
  border:1px solid rgba(0,0,0,.07);
  box-shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
html.light .sc:hover{
  box-shadow:0 8px 24px rgba(0,0,0,.1);
  border-color:rgba(0,0,0,.1);
}
html.light .sc::before{background:radial-gradient(circle,var(--sc-glow,rgba(37,99,235,.06)) 0%,transparent 70%)}
html.light .sc-lbl{color:var(--sub)}
html.light .sc-sub{color:var(--sub)}
html.light .sc-bar{background:rgba(0,0,0,.06)}

/* tables */
html.light .tbl th{
  background:linear-gradient(135deg,#F8FAFC,#F1F5F9);
  border-bottom:2px solid rgba(0,0,0,.07);
  color:#64748B;font-size:10.5px;
}
html.light .tbl td{border-bottom:1px solid rgba(0,0,0,.05);color:var(--text)}
html.light .tbl tr:hover td{background:rgba(37,99,235,.03)}
html.light .tbl .sub-row td{background:linear-gradient(90deg,rgba(37,99,235,.05),rgba(79,70,229,.03))}
html.light .day-inp{background:#fff;border-color:var(--bdr2);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.05)}
html.light .day-inp:focus{background:var(--blue2);border-color:var(--blue)}

/* buttons */
html.light .btn{
  background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.08),inset 0 1px 0 rgba(255,255,255,.8);
}
html.light .btn:hover{background:var(--bg3);border-color:rgba(0,0,0,.14);box-shadow:0 2px 6px rgba(0,0,0,.1)}
html.light .btn-icon{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .btn-icon svg{fill:var(--sub)}

/* modal */
html.light .modal{background:#fff;border-color:rgba(0,0,0,.1);box-shadow:0 25px 60px rgba(0,0,0,.15)}
html.light .modal-hdr{background:linear-gradient(135deg,rgba(37,99,235,.03),transparent);border-bottom-color:rgba(0,0,0,.07)}
html.light .modal-ftr{background:#F8FAFC;border-top-color:rgba(0,0,0,.07)}
html.light .overlay{background:rgba(15,23,42,.55);backdrop-filter:blur(6px)}

/* form fields */
html.light .fld label{color:#64748B}
html.light .fld input,html.light .fld select,html.light .fld textarea{
  background:#fff;border-color:rgba(0,0,0,.12);color:var(--text);
  box-shadow:0 1px 2px rgba(0,0,0,.04) inset;
}
html.light .fld input:focus,html.light .fld select:focus{
  background:var(--blue2);border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}
html.light .fld select option{background:#fff;color:var(--text)}
html.light .prev-box{background:#F8FAFC;border-color:rgba(0,0,0,.08)}

/* misc */
html.light .pay-strip{background:linear-gradient(135deg,rgba(5,150,105,.05),rgba(16,185,129,.03));border-color:rgba(5,150,105,.15)}
html.light .pay-strip-fill{box-shadow:0 0 8px rgba(5,150,105,.25)}
html.light .inline-inp{border-bottom-color:rgba(0,0,0,.15)}
html.light .inline-inp:focus{background:var(--blue2)}
html.light .dz{border-color:rgba(0,0,0,.12)}
html.light .dz:hover{background:var(--blue2);border-color:var(--blue)}
html.light .search-wrap input{background:#fff;border-color:rgba(0,0,0,.1);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
html.light .search-wrap input:focus{background:var(--blue2);border-color:var(--blue)}
html.light .bottom-nav{background:rgba(255,255,255,.95);border-top-color:rgba(0,0,0,.08)}
html.light .prov-bar-bg{background:rgba(0,0,0,.07)}
html.light .rank-bar-bg{background:rgba(0,0,0,.07)}
html.light .info.blue{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
html.light .info.blue svg{fill:#1D4ED8}
html.light .info.green{background:#ECFDF5;border-color:#A7F3D0;color:#065F46}
html.light .info.green svg{fill:#065F46}
html.light .info.amber{background:#FFFBEB;border-color:#FDE68A;color:#92400E}
html.light .info.amber svg{fill:#92400E}
html.light .t-ok{background:#ECFDF5;color:#059669;border-color:#A7F3D0;box-shadow:0 4px 12px rgba(5,150,105,.12)}
html.light .t-err{background:#FEF2F2;color:#DC2626;border-color:#FECACA;box-shadow:0 4px 12px rgba(220,38,38,.1)}
html.light .t-info{background:#EFF6FF;color:#2563EB;border-color:#BFDBFE;box-shadow:0 4px 12px rgba(37,99,235,.1)}
html.light .paid-badge.yes{background:#ECFDF5;border-color:#A7F3D0;color:#059669}
html.light .paid-badge.yes:hover{background:#D1FAE5;border-color:var(--green)}
html.light .paid-badge.no{background:#FFFBEB;border-color:#FDE68A;color:#B45309}
html.light .paid-badge.no:hover{background:#FEF3C7;border-color:#D97706}

/* login light mode */
html.light .login-screen{
  background:
    radial-gradient(ellipse 70% 60% at 30% 20%,rgba(37,99,235,.1) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 70% 70%,rgba(124,58,237,.06) 0%,transparent 55%),
    #F0F4F8;
}
html.light .login-box{
  background:rgba(255,255,255,.96);
  border:1px solid rgba(0,0,0,.09);
  box-shadow:0 30px 80px rgba(0,0,0,.12),0 0 0 1px rgba(37,99,235,.06);
}
html.light .login-box::before{background:linear-gradient(90deg,transparent,#2563EB,#7C3AED,#059669,transparent)}
html.light .login-title{color:var(--text)}
html.light .login-sub{color:var(--sub)}

/* ══ Org Chart ════════════════════════════════════════════════════ */
.org-page{display:flex;flex-direction:column;gap:0;padding:0;flex:1;overflow-y:auto;order:3;min-height:0}
.oc-canvas{background:#f1f5f9;border-radius:12px;padding:20px;direction:rtl}
html.dark .oc-canvas{background:#0f172a}
.oc-topbar{display:flex;align-items:center;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.oc-spacer{flex:1}
.oc-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid #e2e8f0;background:#fff;color:#1e293b;cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-family:inherit;transition:background .15s}
.oc-btn:hover{background:#f8fafc}

.oc-root-name{font-size:15px;font-weight:900;color:#1e293b}
