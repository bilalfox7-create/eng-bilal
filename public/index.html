<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>نظام إعاشات المهندسين – ليبيا</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1E33;--navy2:#162D47;
  --blue:#2563EB;--blue2:#EFF6FF;--blue3:#BFDBFE;
  --green:#16A34A;--green2:#F0FDF4;--green3:#BBF7D0;
  --red:#DC2626;--red2:#FEF2F2;
  --gold:#D97706;--gold2:#FFFBEB;
  --purple:#7C3AED;--purple2:#F5F3FF;
  --gray:#6B7280;--gray2:#F9FAFB;--gray3:#F3F4F6;
  --bdr:#E5E7EB;--bdr2:#D1D5DB;
  --text:#111827;--sub:#6B7280;
  --bg:#FFFFFF;--bg2:#F9FAFB;--bg3:#F3F4F6;
  --r:8px;--rl:12px;--rxl:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);
  --shadow3:0 10px 15px rgba(0,0,0,.07),0 4px 6px rgba(0,0,0,.04);
}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0;transition:transform .25s ease}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.sb-header{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-logo{width:36px;height:36px;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo svg{width:20px;height:20px;fill:#fff}
.sb-title{color:#fff;font-size:13px;font-weight:600;line-height:1.3}
.sb-subtitle{color:rgba(255,255,255,.4);font-size:10px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-section{padding:8px 12px 4px;font-size:9px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;border-radius:var(--r);margin:1px 8px;transition:all .15s;color:rgba(255,255,255,.55);font-size:12.5px;font-weight:500;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-item.on{background:rgba(255,255,255,.12);color:#fff}
.nav-item.on::before{content:'';position:absolute;right:0;top:25%;bottom:25%;width:3px;background:var(--blue);border-radius:2px 0 0 2px}
.nav-item svg{width:16px;height:16px;fill:currentColor;flex-shrink:0}
.nav-badge{margin-right:auto;background:#ef4444;color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:100px}
.sb-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.sb-ver{font-size:10px;color:rgba(255,255,255,.25)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--bdr);gap:10px;flex-wrap:wrap;flex-shrink:0;box-shadow:var(--shadow)}
.topbar-left{display:flex;align-items:center;gap:12px;min-width:0}
.menu-btn{width:36px;height:36px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--bg);cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.menu-btn svg{width:16px;height:16px;fill:var(--sub)}
.topbar-right{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.page-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap}
.page-sub{font-size:11px;color:var(--sub);white-space:nowrap}
.sep{width:1px;height:18px;background:var(--bdr)}
.mstrip{display:flex;gap:5px;overflow-x:auto;padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--bdr);scrollbar-width:none;align-items:center;flex-shrink:0}
.mstrip::-webkit-scrollbar{display:none}
.mchip{padding:4px 12px;border-radius:100px;font-size:11px;font-weight:500;border:1px solid var(--bdr2);background:var(--bg2);cursor:pointer;white-space:nowrap;color:var(--sub);display:inline-flex;align-items:center;gap:5px;transition:all .12s;flex-shrink:0}
.mchip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue2)}
.mchip.cur{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 4px rgba(37,99,235,.3)}
.mchip.saved{border-color:var(--green);color:var(--green);background:var(--green2)}
.mchip.cur.saved{background:var(--green);color:#fff;border-color:var(--green)}
.mchip.add{border-style:dashed;color:var(--sub)}
.mdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.btn{border:1px solid var(--bdr2);background:var(--bg);color:var(--text);border-radius:var(--r);padding:6px 12px;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;font-family:inherit;transition:all .12s;flex-shrink:0;box-shadow:var(--shadow)}
.btn:hover{background:var(--bg2);border-color:var(--bdr)}
.btn:active{transform:scale(.98);box-shadow:none}
.btn:disabled{opacity:.45;cursor:default;transform:none;box-shadow:none}
.btn.blue{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 1px 4px rgba(37,99,235,.3)}
.btn.blue:hover{background:#1D4ED8;border-color:#1D4ED8}
.btn.green{background:var(--green);color:#fff;border-color:var(--green)}
.btn.green:hover{background:#15803D}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.red-outline{border-color:var(--red);color:var(--red)}
.btn.red-outline:hover{background:var(--red2)}
.btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
.btn-icon{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--bdr);background:var(--bg);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .12s}
.btn-icon:hover{background:var(--bg2)}
.btn-icon svg{width:13px;height:13px;fill:var(--sub)}
.btn-icon.del:hover{background:var(--red2);border-color:var(--red)}
.btn-icon.del:hover svg{fill:var(--red)}
.btn-icon.edit:hover{background:var(--blue2);border-color:var(--blue)}
.btn-icon.edit:hover svg{fill:var(--blue)}
.card{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;box-shadow:var(--shadow)}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.card-title-icon{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-title-icon svg{width:13px;height:13px}
.card-badge{font-size:10px;color:var(--sub);background:var(--bg3);padding:3px 9px;border-radius:100px;border:1px solid var(--bdr);font-weight:500}
.sg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.sc{background:var(--bg);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:box-shadow .15s}
.sc:hover{box-shadow:var(--shadow2)}
.sc-stripe{position:absolute;top:0;right:0;width:4px;height:100%}
.sc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sc-icon svg{width:18px;height:18px}
.sc-lbl{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:500}
.sc-val{font-size:22px;font-weight:700;line-height:1;color:var(--text)}
.sc-sub{font-size:10px;color:var(--sub);margin-top:5px}
.sc-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:12px;overflow:hidden}
.sc-fill{height:100%;border-radius:2px;transition:width .5s ease}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 10px;background:var(--bg2);font-size:10px;font-weight:600;color:var(--sub);border-bottom:1px solid var(--bdr);white-space:nowrap;text-align:center;letter-spacing:.2px;text-transform:uppercase}
.tbl th.l{text-align:right}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--bdr);text-align:center;color:var(--text);vertical-align:middle}
.tbl td.l{text-align:right}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
.tbl .sub-row td{background:var(--bg3);font-weight:600;font-size:12px}
.tbl .sub-row:hover td{background:var(--bg3)}
.day-inp{width:44px;padding:4px;text-align:center;border:1.5px solid var(--bdr2);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;font-family:inherit;transition:border-color .1s;font-weight:500}
.day-inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.prov-hdr{padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.prov-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.prov-name{font-size:13px;font-weight:600;color:var(--text)}
.prov-count{font-size:11px;color:var(--sub);font-weight:400}
.prov-bar-bg{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin:0 16px 12px}
.prov-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--bg);border-radius:var(--rxl);width:420px;max-width:100%;border:1px solid var(--bdr);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow3);animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{padding:16px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-size:15px;font-weight:600;color:var(--text)}
.modal-body{padding:16px 18px}
.modal-ftr{padding:12px 18px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:8px}
.fld{margin-bottom:14px}
.fld label{font-size:11px;font-weight:600;color:var(--sub);display:block;margin-bottom:5px;letter-spacing:.2px;text-transform:uppercase}
.fld input,.fld select,.fld textarea{width:100%;padding:8px 11px;border:1.5px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;transition:all .1s}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prev-box{background:var(--bg2);border-radius:var(--r);border:1px solid var(--bdr);padding:12px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prev-lbl{font-size:10px;color:var(--sub);font-weight:500;margin-bottom:2px}
.prev-val{font-size:13px;font-weight:700}
.info{border-radius:var(--r);padding:10px 14px;font-size:12px;line-height:1.7;border:1px solid;display:flex;gap:10px;align-items:flex-start}
.info svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
.info.blue{background:var(--blue2);color:#1E40AF;border-color:var(--blue3)}
.info.blue svg{fill:#1E40AF}
.info.green{background:var(--green2);color:#14532D;border-color:var(--green3)}
.info.green svg{fill:#14532D}
.info.amber{background:var(--gold2);color:#92400E;border-color:#FDE68A}
.info.amber svg{fill:#92400E}
.toast-wrap{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none}
.toast{padding:9px 20px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow3);animation:toastIn .25s ease;pointer-events:all}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.t-ok{background:var(--navy);color:#fff}
.t-err{background:var(--red);color:#fff}
.t-info{background:var(--blue);color:#fff}
.chart-wrap{position:relative;width:100%}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.rank-row:last-child{border-bottom:none}
.rank-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rank-bar-bg{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.dz{border:2px dashed var(--bdr2);border-radius:var(--rl);padding:24px;text-align:center;cursor:pointer;transition:all .15s}
.dz:hover,.dz.over{border-color:var(--blue);background:var(--blue2)}
.dz-icon{width:40px;height:40px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.dz-icon svg{width:20px;height:20px;fill:var(--sub)}
.dz strong{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.dz p{font-size:11px;color:var(--sub)}
.step-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr)}
.step-row:last-child{border-bottom:none}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.step-sub{font-size:11px;color:var(--sub)}
.logo-preview{width:80px;height:80px;border:2px dashed var(--bdr2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:all .15s}
.logo-preview:hover{border-color:var(--blue);background:var(--blue2)}
.logo-preview img{width:100%;height:100%;object-fit:contain}
.search-wrap{position:relative;display:inline-flex;align-items:center}
.search-wrap input{padding-right:32px;height:34px;font-size:12px;border:1px solid var(--bdr2);border-radius:var(--r);background:var(--bg);color:var(--text);font-family:inherit;padding-right:9px;padding-left:32px;width:160px;transition:all .15s}
.search-wrap input:focus{outline:none;border-color:var(--blue);width:200px;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-wrap .search-icon{position:absolute;left:9px;width:14px;height:14px;fill:var(--sub);pointer-events:none}
.mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;backdrop-filter:blur(2px)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bdr);z-index:40;box-shadow:0 -2px 10px rgba(0,0,0,.06)}
.bottom-nav-inner{display:flex;justify-content:space-around;padding:6px 0 env(safe-area-inset-bottom,6px)}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;color:var(--sub);flex:1;transition:color .15s;border-radius:var(--r);margin:2px;font-size:10px;font-weight:500}
.bn-item:hover{color:var(--blue);background:var(--blue2)}
.bn-item.on{color:var(--blue)}
.bn-item svg{width:20px;height:20px;fill:currentColor}
/* ── Login screen ────────────────────── */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);padding:16px}
.login-box{background:#fff;border-radius:20px;padding:36px 32px;width:360px;max-width:100%;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{width:56px;height:56px;background:var(--blue);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.login-title{font-size:22px;font-weight:700;color:var(--navy);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--sub);text-align:center;margin-bottom:24px}
/* ── Loading screen ──────────────────── */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
/* ── Logout btn ──────────────────────── */
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;font-weight:500;transition:all .15s;width:100%;background:none;border:none;font-family:inherit;margin-top:6px}
.logout-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.logout-btn svg{width:14px;height:14px;fill:currentColor;flex-shrink:0}
@media(max-width:768px){
  .sidebar{position:fixed;top:0;right:0;bottom:0;z-index:60;transform:translateX(100%)}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shadow3)}
  .mob-overlay.show{display:block}
  .menu-btn{display:inline-flex}
  .main{padding-bottom:64px}
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .topbar-right .btn span{display:none}
  .topbar-right .btn{padding:6px 8px}
  .search-wrap input{width:120px}
  .search-wrap input:focus{width:150px}
  .bottom-nav{display:block}
  .content{padding:10px}
  .g2{grid-template-columns:1fr}
}
@media(max-width:480px){
  .sg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sc-val{font-size:18px}
  .page-sub{display:none}
  .sep{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useMemo}=React;
const h=React.createElement;

/* ── Constants ──────────────────────────────────────────── */
const MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const PROVS=["محافظة درنة","محافظة البيضاء","محافظة بنغازى","محافظة طبرق"];
const PCOLS=["#2563EB","#16A34A","#D97706","#7C3AED"];
const PLTS=["#EFF6FF","#F0FDF4","#FFFBEB","#F5F3FF"];

const BASE={
  "محافظة درنة":[
    {id:"d1",name:"ضياء الدين محمود",spec:"مدير مشروعات ليبيا",d1:0,d2:0},
    {id:"d2",name:"محمد سلامة غريب",spec:"أخصائى مساحة",d1:0,d2:0},
    {id:"d3",name:"بلال أشرف على",spec:"منسق ورقيات",d1:0,d2:0},
    {id:"d4",name:"عبد العظيم أحمد",spec:"مهندس مكتب فنى",d1:0,d2:0},
    {id:"d5",name:"محمد شحاته محمد",spec:"أخصائى مساحة",d1:0,d2:0},
    {id:"d6",name:"محمد صلاح محمد السيد",spec:"مهندس مدنى",d1:0,d2:0},
    {id:"d7",name:"محمد نابغ محمود",spec:"مهندس معمارى",d1:0,d2:0},
    {id:"d8",name:"بهاء أحمد محمود",spec:"مدير مشروع طرق",d1:0,d2:0},
    {id:"d9",name:"محمد حمدى إبراهيم",spec:"مهندس ضبط جودة",d1:0,d2:0},
    {id:"d10",name:"أحمد الشوربجى",spec:"مهندس طرق",d1:0,d2:0},
  ],

/* ── Chart components ────────────────────────────────────── */
function LineChart({labels,datasets,height=160}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(ch.current)ch.current.destroy();
    ch.current=new window.Chart(ref.current,{
      type:"line",data:{labels,datasets:datasets.map(d=>({...d,tension:.4,pointRadius:4,pointHoverRadius:6,fill:false}))},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:datasets.length>1,position:"bottom",rtl:true,labels:{font:{size:11,family:"Segoe UI,Tahoma"},boxWidth:12,padding:12}},tooltip:{rtl:true,callbacks:{label:c=>`${c.dataset.label||""}: ${Number(c.raw).toFixed(1)} $`}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v.toFixed(0)+"$"},grid:{color:"rgba(0,0,0,0.04)"}}}}
    });
    return()=>{if(ch.current){ch.current.destroy();ch.current=null;}};
  },[labels,datasets]);
  return h("div",{className:"chart-wrap",style:{height}},h("canvas",{ref}));
}
function BarChart({labels,datasets,height=160}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(ch.current)ch.current.destroy();
    ch.current=new window.Chart(ref.current,{
      type:"bar",data:{labels,datasets:datasets.map(d=>({...d,borderRadius:4}))},
      options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},plugins:{legend:{display:datasets.length>1,position:"bottom",rtl:true,labels:{font:{size:11},boxWidth:12,padding:12}},tooltip:{rtl:true}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v.toFixed(0)+"$"},grid:{color:"rgba(0,0,0,0.04)"}}}}
    });
    return()=>{if(ch.current){ch.current.destroy();ch.current=null;}};
  },[labels,datasets]);
  return h("div",{className:"chart-wrap",style:{height}},h("canvas",{ref}));
}
function DoughnutChart({labels,data,colors,height=160}){
  const ref=useRef(null);const ch=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.Chart)return;
    if(ch.current)ch.current.destroy();
    ch.current=new window.Chart(ref.current,{
      type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:"#fff",hoverBorderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:"70%",plugins:{legend:{display:true,position:"bottom",rtl:true,labels:{font:{size:11},boxWidth:12,padding:10}},tooltip:{rtl:true,callbacks:{label:c=>`${c.label}: ${Number(c.raw).toFixed(1)} $`}}}}
    });
    return()=>{if(ch.current){ch.current.destroy();ch.current=null;}};
  },[labels,data,colors]);
  return h("div",{className:"chart-wrap",style:{height}},h("canvas",{ref}));
}

function App(){
  const [page,setPage]=useState("dash");
  const [months,setMonths]=useState({});
  const [ak,setAk]=useState(mkKey(now.getMonth()+1,now.getFullYear()));
  const [cmpKey,setCmpKey]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({prov:PROVS[0],name:"",spec:"",d1:0,d2:0,id:null});
  const [nmForm,setNmForm]=useState({month:now.getMonth()+1,year:now.getFullYear()});
  const [search,setSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [mobOpen,setMobOpen]=useState(false);
  const [importPrev,setImportPrev]=useState(null);
  const [drag,setDrag]=useState(false);
  const [logo,setLogo]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [user,setUser]=useState(null);
  const [loginForm,setLoginForm]=useState({username:"",password:""});
  const [loginError,setLoginError]=useState("");
  const fileRef=useRef(null);
  const logoRef=useRef(null);
  const pendingRef=useRef({});
  const timerRef=useRef(null);

  /* ── Load data on mount ───────────────────────────── */
  useEffect(()=>{
    fetch("/auth/me").then(r=>r.json()).then(u=>{
      if(!u.username){setLoaded(true);return;}
      setUser(u);
      return Promise.all([
        fetch("/api/months").then(r=>r.json()),
        fetch("/api/logo").then(r=>r.json()).catch(()=>({logo:null})),
      ]).then(([md,ld])=>{
        const m=md.months||{};
        setMonths(m);
        const keys=Object.keys(m).sort();
        if(keys.length>0)setAk(keys[keys.length-1]);
        setLogo(ld.logo||null);
        setLoaded(true);
      });
    }).catch(()=>setLoaded(true));
  },[]);

  /* ── Save queue (debounced) ───────────────────────── */
  const queueSave=useCallback((key,val)=>{
    pendingRef.current[key]=val;
    clearTimeout(timerRef.current);
    timerRef.current=setTimeout(async()=>{
      const q={...pendingRef.current};pendingRef.current={};
      for(const[k,v]of Object.entries(q)){
        if(v===null){
          await fetch(`/api/months/${k}`,{method:"DELETE"}).catch(()=>{});
        }else{
          await fetch(`/api/months/${k}`,{
            method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)
          }).catch(()=>{});
        }
      }
    },800);
  },[]);

  const msg=(m,t="ok")=>{setToast({m,t});setTimeout(()=>setToast(null),3500);};

  /* ── Auth ─────────────────────────────────────────── */
  const doLogin=async()=>{
    setLoginError("");
    try{
      const r=await fetch("/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(loginForm)});
      const d=await r.json();
      if(!r.ok){setLoginError(d.error||"خطأ في تسجيل الدخول");return;}
      setUser(d);
      const[md,ld]=await Promise.all([
        fetch("/api/months").then(r=>r.json()),
        fetch("/api/logo").then(r=>r.json()).catch(()=>({logo:null})),
      ]);
      const m=md.months||{};
      setMonths(m);
      const keys=Object.keys(m).sort();
      if(keys.length>0)setAk(keys[keys.length-1]);
      setLogo(ld.logo||null);
    }catch(e){setLoginError("خطأ في الاتصال بالخادم");}
  };

  const doLogout=async()=>{
    await fetch("/auth/logout",{method:"POST"});
    setUser(null);setMonths({});setLogo(null);
  };

  /* ── Computed ─────────────────────────────────────── */
  const am=useMemo(()=>months[ak]||null,[months,ak]);
  const data=useMemo(()=>am?.data||dc(BASE),[am]);
  const cfg=useMemo(()=>am?.cfg||{month:now.getMonth()+1,year:now.getFullYear(),rate:300,egp:52.5,company:"شركة المشاريع الليبية"},[am]);
  const totals=useMemo(()=>PROVS.map(p=>(data[p]||[]).reduce((a,e)=>{const c=calc(e,cfg.rate,cfg.egp);return{p,n:a.n+1,a1:a.a1+c.a1,a2:a.a2+c.a2,tot:a.tot+c.tot,egp:a.egp+c.egp};},{p,n:0,a1:0,a2:0,tot:0,egp:0})),[data,cfg]);
  const G=useMemo(()=>totals.reduce((a,t)=>({n:a.n+t.n,a1:a.a1+t.a1,a2:a.a2+t.a2,tot:a.tot+t.tot,egp:a.egp+t.egp}),{n:0,a1:0,a2:0,tot:0,egp:0}),[totals]);
  const maxT=useMemo(()=>Math.max(...totals.map(t=>t.tot),1),[totals]);
  const sortedKeys=useMemo(()=>Object.keys(months).sort(),[months]);
  const allE=useMemo(()=>PROVS.flatMap(p=>(data[p]||[]).map(e=>({...e,prov:p}))),[data]);
  const filtered=useMemo(()=>search.trim()?allE.filter(e=>e.name.includes(search)||e.spec.includes(search)):[],[search,allE]);
  const prevC=useMemo(()=>calc({d1:+form.d1||0,d2:+form.d2||0},cfg.rate,cfg.egp),[form.d1,form.d2,cfg.rate,cfg.egp]);
  const isSaved=!!months[ak]?.savedAt;
  const mn=MONTHS[cfg.month-1];
  const unsaved=Object.values(months).filter(m=>!m?.savedAt).length;

  const histStats=useMemo(()=>sortedKeys.filter(k=>months[k]?.savedAt).map(k=>{
    const m=months[k],[y,mo]=k.split("-");
    const tot=PROVS.reduce((a,p)=>(m.data?.[p]||[]).reduce((b,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return b+c.tot;},a),0);
    const provTots=PROVS.map(p=>(m.data?.[p]||[]).reduce((a,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return a+c.tot;},0));
    return{key:k,label:MONTHS[+mo-1].slice(0,3)+" "+y.slice(2),tot,provTots};
  }),[sortedKeys,months]);

  const topEngs=useMemo(()=>{
    const map={};
    sortedKeys.filter(k=>months[k]?.savedAt).forEach(k=>{
      const m=months[k];
      PROVS.forEach(p=>{(m.data?.[p]||[]).forEach(e=>{
        if(!map[e.id])map[e.id]={id:e.id,name:e.name,spec:e.spec,prov:p,days:0,usd:0};
        map[e.id].days+=e.d1+e.d2;
        map[e.id].usd+=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5).tot;
      });});
    });
    return Object.values(map).sort((a,b)=>b.usd-a.usd).slice(0,8);
  },[sortedKeys,months]);
  const maxEng=useMemo(()=>Math.max(...topEngs.map(e=>e.usd),1),[topEngs]);

  /* ── Actions ──────────────────────────────────────── */
  const switchMonth=k=>{
    setAk(k);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);
    }
    setMobOpen(false);
  };

  const saveMonth=async()=>{
    const v={data:dc(data),cfg:dc(cfg),savedAt:new Date().toISOString()};
    setMonths(p=>({...p,[ak]:v}));
    await fetch(`/api/months/${ak}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(()=>{});
    msg(`تم حفظ ${mn} ${cfg.year} ✓`);
  };

  const createMonth=()=>{
    const k=mkKey(nmForm.month,nmForm.year);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);
    }
    setAk(k);setModal(null);setPage("eng");
    msg(`تم فتح ${MONTHS[nmForm.month-1]} ${nmForm.year}`);
  };

  const updData=(p,id,f,v)=>{
    const nd=dc(data);nd[p]=nd[p].map(e=>e.id===id?{...e,[f]:Math.max(0,Math.min(15,+v||0))}:e);
    const updated={...( months[ak]||{cfg}),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const updCfg=(k,v)=>{
    const nc={...cfg,[k]:['month','year','rate','egp'].includes(k)?+v||0:v};
    const updated={...(months[ak]||{data}),cfg:nc,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const submitEng=()=>{
    if(!form.name.trim()){msg("أدخل اسم المهندس","err");return;}

                    h("td",null,Math.abs(diff)<0.01?"—":h("span",{style:{color:diff>0?"#16A34A":"#DC2626",fontWeight:600}},diff>0?"▲ "+f$(diff):"▼ "+f$(Math.abs(diff)))),
                    h("td",null,Math.abs(pct)<0.1?"—":h("span",{style:{fontSize:11,padding:"2px 8px",borderRadius:100,fontWeight:600,background:pct>0?"#F0FDF4":"#FEF2F2",color:pct>0?"#16A34A":"#DC2626"}},(pct>0?"+":"")+pct.toFixed(1)+"%"))

                }),
                (()=>{

          h("div",{className:"card"},
            h("div",{className:"card-hdr"},h("div",{className:"card-title"},h("div",{className:"card-title-icon",style:{background:"#FFFBEB"}},h(Ic,{n:"exp",sz:13,c:"#D97706"})),"تصدير نسخة احتياطية")),

              h("div",null,h("div",{style:{fontWeight:600,fontSize:14,marginBottom:4}},"حفظ كل البيانات في ملف JSON"),h("div",{style:{fontSize:12,color:"var(--sub)"}},`${sortedKeys.length} شهر محفوظ  ·  ${Object.values(months).reduce((a,m)=>a+PROVS.reduce((b,p)=>b+(m.data?.[p]?.length||0),0),0)} مهندس`)),

              h("div",{className:`dz ${drag?"over":""}`,onClick:()=>fileRef.current?.click(),onDragOver:ev=>{ev.preventDefault();setDrag(true);},onDragLeave:()=>setDrag(false),onDrop:ev=>{ev.preventDefault();setDrag(false);readFile(ev.dataTransfer.files[0]);}},
                h("div",{className:"dz-icon"},h(Ic,{n:"imp",sz:20,c:"var(--sub)"})),
                h("strong",null,"اسحب ملف JSON هنا أو اضغط للاختيار"),

                [["اضغط «حفظ الشهر» بعد كل تحديث","لضمان حفظ جميع التغييرات على الخادم"],["اضغط «تصدير» شهرياً واحتفظ بالملف","في Google Drive أو OneDrive"],["عند تغيير الخادم أو الجهاز","استيراد الملف واختيار «دمج»"]]
                .map(([t,s],i)=>h("div",{key:i,className:"step-row"},h("div",{className:"step-num"},i+1),h("div",null,h("div",{className:"step-title"},t),h("div",{className:"step-sub"},s))))
              )
            )
          )
        ),

        /* ══ REPORT ══ */
        page==="report"&&h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          h("div",{className:"card"},
            h("div",{className:"card-hdr"},h("div",{className:"card-title"},h("div",{className:"card-title-icon",style:{background:"#EFF6FF"}},h(Ic,{n:"report",sz:13,c:"#2563EB"})),"إعدادات الكشف الرسمى")),
            h("div",{style:{padding:"14px 16px",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12}},
              [{k:"company",l:"اسم الشركة / الجهة",t:"text"},{k:"month",l:"الشهر (1-12)",t:"number"},{k:"year",l:"السنة",t:"number"},{k:"rate",l:"الإعاشة الشهرية ($)",t:"number"},{k:"egp",l:"سعر الصرف (ج.م/$)",t:"number"}]

              h("div",{className:"logo-preview",onClick:()=>logoRef.current?.click()},
                logo?h("img",{src:logo,alt:"logo"}):h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:4}},h(Ic,{n:"img",sz:20,c:"var(--bdr2)"}),h("span",{style:{fontSize:10,color:"var(--sub)"}},"رفع شعار"))
              ),
              h("div",null,
                h("div",{style:{fontWeight:600,fontSize:13,marginBottom:4}},logo?"تم رفع الشعار ✓":"لم يتم رفع شعار بعد"),

                h("div",{style:{display:"flex",gap:6}},
                  h("button",{className:"btn",style:{fontSize:11},onClick:()=>logoRef.current?.click()},h(Ic,{n:"img",sz:12}),logo?"تغيير الشعار":"رفع شعار"),
                  logo&&h("button",{className:"btn red-outline",style:{fontSize:11},onClick:()=>{setLogo(null);fetch("/api/logo",{method:"DELETE"});}},h(Ic,{n:"del",sz:12}),"حذف الشعار")
