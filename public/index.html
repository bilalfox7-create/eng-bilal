  },[qaOpen]);

  /* ── Live clock — tick every second for the unified header ── */
  useEffect(()=>{
    const id=setInterval(()=>setClockNow(new Date()),1000);
    return()=>clearInterval(id);
  },[]);

  const engProfileData=useMemo(()=>{
    if(!engProfile)return null;
    const{eng,prov}=engProfile;
    const monthly=sortedKeys.filter(k=>k!=='leaves').map(k=>{
      const m=months[k];
      const e=(m?.data?.[prov]||[]).find(x=>x.id===eng.id);
      if(!e)return null;
      const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);
      const attMap=m?.attendance?.[eng.id]||{};
      const cnt=s=>Object.values(attMap).filter(d=>d?.s===s).length;
      const[y,mo]=k.split('-');
      return{key:k,monthLabel:MONTHS[+mo-1]+' '+y,d1:e.d1,d2:e.d2,extra:+e.extra||0,c,
        present:cnt('P'),egypt:cnt('EG'),absent:cnt('A'),leave:cnt('AL'),sick:cnt('SL')};
    }).filter(Boolean);
    const engLeaves=leaves.filter(l=>l.engineerId===eng.id);
    return{monthly,engLeaves};
  },[engProfile,sortedKeys,months,leaves]);

  const histStats=useMemo(()=>sortedKeys.filter(k=>months[k]?.savedAt).map(k=>{
    const m=months[k],[y,mo]=k.split("-");
    const tot=PROVS.reduce((a,p)=>(m.data?.[p]||[]).reduce((b,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return b+c.tot;},a),0);
    const provTots=PROVS.map(p=>(m.data?.[p]||[]).reduce((a,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return a+c.tot;},0));
    return{key:k,label:MONTHS[+mo-1].slice(0,3)+" "+y.slice(2),tot,provTots};
  }),[sortedKeys,months]);

  const topEngs=useMemo(()=>{
    const map={};
    sortedKeys.filter(k=>months[k]?.savedAt).forEach(k=>{
      const m=months[k];
      PROVS.forEach(p=>{(m.data?.[p]||[]).forEach(e=>{
        if(!map[e.id])map[e.id]={id:e.id,name:e.name,spec:e.spec,prov:p,days:0,usd:0};
        map[e.id].days+=e.d1+e.d2;
        map[e.id].usd+=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5).tot;
      });});
    });
    return Object.values(map).sort((a,b)=>b.usd-a.usd).slice(0,8);
  },[sortedKeys,months]);
  const maxEng=useMemo(()=>Math.max(...topEngs.map(e=>e.usd),1),[topEngs]);

  /* ── Actions ──────────────────────────────────────── */
  const switchMonth=k=>{
    setAk(k);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;e.extra=0;if(e.paid1!==undefined)e.paid1=false;if(e.paid2!==undefined)e.paid2=false;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);
    }
    setMobOpen(false);
  };

  const saveMonth=async()=>{
    /* حافظ على expenses و attendance الموجودين فى الشهر — مش بعت {data,cfg}
       فقط لأن السيرفر هيمسح الباقى */
    const cur=months[ak]||{};
    const v={
      data:dc(dataRaw),cfg:dc(cfg),savedAt:new Date().toISOString(),
      expenses:cur.expenses||null,attendance:cur.attendance||null
    };
    setMonths(p=>({...p,[ak]:v}));
    pendingRef.current[ak]=v;
    await flushSaves(); // force:true → guard مش هيرفض
    logActivity('حفظ شهر',`${mn} ${cfg.year}`);
    msg(`تم حفظ ${mn} ${cfg.year} ✓`);
  };

  const createMonth=()=>{
    const k=mkKey(nmForm.month,nmForm.year);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;e.extra=0;if(e.paid1!==undefined)e.paid1=false;if(e.paid2!==undefined)e.paid2=false;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);
    }
    setAk(k);setModal(null);setPage("eng");
    msg(`تم فتح ${MONTHS[nmForm.month-1]} ${nmForm.year}`);
  };

  const mkMonthBase=()=>({...(months[ak]||{data,cfg})});
  const lockGuard=()=>{if(!isAdmin&&isMonthLocked(ak)){msg('🔒 هذا الشهر مقفول — لا يمكن التعديل','err');return true;}return false;};
  const mkAttMonthBase=()=>({...(months[attKey]||{data:attData,cfg:attCfg})});
  const attLockGuard=()=>{if(!isAdmin&&isMonthLocked(attKey)){msg('🔒 هذا الشهر مقفول — لا يمكن التعديل','err');return true;}return false;};

  const updData=(p,id,f,v)=>{
    if(lockGuard())return;
    const nd=dc(dataRaw);nd[p]=nd[p].map(e=>e.id===id?{...e,[f]:Math.max(0,Math.min(15,+v||0))}:e);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const updCfg=(k,v)=>{
    if(lockGuard())return;
    const nc={...cfg,[k]:['month','year','rate','egp'].includes(k)?+v||0:v};
    const updated={...mkMonthBase(),cfg:nc,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const submitEng=()=>{
    if(!form.name.trim()){msg("أدخل اسم المهندس","err");return;}
    if(lockGuard())return;
    const nd=dc(dataRaw);
    // Auto-calc d1/d2 if arrivalDate is in current month. `extra` is manual — never auto-set.
    const arrCalc=calcArrivalDays(form.arrivalDate,cfg.year,cfg.month);
    const finalD1=arrCalc?arrCalc.d1:+form.d1;
    const finalD2=arrCalc?arrCalc.d2:+form.d2;
    const finalExtra=+form.extra||0;
    const engId=form.id||"u"+Date.now();
    if(form.id){
      nd[form.prov]=nd[form.prov].map(e=>e.id===form.id?{...e,name:form.name,spec:form.spec||"مهندس",d1:finalD1,d2:finalD2,extra:finalExtra,arrivalDate:form.arrivalDate||null}:e);
      logActivity('تعديل مهندس',`${form.name} — ${form.prov.replace('محافظة ','')}`);
      // Update org chart for edited engineer
      if(orgData){
        const cityId=CITY_CFG.find(c=>c.prov===form.prov)?.id;
        if(cityId){
          const no=dc(orgData);
          const city=no.cities.find(c=>c.id===cityId);
          if(city){
            const upd=e=>e.name===form.name?e:{...e};
            const updateList=arr=>arr.map(e=>{
              const orig=nd[form.prov].find(x=>x.id===form.id);
              return e.name===(orig?orig.name:form.name)?{name:form.name,role:form.spec||"مهندس"}:e;
            });
            city.managers=updateList(city.managers);
            city.team=updateList(city.team);
            setOrgData(no);
            fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:no})}).catch(()=>{});
          }
        }
      }
      msg("تم الحفظ");
    } else {
      const newEng={id:engId,name:form.name.trim(),spec:form.spec||"مهندس",d1:finalD1,d2:finalD2,extra:finalExtra,arrivalDate:form.arrivalDate||null,addedAt:new Date().toISOString().split('T')[0]};
      nd[form.prov]=[...(nd[form.prov]||[]),newEng];
      logActivity('إضافة مهندس',`${newEng.name} — ${form.prov.replace('محافظة ','')}`);
      // Update org chart
      if(orgData){
        const cityId=CITY_CFG.find(c=>c.prov===form.prov)?.id;
        if(cityId){
          const no=dc(orgData);
          const city=no.cities.find(c=>c.id===cityId);
          if(city){
            const entry={name:newEng.name,role:newEng.spec};
            if(newEng.spec.includes("مدير"))city.managers.push(entry);
            else city.team.push(entry);
            setOrgData(no);
            fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:no})}).catch(()=>{});
          }
        }
      }
      msg("تمت الإضافة");
    }
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    // Propagate arrivalDate across all months + auto-mark Egypt days in attendance
    const propUpdates={};
    const arr=form.arrivalDate?new Date(form.arrivalDate+'T12:00'):null;
    // Build list of months to scan: include current `ak` even if engineer is new there
    const allKeys=Array.from(new Set([ak,...Object.keys(months)])).filter(k=>k!=='leaves');
    allKeys.forEach(key=>{
      const m=key===ak?updated:months[key];
      if(!m?.data)return;
      const[yStr,mStr]=key.split('-');
      const year=+yStr,month=+mStr;
      // Determine month position relative to arrival
      let isBeforeArrival=false,isAfterArrival=false,arrCalcRes=null;
      if(form.arrivalDate){
        const arrDate=new Date(form.arrivalDate+'T12:00');
        const monthStart=new Date(year,month-1,1);
        const monthEnd=new Date(year,month,0,23,59,59);
        isBeforeArrival=arrDate>monthEnd;
        isAfterArrival=arrDate<monthStart;
        arrCalcRes=calcArrivalDays(form.arrivalDate,year,month);
      }
      let provKey=null,idx=-1;
      Object.keys(m.data).forEach(p=>{
        const i=(m.data[p]||[]).findIndex(e=>e.id===engId);
        if(i>=0){provKey=p;idx=i;}
      });
      let newList,newData;
      if(!provKey){
        // Engineer not yet in this month
        if(!form.arrivalDate||isBeforeArrival){
          return;// no arrival or month before arrival → don't add
        }
        // Add engineer to this month (arrival month or after).
        // `extra` is manual (أيام قديمة) — never auto-set; defaults to 0 for a new engineer.
        provKey=form.prov;
        newList=[...(m.data[provKey]||[])];
        let nD1=15,nD2=15;
        if(arrCalcRes){nD1=arrCalcRes.d1;nD2=arrCalcRes.d2;}
        newList.push({
          id:engId,
          name:form.name.trim(),
          spec:form.spec||"مهندس",
          d1:nD1,d2:nD2,extra:0,
          arrivalDate:form.arrivalDate,
          addedAt:new Date().toISOString().split('T')[0]
        });
        idx=newList.length-1;
        newData={...m.data,[provKey]:newList};
      }else{
        // Engineer exists — update arrivalDate + d1/d2 only. `extra` is preserved (manual).
        newList=[...m.data[provKey]];
        newList[idx]={...newList[idx],arrivalDate:form.arrivalDate||null};
        if(form.arrivalDate){
          if(arrCalcRes){
            newList[idx]={...newList[idx],d1:arrCalcRes.d1,d2:arrCalcRes.d2};
          }else if(isBeforeArrival){
            newList[idx]={...newList[idx],d1:0,d2:0};
          }else if(isAfterArrival){
            const cur=newList[idx];
            const cd1=+cur.d1||0,cd2=+cur.d2||0;
            if(cd1===0&&cd2===0){
              newList[idx]={...cur,d1:15,d2:15};
            }
          }
        }
        newData={...m.data,[provKey]:newList};
      }
      // Update attendance: mark/unmark 'EG' days
      const dim=new Date(year,month,0).getDate();
      const newAtt={...(m.attendance||{})};
      const engAtt={...(newAtt[engId]||{})};
      Object.keys(engAtt).forEach(d=>{if(engAtt[d]?.s==='EG')delete engAtt[d];});
      if(arr){
        const monthEnd=new Date(year,month-1,dim,23,59,59);
        const monthStart=new Date(year,month-1,1);
        if(arr>monthEnd){
          for(let d=1;d<=dim;d++)engAtt[d]={s:'EG'};
        }else if(arr>=monthStart){
          for(let d=1;d<arr.getDate();d++)engAtt[d]={s:'EG'};
        }
      }
      newAtt[engId]=engAtt;
      propUpdates[key]={...m,data:newData,attendance:newAtt,savedAt:null};
    });
    setMonths(prev=>({...prev,...propUpdates}));
    // Discrete action — flush فورى عشان لو المستخدم عمل refresh على طول
    Object.entries(propUpdates).forEach(([k,v])=>{pendingRef.current[k]=v;});
    flushSaves();
    setModal(null);
  };

  const delEng=async(p,id,name)=>{
    if(!confirm("حذف "+name+"؟"))return;
    if(lockGuard())return;
    const nd=dc(dataRaw);nd[p]=nd[p].filter(e=>e.id!==id);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    pendingRef.current[ak]=updated;await flushSaves();
    logActivity('حذف مهندس',`${name} — ${p.replace('محافظة ','')} — ${mn} ${cfg.year}`);
    msg("تم الحذف");
  };

  /* ── Transfer engineer between provinces ────────────────
     Updates current month's data — moves engineer record from
     `from` to `to` and appends to engineer's transfers[] history.
     Also updates ALL future months that have a record of this
     engineer (so the engineer's province field is consistent).
  ──────────────────────────────────────────────────────── */
  const transferEngineer=(engId,toProv,dateStr)=>{
    if(!isAdmin){msg('للأدمن فقط','err');return;}
    if(lockGuard())return;
    /* Debounce: ignore rapid double-clicks within 2s */
    if(transferringRef.current){msg('جارٍ تنفيذ النقل السابق...','err');return;}
    /* Find current location of engineer in active month */
    let fromProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(data[p]||[]).find(e=>e.id===engId);if(found){fromProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود فى الشهر الحالى','err');return;}
    if(fromProv===toProv){msg('المهندس بالفعل فى '+toProv,'err');return;}
    if(!toProv||!PROVS.includes(toProv)){msg('اختار المحافظة الجديدة','err');return;}
    if(!dateStr){msg('اختار تاريخ النقل','err');return;}
    /* Anti-duplicate: reject if engineer already has transfer with same date+from+to */
    const existingTransfers=engRec.transfers||[];
    const isDup=existingTransfers.some(t=>t.date===dateStr&&t.from===fromProv&&t.to===toProv);
    if(isDup){
      msg('⚠️ هذا التنقل مسجل مسبقاً — نفس التاريخ ونفس المحافظتين','err');
      return;
    }
    const today=new Date();today.setHours(12,0,0,0);
    const tDate=new Date(dateStr+'T12:00');
    if(tDate<today){
      if(!confirm('تاريخ النقل فى الماضى — تصحيح بأثر رجعى. تأكيد؟'))return;
    }
    /* Lock the transfer button for 2s to prevent rapid double-submit */
    transferringRef.current=true;
    setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const transferEntry={id:'tr_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),from:fromProv,to:toProv,date:dateStr,by:user?.username||'admin',at:new Date().toISOString()};
    const nd=dc(dataRaw);
    /* Remove from old prov, push to new prov with updated transfers + prov */
    nd[fromProv]=(nd[fromProv]||[]).filter(e=>e.id!==engId);
    const updatedEng={...engRec,prov:toProv,transfers:[...(engRec.transfers||[]),transferEntry]};
    nd[toProv]=[...(nd[toProv]||[]),updatedEng];
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    pendingRef.current[ak]=updated;flushSaves();
    /* DS5: stamp the transfer onto the engineer's record in OTHER loaded months that include or
       follow the transfer date, so engProvAtDate (date-aware via transfers[]) resolves the right
       province per day in every month — not just the active one. Updated in place (prov+transfers[]);
       engSegmentsInMonth does the per-date split. Months entirely before the transfer are untouched. */
    const _tMonth=dateStr.slice(0,7);
    const _prop={};
    Object.keys(months).forEach(key=>{
      if(key==='leaves'||key===ak||key<_tMonth)return;
      const mm=months[key];if(!mm?.data)return;
      let touched=false;const nd2={};
      Object.keys(mm.data).forEach(p=>{
        nd2[p]=(mm.data[p]||[]).map(e=>{
          if(e.id!==engId)return e;
          const dup=(e.transfers||[]).some(t=>t.date===dateStr&&t.from===fromProv&&t.to===toProv);
          if(dup&&e.prov===toProv)return e;
          touched=true;
          return{...e,prov:toProv,transfers:dup?(e.transfers||[]):[...(e.transfers||[]),transferEntry]};
        });
      });
      if(touched)_prop[key]={...mm,data:nd2,savedAt:null};
    });
    if(Object.keys(_prop).length){setMonths(prev=>({...prev,..._prop}));Object.entries(_prop).forEach(([k,v])=>queueSave(k,v));}
    logActivity('نقل مهندس',`${engRec.name} — من ${fromProv.replace('محافظة ','')} إلى ${toProv.replace('محافظة ','')} بتاريخ ${dateStr}`);
    msg(`تم نقل ${engRec.name} إلى ${toProv}`);
    setModal(null);
    setEngTransferForm({engId:'',toProv:'',date:''});
  };

  /* ── Transfer engineer to Egypt (final return) ─────────
     Engineer is removed from the active workforce. Their record
     stays in the month data with `egyptTransfer` set, but the UI
     filters them out via the `data` useMemo. Past months remain
     untouched (snapshots). Activity log records the action.
  ──────────────────────────────────────────────────────── */
  const egyptTransferEngineer=(engId,dateStr,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ نقل سابق...','err');return;}
    /* Find engineer in active month (use dataRaw so we don't filter out anyone) */
    let fromProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){fromProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(engRec.egyptTransfer){msg('المهندس بالفعل منقول لمصر','err');return;}
    /* Province permission: must be their own engineer */
    if(!isAdmin&&fromProv!==userProv){msg('يمكنك نقل مهندسى محافظتك فقط','err');return;}
    if(!dateStr){msg('اختار تاريخ النقل','err');return;}
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const egyptEntry={
      id:'eg_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      date:dateStr,
      by:user?.username||'admin',
      at:new Date().toISOString(),
      notes:notes||'',
      fromProv
    };
    /* Mutate data: mark engineer with egyptTransfer */
    const nd=dc(dataRaw);
    nd[fromProv]=(nd[fromProv]||[]).map(e=>e.id===engId?{...e,egyptTransfer:egyptEntry}:e);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    pendingRef.current[ak]=updated;flushSaves();
    logActivity('نقل لمصر',`${engRec.name} — من ${fromProv.replace('محافظة ','')} بتاريخ ${dateStr}${notes?' · '+notes:''}`);
    msg(`🇪🇬 تم نقل ${engRec.name} لمصر — خرج من ${fromProv}`);
    setModal(null);
    setEgyptTransferForm({engId:'',date:'',notes:''});
  };

  /* ── Record an egypt leave (engineer goes to Egypt for vacation) ──
     Adds a new entry to eng.egyptLeaves with returnDate=null.
     Auto-decrements d1/d2 in the current month for the days already
     covered by this new leave (so the disbursement reflects the leave
     immediately).
  ───────────────────────────────────────────────────────────── */
  const recordEgyptLeave=(engId,departureDate,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ عملية سابقة...','err');return;}
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(!isAdmin&&curProv!==userProv){msg('يمكنك تسجيل إجازة لمهندسى محافظتك فقط','err');return;}
    if(!departureDate){msg('اختار تاريخ النزول','err');return;}
    /* Validate against arrivalDate */
    if(engRec.arrivalDate&&departureDate<engRec.arrivalDate){
      msg('تاريخ النزول لا يمكن أن يكون قبل تاريخ القدوم','err');return;
    }
    /* Block if engineer already permanently departed before this leave date */
    if(engRec.departedAt&&departureDate>engRec.departedAt){
      msg('المهندس غادر نهائياً بتاريخ '+engRec.departedAt+' — لا يمكن تسجيل إجازة بعد المغادرة النهائية','err');return;
    }
    /* Reject if engineer already has an active (open) leave */
    const active=getActiveEgyptLeave(engRec);
    if(active){
      msg(`⚠️ هذا المهندس فى إجازة بالفعل من ${active.departureDate}`,'err');return;
    }
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const leaveEntry={
      id:'el_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      departureDate,
      returnDate:null,
      notes:notes||'',
      createdBy:user?.username||'admin',
      createdAt:new Date().toISOString()
    };
    /* Compute leave days in current month for d1/d2 decrement */
    const M=cfg.month||(now.getMonth()+1),Y=cfg.year||now.getFullYear();
    const dim=new Date(Y,M,0).getDate();
    const monthEnd=`${Y}-${String(M).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
    const monthStart=`${Y}-${String(M).padStart(2,'0')}-01`;
    let leaveDaysH1=0,leaveDaysH2=0;
    if(departureDate<=monthEnd){
      const leaveStartDay=departureDate>=monthStart?+departureDate.split('-')[2]:1;
      for(let d=leaveStartDay;d<=dim;d++){
        if(d<=15)leaveDaysH1++;else leaveDaysH2++;
      }
    }
    const newD1=Math.max(0,(+engRec.d1||0)-leaveDaysH1);
    const newD2=Math.max(0,(+engRec.d2||0)-leaveDaysH2);
    /* Cross-month sync: egyptLeaves is a global engineer-fact, must propagate to ALL months
       so the 'تسجيل العودة' button shows up regardless of which month the user is viewing.
       Active month gets full update (d1/d2 + egyptLeaves), other months get egyptLeaves only. */
    setMonths(prev=>{
      const out={...prev};
      let activeUpdated=null;
      Object.keys(out).forEach(k=>{
        if(k==='leaves')return;
        const md=out[k];
        if(!md?.data)return;
        let touched=false;
        const newData={};
        Object.keys(md.data).forEach(p=>{
          newData[p]=(md.data[p]||[]).map(e=>{
            if(e.id!==engId)return e;
            touched=true;
            if(k===ak){
              return{...e,egyptLeaves:[...(e.egyptLeaves||[]),leaveEntry],d1:newD1,d2:newD2,_d1Before:e.d1,_d2Before:e.d2};
            }else{
              return{...e,egyptLeaves:[...(e.egyptLeaves||[]),leaveEntry]};
            }
          });
        });
        if(touched){
          out[k]={...md,data:newData,savedAt:null};
          if(k===ak)activeUpdated=out[k]; else queueSave(k,out[k]);
        }
      });
      if(activeUpdated)queueSave(ak,activeUpdated);
      return out;
    });
    logActivity('تسجيل نزول إجازة',`${engRec.name} — من ${curProv.replace('محافظة ','')} بتاريخ ${departureDate}${notes?' · '+notes:''}`);
    msg(`✈️ ${engRec.name} نزل إجازة فى ${departureDate}`);
    setModal(null);
    setEgyptLeaveForm({engId:'',date:'',notes:''});
  };

  /* ── Record return from egypt leave ─────────────────
     Updates the active leave entry with returnDate. Restores d1/d2
     for days from returnDate to end of month (engineer is back).
  ───────────────────────────────────────────────────── */
  const recordEgyptReturn=(engId,returnDate,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ عملية سابقة...','err');return;}
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(!isAdmin&&curProv!==userProv){msg('يمكنك تسجيل عودة لمهندسى محافظتك فقط','err');return;}
    if(!returnDate){msg('اختار تاريخ العودة','err');return;}
    const active=getActiveEgyptLeave(engRec);
    if(!active){msg('هذا المهندس ليس فى إجازة حالياً','err');return;}
    if(returnDate<=active.departureDate){msg('تاريخ العودة يجب أن يكون بعد تاريخ النزول','err');return;}
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    /* Compute days in current month from return-date to end-of-month → restore as P-eligible */
    const M=cfg.month||(now.getMonth()+1),Y=cfg.year||now.getFullYear();
    const dim=new Date(Y,M,0).getDate();
    const monthEnd=`${Y}-${String(M).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
    const monthStart=`${Y}-${String(M).padStart(2,'0')}-01`;
    let restoreH1=0,restoreH2=0;
    if(returnDate<=monthEnd&&returnDate>=monthStart){
      const startD=+returnDate.split('-')[2];
      for(let d=startD;d<=dim;d++){
        if(d<=15)restoreH1++;else restoreH2++;
      }
    }else if(returnDate<monthStart){
      /* Return before this month started; nothing to restore in current month */
    }
    const newD1=Math.min(15,(+engRec.d1||0)+restoreH1);
    const newD2=Math.min(15,(+engRec.d2||0)+restoreH2);
    /* Cross-month sync: closing the egyptLeaves entry must propagate to ALL months
       so the button reverts to 'تسجيل نزول' regardless of which month is being viewed. */
    setMonths(prev=>{
      const out={...prev};
      let activeUpdated=null;
      Object.keys(out).forEach(k=>{
        if(k==='leaves')return;
        const md=out[k];
        if(!md?.data)return;
        let touched=false;
        const newData={};
        Object.keys(md.data).forEach(p=>{
          newData[p]=(md.data[p]||[]).map(e=>{
            if(e.id!==engId)return e;
            const newLeaves=(e.egyptLeaves||[]).map(l=>l.id===active.id?{...l,returnDate,returnNotes:notes||'',returnAt:new Date().toISOString()}:l);
            touched=true;
            if(k===ak){
              return{...e,egyptLeaves:newLeaves,d1:newD1,d2:newD2};
            }else{
              return{...e,egyptLeaves:newLeaves};
            }
          });
        });
        if(touched){
          out[k]={...md,data:newData,savedAt:null};
          if(k===ak)activeUpdated=out[k]; else queueSave(k,out[k]);
        }
      });
      if(activeUpdated)queueSave(ak,activeUpdated);
      return out;
    });
    logActivity('تسجيل عودة من إجازة',`${engRec.name} — رجع فى ${returnDate} (نزل ${active.departureDate})${notes?' · '+notes:''}`);
    msg(`🟢 ${engRec.name} رجع من إجازة فى ${returnDate}`);
    setModal(null);
    setEgyptLeaveForm({engId:'',date:'',notes:''});
  };

  /* ── Edit egypt-leave dates (cross-month sync) ──────────
     Updates departureDate and/or returnDate of an existing leave entry
     across all months. Validates end > start. d1/d2 NOT recomputed —
     user is expected to manually adjust attendance days if dates shift. */
  const editEgyptLeaveDates=(engId,leaveId,newDeparture,newReturn)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(!newDeparture){msg('تاريخ النزول مطلوب','err');return;}
    if(newReturn&&newReturn<=newDeparture){msg('تاريخ العودة يجب أن يكون بعد تاريخ النزول','err');return;}
    let engName='مهندس',engProv=null;
    PROVS.forEach(p=>{const f=(dataRaw[p]||[]).find(e=>e.id===engId);if(f){engName=f.name;engProv=p;}});
    if(!isAdmin&&engProv!==userProv){msg('يمكنك تعديل إجازات مهندسي محافظتك فقط','err');return;}
    setMonths(prev=>{
      const out={...prev};
      Object.keys(out).forEach(k=>{
        if(k==='leaves')return;
        const md=out[k];
        if(!md?.data)return;
        let touched=false;
        const newData={};
        Object.keys(md.data).forEach(p=>{
          newData[p]=(md.data[p]||[]).map(e=>{
            if(e.id!==engId||!e.egyptLeaves)return e;
            const newLeaves=(e.egyptLeaves||[]).map(l=>l.id===leaveId?{...l,departureDate:newDeparture,returnDate:newReturn||null}:l);
            touched=true;
            return{...e,egyptLeaves:newLeaves};
          });
        });
        if(touched){
          out[k]={...md,data:newData,savedAt:null};
          queueSave(k,out[k]);
        }
      });
      return out;
    });
    logActivity('تعديل إجازة مصر',`${engName} — تواريخ جديدة: ${newDeparture}${newReturn?' → '+newReturn:' (مفتوحة)'}`);
    msg(`✏️ تم تعديل تواريخ إجازة ${engName}`);
  };

  /* ── Cancel/delete egypt-leave entirely ─────────────────
     daysAction: 'empty' | 'present' | 'absent'
       - empty: clear AL/SL/EL/TXR cells in the leave range (set to nothing)
       - present: set those cells to 'P'
       - absent: set those cells to 'A'
     Also restores d1/d2 from _d1Before/_d2Before on the active month if available. */
  const cancelEgyptLeave=(engId,leaveId,daysAction)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    let engName='مهندس',engProv=null,leave=null;
    PROVS.forEach(p=>{
      const f=(dataRaw[p]||[]).find(e=>e.id===engId);
      if(f){engName=f.name;engProv=p;leave=(f.egyptLeaves||[]).find(l=>l.id===leaveId);}
    });
    if(!leave){
      /* Cross-month lookup */
      Object.values(months).forEach(m=>{
        if(leave||!m?.data)return;
        Object.values(m.data).forEach(arr=>{
          if(leave||!Array.isArray(arr))return;
          const e=arr.find(x=>x?.id===engId);
          if(e?.egyptLeaves)leave=e.egyptLeaves.find(l=>l.id===leaveId);
        });
      });
    }
    if(!leave){msg('الإجازة غير موجودة','err');return;}
    if(!isAdmin&&engProv!==userProv){msg('يمكنك إلغاء إجازات مهندسي محافظتك فقط','err');return;}
    const dep=leave.departureDate;
    const ret=leave.returnDate;
    /* Compute affected days range: dep → (ret-1) for closed, dep → today for open.
       Uses global timezone-safe helpers (subOneDayYmd/todayYmd). */
    const todayIso=todayYmd();
    const lastDay=ret?subOneDayYmd(ret):todayIso;
    setMonths(prev=>{
      const out={...prev};
      Object.keys(out).forEach(k=>{
        if(k==='leaves')return;
        const md=out[k];
        if(!md?.data)return;
        let dataChanged=false,attChanged=false;
        const newData={};
        Object.keys(md.data).forEach(p=>{
          newData[p]=(md.data[p]||[]).map(e=>{
            if(e.id!==engId)return e;
            const newLeaves=(e.egyptLeaves||[]).filter(l=>l.id!==leaveId);
            const nextE={...e,egyptLeaves:newLeaves};
            dataChanged=true;
            /* Restore d1/d2 only on the active month where they were stored */
            if(k===ak){
              if(e._d1Before!==undefined){nextE.d1=e._d1Before;delete nextE._d1Before;}
              if(e._d2Before!==undefined){nextE.d2=e._d2Before;delete nextE._d2Before;}
            }
            return nextE;
          });
        });
        /* Update attendance cells in this month for the leave range */
        const newAtt=md.attendance?{...md.attendance}:{};
        if(daysAction!=='empty'||true){
          const monthY=+k.split('-')[0],monthM=+k.split('-')[1];
          const dim=new Date(monthY,monthM,0).getDate();
          for(let d=1;d<=dim;d++){
            const ds=`${monthY}-${String(monthM).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            if(ds<dep||ds>lastDay)continue;
            if(new Date(monthY,monthM-1,d).getDay()===5)continue;
            if(!newAtt[engId])newAtt[engId]={};
            else newAtt[engId]={...newAtt[engId]};
            if(daysAction==='empty'){if(newAtt[engId][d]){delete newAtt[engId][d];attChanged=true;}}
            else if(daysAction==='present'){newAtt[engId][d]={s:'P'};attChanged=true;}
            else if(daysAction==='absent'){newAtt[engId][d]={s:'A'};attChanged=true;}
          }
        }
        if(dataChanged||attChanged){
          out[k]={...md,data:newData,attendance:newAtt,savedAt:null};
          queueSave(k,out[k]);
        }
      });
      return out;
    });
    logActivity('إلغاء إجازة مصر',`${engName} — ${dep}${ret?' → '+ret:' (كانت مفتوحة)'} · الأيام: ${{empty:'فارغة',present:'حاضر',absent:'غائب'}[daysAction]||daysAction}`);
    msg(`🗑️ تم إلغاء إجازة ${engName}`);
  };

  /* ── Undo a transfer ────────────────────────────────────
     Removes the transfer entry from eng.transfers AND moves the
     engineer back to transfer.from. Activity log entry is deleted
     too, so it's a clean undo (not a counter-transfer).

     Permissions:
       - admin: any transfer
       - province: only own transfers (transfer.by === username)
                   and only within 24h of the transfer
       - viewer: blocked

     Constraint: only the LATEST transfer can be undone (chronological).
     Earlier transfers are immutable history once a newer transfer exists.
  ──────────────────────────────────────────────────────── */
  const undoTransfer=(engId,transferId)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    /* Find engineer in active month — use dataRaw so we can find egypt-transferred engineers too */
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود — لا يمكن التراجع','err');return;}
    /* ── Egypt-leave undo: remove the entry, restore d1/d2, optionally re-open closed leave ── */
    const leaves=getEgyptLeaves(engRec);
    const leaveIdx=leaves.findIndex(l=>l.id===transferId);
    if(leaveIdx!==-1){
      const lv=leaves[leaveIdx];
      const isClosedReturn=!!lv.returnDate;
      if(!isAdmin){
        const tBy=lv.createdBy;
        if(tBy!==user?.username){msg('غير مصرح','err');return;}
        const ageMs=Date.now()-new Date(lv.createdAt||0).getTime();
        if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة)','err');return;}
      }
      /* Cross-month sync: undo must propagate to ALL months that have this engineer
         so the egypt-leave entry is fully removed from history regardless of view. */
      setMonths(prev=>{
        const out={...prev};
        let activeUpdated=null;
        Object.keys(out).forEach(k=>{
          if(k==='leaves')return;
          const md=out[k];
          if(!md?.data)return;
          let touched=false;
          const newData={};
          Object.keys(md.data).forEach(p=>{
            newData[p]=(md.data[p]||[]).map(e=>{
              if(e.id!==engId)return e;
              const newLeaves=(e.egyptLeaves||[]).filter(l=>l.id!==transferId);
              const nextE={...e,egyptLeaves:newLeaves};
              touched=true;
              /* Restore d1/d2 from _d1Before/_d2Before only on the active month
                 (those flags were set there by recordEgyptLeave) */
              if(k===ak){
                if(e._d1Before!==undefined){nextE.d1=e._d1Before;delete nextE._d1Before;}
                if(e._d2Before!==undefined){nextE.d2=e._d2Before;delete nextE._d2Before;}
              }
              return nextE;
            });
          });
          if(touched){
            out[k]={...md,data:newData,savedAt:null};
            if(k===ak)activeUpdated=out[k]; else queueSave(k,out[k]);
          }
        });
        if(activeUpdated)queueSave(ak,activeUpdated);
        return out;
      });
      fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
        const matches=(d.logs||[]).filter(l=>(l.action==='تسجيل نزول إجازة'||l.action==='تسجيل عودة من إجازة')&&l.detail.includes(engRec.name)&&(l.detail.includes(lv.departureDate)||(lv.returnDate&&l.detail.includes(lv.returnDate))));
        if(matches.length>0){
          return fetch('/api/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({ids:matches.map(m=>m.id)})});
        }
      }).catch(()=>{});
      msg(`✓ تم التراجع عن ${isClosedReturn?'العودة':'النزول'} — ${engRec.name}`);
      setUndoConfirm(null);
      return;
    }
    /* ── Egypt-transfer undo: special path — restore engineer (remove egyptTransfer field) ── */
    if(engRec.egyptTransfer&&engRec.egyptTransfer.id===transferId){
      const tr=engRec.egyptTransfer;
      if(!isAdmin){
        if(tr.by!==user?.username){msg('غير مصرح','err');return;}
        const ageMs=Date.now()-new Date(tr.at).getTime();
        if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة)','err');return;}
      }
      const nd=dc(dataRaw);
      nd[curProv]=(nd[curProv]||[]).map(e=>{
        if(e.id!==engId)return e;
        const{egyptTransfer,...rest}=e;
        return rest;
      });
      const updated={...mkMonthBase(),data:nd,savedAt:null};
      setMonths(prev=>({...prev,[ak]:updated}));
      queueSave(ak,updated);
      fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
        const matches=(d.logs||[]).filter(l=>l.action==='نقل لمصر'&&l.detail.includes(engRec.name)&&l.detail.includes(tr.date));
        if(matches.length>0){
          return fetch('/api/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({ids:matches.map(m=>m.id)})});
        }
      }).catch(()=>{});
      msg(`✓ تم التراجع — ${engRec.name} رجع إلى ${curProv}`);
      setUndoConfirm(null);
      return;
    }
    const ts=getTransfers(engRec);
    if(ts.length===0){msg('لا يوجد نقل لهذا المهندس','err');return;}
    /* Find transfer by id (or fall back to `at` for legacy) */
    const tIdx=ts.findIndex(t=>(t.id||t.at)===transferId);
    if(tIdx===-1){msg('النقل غير موجود','err');return;}
    /* Only undo the LATEST (chronological — last in sorted array) */
    if(tIdx!==ts.length-1){
      msg('⚠️ يمكن التراجع عن آخر نقل فقط — هذا النقل تتبعه نقلات أخرى','err');
      return;
    }
    const tr=ts[tIdx];
    /* Province perm: must own + within 24h */
    if(!isAdmin){
      if(tr.by!==user?.username){msg('غير مصرح — هذا النقل ليس من قِبَلك','err');return;}
      const ageMs=Date.now()-new Date(tr.at).getTime();
      if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة) — تواصل مع الأدمن','err');return;}
    }
    /* Confirmation already shown in UI — proceed */
    const nd=dc(dataRaw);
    nd[curProv]=(nd[curProv]||[]).filter(e=>e.id!==engId);
    const newTransfers=ts.filter((_,i)=>i!==tIdx);
    const updatedEng={...engRec,prov:tr.from,transfers:newTransfers};
    nd[tr.from]=[...(nd[tr.from]||[]),updatedEng];
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    /* Clean the matching activity log entry — fetch logs, find by detail, delete by id */
    fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
      const matches=(d.logs||[]).filter(l=>
        l.action==='نقل مهندس' &&
        l.detail.includes(engRec.name) &&
        l.detail.includes(tr.date) &&
        l.detail.includes(tr.from.replace('محافظة ','')) &&
        l.detail.includes(tr.to.replace('محافظة ',''))
      );
      if(matches.length>0){
        return fetch('/api/activity',{
          method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',
          body:JSON.stringify({ids:matches.map(m=>m.id)})
        });
      }
    }).catch(()=>{});
    msg(`✓ تم التراجع — ${engRec.name} رجع إلى ${tr.from}`);
    setUndoConfirm(null);
  };

  const togglePaidHalf=(p,id,half)=>{
    if(lockGuard())return;
    /* Province user can only toggle paid for their own province */
    if(isProvince&&p!==userProv){msg('غير مصرح','err');return;}
    const nd=dc(dataRaw);
    nd[p]=nd[p].map(e=>{
      if(e.id!==id)return e;
      const cur1=isP1(e),cur2=isP2(e);
      const out={...e,paid1:half===1?!cur1:cur1,paid2:half===2?!cur2:cur2};
      delete out.paid;
      return out;
    });
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };
  const togglePaid1=(p,id)=>togglePaidHalf(p,id,1);
  const togglePaid2=(p,id)=>togglePaidHalf(p,id,2);

  const markAllPaid=(paid,half,onlyProv)=>{
    if(lockGuard())return;
    const nd=dc(dataRaw);
    /* onlyProv → mark just that province; else province user marks own, admin marks all */
    const provsScope=onlyProv?[onlyProv]:(isProvince?[userProv].filter(Boolean):PROVS);
    provsScope.forEach(p=>{nd[p]=(nd[p]||[]).map(e=>{
      if(e.egyptTransfer)return e;
      const cur1=isP1(e),cur2=isP2(e);
      const out={...e,paid1:half===1||half==='both'?paid:cur1,paid2:half===2||half==='both'?paid:cur2};
      delete out.paid;
      return out;
    });});
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    const lbl=half===1?'النصف الأول':half===2?'النصف الثاني':'الكل';
    msg(paid?`تم تأشير ${lbl} كمدفوع ✓`:`تم إلغاء ${lbl}`);
  };


  /* ── Attendance helpers ───────────────────────────────
     Engineers in Libya don't take regular AL or EL leave — they only get:
     - egypt-leave (recorded via the egypt-leave button, not as cell status)
     - sick leave (SL)
     - and the standard cell statuses (P/EG/A/H/TXR)
     AL & EL are kept in the label/short/color maps so HISTORICAL data still
     renders correctly, but they're excluded from ATT_CYCLE so new entries
     can't pick them through the popup. */
  const ATT_CYCLE=[null,'P','EG','A','SL','TXR','H'];
  const ATT_LABEL={P:'حاضر',EG:'فى مصر',A:'غائب',AL:'إجازة',SL:'مرضية',EL:'طارئة',H:'عطلة',EGL:'إجازة (مصر)',TXR:'متأخر'};
  const ATT_SHORT={P:'ح',EG:'م',A:'غ',AL:'س',SL:'مر',EL:'ط',H:'ع',EGL:'م',TXR:'⚠'};
  const ATT_COL={P:'#10B981',EG:'#3B82F6',A:'#EF4444',AL:'#FCD34D',SL:'#FB923C',EL:'#A78BFA',H:'#94A3B8',EGL:'#EA580C',TXR:'#F59E0B'};
  const ATT_BG={P:'rgba(16,185,129,.2)',EG:'rgba(59,130,246,.18)',A:'rgba(239,68,68,.15)',AL:'rgba(252,211,77,.15)',SL:'rgba(249,115,22,.15)',EL:'rgba(167,139,250,.15)',H:'rgba(148,163,184,.1)',EGL:'rgba(234,88,12,.18)',TXR:'rgba(245,158,11,.18)'};

  const attCycleStatus=(engId,day)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const a=existing.attendance||{};
    const cur=a[engId]?.[day]?.s||null;
    const next=ATT_CYCLE[(ATT_CYCLE.indexOf(cur)+1)%ATT_CYCLE.length];
    const na=JSON.parse(JSON.stringify(a));
    if(!na[engId])na[engId]={};
    if(next===null)delete na[engId][day];
    else na[engId][day]={...(na[engId]?.[day]||{}),s:next};
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
  };

  /* ── Attendance day object schema ────────────────────────
     Attendance is stored as JSON inside months.attendance:
       attendance[engId][day] = {
         s:  'P'|'A'|'AL'|'SL'|'EL'|'EG'|'H'|'TXR' (status code),
         in:  'HH:MM' (optional check-in time),
         out: 'HH:MM' (optional check-out time),
         lateH: 0-12 (late hours, only when s === 'TXR'),
         lateM: 0-59 (late minutes, only when s === 'TXR')
       }
     New fields lateH/lateM are no-op when status isn't 'TXR'.
     No SQL migration needed — attendance column is a JSON blob.
  ──────────────────────────────────────────────────────── */
  /* Format late time as HH:MM or "—" if no late time */
  const formatLate=(h,m)=>{
    const hh=+h||0,mm=+m||0;
    if(hh===0&&mm===0)return '—';
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  };
  /* Returns total late minutes for an engineer in a month (sum of all TXR days) */
  const totalLateMinutes=(att,engId)=>{
    const days=att?.[engId]||{};
    let total=0;
    Object.values(days).forEach(d=>{
      if(d?.s==='TXR')total+=((+d.lateH||0)*60)+(+d.lateM||0);
    });
    return total;
  };
  /* Format total minutes as HH:MM */
  const formatTotalLate=(mins)=>{
    if(!mins)return '00:00';
    const h=Math.floor(mins/60),m=mins%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  };

  const attSetStatus=(engId,day,status)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    if(!na[engId])na[engId]={};
    if(na[engId]?.[day]?.s===status)delete na[engId][day];
    else na[engId][day]={...(na[engId]?.[day]||{}),s:status};
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
  };

  /* Set late time for a specific day. Status must be 'TXR' first. */
  const attSetLate=(engId,day,lateH,lateM)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    if(!na[engId])na[engId]={};
    const cur=na[engId][day]||{};
    /* Only allow setting late when status is TXR (or auto-promote if not set) */
    const newCell={...cur,s:'TXR',lateH:Math.max(0,Math.min(12,+lateH||0)),lateM:Math.max(0,Math.min(59,+lateM||0))};
    na[engId][day]=newCell;
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
    /* Find engineer name for nicer log + undo */
    let engName='مهندس';
    PROVS.forEach(p=>{const f=(attData[p]||[]).find(e=>e.id===engId);if(f)engName=f.name;});
    /* Detail format must be parseable for undo: '<name> — يوم <day> (<key>) — <HH:MM>' */
    logActivity('تسجيل تأخير',`${engName} — يوم ${day} (${attKey}) — ${formatLate(lateH,lateM)} [engId:${engId}]`);
  };

  /* Undo a late entry: clear lateH/lateM + remove cell entirely (back to empty) */
  const undoLateEntry=(engId,monthKey,day)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    const existingM=months[monthKey];
    if(!existingM){msg('الشهر غير موجود','err');return;}
    const na=JSON.parse(JSON.stringify(existingM.attendance||{}));
    if(na[engId]&&na[engId][day]){
      const cur=na[engId][day];
      if(cur.s==='TXR'){
        delete na[engId][day];
        if(Object.keys(na[engId]).length===0)delete na[engId];
        const upd={...existingM,attendance:na,savedAt:null};
        setMonths(prev=>({...prev,[monthKey]:upd}));
        queueSave(monthKey,upd);
        /* Delete matching activity log entries */
        fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
          const matches=(d.logs||[]).filter(l=>l.action==='تسجيل تأخير'&&l.detail&&l.detail.includes(`[engId:${engId}]`)&&l.detail.includes(`(${monthKey})`)&&l.detail.includes(`يوم ${day} `));
          if(matches.length>0){
            return fetch('/api/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({ids:matches.map(m=>m.id)})});
          }
        }).catch(()=>{});
        msg('✓ تم التراجع عن تسجيل التأخير');
      }else{
        msg('الخلية ليست متأخرة','err');
      }
    }else{
      msg('لا يوجد تسجيل لهذا اليوم','err');
    }
    setUndoConfirm(null);
  };

  const attFillMonth=(provFilter)=>{
    if(attLockGuard())return;
    const dIM=new Date(attCfg.year,attCfg.month,0).getDate();
    const provs=provFilter?[provFilter]:PROVS;
    const allEngs=provs.flatMap(p=>attData[p]||[]);
    const wDays=Array.from({length:dIM},(_,i)=>i+1).filter(d=>new Date(attCfg.year,attCfg.month-1,d).getDay()!==5);
    const mn2=MONTHS[attCfg.month-1]+" "+attCfg.year;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    wDays.forEach(d=>{allEngs.forEach(eng=>{if(!na[eng.id])na[eng.id]={};if(!na[eng.id][d]?.s)na[eng.id][d]={...(na[eng.id][d]||{}),s:"P"};});});
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
    logActivity('تحضير حضور',mn2+(provFilter?' — '+provFilter.replace('محافظة ',''):''));
    msg("تم تحضير "+mn2+" كاملاً ✓");
  };

  const attClearMonth=(provFilter)=>{
    if(attLockGuard())return;
    const provs=provFilter?[provFilter]:PROVS;
    const allEngs=provs.flatMap(p=>attData[p]||[]);
    const mn2=MONTHS[attCfg.month-1]+" "+attCfg.year;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    allEngs.forEach(eng=>{
      if(!na[eng.id])return;
      Object.keys(na[eng.id]).forEach(d=>{if(na[eng.id][d]?.s==='P')delete na[eng.id][d];});
      if(Object.keys(na[eng.id]).length===0)delete na[eng.id];
    });
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
    logActivity('إلغاء تحضير حضور',mn2+(provFilter?' — '+provFilter.replace('محافظة ',''):''));
    msg("تم إلغاء تحضير "+mn2+" ✓");
  };

  const attClearCell=(engId,day)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const prevSt=(existing.attendance||{})[engId]?.[day]?.s||null;
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    if(na[engId])delete na[engId][day];
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
    /* Log only if there was actually something to clear */
    if(prevSt){
      let engName='مهندس';
      PROVS.forEach(p=>{const f=(attData[p]||[]).find(e=>e.id===engId);if(f)engName=f.name;});
      logActivity('مسح حالة حضور',`${engName} — يوم ${day} (${attKey}) — كانت: ${ATT_LABEL[prevSt]||prevSt}`);
    }
  };

  const saveLeaves=async(list,statuses)=>{
    const sts=statuses!==undefined?statuses:engineerStatuses;
    const upd={requests:list,engineerStatuses:sts};
    setMonths(p=>({...p,'leaves':upd}));
    // await: discrete action — لا نظهر toast إلا بعد استلام رد السيرفر
    try{await fetch('/api/months/leaves',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(upd)});}catch(_){}
  };
  const setEngStatus=async(engId,status)=>{
    const ns={...engineerStatuses};
    if(status==='active')delete ns[engId];else ns[engId]=status;
    await saveLeaves(leaves,ns);
  };

  /* ── Permanent departure (نقل لمصر نهائياً) ─────────────
     Sets `departedAt` on the engineer across ALL months (cross-month propagation
     so the filter works consistently regardless of which month is viewed).
     If departedAt is in the departure month, auto-marks EG attendance for days
     after departure in that month + clears any EG marks before departure.
     Pass departedAt='' or null to CLEAR the departure (undo). */
  const setPermaDeparture=(engId,departedAt)=>{
    if(lockGuard())return;
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    const isClear=!departedAt;
    /* Build cross-month updates */
    const propUpdates={};
    const allKeys=Object.keys(months).filter(k=>k!=='leaves');
    allKeys.forEach(key=>{
      const m=months[key];
      if(!m?.data)return;
      const[yStr,mStr]=key.split('-');
      const Y=+yStr,M=+mStr;
      const dim=new Date(Y,M,0).getDate();
      let mutated=false;
      const newData={...m.data};
      Object.keys(newData).forEach(p=>{
        const list=newData[p]||[];
        const idx=list.findIndex(e=>e.id===engId);
        if(idx<0)return;
        const cur=list[idx];
        if(isClear){
          if(cur.departedAt){
            const newList=[...list];
            const{departedAt:_,...rest}=cur;
            newList[idx]=rest;
            newData[p]=newList;
            mutated=true;
          }
        }else{
          if(cur.departedAt!==departedAt){
            const newList=[...list];
            newList[idx]={...cur,departedAt};
            newData[p]=newList;
            mutated=true;
          }
        }
      });
      /* Auto-EG attendance handling: only the departure month is affected */
      let newAtt=m.attendance||{};
      const depParts=isClear?null:departedAt.split('-').map(Number);
      const isDepartureMonth=!isClear&&depParts&&depParts[0]===Y&&depParts[1]===M;
      if(isDepartureMonth||isClear){
        const ea={...(newAtt[engId]||{})};
        let attChanged=false;
        if(isClear){
          /* On clear, only remove auto-flagged EG cells (those we may have set). We can't
             distinguish auto vs manual perfectly, so we leave attendance untouched. The
             admin can manually adjust. */
        }else{
          const depDay=depParts[2];
          for(let d=depDay+1;d<=dim;d++){
            if(!ea[d]||ea[d].s!=='EG'){ea[d]={s:'EG'};attChanged=true;}
          }
        }
        if(attChanged){
          newAtt={...newAtt,[engId]:ea};
          mutated=true;
        }
      }
      if(mutated){
        propUpdates[key]={...m,data:newData,attendance:newAtt,savedAt:null};
      }
    });
    if(Object.keys(propUpdates).length===0){
      msg(isClear?'لا يوجد تاريخ مغادرة للحذف':'لا تغيير','err');
      return;
    }
    setMonths(prev=>({...prev,...propUpdates}));
    Object.entries(propUpdates).forEach(([k,v])=>queueSave(k,v));
    logActivity(isClear?'إلغاء المغادرة النهائية':'نقل لمصر نهائياً',`المهندس · ${departedAt||'—'}`);
    msg(isClear?'تم إلغاء المغادرة النهائية ✓':'تم تسجيل المغادرة النهائية ✓');
    setPermaDepartForm(null);
  };
  const postponeLeave=(reqId,newDate,reason)=>{
    fetch('/api/leaves/'+reqId,{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({postpone:{newDate,reason}})})
    .then(r=>r.json()).then(d=>{
      if(!d.ok)return;
      setMonths(p=>({...p,'leaves':{...p['leaves'],requests:leaves.map(l=>l.id===reqId?d.request:l)}}));
      setLeaveActionForm(null);msg('تم تأجيل التذكرة ✓');
    }).catch(()=>{});
  };
  const cancelTicket=(reqId,reason)=>{
    fetch('/api/leaves/'+reqId,{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({cancelTicket:{reason}})})
    .then(r=>r.json()).then(d=>{
      if(!d.ok)return;
      setMonths(p=>({...p,'leaves':{...p['leaves'],requests:leaves.map(l=>l.id===reqId?d.request:l)}}));
      setLeaveActionForm(null);msg('تم إلغاء التذكرة');
    }).catch(()=>{});
  };

  const calcEligibility=(engId)=>{
    const allDays=[];
    Object.entries(months).forEach(([key,mdata])=>{
      if(key==='leaves'||!mdata?.attendance)return;
      const parts=key.split('-');const y=+parts[0],m=+parts[1];
      const ea=mdata.attendance[engId]||{};
      Object.entries(ea).forEach(([d,dd])=>{if(dd?.s&&dd.s!=='A')allDays.push({date:new Date(y,m-1,+d),s:dd.s});});
    });

  const attGetStats=(engId,att,year,month)=>{
    const ea=att[engId]||{};
    let P=0,A=0,AL=0,SL=0,EL=0,H=0,mins=0;
    Object.values(ea).forEach(d=>{
      if(!d?.s)return;
      if(d.s==='P'){P++;if(d.in&&d.out){const[ih,im]=d.in.split(':').map(Number);const[oh,om]=d.out.split(':').map(Number);const dm=(oh*60+om)-(ih*60+im);if(dm>0)mins+=dm;else mins+=8*60;}else mins+=8*60;}
      else if(d.s==='A')A++;else if(d.s==='AL')AL++;else if(d.s==='SL')SL++;else if(d.s==='EL')EL++;else if(d.s==='H')H++;
    });
    if(year&&month){const dim=new Date(year,month,0).getDate();for(let d=1;d<=dim;d++)if(new Date(year,month-1,d).getDay()===5)H++;}
    /* ── Egypt-leave OVERRIDE (تطبيق على كل الإحصاءات) ──
       لو المهندس فى إجازة مصر يوم معين، الـ cell بيظهر 'م' بغضّ النظر عن
       الـ status اليدوى (P/A/إلخ). كده الـ summary لازم يطرح الأيام دى من
       حسابات الحضور والغياب عشان الأرقام تطابق الخلايا.

       هذا التطبيق هنا داخل attGetStats يجعل كل الـ call sites (live grid،
       header summary، Excel، history، PDFs) متطابقة تلقائيًا — بدلاً من
       تكرار المنطق فى كل مكان.
       اشتراك ساعات العمل (mins) ما يتأثرش هنا — يفترض الإصلاح مفروض يخصم
       ساعات أيام الإجازة من mins. سنعالجه بنفس المنطق. */
    let pInLeave=0,aInLeave=0,egyptDays=0,minsInLeave=0;
    if(year&&month){
      /* فحص cross-month: لو الـ egyptLeaves[] مسجلة على سجل المهندس فى أى شهر،
         الفحص لازم يلاقيها. فاحص داخلى يبحث عبر كل سجلات هذا المهندس. */
      const _isEgyptLeaveDay=(ds)=>{
        try{
          for(const k of Object.keys(months||{})){
            if(k==='leaves')continue;
            const md=months[k];if(!md?.data)continue;
            for(const p of Object.keys(md.data)){
              const e=(md.data[p]||[]).find(x=>x?.id===engId);
              if(e&&isOnEgyptLeaveDate(e,ds))return true;
            }
          }
        }catch(_){}
        return false;
      };
      const dim=new Date(year,month,0).getDate();
      for(let d=1;d<=dim;d++){
        if(new Date(year,month-1,d).getDay()===5)continue; /* تجاهل الجمعة */
        const ds=`${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(_isEgyptLeaveDay(ds)){
          egyptDays++;
          const cell=ea[d];const cellSt=cell?.s;
          if(cellSt==='P'){
            pInLeave++;
            /* اطرح ساعات هذا اليوم من mins */
            if(cell.in&&cell.out){
              const[ih,im]=cell.in.split(':').map(Number);
              const[oh,om]=cell.out.split(':').map(Number);
              const dm=(oh*60+om)-(ih*60+im);
              minsInLeave+=dm>0?dm:8*60;
            }else{
              minsInLeave+=8*60;
            }
          }else if(cellSt==='A')aInLeave++;
        }
      }
    }
    const adjP=Math.max(0,P-pInLeave);
    const adjA=Math.max(0,A-aInLeave);
    const adjMins=Math.max(0,mins-minsInLeave);
    return{
      /* ADJUSTED counts — egypt-leave OVERRIDE applied (default — استخدمها فى الـ summary) */
      P:adjP,A:adjA,
      hrs:Math.floor(adjMins/60),min:adjMins%60,
      /* RAW counts — قبل الـ override (للأماكن النادرة اللى محتاجة الرقم الخام) */
      Praw:P,Araw:A,hrsRaw:Math.floor(mins/60),
      /* Egypt-leave breakdown */
      egyptDays,pInLeave,aInLeave,
      /* الإجازات الرسمية (AL/SL/EL/H) — ما تتأثرش */
      AL,SL,EL,H,vac:AL+SL+EL
    };
  };

  /* ── Multi-month leave display helpers ──────────────────────────
     User-spec: for any leave (formal AL/SL/EL or egypt-leave) that
     spans across multiple months, the SUMMARY display shows the FULL
     duration in every month the leave overlaps. The financial calcs
     (d1/d2, daily allowance) are unaffected — they stay per-month.

     getDisplayLeaveDays(engId, y, m, sVac):
       ── قرار صريح من المستخدم: طلبات الإجازة (صفحة "طلبات إجازة مصر")
       منفصلة 100% عن سجل الحضور والانصراف. الموافقة على طلب لا تنشئ
       أو تعكس خلايا SL/AL — المستخدم يدخل الحالة بنفسه فى الجدول.

       لذلك هذه الدالة الآن ترجع cell-based SL count فقط (sVac كما هو)
       ولا تلتفت إلى months.leaves.requests. تم الإبقاء على الدالة كـ
       wrapper بدلاً من حذفها لتجنب تعديل كل الـ call sites. */
  const getDisplayLeaveDays=(engId,year,month,sVac)=>sVac||0;

  /* getDisplayEgyptLeaveDays(engId, y, m, sEgy):
     يرجع عدد أيام إجازة مصر (calendar days) الـ overlap مع الشهر (y,m).

     السلوك مختلف حسب حالة الإجازة:
     • إجازة مغلقة (returnDate موجود) → يحسب المدة الكاملة (cross-month)
       ويعرضها فى كل شهر تتشابك معه (مثلاً: 15 أبريل → 20 مايو = 35 يوم
       يظهر فى أبريل ومايو نفس الرقم).
     • إجازة مفتوحة (مفيش returnDate لسه) → يحسب أيام الشهر المعروض فقط
       (clipped). مثلاً مهندس نزل 15 أبريل ولسه فى مصر اليوم 8 مايو:
         - أبريل يعرض 16 (15→30 أبريل)
         - مايو يعرض 8 (1→8 مايو)
       لما تدخل تاريخ العودة، الرقم يتجمع تلقائياً فى الشهرين. */
  const getDisplayEgyptLeaveDays=(engId,year,month,sEgy)=>{
    if(!year||!month)return sEgy||0;
    const ms=`${year}-${String(month).padStart(2,'0')}-01`;
    const dim=new Date(year,month,0).getDate();
    const me=`${year}-${String(month).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
    /* Cross-month lookup of egyptLeaves */
    const seen=new Map();
    Object.keys(months).forEach(k=>{
      if(k==='leaves')return;
      const md=months[k];
      if(!md?.data)return;
      Object.keys(md.data).forEach(p=>{
        const e=(md.data[p]||[]).find(x=>x?.id===engId);
        if(e?.egyptLeaves)e.egyptLeaves.forEach(lv=>{if(lv.id)seen.set(lv.id,lv);});
      });
    });
    /* Use global timezone-safe helpers (todayYmd/subOneDayYmd/daysInclusive) */
    const todayLocal=todayYmd();
    const cmp=(a,b)=>a<b?-1:a>b?1:0;
    const max3=(a,b)=>cmp(a,b)>=0?a:b;
    const min3=(a,b)=>cmp(a,b)<=0?a:b;
    let total=0;
    for(const lv of seen.values()){
      const s=lv.departureDate;
      if(!s)continue;
      const isClosed=!!lv.returnDate;
      /* returnDate is exclusive (engineer is back ON that day) — last leave day = returnDate - 1.
         For an open leave (no returnDate), last day is today (local). */
      const lastDay=isClosed?subOneDayYmd(lv.returnDate):todayLocal;
      if(cmp(s,me)>0||cmp(lastDay,ms)<0)continue;
      let sd,ed;
      if(isClosed){
        /* CLOSED → الكل (يعرض المدة الكاملة فى كل شهر) */
        sd=s;ed=lastDay;
      }else{
        /* OPEN → اقطع على حدود الشهر المعروض */
        sd=max3(s,ms);ed=min3(lastDay,me);
      }
      if(cmp(ed,sd)<0)continue;
      const dayCount=daysInclusive(sd,ed);
      total+=Math.max(0,dayCount);
    }
    return total>0?total:(sEgy||0);
  };

    const provColors=["#1d4ed8","#15803d","#b45309","#6d28d9"];
    /* If monthKey override is given and differs from active month, build local bundle */
    const _useOverride=monthKey&&monthKey!==ak&&months[monthKey];
    const _data=_useOverride?(months[monthKey].data||{}):data;
    const _cfg=_useOverride?(months[monthKey].cfg||cfg):cfg;
    const _mn=_useOverride?MONTHS[(_cfg.month||1)-1]:mn;
    const _provs=isProvince?PROVS.filter(p=>p===userProv):PROVS; /* RP1: province user's PDF shows only own province (matches screen) */
    const _totals=_useOverride?_provs.map(p=>(_data[p]||[]).reduce((a,e)=>{const c=calc(e,_cfg.rate,_cfg.egp);return{n:a.n+1,a1:a.a1+c.a1,a2:a.a2+c.a2,tot:a.tot+c.tot,egp:a.egp+c.egp};},{n:0,a1:0,a2:0,tot:0,egp:0})):totals;
    const _G=_useOverride?_totals.reduce((a,t)=>({n:a.n+t.n,a1:a.a1+t.a1,a2:a.a2+t.a2,tot:a.tot+t.tot,egp:a.egp+t.egp}),{n:0,a1:0,a2:0,tot:0,egp:0}):G;
    const _allE=_useOverride?_provs.flatMap(p=>(_data[p]||[]).map(e=>({...e,prov:p}))):allE;
    const _exp=_useOverride?(months[monthKey].expenses||{custody:[],items:[],transfers:[]}):null;
    const _custody=_useOverride?(_exp.custody||[]):custody;
    const _expItems=_useOverride?(_exp.items||[]):expItems;
    const _expTotals=_useOverride?{
      itemsUSD:_expItems.reduce((a,e)=>a+(+e.usd||0),0),
      itemsLYD:_expItems.reduce((a,e)=>a+(+e.lyd||0),0),
      rentUSD:_expItems.filter(e=>e.type==="إيجار").reduce((a,e)=>a+(+e.usd||0),0),
      rentLYD:_expItems.filter(e=>e.type==="إيجار").reduce((a,e)=>a+(+e.lyd||0),0),
      msrfUSD:_expItems.filter(e=>e.type==="مصروف").reduce((a,e)=>a+(+e.usd||0),0),
      msrfLYD:_expItems.filter(e=>e.type==="مصروف").reduce((a,e)=>a+(+e.lyd||0),0),
      custTotalUSD:_custody.reduce((a,c)=>a+(+c.usd||0),0),
      custTotalLYD:_custody.reduce((a,c)=>a+(+c.lyd||0),0),
    }:expTotals;
    const rate=LIVE_EGP;
    /* halfMode helpers */

    const _halfLabel=halfMode===1?' — النصف الأول (1-15)':halfMode===2?' — النصف الثانى (16-آخر الشهر)':'';
    /* Build engsByProv with transfer-aware split — engineers transferred during the month appear in BOTH old and new prov with d1/d2 split */
    const _M=_cfg.month||1, _Y=_cfg.year||new Date().getFullYear();
    const _engsByProv={};
    _provs.forEach(p=>{_engsByProv[p]=engsInProvDuringMonth(p,_Y,_M,_data);});
    /* Recompute prov totals from split engineers so each prov gets its own portion.
       Includes manual oldDays (e.extra) — but only for non-split engineers (split rows show extra=0). */
    const _totalsSplit=_provs.map(p=>{
      const list=_engsByProv[p]||[];
      const dr=(+_cfg.rate||300)/30;
      return list.reduce((a,e)=>{
        const isSplit=!!e.needsSplit;

        const a1=d1*dr,a2=d2*dr,oldAmt=oldD*dr,tot=a1+a2+oldAmt,egp=tot*LIVE_EGP;
        return{n:a.n+1,a1:a.a1+a1,a2:a.a2+a2,oldDays:(a.oldDays||0)+oldD,oldAmt:(a.oldAmt||0)+oldAmt,tot:a.tot+tot,egp:a.egp+egp};
      },{n:0,a1:0,a2:0,oldDays:0,oldAmt:0,tot:0,egp:0});

    const _Gsplit=_totalsSplit.reduce((a,t)=>({n:a.n+t.n,a1:a.a1+t.a1,a2:a.a2+t.a2,oldDays:(a.oldDays||0)+(t.oldDays||0),oldAmt:(a.oldAmt||0)+(t.oldAmt||0),tot:a.tot+t.tot,egp:a.egp+t.egp}),{n:0,a1:0,a2:0,oldDays:0,oldAmt:0,tot:0,egp:0});

    const provRows=_provs.map((prov,pi)=>{

            }

        }
        /* Permanent-departure badge */
        if(e.hasDeparture){
          nameBadges+=`<br><span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#FEE2E2;color:#B91C1C;border:1px solid #FCA5A5;font-weight:800;margin-top:2px">📤 غادر نهائياً يوم ${e.departureDay}</span>`;
        }
        /* halfMode-aware row total: include the visible half(s) + manual old days */
        const _oldDays=isSplit?0:(+e.extra||0);
        const _oldAmt=c.oldAmt||0;
        const _rowTot=(_showH1?c.a1:0)+(_showH2?c.a2:0)+_oldAmt;
        const _rowEgp=_rowTot*LIVE_EGP;
        return `<tr style="background:${bg};">

    const wb=XLSX.utils.book_new();

    const days=Array.from({length:dIM},(_,i)=>i+1);
    const DAY_AR=["أح","إث","ث","أر","خ","ج","س"];
    const provsToDo=!isProvince?PROVS:[userProv].filter(Boolean);
    provsToDo.forEach(prov=>{
      /* Hide engineers who departed before this month */
      const engs=(data[prov]||[]).filter(e=>!isDepartedBeforeMonth(e,cfg.year,cfg.month));
      if(!engs.length)return;
      const header=["المهندس","التخصص",...days.map(d=>d+" "+DAY_AR[new Date(cfg.year,cfg.month-1,d).getDay()]),"حضور","غياب","إجازة مرضية","إجازة (مصر)","ساعات","أيام التأخير","إجمالى التأخير"];
      const rows=[header];
      /* Cross-month egypt-leave check for Excel cells */
      const isLeaveDayXL=(engId,dateStr)=>{
        for(const k of Object.keys(months)){
          if(k==='leaves')continue;
          const md=months[k];
          if(!md?.data)continue;
          for(const p of Object.keys(md.data)){
            const e=(md.data[p]||[]).find(x=>x?.id===engId);

          }

        return false;
      };
      engs.forEach(e=>{
        const s=attGetStats(e.id,att,cfg.year,cfg.month);
        const eAtt=att[e.id]||{};
        let lateDays=0,lateMins=0,egyptDays=0;
        const cells=days.map(d=>{
          const dd=eAtt[d];const st=dd?.s;
          const ds=`${cfg.year}-${String(cfg.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const isFri=new Date(cfg.year,cfg.month-1,d).getDay()===5;
          /* Egypt-leave OVERRIDE — takes priority over any manual status (except Fridays which stay as weekend) */
          if(!isFri&&isLeaveDayXL(e.id,ds)){
            egyptDays++;

          }
          if(st==='TXR'){

        rows.push([e.name,e.spec,...cells,s.P,s.A,vacFull,egyptFull||'—',s.hrs+"h",lateDays||'—',totalLate]);
      });
      const ws=XLSX.utils.aoa_to_sheet(rows);
      ws["!cols"]=[{wch:24},{wch:16},...days.map(()=>({wch:8})),{wch:6},{wch:6},{wch:6},{wch:11},{wch:7},{wch:11},{wch:14}];

  ${(()=>{
    /* Collect ALL active leaves OR leaves overlapping this month */
    const monthStart=`${Y}-${String(M).padStart(2,'0')}-01`;
    const dimComp=new Date(Y,M,0).getDate();
    const monthEnd=`${Y}-${String(M).padStart(2,'0')}-${String(dimComp).padStart(2,'0')}`;
    const onLeave=[];
    const _seenLv=new Set();
    /* DS4 fix: scan ALL months' data (dedup by engineer id) so a leave recorded in an
       earlier month still appears here — matches the cross-month "في إجازة الآن" count above. */
    Object.values(months||{}).forEach(mm=>{
      if(!mm?.data)return;
      Object.entries(mm.data).forEach(([prov,engs])=>(engs||[]).forEach(e=>{
        if(_seenLv.has(e.id))return;
        (e.egyptLeaves||[]).forEach(l=>{
          if(_seenLv.has(e.id))return;
          const overlaps=l.departureDate<=monthEnd&&(!l.returnDate||l.returnDate>=monthStart);
          if(overlaps){
            _seenLv.add(e.id);
            let daysInMonth=0;
            for(let d=1;d<=dimComp;d++){
              const ds=`${Y}-${String(M).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              if(l.departureDate<=ds&&(!l.returnDate||l.returnDate>ds))daysInMonth++;
            }
            onLeave.push({eng:e.name,prov:prov.replace('محافظة ',''),dep:l.departureDate,ret:l.returnDate||'لم يرجع بعد',days:daysInMonth,fromPrev:l.departureDate<monthStart});
          }
        });
      }));
    });
    onLeave.sort((a,b)=>(a.dep||'').localeCompare(b.dep||''));
