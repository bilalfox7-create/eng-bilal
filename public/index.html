        else if(dd<0)items.push({id:'rent-overdue-'+r.id,icon:'⚠️',lvl:'red',title:`إيجار متأخر: ${r.desc}`,subtitle:r.dueDate+' · '+(+r.lyd).toLocaleString('ar-EG')+' د.ل',action:()=>setPage('expenses')});
        else if(dd<=3)items.push({id:'rent-soon-'+r.id,icon:'📅',lvl:'yellow',title:`إيجار قريب: ${r.desc} (خلال ${dd} يوم)`,subtitle:(+r.lyd).toLocaleString('ar-EG')+' د.ل',action:()=>setPage('expenses')});
      });
      if(aggBalance.critical)items.push({id:'bal-c',icon:'⚠️',lvl:'red',title:'استهلاك مرتفع جداً',subtitle:`${aggBalance.pct}% مستخدم`,action:()=>setPage('expenses')});
      else if(aggBalance.low)items.push({id:'bal-l',icon:'⚠️',lvl:'yellow',title:'الاستهلاك مرتفع',subtitle:`${aggBalance.pct}% مستخدم`,action:()=>setPage('expenses')});

    return items.sort((a,b)=>(a.lvl==='red'?-1:1)-(b.lvl==='red'?-1:1));
  },[pendingLeaves,returnAlerts,monthRents,aggBalance,isProvince]);

  /* ── Close notifications dropdown on outside click ── */
  useEffect(()=>{

  /* ── Live clock — tick every second for the unified header ── */
  useEffect(()=>{
    const id=setInterval(()=>setClockNow(new Date()),1000);
    return()=>clearInterval(id);
  },[]);

  const engProfileData=useMemo(()=>{
    if(!engProfile)return null;
    const{eng,prov}=engProfile;
    const monthly=sortedKeys.filter(k=>k!=='leaves').map(k=>{
      const m=months[k];

    const engLeaves=leaves.filter(l=>l.engineerId===eng.id);

  const histStats=useMemo(()=>sortedKeys.filter(k=>months[k]?.savedAt).map(k=>{
    const m=months[k],[y,mo]=k.split("-");
    const tot=PROVS.reduce((a,p)=>(m.data?.[p]||[]).reduce((b,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return b+c.tot;},a),0);
    const provTots=PROVS.map(p=>(m.data?.[p]||[]).reduce((a,e)=>{const c=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5);return a+c.tot;},0));
    return{key:k,label:MONTHS[+mo-1].slice(0,3)+" "+y.slice(2),tot,provTots};
  }),[sortedKeys,months]);

  const topEngs=useMemo(()=>{
    const map={};
    sortedKeys.filter(k=>months[k]?.savedAt).forEach(k=>{
      const m=months[k];
      PROVS.forEach(p=>{(m.data?.[p]||[]).forEach(e=>{
        if(!map[e.id])map[e.id]={id:e.id,name:e.name,spec:e.spec,prov:p,days:0,usd:0};
        map[e.id].days+=e.d1+e.d2;
        map[e.id].usd+=calc(e,m.cfg?.rate||300,m.cfg?.egp||52.5).tot;
      });});

    return Object.values(map).sort((a,b)=>b.usd-a.usd).slice(0,8);
  },[sortedKeys,months]);
  const maxEng=useMemo(()=>Math.max(...topEngs.map(e=>e.usd),1),[topEngs]);

  /* ── Actions ──────────────────────────────────────── */
  const switchMonth=k=>{
    setAk(k);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);
    }
    setMobOpen(false);
  };

  const saveMonth=async()=>{
    const v={data:dc(data),cfg:dc(cfg),savedAt:new Date().toISOString()};
    setMonths(p=>({...p,[ak]:v}));
    await fetch(`/api/months/${ak}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}).catch(()=>{});
    logActivity('حفظ شهر',`${mn} ${cfg.year}`);
    msg(`تم حفظ ${mn} ${cfg.year} ✓`);
  };

  const createMonth=()=>{
    const k=mkKey(nmForm.month,nmForm.year);
    if(!months[k]){
      const prev=months[ak];const nd=dc(prev?.data||BASE);
      PROVS.forEach(p=>{(nd[p]||[]).forEach(e=>{e.d1=0;e.d2=0;});});
      const[y,m]=k.split("-");
      const nm={data:nd,cfg:{...(prev?.cfg||cfg),month:+m,year:+y},savedAt:null};
      setMonths(p=>({...p,[k]:nm}));
      queueSave(k,nm);

    setAk(k);setModal(null);setPage("eng");
    msg(`تم فتح ${MONTHS[nmForm.month-1]} ${nmForm.year}`);

  const mkMonthBase=()=>({...(months[ak]||{data,cfg})});
  const lockGuard=()=>{if(!isAdmin&&isMonthLocked(ak)){msg('🔒 هذا الشهر مقفول — لا يمكن التعديل','err');return true;}return false;};
  const mkAttMonthBase=()=>({...(months[attKey]||{data:attData,cfg:attCfg})});
  const attLockGuard=()=>{if(!isAdmin&&isMonthLocked(attKey)){msg('🔒 هذا الشهر مقفول — لا يمكن التعديل','err');return true;}return false;};

  const updData=(p,id,f,v)=>{
    if(lockGuard())return;
    const nd=dc(data);nd[p]=nd[p].map(e=>e.id===id?{...e,[f]:Math.max(0,Math.min(15,+v||0))}:e);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const updCfg=(k,v)=>{
    if(lockGuard())return;
    const nc={...cfg,[k]:['month','year','rate','egp'].includes(k)?+v||0:v};
    const updated={...mkMonthBase(),cfg:nc,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };

  const submitEng=()=>{
    if(!form.name.trim()){msg("أدخل اسم المهندس","err");return;}
    if(lockGuard())return;
    const nd=dc(data);
    // Auto-calc d1/d2/extra if arrivalDate is in current month
    const arrCalc=calcArrivalDays(form.arrivalDate,cfg.year,cfg.month);
    const finalD1=arrCalc?arrCalc.d1:+form.d1;
    const finalD2=arrCalc?arrCalc.d2:+form.d2;
    const finalExtra=arrCalc?arrCalc.extra:0;
    const engId=form.id||"u"+Date.now();
    if(form.id){
      nd[form.prov]=nd[form.prov].map(e=>e.id===form.id?{...e,name:form.name,spec:form.spec||"مهندس",d1:finalD1,d2:finalD2,extra:finalExtra,arrivalDate:form.arrivalDate||null}:e);
      logActivity('تعديل مهندس',`${form.name} — ${form.prov.replace('محافظة ','')}`);
      // Update org chart for edited engineer
      if(orgData){
        const cityId=CITY_CFG.find(c=>c.prov===form.prov)?.id;
        if(cityId){
          const no=dc(orgData);
          const city=no.cities.find(c=>c.id===cityId);
          if(city){
            const upd=e=>e.name===form.name?e:{...e};
            const updateList=arr=>arr.map(e=>{
              const orig=nd[form.prov].find(x=>x.id===form.id);
              return e.name===(orig?orig.name:form.name)?{name:form.name,role:form.spec||"مهندس"}:e;
            });
            city.managers=updateList(city.managers);
            city.team=updateList(city.team);
            setOrgData(no);
            fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:no})}).catch(()=>{});
          }
        }
      }
      msg("تم الحفظ");
    } else {
      const newEng={id:engId,name:form.name.trim(),spec:form.spec||"مهندس",d1:finalD1,d2:finalD2,extra:finalExtra,arrivalDate:form.arrivalDate||null,addedAt:new Date().toISOString().split('T')[0]};
      nd[form.prov]=[...(nd[form.prov]||[]),newEng];
      logActivity('إضافة مهندس',`${newEng.name} — ${form.prov.replace('محافظة ','')}`);
      // Update org chart
      if(orgData){
        const cityId=CITY_CFG.find(c=>c.prov===form.prov)?.id;
        if(cityId){
          const no=dc(orgData);
          const city=no.cities.find(c=>c.id===cityId);
          if(city){
            const entry={name:newEng.name,role:newEng.spec};
            if(newEng.spec.includes("مدير"))city.managers.push(entry);
            else city.team.push(entry);
            setOrgData(no);
            fetch("/api/org-chart",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({data:no})}).catch(()=>{});
          }
        }
      }
      msg("تمت الإضافة");
    }
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    // Propagate arrivalDate across all months + auto-mark Egypt days in attendance
    const propUpdates={};
    const arr=form.arrivalDate?new Date(form.arrivalDate+'T12:00'):null;
    // Build list of months to scan: include current `ak` even if engineer is new there
    const allKeys=Array.from(new Set([ak,...Object.keys(months)])).filter(k=>k!=='leaves');
    allKeys.forEach(key=>{
      const m=key===ak?updated:months[key];
      if(!m?.data)return;
      const[yStr,mStr]=key.split('-');
      const year=+yStr,month=+mStr;
      // Determine month position relative to arrival
      let isBeforeArrival=false,isAfterArrival=false,arrCalcRes=null;
      if(form.arrivalDate){
        const arrDate=new Date(form.arrivalDate+'T12:00');
        const monthStart=new Date(year,month-1,1);
        const monthEnd=new Date(year,month,0,23,59,59);
        isBeforeArrival=arrDate>monthEnd;
        isAfterArrival=arrDate<monthStart;
        arrCalcRes=calcArrivalDays(form.arrivalDate,year,month);
      }
      let provKey=null,idx=-1;
      Object.keys(m.data).forEach(p=>{
        const i=(m.data[p]||[]).findIndex(e=>e.id===engId);
        if(i>=0){provKey=p;idx=i;}
      });
      let newList,newData;
      if(!provKey){
        // Engineer not yet in this month
        if(!form.arrivalDate||isBeforeArrival){
          return;// no arrival or month before arrival → don't add
        }
        // Add engineer to this month (arrival month or after)
        provKey=form.prov;
        newList=[...(m.data[provKey]||[])];
        let nD1=15,nD2=15,nExtra=0;
        if(arrCalcRes){nD1=arrCalcRes.d1;nD2=arrCalcRes.d2;nExtra=arrCalcRes.extra;}
        newList.push({
          id:engId,
          name:form.name.trim(),
          spec:form.spec||"مهندس",
          d1:nD1,d2:nD2,extra:nExtra,
          arrivalDate:form.arrivalDate,
          addedAt:new Date().toISOString().split('T')[0]
        });
        idx=newList.length-1;
        newData={...m.data,[provKey]:newList};
      }else{
        // Engineer exists — update
        newList=[...m.data[provKey]];
        newList[idx]={...newList[idx],arrivalDate:form.arrivalDate||null};
        if(form.arrivalDate){
          if(arrCalcRes){
            newList[idx]={...newList[idx],d1:arrCalcRes.d1,d2:arrCalcRes.d2,extra:arrCalcRes.extra};
          }else if(isBeforeArrival){
            newList[idx]={...newList[idx],d1:0,d2:0,extra:0};
          }else if(isAfterArrival){
            const cur=newList[idx];
            const cd1=+cur.d1||0,cd2=+cur.d2||0;
            if(cd1===0&&cd2===0){
              newList[idx]={...cur,d1:15,d2:15,extra:0};
            }else{
              newList[idx]={...cur,extra:0};
            }
          }
        }else if(key!==ak){
          newList[idx]={...newList[idx],extra:0};
        }
        newData={...m.data,[provKey]:newList};
      }
      // Update attendance: mark/unmark 'EG' days
      const dim=new Date(year,month,0).getDate();
      const newAtt={...(m.attendance||{})};
      const engAtt={...(newAtt[engId]||{})};
      Object.keys(engAtt).forEach(d=>{if(engAtt[d]?.s==='EG')delete engAtt[d];});
      if(arr){
        const monthEnd=new Date(year,month-1,dim,23,59,59);
        const monthStart=new Date(year,month-1,1);
        if(arr>monthEnd){
          for(let d=1;d<=dim;d++)engAtt[d]={s:'EG'};
        }else if(arr>=monthStart){
          for(let d=1;d<arr.getDate();d++)engAtt[d]={s:'EG'};
        }
      }
      newAtt[engId]=engAtt;
      propUpdates[key]={...m,data:newData,attendance:newAtt,savedAt:null};
    });
    setMonths(prev=>({...prev,...propUpdates}));
    Object.entries(propUpdates).forEach(([k,v])=>queueSave(k,v));
    setModal(null);
  };

  const delEng=(p,id,name)=>{

    const nd=dc(data);nd[p]=nd[p].filter(e=>e.id!==id);

  /* ── Transfer engineer between provinces ────────────────
     Updates current month's data — moves engineer record from
     `from` to `to` and appends to engineer's transfers[] history.
     Also updates ALL future months that have a record of this
     engineer (so the engineer's province field is consistent).
  ──────────────────────────────────────────────────────── */
  const transferEngineer=(engId,toProv,dateStr)=>{
    if(!isAdmin){msg('للأدمن فقط','err');return;}
    if(lockGuard())return;
    /* Debounce: ignore rapid double-clicks within 2s */
    if(transferringRef.current){msg('جارٍ تنفيذ النقل السابق...','err');return;}
    /* Find current location of engineer in active month */
    let fromProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(data[p]||[]).find(e=>e.id===engId);if(found){fromProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود فى الشهر الحالى','err');return;}
    if(fromProv===toProv){msg('المهندس بالفعل فى '+toProv,'err');return;}
    if(!toProv||!PROVS.includes(toProv)){msg('اختار المحافظة الجديدة','err');return;}
    if(!dateStr){msg('اختار تاريخ النقل','err');return;}
    /* Anti-duplicate: reject if engineer already has transfer with same date+from+to */
    const existingTransfers=engRec.transfers||[];
    const isDup=existingTransfers.some(t=>t.date===dateStr&&t.from===fromProv&&t.to===toProv);
    if(isDup){
      msg('⚠️ هذا التنقل مسجل مسبقاً — نفس التاريخ ونفس المحافظتين','err');
      return;
    }
    const today=new Date();today.setHours(12,0,0,0);
    const tDate=new Date(dateStr+'T12:00');
    if(tDate<today){
      if(!confirm('تاريخ النقل فى الماضى — تصحيح بأثر رجعى. تأكيد؟'))return;
    }
    /* Lock the transfer button for 2s to prevent rapid double-submit */
    transferringRef.current=true;
    setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const transferEntry={id:'tr_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),from:fromProv,to:toProv,date:dateStr,by:user?.username||'admin',at:new Date().toISOString()};
    const nd=dc(data);
    /* Remove from old prov, push to new prov with updated transfers + prov */
    nd[fromProv]=(nd[fromProv]||[]).filter(e=>e.id!==engId);
    const updatedEng={...engRec,prov:toProv,transfers:[...(engRec.transfers||[]),transferEntry]};
    nd[toProv]=[...(nd[toProv]||[]),updatedEng];
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    logActivity('نقل مهندس',`${engRec.name} — من ${fromProv.replace('محافظة ','')} إلى ${toProv.replace('محافظة ','')} بتاريخ ${dateStr}`);
    msg(`تم نقل ${engRec.name} إلى ${toProv}`);
    setModal(null);
    setEngTransferForm({engId:'',toProv:'',date:''});
  };

  /* ── Transfer engineer to Egypt (final return) ─────────
     Engineer is removed from the active workforce. Their record
     stays in the month data with `egyptTransfer` set, but the UI
     filters them out via the `data` useMemo. Past months remain
     untouched (snapshots). Activity log records the action.
  ──────────────────────────────────────────────────────── */
  const egyptTransferEngineer=(engId,dateStr,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ نقل سابق...','err');return;}
    /* Find engineer in active month (use dataRaw so we don't filter out anyone) */
    let fromProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){fromProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(engRec.egyptTransfer){msg('المهندس بالفعل منقول لمصر','err');return;}
    /* Province permission: must be their own engineer */
    if(!isAdmin&&fromProv!==userProv){msg('يمكنك نقل مهندسى محافظتك فقط','err');return;}
    if(!dateStr){msg('اختار تاريخ النقل','err');return;}
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const egyptEntry={
      id:'eg_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      date:dateStr,
      by:user?.username||'admin',
      at:new Date().toISOString(),
      notes:notes||'',
      fromProv
    };
    /* Mutate data: mark engineer with egyptTransfer */
    const nd=dc(dataRaw);
    nd[fromProv]=(nd[fromProv]||[]).map(e=>e.id===engId?{...e,egyptTransfer:egyptEntry}:e);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    logActivity('نقل لمصر',`${engRec.name} — من ${fromProv.replace('محافظة ','')} بتاريخ ${dateStr}${notes?' · '+notes:''}`);
    msg(`🇪🇬 تم نقل ${engRec.name} لمصر — خرج من ${fromProv}`);
    setModal(null);
    setEgyptTransferForm({engId:'',date:'',notes:''});
  };

  /* ── Record an egypt leave (engineer goes to Egypt for vacation) ──
     Adds a new entry to eng.egyptLeaves with returnDate=null.
     Auto-decrements d1/d2 in the current month for the days already
     covered by this new leave (so the disbursement reflects the leave
     immediately).
  ───────────────────────────────────────────────────────────── */
  const recordEgyptLeave=(engId,departureDate,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ عملية سابقة...','err');return;}
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(!isAdmin&&curProv!==userProv){msg('يمكنك تسجيل إجازة لمهندسى محافظتك فقط','err');return;}
    if(!departureDate){msg('اختار تاريخ النزول','err');return;}
    /* Validate against arrivalDate */
    if(engRec.arrivalDate&&departureDate<engRec.arrivalDate){
      msg('تاريخ النزول لا يمكن أن يكون قبل تاريخ القدوم','err');return;
    }
    /* Reject if engineer already has an active (open) leave */
    const active=getActiveEgyptLeave(engRec);
    if(active){
      msg(`⚠️ هذا المهندس فى إجازة بالفعل من ${active.departureDate}`,'err');return;
    }
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    const leaveEntry={
      id:'el_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
      departureDate,
      returnDate:null,
      notes:notes||'',
      createdBy:user?.username||'admin',
      createdAt:new Date().toISOString()
    };
    /* Compute leave days in current month for d1/d2 decrement */
    const M=cfg.month||(now.getMonth()+1),Y=cfg.year||now.getFullYear();
    const dim=new Date(Y,M,0).getDate();
    const monthEnd=`${Y}-${String(M).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
    const monthStart=`${Y}-${String(M).padStart(2,'0')}-01`;
    let leaveDaysH1=0,leaveDaysH2=0;
    if(departureDate<=monthEnd){
      const leaveStartDay=departureDate>=monthStart?+departureDate.split('-')[2]:1;
      for(let d=leaveStartDay;d<=dim;d++){
        if(d<=15)leaveDaysH1++;else leaveDaysH2++;
      }
    }
    const newD1=Math.max(0,(+engRec.d1||0)-leaveDaysH1);
    const newD2=Math.max(0,(+engRec.d2||0)-leaveDaysH2);
    const nd=dc(dataRaw);
    nd[curProv]=(nd[curProv]||[]).map(e=>e.id===engId?{
      ...e,
      egyptLeaves:[...(e.egyptLeaves||[]),leaveEntry],
      d1:newD1,d2:newD2,
      _d1Before:e.d1,_d2Before:e.d2  /* preserve originals for undo */
    }:e);
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    logActivity('تسجيل نزول إجازة',`${engRec.name} — من ${curProv.replace('محافظة ','')} بتاريخ ${departureDate}${notes?' · '+notes:''}`);
    msg(`✈️ ${engRec.name} نزل إجازة فى ${departureDate}`);
    setModal(null);
    setEgyptLeaveForm({engId:'',date:'',notes:''});
  };

  /* ── Record return from egypt leave ─────────────────
     Updates the active leave entry with returnDate. Restores d1/d2
     for days from returnDate to end of month (engineer is back).
  ───────────────────────────────────────────────────── */
  const recordEgyptReturn=(engId,returnDate,notes)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    if(transferringRef.current){msg('جارٍ تنفيذ عملية سابقة...','err');return;}
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود','err');return;}
    if(!isAdmin&&curProv!==userProv){msg('يمكنك تسجيل عودة لمهندسى محافظتك فقط','err');return;}
    if(!returnDate){msg('اختار تاريخ العودة','err');return;}
    const active=getActiveEgyptLeave(engRec);
    if(!active){msg('هذا المهندس ليس فى إجازة حالياً','err');return;}
    if(returnDate<=active.departureDate){msg('تاريخ العودة يجب أن يكون بعد تاريخ النزول','err');return;}
    transferringRef.current=true;setTransferring(true);
    setTimeout(()=>{transferringRef.current=false;setTransferring(false);},2000);
    /* Compute days in current month from return-date to end-of-month → restore as P-eligible */
    const M=cfg.month||(now.getMonth()+1),Y=cfg.year||now.getFullYear();
    const dim=new Date(Y,M,0).getDate();
    const monthEnd=`${Y}-${String(M).padStart(2,'0')}-${String(dim).padStart(2,'0')}`;
    const monthStart=`${Y}-${String(M).padStart(2,'0')}-01`;
    let restoreH1=0,restoreH2=0;
    if(returnDate<=monthEnd&&returnDate>=monthStart){
      const startD=+returnDate.split('-')[2];
      for(let d=startD;d<=dim;d++){
        if(d<=15)restoreH1++;else restoreH2++;
      }
    }else if(returnDate<monthStart){
      /* Return before this month started; nothing to restore in current month */
    }
    const newD1=Math.min(15,(+engRec.d1||0)+restoreH1);
    const newD2=Math.min(15,(+engRec.d2||0)+restoreH2);
    const nd=dc(dataRaw);
    nd[curProv]=(nd[curProv]||[]).map(e=>{
      if(e.id!==engId)return e;
      const newLeaves=(e.egyptLeaves||[]).map(l=>l.id===active.id?{...l,returnDate,returnNotes:notes||'',returnAt:new Date().toISOString()}:l);
      return{...e,egyptLeaves:newLeaves,d1:newD1,d2:newD2};
    });
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    logActivity('تسجيل عودة من إجازة',`${engRec.name} — رجع فى ${returnDate} (نزل ${active.departureDate})${notes?' · '+notes:''}`);
    msg(`🟢 ${engRec.name} رجع من إجازة فى ${returnDate}`);
    setModal(null);
    setEgyptLeaveForm({engId:'',date:'',notes:''});
  };

  /* ── Undo a transfer ────────────────────────────────────
     Removes the transfer entry from eng.transfers AND moves the
     engineer back to transfer.from. Activity log entry is deleted
     too, so it's a clean undo (not a counter-transfer).

     Permissions:
       - admin: any transfer
       - province: only own transfers (transfer.by === username)
                   and only within 24h of the transfer
       - viewer: blocked

     Constraint: only the LATEST transfer can be undone (chronological).
     Earlier transfers are immutable history once a newer transfer exists.
  ──────────────────────────────────────────────────────── */
  const undoTransfer=(engId,transferId)=>{
    if(!isAdmin&&!isProvince){msg('غير مصرح','err');return;}
    if(lockGuard())return;
    /* Find engineer in active month — use dataRaw so we can find egypt-transferred engineers too */
    let curProv=null,engRec=null;
    PROVS.forEach(p=>{const found=(dataRaw[p]||[]).find(e=>e.id===engId);if(found){curProv=p;engRec=found;}});
    if(!engRec){msg('المهندس غير موجود — لا يمكن التراجع','err');return;}
    /* ── Egypt-leave undo: remove the entry, restore d1/d2, optionally re-open closed leave ── */
    const leaves=getEgyptLeaves(engRec);
    const leaveIdx=leaves.findIndex(l=>l.id===transferId);
    if(leaveIdx!==-1){
      const lv=leaves[leaveIdx];
      const isClosedReturn=!!lv.returnDate;
      if(!isAdmin){
        const tBy=lv.createdBy;
        if(tBy!==user?.username){msg('غير مصرح','err');return;}
        const ageMs=Date.now()-new Date(lv.createdAt||0).getTime();
        if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة)','err');return;}
      }
      const nd=dc(dataRaw);
      nd[curProv]=(nd[curProv]||[]).map(e=>{
        if(e.id!==engId)return e;
        /* Remove the leave entry entirely (clean undo) */
        const newLeaves=(e.egyptLeaves||[]).filter(l=>l.id!==transferId);
        const out={...e,egyptLeaves:newLeaves};
        /* Restore d1/d2 if we had stored originals */
        if(e._d1Before!==undefined){out.d1=e._d1Before;delete out._d1Before;}
        if(e._d2Before!==undefined){out.d2=e._d2Before;delete out._d2Before;}
        return out;
      });
      const updated={...mkMonthBase(),data:nd,savedAt:null};
      setMonths(prev=>({...prev,[ak]:updated}));
      queueSave(ak,updated);
      fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
        const matches=(d.logs||[]).filter(l=>(l.action==='تسجيل نزول إجازة'||l.action==='تسجيل عودة من إجازة')&&l.detail.includes(engRec.name)&&(l.detail.includes(lv.departureDate)||(lv.returnDate&&l.detail.includes(lv.returnDate))));
        if(matches.length>0){
          return fetch('/api/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({ids:matches.map(m=>m.id)})});
        }
      }).catch(()=>{});
      msg(`✓ تم التراجع عن ${isClosedReturn?'العودة':'النزول'} — ${engRec.name}`);
      setUndoConfirm(null);
      return;
    }
    /* ── Egypt-transfer undo: special path — restore engineer (remove egyptTransfer field) ── */
    if(engRec.egyptTransfer&&engRec.egyptTransfer.id===transferId){
      const tr=engRec.egyptTransfer;
      if(!isAdmin){
        if(tr.by!==user?.username){msg('غير مصرح','err');return;}
        const ageMs=Date.now()-new Date(tr.at).getTime();
        if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة)','err');return;}
      }
      const nd=dc(dataRaw);
      nd[curProv]=(nd[curProv]||[]).map(e=>{
        if(e.id!==engId)return e;
        const{egyptTransfer,...rest}=e;
        return rest;
      });
      const updated={...mkMonthBase(),data:nd,savedAt:null};
      setMonths(prev=>({...prev,[ak]:updated}));
      queueSave(ak,updated);
      fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
        const matches=(d.logs||[]).filter(l=>l.action==='نقل لمصر'&&l.detail.includes(engRec.name)&&l.detail.includes(tr.date));
        if(matches.length>0){
          return fetch('/api/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({ids:matches.map(m=>m.id)})});
        }
      }).catch(()=>{});
      msg(`✓ تم التراجع — ${engRec.name} رجع إلى ${curProv}`);
      setUndoConfirm(null);
      return;
    }
    const ts=getTransfers(engRec);
    if(ts.length===0){msg('لا يوجد نقل لهذا المهندس','err');return;}
    /* Find transfer by id (or fall back to `at` for legacy) */
    const tIdx=ts.findIndex(t=>(t.id||t.at)===transferId);
    if(tIdx===-1){msg('النقل غير موجود','err');return;}
    /* Only undo the LATEST (chronological — last in sorted array) */
    if(tIdx!==ts.length-1){
      msg('⚠️ يمكن التراجع عن آخر نقل فقط — هذا النقل تتبعه نقلات أخرى','err');
      return;
    }
    const tr=ts[tIdx];
    /* Province perm: must own + within 24h */
    if(!isAdmin){
      if(tr.by!==user?.username){msg('غير مصرح — هذا النقل ليس من قِبَلك','err');return;}
      const ageMs=Date.now()-new Date(tr.at).getTime();
      if(ageMs>24*60*60*1000){msg('انتهت مهلة التراجع (٢٤ ساعة) — تواصل مع الأدمن','err');return;}
    }
    /* Confirmation already shown in UI — proceed */
    const nd=dc(data);
    nd[curProv]=(nd[curProv]||[]).filter(e=>e.id!==engId);
    const newTransfers=ts.filter((_,i)=>i!==tIdx);
    const updatedEng={...engRec,prov:tr.from,transfers:newTransfers};
    nd[tr.from]=[...(nd[tr.from]||[]),updatedEng];
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    /* Clean the matching activity log entry — fetch logs, find by detail, delete by id */
    fetch('/api/activity',{credentials:'include'}).then(r=>r.json()).then(d=>{
      const matches=(d.logs||[]).filter(l=>
        l.action==='نقل مهندس' &&
        l.detail.includes(engRec.name) &&
        l.detail.includes(tr.date) &&
        l.detail.includes(tr.from.replace('محافظة ','')) &&
        l.detail.includes(tr.to.replace('محافظة ',''))
      );
      if(matches.length>0){
        return fetch('/api/activity',{
          method:'DELETE',headers:{'Content-Type':'application/json'},credentials:'include',
          body:JSON.stringify({ids:matches.map(m=>m.id)})
        });
      }
    }).catch(()=>{});
    msg(`✓ تم التراجع — ${engRec.name} رجع إلى ${tr.from}`);
    setUndoConfirm(null);
  };

  const togglePaidHalf=(p,id,half)=>{
    if(lockGuard())return;
    const nd=dc(data);
    nd[p]=nd[p].map(e=>{
      if(e.id!==id)return e;
      const cur1=isP1(e),cur2=isP2(e);
      const out={...e,paid1:half===1?!cur1:cur1,paid2:half===2?!cur2:cur2};
      delete out.paid;
      return out;
    });
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
  };
  const togglePaid1=(p,id)=>togglePaidHalf(p,id,1);
  const togglePaid2=(p,id)=>togglePaidHalf(p,id,2);

  const markAllPaid=(paid,half)=>{
    if(lockGuard())return;
    const nd=dc(data);
    PROVS.forEach(p=>{nd[p]=(nd[p]||[]).map(e=>{
      const cur1=isP1(e),cur2=isP2(e);
      const out={...e,paid1:half===1||half==='both'?paid:cur1,paid2:half===2||half==='both'?paid:cur2};
      delete out.paid;
      return out;
    });});
    const updated={...mkMonthBase(),data:nd,savedAt:null};
    setMonths(prev=>({...prev,[ak]:updated}));
    queueSave(ak,updated);
    const lbl=half===1?'النصف الأول':half===2?'النصف الثاني':'الكل';
    msg(paid?`تم تأشير ${lbl} كمدفوع ✓`:`تم إلغاء ${lbl}`);
  };

  /* ── Attendance helpers ─────────────────────────────── */
  const ATT_CYCLE=[null,'P','EG','A','AL','SL','EL','TXR','H'];
  const ATT_LABEL={P:'حاضر',EG:'لم يصل',A:'غائب',AL:'إجازة',SL:'مرضية',EL:'طارئة',H:'عطلة',EGL:'إجازة (مصر)',TXR:'متأخر'};
  const ATT_SHORT={P:'ح',EG:'م',A:'غ',AL:'س',SL:'مر',EL:'ط',H:'ع',EGL:'م',TXR:'⚠'};
  const ATT_COL={P:'#10B981',EG:'#3B82F6',A:'#EF4444',AL:'#FCD34D',SL:'#FB923C',EL:'#A78BFA',H:'#94A3B8',EGL:'#EA580C',TXR:'#F59E0B'};
  const ATT_BG={P:'rgba(16,185,129,.2)',EG:'rgba(59,130,246,.18)',A:'rgba(239,68,68,.15)',AL:'rgba(252,211,77,.15)',SL:'rgba(249,115,22,.15)',EL:'rgba(167,139,250,.15)',H:'rgba(148,163,184,.1)',EGL:'rgba(234,88,12,.18)',TXR:'rgba(245,158,11,.18)'};

  const attCycleStatus=(engId,day)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const a=existing.attendance||{};
    const cur=a[engId]?.[day]?.s||null;
    const next=ATT_CYCLE[(ATT_CYCLE.indexOf(cur)+1)%ATT_CYCLE.length];
    const na=JSON.parse(JSON.stringify(a));
    if(!na[engId])na[engId]={};
    if(next===null)delete na[engId][day];
    else na[engId][day]={...(na[engId]?.[day]||{}),s:next};
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
  };

  /* ── Attendance day object schema ────────────────────────
     Attendance is stored as JSON inside months.attendance:
       attendance[engId][day] = {
         s:  'P'|'A'|'AL'|'SL'|'EL'|'EG'|'H'|'TXR' (status code),
         in:  'HH:MM' (optional check-in time),
         out: 'HH:MM' (optional check-out time),
         lateH: 0-12 (late hours, only when s === 'TXR'),
         lateM: 0-59 (late minutes, only when s === 'TXR')
       }
     New fields lateH/lateM are no-op when status isn't 'TXR'.
     No SQL migration needed — attendance column is a JSON blob.
  ──────────────────────────────────────────────────────── */
  /* Format late time as HH:MM or "—" if no late time */
  const formatLate=(h,m)=>{
    const hh=+h||0,mm=+m||0;
    if(hh===0&&mm===0)return '—';
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
  };
  /* Returns total late minutes for an engineer in a month (sum of all TXR days) */
  const totalLateMinutes=(att,engId)=>{
    const days=att?.[engId]||{};
    let total=0;
    Object.values(days).forEach(d=>{
      if(d?.s==='TXR')total+=((+d.lateH||0)*60)+(+d.lateM||0);
    });
    return total;
  };
  /* Format total minutes as HH:MM */
  const formatTotalLate=(mins)=>{
    if(!mins)return '00:00';
    const h=Math.floor(mins/60),m=mins%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  };

  const attSetStatus=(engId,day,status)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    if(!na[engId])na[engId]={};
    if(na[engId]?.[day]?.s===status)delete na[engId][day];
    else na[engId][day]={...(na[engId]?.[day]||{}),s:status};
    const upd={...existing,attendance:na};
    setMonths(p=>({...p,[attKey]:upd}));queueSave(attKey,upd);
  };

  /* Set late time for a specific day. Status must be 'TXR' first. */
  const attSetLate=(engId,day,lateH,lateM)=>{
    if(attLockGuard())return;
    const existing=mkAttMonthBase();
    const na=JSON.parse(JSON.stringify(existing.attendance||{}));
    if(!na[engId])na[engId]={};
    const cur=na[engId][day]||{};
    /* Only allow setting late when status is TXR (or auto-promote if not set) */
    const newCell={...cur,s:'TXR',lateH:Math.max(0,Math.min(12,+lateH||0)),lateM:Math.max(0,Math.min(59,+lateM||0))};

    allDays.sort((a,b)=>a.date-b.date);
    let li=0;
    for(let i=allDays.length-1;i>0;i--){const gap=(allDays[i].date-allDays[i-1].date)/86400000;if(gap>=7){li=i;break;}}

    /* If monthKey override is given and differs from active month, build local bundle */
    const _useOverride=monthKey&&monthKey!==ak&&months[monthKey];

    const _cfg=_useOverride?(months[monthKey].cfg||cfg):cfg;

    const _totals=_useOverride?PROVS.map(p=>(_data[p]||[]).reduce((a,e)=>{const c=calc(e,_cfg.rate,_cfg.egp);return{n:a.n+1,a1:a.a1+c.a1,a2:a.a2+c.a2,tot:a.tot+c.tot,egp:a.egp+c.egp};},{n:0,a1:0,a2:0,tot:0,egp:0})):totals;

    const _expTotals=_useOverride?{
      itemsUSD:_expItems.reduce((a,e)=>a+(+e.usd||0),0),

</div>

<div class="footer">

</div>
</body></html>`;
    w.document.write(html);
    w.document.close();
    setTimeout(()=>{try{w.focus();if(mode==='print')w.print();}catch(e){}},mode==='print'?700:200);
  };

  /* ─────────────────────────────────────────────────────
     LIBRARY-TAB DIRECT PDF GENERATORS
     Each builds a complete white-template PDF without
     navigating away. mode='print' auto-opens print dialog,
     mode='preview' just opens window for viewing.
  ────────────────────────────────────────────────────── */
  const _openPdfWin=(html,mode)=>{
    const w=window.open('','_blank','width=1100,height=820');
    if(!w){msg('السماح بفتح النوافذ المنبثقة','err');return null;}
    w.document.write(html);
    w.document.close();
    setTimeout(()=>{try{w.focus();if(mode==='print')w.print();}catch(e){}},mode==='print'?700:200);
    return w;
  };

  const _pdfHeaderHtml=(title,subtitle)=>{
    const today=new Date().toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});
    const logoHtml=logo?`<img src="${logo}" style="width:60px;height:60px;object-fit:contain;border-radius:8px;border:1px solid #BFDBFE"/>`:'<div style="width:60px;height:60px;border-radius:8px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:24px">🏗️</div>';
    return `<div style="display:flex;align-items:center;gap:14px;padding:14px 18px;background:linear-gradient(135deg,#EFF6FF,#F5F3FF);border:1px solid #BFDBFE;border-radius:10px;margin-bottom:16px">
      ${logoHtml}
      <div style="flex:1">
        <div style="font-size:18px;font-weight:900;color:#1E3A8A;line-height:1.3">${title}</div>
        <div style="font-size:11px;color:#3B82F6;font-weight:700;margin-top:3px">${subtitle}</div>
        <div style="font-size:10px;color:#64748B;margin-top:3px">${cfg.company||'شركة الرائد للاستشارات الهندسية'} · صدر: ${today}</div>
      </div>
    </div>`;
  };

  const _pdfShellCss=()=>`@page{size:A4;margin:12mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;color:#1e293b;font-size:11px;background:#fff;padding:18px;line-height:1.5}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.no-print{display:none!important}}.print-bar{position:fixed;top:8px;left:8px;z-index:99}.print-btn{background:linear-gradient(135deg,#1d4ed8,#6d28d9);color:#fff;border:none;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:700;box-shadow:0 4px 12px rgba(29,78,216,.35)}table{width:100%;border-collapse:collapse;font-size:10.5px}th,td{border:1px solid #E2E8F0;padding:6px 8px;text-align:right}th{background:#F8FAFC;font-weight:800;color:#475569}.empty{padding:30px;text-align:center;color:#94A3B8;font-style:italic;font-size:12px;border:1.5px dashed #CBD5E1;border-radius:10px;margin:20px 0}.section{margin-bottom:18px}.section-title{font-size:14px;font-weight:900;color:#1E3A8A;padding:8px 12px;background:#F8FAFC;border-right:4px solid #2563EB;border-radius:4px;margin-bottom:10px}`;

  /* ── Attendance PDF (defaults to PREVIOUS month — attendance is recorded for prev month at start of current month) ── */
  const printAttendancePDF=(mode='print',monthKey=null)=>{
    /* Default: use attKey (previous month). Fall back to current ak if no override and attKey missing data */
    const useKey=monthKey||attKey;
    const useM=months[useKey];
    const _data=useM?.data||data;
    const _att=useM?.attendance||{};
    const _cfg=useM?.cfg||cfg;
    const M=_cfg.month||(now.getMonth()+1),Y=_cfg.year||now.getFullYear();
    const monthLabel=MONTHS[M-1]+' '+Y;
    const daysInMonth=new Date(Y,M,0).getDate();
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);
    const DAY_AR=["أح","إث","ث","أر","خ","ج","س"];
    const isFri=d=>new Date(Y,M-1,d).getDay()===5;
    const S_BG={P:'#D1FAE5',EG:'#DBEAFE',A:'#FEE2E2',AL:'#EFF6FF',SL:'#FEF3C7',EL:'#FFEDD5',H:'#F1F5F9'};
    const S_COL={P:'#059669',EG:'#2563EB',A:'#DC2626',AL:'#1D4ED8',SL:'#D97706',EL:'#EA580C',H:'#64748B'};
    const visibleProvs=isProvince?[userProv]:PROVS;
    let totalP=0,totalA=0,totalLv=0,totalEgL=0;
    /* PDF colors for egypt leave (orange) */
    const PDF_EGL_BG='#FFEDD5',PDF_EGL_COL='#C2410C';
    const provBlocks=visibleProvs.map(prov=>{
      /* Use transfer-aware list: shows both currently-here engs AND those who passed through this prov this month */
      const provEngs=engsInProvDuringMonth(prov,Y,M,_data);
      if(!provEngs.length)return '';
      const rows=provEngs.map(eng=>{
        const eAtt=_att[eng.id]||{};
        const isSplit=eng.hasTransfer&&(eng.firstDay>1||eng.lastDay<daysInMonth);
        let p=0,a=0,lv=0,egL=0;
        const cells=days.map(d=>{
          const fri=isFri(d);
          const inTenure=eng.daysInProvSet.has(d);
          /* Outside tenure → grey "—" cell */
          if(!inTenure){
            return '<td style="background:#FAFAFA;color:#CBD5E1;text-align:center;font-size:11px;font-weight:600;border:1px dashed #E2E8F0">—</td>';
          }
          /* Egypt-leave override (highest priority) */
          const onLeave=getEgyptLeaveAutoState(eng,Y,M,d);
          if(onLeave){egL++;return `<td style="background:${PDF_EGL_BG};color:${PDF_EGL_COL};text-align:center;font-size:9px;font-weight:800">م</td>`;}
          const dd=eAtt[d];const st=dd?.s;
          if(st==='P')p++;else if(st==='A')a++;else if(['AL','SL','EL'].includes(st))lv++;
          if(fri)return '<td style="background:#F1F5F9;color:#94A3B8;text-align:center;font-size:9px;font-weight:700">ع</td>';
          if(!st)return '<td></td>';
          return `<td style="background:${S_BG[st]};color:${S_COL[st]};text-align:center;font-size:9px;font-weight:800">${st}</td>`;
        }).join('');
        totalEgL+=egL;
        totalP+=p;totalA+=a;totalLv+=lv;
        /* Tenure / transfer badges */
        let badges='';
        if(isSplit){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE;font-weight:700;margin-right:4px">📅 يوم ${eng.firstDay}-${eng.lastDay}</span>`;
        }
        if(eng.isReadOnlyHere){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F1F5F9;color:#475569;border:1px solid #CBD5E1;font-weight:700;margin-right:4px">🔒 منقول</span>`;
        }else if(eng.hasTransfer){
          /* Show "منقول من X" only in destination prov */
          const ts=getTransfers(eng);
          const last=ts[ts.length-1];
          if(last&&last.to===prov){
            badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#F5F3FF;color:#6D28D9;border:1px solid #DDD6FE;font-weight:700;margin-right:4px">🔄 منقول من ${last.from.replace('محافظة ','')} · ${last.date}</span>`;
          }
        }
        /* Egypt-leave badge if engineer is currently on leave */
        const activeLeave=getActiveEgyptLeave(eng);
        if(activeLeave){
          badges+=`<span style="display:inline-block;font-size:8px;padding:1px 6px;border-radius:100px;background:#FFEDD5;color:#C2410C;border:1px solid #FED7AA;font-weight:700;margin-right:4px">🇪🇬 إجازة منذ ${activeLeave.departureDate}</span>`;
        }
        return `<tr><td style="font-weight:700">${eng.name}${badges?'<br>'+badges:''}<br><span style="font-size:9px;color:#64748B">${eng.spec||''}</span></td>${cells}<td style="text-align:center;background:#FAFAFA"><span style="color:#059669;font-weight:800">${p}</span> · <span style="color:#DC2626;font-weight:800">${a}</span>${lv>0?' · <span style="color:#2563EB;font-weight:800">'+lv+'</span>':''}${egL>0?' · <span style="color:#C2410C;font-weight:800">'+egL+' م</span>':''}</td></tr>`;
      }).join('');
      const header=`<tr><th style="min-width:130px">المهندس</th>${days.map(d=>`<th style="min-width:24px;font-size:9px${isFri(d)?';background:#F1F5F9;color:#94A3B8':''}">${d}<br>${DAY_AR[new Date(Y,M-1,d).getDay()]}</th>`).join('')}<th style="min-width:90px">الملخص</th></tr>`;
      /* Transferred-OUT section (engineers who left this prov during this month) */
      const transferredOutNames=[];
      Object.values(_data).forEach(provEngsList=>(provEngsList||[]).forEach(e=>{
        const ts=getTransfers(e);
        if(!ts.length)return;
        const last=ts[ts.length-1];
        const lastDate=new Date(last.date+'T12:00');
        if(last.from===prov && e.prov!==prov && lastDate.getFullYear()===Y && lastDate.getMonth()+1===M){
          transferredOutNames.push({name:e.name,spec:e.spec,date:last.date,to:last.to});
        }
      }));
      const transferOutBlock=transferredOutNames.length>0
        ?`<div style="margin-top:8px;padding:10px 14px;background:#F5F3FF;border:1px solid #DDD6FE;border-radius:8px"><div style="font-size:11px;font-weight:800;color:#6D28D9;margin-bottom:6px">📤 منقولون من هذه المحافظة (${transferredOutNames.length})</div>${transferredOutNames.map(t=>`<div style="font-size:10px;color:#475569;padding:3px 0"><strong style="color:#1F2937">${t.name}</strong> · ${t.spec||'مهندس'} · <span style="color:#6D28D9">${t.date}</span> → <strong style="color:#059669">${t.to.replace('محافظة ','')}</strong></div>`).join('')}</div>`
        :'';
      return `<div class="section"><div class="section-title">📍 ${prov} (${provEngs.length} مهندس)</div><table>${header}${rows}</table>${transferOutBlock}</div>`;
    }).join('');
    const summary=`<div style="display:flex;gap:8px;margin-bottom:16px"><div style="flex:1;padding:10px;border:2px solid #34D399;background:#ECFDF5;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#059669">${totalP}</div><div style="font-size:10px;color:#065F46;font-weight:700">إجمالى الحضور</div></div><div style="flex:1;padding:10px;border:2px solid #F87171;background:#FEF2F2;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#DC2626">${totalA}</div><div style="font-size:10px;color:#991B1B;font-weight:700">إجمالى الغياب</div></div><div style="flex:1;padding:10px;border:2px solid #60A5FA;background:#EFF6FF;border-radius:8px;text-align:center"><div style="font-size:20px;font-weight:900;color:#2563EB">${totalLv}</div><div style="font-size:10px;color:#1E40AF;font-weight:700">إجمالى الإجازات</div></div></div>`;
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>تقرير الحضور — ${monthLabel}</title><style>${_pdfShellCss()}@page{size:A4 landscape;margin:8mm}body{padding:14px;font-size:10px}table{font-size:10px}th,td{padding:4px 6px}</style></head><body><div class="print-bar no-print"><button class="print-btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div>${_pdfHeaderHtml('تقرير الحضور والانصراف','تفصيل أيام الحضور والغياب لكل مهندس · '+monthLabel)}${summary}${provBlocks||'<div class="empty">لا توجد بيانات حضور</div>'}</body></html>`;
    _openPdfWin(html,mode);
  };

  /* ── Expenses PDF (defaults to current month ak; pass monthKey to override or pass 'all' for aggregated) ── */
  const printExpensesPDF=(mode='print',monthKey=null)=>{
    const fmt=n=>(+n||0).toLocaleString('ar-EG',{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtN=n=>(+n||0).toLocaleString('ar-EG',{minimumFractionDigits:0,maximumFractionDigits:0});
    const useKey=monthKey||ak;
    const isAll=useKey==='all';
    const useM=months[useKey];
    /* Source arrays: 'all' uses aggregated; specific month uses that month's expenses block */
    const baseCust=isAll?aggCustody:(useM?.expenses?.custody||[]).map(c=>({...c,monthKey:useKey}));
    const baseItems=isAll?aggExpItems:(useM?.expenses?.items||[]).map(e=>({...e,monthKey:useKey}));
    const baseTrfs=isAll?aggTransfers:(useM?.expenses?.transfers||[]).map(t=>({...t,monthKey:useKey}));
    const cust=isProvince?baseCust.filter(c=>c.prov===userProv):baseCust;
    const items=isProvince?baseItems.filter(e=>e.prov===userProv):baseItems;
    const trfs=isProvince?baseTrfs.filter(t=>t.prov===userProv):baseTrfs;
    const monthLabel=isAll?'كل الشهور':(useM?.cfg?MONTHS[(useM.cfg.month||1)-1]+' '+useM.cfg.year:useKey);
    const totC_USD=cust.reduce((a,c)=>a+(+c.usd||0),0);
    const totC_LYD=cust.reduce((a,c)=>a+(+c.lyd||0),0);
    const totI_USD=items.reduce((a,e)=>a+(+e.usd||0),0);
    const totI_LYD=items.reduce((a,e)=>a+(+e.lyd||0),0);
    const totT_USD=trfs.reduce((a,t)=>a+(+t.usd||0),0);
    const totT_LYD=trfs.reduce((a,t)=>a+(+t.lyd||0),0);
    const balUSD=totC_USD-totI_USD-totT_USD;
    const balLYD=totC_LYD+totT_LYD-totI_LYD;
    const summary=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">
      <div style="padding:10px;border:2px solid #34D399;background:#ECFDF5;border-radius:8px;text-align:center"><div style="font-size:9px;color:#065F46;font-weight:800;margin-bottom:4px">العهد المستلمة</div><div style="font-size:14px;font-weight:900;color:#059669">${fmt(totC_USD)} $</div><div style="font-size:11px;font-weight:800;color:#15803D">${fmtN(totC_LYD)} د.ل</div></div>
      <div style="padding:10px;border:2px solid #F87171;background:#FEF2F2;border-radius:8px;text-align:center"><div style="font-size:9px;color:#991B1B;font-weight:800;margin-bottom:4px">المصروفات</div><div style="font-size:14px;font-weight:900;color:#DC2626">${fmt(totI_USD)} $</div><div style="font-size:11px;font-weight:800;color:#B91C1C">${fmtN(totI_LYD)} د.ل</div></div>
      <div style="padding:10px;border:2px solid #FCD34D;background:#FFFBEB;border-radius:8px;text-align:center"><div style="font-size:9px;color:#78350F;font-weight:800;margin-bottom:4px">التحويلات ($→د.ل)</div><div style="font-size:14px;font-weight:900;color:#D97706">${fmt(totT_USD)} $</div><div style="font-size:11px;font-weight:800;color:#92400E">${fmtN(totT_LYD)} د.ل</div></div>
      <div style="padding:10px;border:2px solid #60A5FA;background:#EFF6FF;border-radius:8px;text-align:center"><div style="font-size:9px;color:#1E40AF;font-weight:800;margin-bottom:4px">الرصيد المتبقى</div><div style="font-size:14px;font-weight:900;color:${balUSD<0?'#DC2626':'#2563EB'}">${fmt(balUSD)} $</div><div style="font-size:11px;font-weight:800;color:${balLYD<0?'#DC2626':'#1E40AF'}">${fmtN(balLYD)} د.ل</div></div>
    </div>`;
    const sCust=cust.length?`<div class="section"><div class="section-title">💰 العهد المستلمة (${cust.length})</div><table><thead><tr><th>التاريخ</th><th>المحافظة</th><th>المسؤول</th><th>المصدر</th><th style="text-align:center">$</th><th style="text-align:center">د.ل</th><th>ملاحظات</th></tr></thead><tbody>${cust.map(c=>`<tr><td>${c.date||'—'}</td><td>${(c.prov||'').replace('محافظة ','')}</td><td>${c.responsible||'—'}</td><td>${c.source||'—'}</td><td style="text-align:center;font-weight:700;color:#059669">${fmt(c.usd||0)}</td><td style="text-align:center;font-weight:700;color:#15803D">${fmtN(c.lyd||0)}</td><td style="font-size:10px;color:#64748B">${c.notes||''}</td></tr>`).join('')}<tr style="background:#F8FAFC;font-weight:900"><td colspan="4">الإجمالى</td><td style="text-align:center;color:#059669">${fmt(totC_USD)} $</td><td style="text-align:center;color:#15803D">${fmtN(totC_LYD)} د.ل</td><td></td></tr></tbody></table></div>`:'';
    const sItems=items.length?`<div class="section"><div class="section-title">💸 المصروفات والإيجارات (${items.length})</div><table><thead><tr><th>التاريخ</th><th>النوع</th><th>التصنيف</th><th>الوصف</th><th>المحافظة</th><th style="text-align:center">$</th><th style="text-align:center">د.ل</th></tr></thead><tbody>${items.map(e=>`<tr><td>${e.date||'—'}</td><td><span style="background:${e.type==='إيجار'?'#FEF3C7':'#FEE2E2'};color:${e.type==='إيجار'?'#92400E':'#991B1B'};padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800">${e.type||'—'}</span></td><td>${e.category||'—'}</td><td>${e.desc||'—'}</td><td>${(e.prov||'').replace('محافظة ','')}</td><td style="text-align:center;font-weight:700;color:#DC2626">${fmt(e.usd||0)}</td><td style="text-align:center;font-weight:700;color:#B91C1C">${fmtN(e.lyd||0)}</td></tr>`).join('')}<tr style="background:#F8FAFC;font-weight:900"><td colspan="5">الإجمالى</td><td style="text-align:center;color:#DC2626">${fmt(totI_USD)} $</td><td style="text-align:center;color:#B91C1C">${fmtN(totI_LYD)} د.ل</td></tr></tbody></table></div>`:'';
    const sTrfs=trfs.length?`<div class="section"><div class="section-title">🔄 التحويلات (${trfs.length})</div><table><thead><tr><th>التاريخ</th><th>المحافظة</th><th>المسؤول</th><th style="text-align:center">من ($)</th><th style="text-align:center">إلى (د.ل)</th><th style="text-align:center">السعر</th></tr></thead><tbody>${trfs.map(t=>`<tr><td>${t.date||'—'}</td><td>${(t.prov||'').replace('محافظة ','')}</td><td>${t.responsible||'—'}</td><td style="text-align:center;font-weight:700;color:#D97706">${fmt(t.usd||0)}</td><td style="text-align:center;font-weight:700;color:#92400E">${fmtN(t.lyd||0)}</td><td style="text-align:center;font-size:10px;color:#64748B">${t.usd>0?(t.lyd/t.usd).toFixed(2):'—'}</td></tr>`).join('')}<tr style="background:#F8FAFC;font-weight:900"><td colspan="3">الإجمالى</td><td style="text-align:center;color:#D97706">${fmt(totT_USD)} $</td><td style="text-align:center;color:#92400E">${fmtN(totT_LYD)} د.ل</td><td></td></tr></tbody></table></div>`:'';
    const html=`<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>تقرير المصروفات — ${monthLabel}</title><style>${_pdfShellCss()}</style></head><body><div class="print-bar no-print"><button class="print-btn" onclick="window.print()">🖨️ طباعة / حفظ PDF</button></div>${_pdfHeaderHtml('تقرير العهدة والمصروفات','العهد + الإيجارات + التحويلات + الرصيد المتبقى · '+monthLabel)}${summary}${sCust||'<div class="empty">لا توجد عهد مسجلة</div>'}${sItems}${sTrfs}</body></html>`;
    _openPdfWin(html,mode);
  };

  /* ── Leaves PDF (all leaves with status) ── */
  const printLeavesPDF=(mode='print')=>{
    const fmtN=n=>(+n||0).toLocaleString('ar-EG');
    const list=isProvince?leaves.filter(l=>l.prov===userProv):leaves;
    const approved=list.filter(l=>l.status==='approved');
    const pending=list.filter(l=>l.status==='pending');
    const cancelled=list.filter(l=>l.status==='cancelled'||l.status==='rejected');
    const today=new Date();today.setHours(12,0,0,0);
    const onLeaveNow=approved.filter(l=>{
      if(!l.travelDate)return false;
      const t=new Date(l.travelDate+'T12:00'),r=l.returnDate?new Date(l.returnDate+'T12:00'):null;
      return t<=today&&(!r||today<=r);
    });
    const summary=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px">

              },h(Ic,{n:"plus",sz:12}),"إضافة مستخدم")
            ),
            provUsers.length===0

                provUsers.map(u=>{

                    h("div",{style:{position:"relative",flexShrink:0}},
                      h("div",{style:{width:36,height:36,borderRadius:"50%",background:"rgba(96,165,250,.12)",border:"1px solid rgba(96,165,250,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}},"👤"),
                      isOnline&&h("div",{style:{position:"absolute",bottom:1,left:1,width:10,height:10,borderRadius:"50%",background:"#34D399",border:"2px solid var(--bg2)",boxShadow:"0 0 6px #34D399"}})
                    ),
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:2}},
                        h("span",{style:{fontWeight:700,fontSize:13}},u.username),
                        isOnline&&h("span",{style:{fontSize:9,padding:"1px 6px",borderRadius:100,background:"rgba(52,211,153,.15)",color:"#34D399",border:"1px solid rgba(52,211,153,.3)",fontWeight:700}},"نشط")
                      ),
                      h("div",{style:{fontSize:11,color:"var(--sub)"}},u.province)
                    ),
                    h("button",{className:"btn",style:{fontSize:11,padding:"5px 12px"},
                      onClick:()=>setPwdModal({id:u.id,username:u.username,val:""})},
                      h("svg",{viewBox:"0 0 20 20",fill:"none",stroke:"currentColor",strokeWidth:"1.8",strokeLinecap:"round",width:12,height:12},
                        h("rect",{x:3,y:9,width:14,height:9,rx:1.5}),h("path",{d:"M7 9V6a3 3 0 016 0v3"})
                      ),
                      " كلمة المرور"
                    ),
                    h("button",{className:"btn-icon del",title:"حذف المستخدم",
                      onClick:async()=>{
                        if(!confirm(`حذف مستخدم "${u.username}"؟`))return;
                        const r=await fetch(`/api/users/${u.id}`,{method:"DELETE"});
                        if(r.ok){setProvUsers(p=>p.filter(x=>x.id!==u.id));msg("تم حذف المستخدم ✓");}
                        else{const d=await r.json();msg(d.error||"خطأ","err");}
                      }
                    },h(Ic,{n:"del",sz:12}))
                  );
                })
              )
          )
        )
      ),

      /* ══ ACTIVITY LOG ══ */
      page==="activity"&&h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        h("div",{className:"card"},
          h("div",{className:"card-hdr"},
            h("div",{className:"card-title"},h("div",{className:"card-title-icon",style:{background:"rgba(96,165,250,.12)"}},h(Ic,{n:"att",sz:13,c:"#60A5FA"})),"سجل النشاط"),
            h("button",{className:"btn",style:{padding:"4px 12px",fontSize:11},onClick:()=>{
              fetch('/api/activity').then(r=>r.json()).then(d=>{if(d.logs)setActivityLogs(d.logs);}).catch(()=>{});
            }},h(Ic,{n:"hist",sz:12})," تحديث")
          ),
          activityLogs.length===0
            ?h("div",{style:{padding:"28px",textAlign:"center",color:"var(--sub)",fontSize:12}},"لا يوجد سجل نشاط بعد")
            :h("div",{style:{overflowX:"auto"}},
              h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
                h("thead",null,
                  h("tr",{style:{background:"var(--bg2)",borderBottom:"1px solid var(--bdr)"}},
                    h("th",{style:{padding:"8px 14px",textAlign:"right",fontWeight:700,color:"var(--sub)",whiteSpace:"nowrap"}},"المستخدم"),
                    h("th",{style:{padding:"8px 14px",textAlign:"right",fontWeight:700,color:"var(--sub)",whiteSpace:"nowrap"}},"العملية"),
                    h("th",{style:{padding:"8px 14px",textAlign:"right",fontWeight:700,color:"var(--sub)",whiteSpace:"nowrap"}},"التفاصيل"),
                    h("th",{style:{padding:"8px 14px",textAlign:"right",fontWeight:700,color:"var(--sub)",whiteSpace:"nowrap"}},"التاريخ والوقت")
                  )
                ),
                h("tbody",null,
                  activityLogs.map((log,i)=>{
                    const d=new Date(log.ts);
                    const dateStr=d.toLocaleDateString("ar-EG",{day:"numeric",month:"short",year:"numeric"});
                    const timeStr=d.toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
                    const actionCol=log.action.includes("حذف")?"#F87171":log.action.includes("إضافة")?"#34D399":log.action==="نقل مهندس"?"#A78BFA":log.action==="نقل لمصر"?"#F87171":"#60A5FA";
                    /* Detect transfer log entry → resolve engineer + transfer entry → undo button */
                    let undoBtn=null;
                    if(log.action==='نقل مهندس'&&isAdmin){
                      /* Detail format: ${engName} — من ${shortFrom} إلى ${shortTo} بتاريخ ${date} */
                      const m=(log.detail||'').match(/^(.+?)\s—\sمن\s(.+?)\sإلى\s(.+?)\sبتاريخ\s(.+)$/);
                      if(m){
                        const[,name,shortFrom,shortTo,date]=m;
                        const fromProv='محافظة '+shortFrom.trim();
                        const toProv='محافظة '+shortTo.trim();
                        /* Find engineer + matching transfer in current month */
                        let foundEng=null;
                        PROVS.forEach(p=>(data[p]||[]).forEach(e=>{if(e.name===name)foundEng=e;}));
                        if(foundEng){
                          const ts=getTransfers(foundEng);
                          const tIdx=ts.findIndex(t=>t.from===fromProv&&t.to===toProv&&t.date===date.trim());
                          /* Only allow undo if it's the LATEST transfer */
                          if(tIdx===ts.length-1&&tIdx!==-1){
                            const tr=ts[tIdx];
                            undoBtn=h("button",{
                              title:"تراجع عن النقل",
                              onClick:()=>setUndoConfirm({eng:foundEng,transfer:tr}),
                              style:{padding:"3px 10px",fontSize:10,fontWeight:800,border:"1px solid rgba(245,158,11,.4)",borderRadius:6,background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.06))",color:"#fbbf24",fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap"}
                            },"↩️ تراجع");
                          }
                        }
                      }
                    }else if(log.action==='نقل لمصر'&&isAdmin){
                      /* Detail format: ${engName} — من ${shortFrom} بتاريخ ${date}[ · ${notes}] */
                      const m=(log.detail||'').match(/^(.+?)\s—\sمن\s(.+?)\sبتاريخ\s([^\s·]+)/);
                      if(m){
                        const[,name,,date]=m;
                        /* Find engineer with egypt-transfer in dataRaw (ignoring filter) */
                        let foundEng=null;
                        PROVS.forEach(p=>(dataRaw[p]||[]).forEach(e=>{if(e.name===name&&e.egyptTransfer&&e.egyptTransfer.date===date.trim())foundEng=e;}));
                        if(foundEng&&foundEng.egyptTransfer){
                          undoBtn=h("button",{
                            title:"تراجع عن النقل لمصر",
                            onClick:()=>setUndoConfirm({eng:foundEng,transfer:{...foundEng.egyptTransfer,from:foundEng.egyptTransfer.fromProv,to:'مصر 🇪🇬'}}),
                            style:{padding:"3px 10px",fontSize:10,fontWeight:800,border:"1px solid rgba(245,158,11,.4)",borderRadius:6,background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.06))",color:"#fbbf24",fontFamily:"inherit",cursor:"pointer",whiteSpace:"nowrap"}
                          },"↩️ تراجع");
                        }
                      }
                    }
                    return h("tr",{key:log.id,style:{borderBottom:"1px solid var(--bdr)",background:i%2===0?"transparent":"var(--bg2)"}},
                      h("td",{style:{padding:"9px 14px",fontWeight:600}},log.username),
                      h("td",{style:{padding:"9px 14px"}},
                        h("span",{style:{background:`rgba(${actionCol==="#F87171"?"248,113,113":actionCol==="#34D399"?"52,211,153":actionCol==="#A78BFA"?"167,139,250":"96,165,250"},.12)`,color:actionCol,padding:"2px 10px",borderRadius:100,fontWeight:700,fontSize:11}},log.action)
                      ),
                      h("td",{style:{padding:"9px 14px",color:"var(--sub)"}},
                        h("div",{style:{display:"flex",alignItems:"center",gap:8,justifyContent:"space-between"}},
                          h("span",null,log.detail||"—"),
                          undoBtn
                        )
                      ),
                      h("td",{style:{padding:"9px 14px",color:"var(--sub)",whiteSpace:"nowrap",fontSize:11}},dateStr+" · "+timeStr)
                    );
                  })
                )
              )
            )
        )
      ),

      /* ══ ORGANIZATIONAL CHART ══ */
      page==="org"&&h("div",{className:"org-page"},
        h(OcOrgChart,{data:data,att:att,orgData:orgData,cfg:cfg,onPrintReady:fn=>{orgPrintRef.current=fn;}})
      ),

      /* ── ENGINEER PROFILE MODAL ────────────────────────── */
      engProfile&&h("div",{className:"overlay",onClick:()=>setEngProfile(null)},
        h("div",{className:"modal ep-modal",onClick:e=>e.stopPropagation()},
          h("div",{className:"modal-hdr"},
            h("div",{style:{display:"flex",flexDirection:"column",gap:2}},
              h("h3",null,engProfile.eng.name),
              h("div",{style:{fontSize:11,color:"var(--sub)"}},engProfile.eng.spec||"مهندس"," · ",engProfile.prov)
            ),
            h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
              h("button",{className:"btn",style:{fontSize:11,padding:"5px 12px"},onClick:()=>window.print()},"🖨️ طباعة"),
              h("button",{className:"btn-icon del",onClick:()=>setEngProfile(null)},h(Ic,{n:"del",sz:14}))
            )
          ),
          h("div",{className:"ep-tab-bar"},
            [["info","بيانات"],["allowance","الإعاشة"],["att","الحضور"],["leaves","الإجازات"],["transfers","📍 التنقلات"]].map(([k,lbl])=>
              h("button",{key:k,className:`ep-tab ${epTab===k?"on":""}`,onClick:()=>setEpTab(k)},lbl)
            )
          ),
          h("div",{className:"ep-body"},
            epTab==="info"&&h("div",{className:"ep-info-grid"},
              [["الاسم",engProfile.eng.name],["التخصص",engProfile.eng.spec||"مهندس"],
               ["المحافظة",engProfile.prov],["تاريخ القدوم من مصر",engProfile.eng.arrivalDate||"—"],
               ["تاريخ الإضافة",engProfile.eng.addedAt||"—"],
               ["المعرّف",engProfile.eng.id||"—"]
              ].map(([lbl,val])=>h("div",{key:lbl,className:"ep-field"},
                h("div",{className:"ep-lbl"},lbl),h("div",{className:"ep-val"},val)
              ))
            ),
            epTab==="allowance"&&h("div",null,
              !engProfileData||engProfileData.monthly.length===0
                ?h("div",{style:{padding:"24px",textAlign:"center",color:"var(--sub)"}},"لا توجد بيانات إعاشة")
                :h("div",{className:"tbl-wrap"},h("table",{className:"tbl"},
                  h("thead",null,h("tr",null,h("th",{className:"l"},"الشهر"),h("th",null,"نصف أول"),h("th",null,"نصف ثاني"),h("th",null,"الإجمالي $"),h("th",null,"ج.م"))),
                  h("tbody",null,
                    engProfileData.monthly.map(m=>h("tr",{key:m.key},
                      h("td",{className:"l",style:{fontWeight:600}},m.monthLabel),
                      h("td",null,m.d1," يوم"),h("td",null,m.d2," يوم"),
                      h("td",{style:{fontWeight:700,color:"var(--blue)"}},f$(m.c.tot)),
                      h("td",{style:{color:"var(--sub)"}},fE(m.c.egp))
                    )),
                    h("tr",{className:"sub-row"},
                      h("td",{className:"l"},"الإجمالى"),h("td",null),h("td",null),
                      h("td",{style:{fontWeight:800,color:"var(--green)"}},f$(engProfileData.monthly.reduce((a,m)=>a+m.c.tot,0))),
                      h("td",{style:{color:"var(--sub)"}},fE(engProfileData.monthly.reduce((a,m)=>a+m.c.egp,0)))
                    )
                  )
                ))
            ),
            epTab==="att"&&h("div",null,
              !engProfileData||engProfileData.monthly.length===0
                ?h("div",{style:{padding:"24px",textAlign:"center",color:"var(--sub)"}},"لا توجد بيانات حضور")
                :h("div",{className:"tbl-wrap"},h("table",{className:"tbl"},
                  h("thead",null,h("tr",null,h("th",{className:"l"},"الشهر"),h("th",null,"حاضر"),h("th",null,"مصر"),h("th",null,"غائب"),h("th",null,"إجازة"),h("th",null,"مرضية"))),
                  h("tbody",null,
                    engProfileData.monthly.map(m=>h("tr",{key:m.key},
                      h("td",{className:"l",style:{fontWeight:600}},m.monthLabel),
                      h("td",{style:{color:ATT_COL.P}},m.present||"—"),
                      h("td",{style:{color:ATT_COL.EG}},m.egypt||"—"),
                      h("td",{style:{color:ATT_COL.A}},m.absent||"—"),
                      h("td",{style:{color:ATT_COL.AL}},m.leave||"—"),
                      h("td",{style:{color:ATT_COL.SL}},m.sick||"—")
                    ))
                  )
                ))
            ),
            epTab==="leaves"&&h("div",null,
              !engProfileData||engProfileData.engLeaves.length===0
                ?h("div",{style:{padding:"24px",textAlign:"center",color:"var(--sub)"}},"لا توجد إجازات مسجلة")
                :h("div",{style:{display:"flex",flexDirection:"column",gap:8,padding:"4px 0"}},
                  engProfileData.engLeaves.map(l=>h("div",{key:l.id,style:{padding:"12px 14px",borderRadius:8,background:"var(--bg2)",border:"1px solid var(--bdr)"}},
                    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
                      h("div",{style:{fontWeight:700,fontSize:12}},l.leaveStartDate," → ",l.leaveEndDate," (",l.durationDays," يوم)"),
                      h("span",{style:{fontSize:10,padding:"2px 8px",borderRadius:100,fontWeight:600,
                        background:l.status==="approved"?"rgba(52,211,153,.12)":l.status==="rejected"?"rgba(239,68,68,.1)":"rgba(252,211,77,.1)",
                        color:l.status==="approved"?"#34D399":l.status==="rejected"?"#F87171":"#FCD34D"
                      }},l.status==="approved"?"موافق":l.status==="rejected"?"مرفوض":"قيد المراجعة")
                    ),
                    l.notes&&h("div",{style:{fontSize:11,color:"var(--sub)"}},l.notes)
                  ))
                )
            ),
            epTab==="transfers"&&(()=>{
              const ts=getTransfers(engProfile.eng);
              return h("div",{style:{display:"flex",flexDirection:"column",gap:14}},
                /* Current province badge */
                h("div",{style:{padding:"14px 16px",borderRadius:12,background:"linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.08))",border:"1px solid rgba(139,92,246,.30)",display:"flex",alignItems:"center",gap:10}},
                  h("span",{style:{fontSize:18}},"📍"),
                  h("div",{style:{flex:1}},
                    h("div",{style:{fontSize:10,fontWeight:800,color:"#a5b4fc",letterSpacing:"1px",marginBottom:2}},"الموقع الحالى"),
                    h("div",{style:{fontSize:14,fontWeight:900,color:"var(--text)"}},engProfile.prov)
                  )
                ),
                /* Timeline */
                ts.length===0
                  ?h("div",{style:{padding:"24px",textAlign:"center",color:"var(--sub)",fontSize:12}},"لا توجد تنقلات سابقة — المهندس فى محافظته الأولى منذ التسجيل")
                  :h("div",{style:{display:"flex",flexDirection:"column",gap:0,position:"relative",paddingRight:18}},
                      h("div",{style:{position:"absolute",right:6,top:6,bottom:6,width:2,background:"linear-gradient(180deg,rgba(139,92,246,.45),rgba(99,102,241,.18))"}}),
                      ts.slice().reverse().map((t,i)=>{
                        const isLatest=i===0; /* slice().reverse() puts latest first */
                        return h("div",{key:t.id||t.at||i,style:{position:"relative",padding:"10px 14px 14px 0",marginBottom:6}},
                          h("div",{style:{position:"absolute",right:-3,top:14,width:14,height:14,borderRadius:"50%",background:isLatest?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#475569",border:"2px solid var(--bg)",boxShadow:isLatest?"0 0 12px rgba(139,92,246,.6)":"none"}}),
                          h("div",{style:{padding:"10px 14px",borderRadius:10,background:"var(--bg2)",border:"1px solid var(--bdr)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}},
                            h("div",null,
                              h("div",{style:{fontSize:11,color:"var(--sub)",marginBottom:4,fontWeight:700}},"📅 "+t.date+(t.by?" · بواسطة "+t.by:"")),
                              h("div",{style:{fontSize:13,fontWeight:800,color:"var(--text)"}},
                                h("span",{style:{color:"#94a3b8"}},t.from.replace('محافظة ','')),
                                h("span",{style:{margin:"0 8px",color:"#a78bfa",fontWeight:900}},"→"),
                                h("span",{style:{color:"#34d399"}},t.to.replace('محافظة ',''))
                              )
                            ),
                            /* Undo button — only on the LATEST transfer, admin or province (with own+24h) */
                            isLatest&&(isAdmin||(isProvince&&t.by===user?.username&&(Date.now()-new Date(t.at).getTime())<24*60*60*1000))&&
                            h("button",{
                              title:"تراجع عن هذا النقل",
                              style:{padding:"6px 12px",border:"1px solid rgba(245,158,11,.4)",borderRadius:8,background:"linear-gradient(135deg,rgba(245,158,11,.15),rgba(217,119,6,.06))",color:"#fbbf24",fontFamily:"inherit",fontSize:11,fontWeight:800,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0},
                              onClick:()=>setUndoConfirm({eng:engProfile.eng,transfer:t})
                            },"↩️ تراجع")
                          )
                        );
                      })
                    )
              );
            })()
          )
        )
      ),

      /* ── ATT CELL POPUP ─────────────────────────────────── */
      attPopup&&(()=>{const PH=290,PW=145;const showAbove=attPopup.y+4+PH>window.innerHeight;const top=showAbove?Math.max(4,attPopup.cellTop-4-PH):attPopup.y+4;const left=Math.max(4,Math.min(attPopup.x,window.innerWidth-PW-4));return h("div",{className:"att-popup",style:{top,left},onClick:e=>e.stopPropagation()},
        h("div",{className:"att-popup-hdr"},"تسجيل الحالة"),
        ATT_CYCLE.filter(s=>s!==null).map(s=>
          h("button",{key:s,className:"att-popup-btn",style:{background:ATT_BG[s],color:ATT_COL[s]},
            onClick:()=>{attSetStatus(attPopup.engId,attPopup.day,s);setAttPopup(null);}
          },
            h("span",{style:{fontWeight:900,minWidth:16}},ATT_SHORT[s]),
            h("span",null,ATT_LABEL[s])
          )
        ),
        h("button",{className:"att-popup-btn att-popup-clr",
          onClick:()=>{attClearCell(attPopup.engId,attPopup.day);setAttPopup(null);}
        },"✕  مسح")
      );})(),

      /* ── DAY POPUP ───────────────────────────────────────── */
      dayPopup&&(()=>{const PH=320,PW=145;const showAbove=dayPopup.y+4+PH>window.innerHeight;const top=showAbove?Math.max(4,dayPopup.cellTop-4-PH):dayPopup.y+4;const left=Math.max(4,Math.min(dayPopup.x,window.innerWidth-PW-4));return h("div",{className:"att-popup",style:{top,left},onClick:e=>e.stopPropagation()},
        h("div",{className:"att-popup-hdr"},"اليوم "+dayPopup.day+" — تسجيل الكل"),
        ATT_CYCLE.filter(s=>s!==null).map(s=>
          h("button",{key:s,className:"att-popup-btn",style:{background:ATT_BG[s],color:ATT_COL[s]},
            onClick:()=>{
              (data[attProv]||[]).forEach(eng=>{attSetStatus(eng.id,dayPopup.day,s);});
              setDayPopup(null);
            }
          },
            h("span",{style:{fontWeight:900,minWidth:16}},ATT_SHORT[s]),
            h("span",null,ATT_LABEL[s])
          )
        ),
        h("button",{className:"att-popup-btn",style:{background:"var(--bg)",color:"var(--sub)",marginTop:2},
          onClick:()=>setDayPopup(null)
        },"إلغاء")
      );})(),

      /* ── BOTTOM NAV (mobile) ──────────────────────────── */
      h("div",{className:"bottom-nav"},
        h("div",{className:"bottom-nav-inner"},
          (isAdmin?mobileNavs:[{id:"eng",n:"eng",lbl:"كشف الإعاشة"},{id:"att",n:"att",lbl:"الحضور"}])
            .map(({id,n,lbl})=>h("div",{key:id,className:`bn-item ${page===id?"on":""}`,onClick:()=>setPage(id)},h(Ic,{n,sz:20}),h("span",null,lbl.split(" ")[0]))),
          isAdmin&&h("div",{className:`bn-item ${["backup","report"].includes(page)?"on":""}`,onClick:()=>setPage("backup")},
            h(Ic,{n:"backup",sz:20}),h("span",null,"أدوات"),
            unsaved>0&&h("div",{className:"nav-badge",style:{position:"absolute",top:4,left:"50%",transform:"translateX(-50%)",margin:0}},unsaved)
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
